// ── STOCK TAB ─────────────────────────────────────────────
function _renderBranchStockTab(branchId) {
  if (!branchId) return;
  var u = STATE.user;
  var canManage = _can('branches.manage')||_can('dispatch.approve')||_can('sr.approve')||_can('project.approve');
  var branch = STATE.data.branches.find(function(b){ return b.id === branchId; }) || {};
  var sites   = STATE.data.sites.filter(function(s){ return s.branchId === branchId && s.status === 'ACTIVE'; });

  var catOpts = '<option value="ALL">All Categories</option>' +
    STATE.data.categories.map(function(c){
      return '<option value="'+c.id+'" '+(_branchCatFilter===c.id?'selected':'')+'">'+_catLabel(c)+'</option>';
    }).join('');

  // Build stock rows — branch only (sites have their own view)
  var rows = [];
  STATE.data.products.forEach(function(p){
    var cat = STATE.data.categories.find(function(c){ return c.id === p.categoryId; }) || {};
    var qty = ((STATE.data.stock||[])[p.id]||{})[branchId] || 0;
    rows.push({ p:p, cat:cat, locId:branchId, qty:qty });
  });

  // Apply category filter
  if (_branchCatFilter !== 'ALL') {
    rows = rows.filter(function(r){ return r.p.categoryId === _branchCatFilter; });
  }
  // Apply search
  if (_branchSearch) {
    var q = _branchSearch.toLowerCase();
    rows = rows.filter(function(r){
      return r.p.name.toLowerCase().includes(q) ||
             r.p.sku.toLowerCase().includes(q) ||
             (r.p.nameLao||'').toLowerCase().includes(q);
    });
  }
  // Hide zero by default
  var showZero = _branchSearch || _branchCatFilter !== 'ALL';
  if (!showZero) rows = rows.filter(function(r){ return r.qty > 0; });

  // Sort
  rows.sort(function(a,b){
    var av, bv;
    if (_branchSortCol === 'qty') { av = a.qty; bv = b.qty; }
    else if (_branchSortCol === 'value') { av = a.qty*a.p.costPrice; bv = b.qty*b.p.costPrice; }
    else if (_branchSortCol === 'sku') { av = a.p.sku; bv = b.p.sku; }
    else if (_branchSortCol === 'cat') { av = a.cat.name||''; bv = b.cat.name||''; }
    else { av = a.p.name; bv = b.p.name; }
    if (av < bv) return _branchSortDir === 'asc' ? -1 : 1;
    if (av > bv) return _branchSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  // Summary stats
  var totalVal  = rows.reduce(function(s,r){ return s+r.qty*r.p.costPrice; }, 0);
  var lowRows   = rows.filter(function(r){ return r.qty>0 && r.qty<=r.p.reorderPoint; }).length;
  var zeroRows  = rows.filter(function(r){ return r.qty===0; }).length;

  function sortBtn(col, label) {
    var active = _branchSortCol === col;
    var arrow = active ? (_branchSortDir === 'asc' ? ' ↑' : ' ↓') : '';
    return '<th class="text-left px-3 py-3 text-xs font-bold text-slate-500 uppercase cursor-pointer hover:text-blue-600 select-none" onclick="_branchSortCol=\''+col+'\';_branchSortDir=(_branchSortCol===\''+col+'\'&&_branchSortDir===\'asc\'?\'desc\':\'asc\');_renderBranchStockTab(\''+branchId+'\')">'+label+arrow+'</th>';
  }

  // Rows per page (no pagination — selector only)
  var _bppKey = 'branchStockPerPage_'+branchId;
  if (!window[_bppKey]) window[_bppKey] = 25;
  var bPerPage = window[_bppKey];
  var bTotal   = rows.length;
  var pageRows = bPerPage >= 99999 ? rows : rows.slice(0, bPerPage);

  var rowsSelectorHtml =
    '<div class="flex items-center gap-2">' +
    '<span class="text-xs text-slate-500">ສະແດງ Rows:</span>' +
    '<select class="text-xs border border-slate-200 rounded-lg px-2 py-1 bg-white cursor-pointer hover:border-blue-400 transition-colors" ' +
    'onchange="window[\''+_bppKey+'\']=Number(this.value);_renderBranchStockTab(\''+branchId+'\')">' +
    [10,25,50,100,99999].map(function(n){
      var lbl = n===99999?'ທັງໝົດ':String(n);
      return '<option value="'+n+'" '+(bPerPage===n?'selected':'')+'>'+lbl+'</option>';
    }).join('')+
    '</select>' +
    '<span class="text-xs text-slate-400">ລາຍການ</span>' +
    (bTotal > bPerPage && bPerPage < 99999
      ? '<span class="text-xs text-slate-400 ml-1">ສະແດງ 1–'+bPerPage+' ຈາກ <strong>'+bTotal+'</strong></span>'
      : '<span class="text-xs text-slate-400 ml-1">('+bTotal+' ທັງໝົດ)</span>') +
    '</div>';

  var el = document.getElementById('branchTabContent');
  if (!el) return;

  el.innerHTML =
    // Summary cards
    '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">' +
    '<div class="bg-blue-50 border border-blue-100 rounded-2xl p-3 text-center"><div class="text-xl font-black text-blue-700">'+rows.length+'</div><div class="text-xs text-slate-500">ລາຍການ</div></div>' +
    '<div class="bg-slate-50 border border-slate-200 rounded-2xl p-3 text-center"><div class="text-lg font-black text-slate-800">LAK '+fmtNum(totalVal)+'</div><div class="text-xs text-slate-500">ມູນຄ່າລວມ</div></div>' +
    '<div class="bg-'+(lowRows>0?'amber':'emerald')+'-50 border border-'+(lowRows>0?'amber':'emerald')+'-100 rounded-2xl p-3 text-center"><div class="text-xl font-black text-'+(lowRows>0?'amber':'emerald')+'-700">'+lowRows+'</div><div class="text-xs text-slate-500">⚠️ Low Stock</div></div>' +
    '<div class="bg-slate-50 border border-slate-200 rounded-2xl p-3 text-center"><div class="text-xl font-black text-slate-400">'+zeroRows+'</div><div class="text-xs text-slate-500">ໝົດ (0)</div></div>' +
    '</div>' +

    // Filters bar
    '<div class="flex flex-wrap gap-2 mb-4 items-center">' +
    '<input value="'+_branchSearch+'" oninput="_branchSearch=this.value;_renderBranchStockTab(\''+branchId+'\')" class="input" style="max-width:220px" placeholder="🔍 SKU / ຊື່ສິນຄ້າ...">' +
    '<select onchange="_branchCatFilter=this.value;_renderBranchStockTab(\''+branchId+'\')" class="select" style="max-width:180px">'+catOpts+'</select>' +
    '<label class="flex items-center gap-1.5 text-xs text-slate-500 cursor-pointer">' +
    '<input type="checkbox" '+(showZero?'checked':'')+' onchange="_branchSearch=\'\';_branchCatFilter=\'ALL\';_renderBranchStockTab(\''+branchId+'\')" class="rounded">ສະແດງ 0 ດ້ວຍ</label>' +
    '<div class="ml-auto">' + rowsSelectorHtml + '</div>' +
    '</div>' +

    // Table
    '<div class="card overflow-hidden">' +
    '<div class="overflow-x-auto"><table class="w-full text-sm">' +
    '<thead class="bg-slate-50 border-b border-slate-200"><tr>' +
    sortBtn('sku','SKU') +
    sortBtn('name','ສິນຄ້າ') +
    sortBtn('cat','Category') +
    sortBtn('qty','ຈຳນວນ') +
    sortBtn('value','ມູນຄ່າ') +
    '<th class="text-left px-3 py-3 text-xs font-bold text-slate-500 uppercase">Status</th>' +
    '<th class="px-3 py-3 text-xs font-bold text-slate-500 uppercase">Action</th>' +
    '</tr></thead><tbody>' +
    (pageRows.length === 0
      ? '<tr><td colspan="7" class="px-4 py-10 text-center text-slate-400">ບໍ່ພົບລາຍການສິນຄ້າ</td></tr>'
      : pageRows.map(function(r){
          var isLow  = r.qty > 0 && r.qty <= r.p.reorderPoint;
          var isZero = r.qty === 0;

          // ── Asset check ───────────────────────────────────
          var isAsset  = _isAssetCategory(r.p.categoryId);
          var asStatus = isAsset ? _getAssetStatus(r.p.id, branchId) : null;
          var stCfg    = asStatus ? (_ASSET_STATUS_CFG[asStatus.status]||_ASSET_STATUS_CFG.OPERATIONAL)
                                  : (isAsset ? _ASSET_STATUS_CFG.OPERATIONAL : null);
          var isBroken = asStatus && (asStatus.status==='UNDER_MAINTENANCE'||asStatus.status==='CANNOT_REPAIR'||asStatus.status==='DISPOSED');

          var rowCls = isBroken ? 'bg-amber-50/30' : isZero ? 'opacity-50 bg-slate-50/30' : isLow ? 'bg-amber-50/40' : '';

          // ── Status badge ──────────────────────────────────
          var statusBadge;
          if (isAsset && stCfg) {
            statusBadge = '<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full font-bold '+stCfg.cls+'">' +
              '<span class="w-1.5 h-1.5 rounded-full '+stCfg.dot+' flex-shrink-0"></span>'+stCfg.label+'</span>';
            if (asStatus && asStatus.mrNumber) statusBadge += '<div class="text-[9px] text-slate-400 mt-0.5">'+asStatus.mrNumber+'</div>';
          } else {
            statusBadge = isZero
              ? '<span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-400">ໝົດ</span>'
              : isLow
                ? '<span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-semibold">⚠️ ໃກ້ໝົດ</span>'
                : '<span class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-semibold">✅ OK</span>';
          }

          // ── Action buttons ────────────────────────────────
          var adjustBtn = _can('inventory.branch.manage')
            ? '<button type="button" onclick="openAdjustStock(\''+r.p.id+'\',\''+r.locId+'\',\''+branch.name+'\')" '+
              'class="text-[10px] px-2 py-1 rounded-lg bg-amber-50 hover:bg-amber-100 text-amber-600 border border-amber-200 font-semibold">⚙️ ແກ້ໄຂ</button>'
            : '';

          var maintBtn = '';
          if (isAsset && _can('maintenance.create') && !isBroken) {
            maintBtn = '<button type="button" onclick="openCreateMRFromStock(\''+r.p.id+'\',\''+r.p.sku+'\',\''+r.p.name.replace(/'/g,'')+'\',\''+branchId+'\')" '+
              'class="text-[10px] px-2 py-1 rounded-lg bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 font-semibold" '+
              'title="ແຈ້ງສ້ອມແປງ">🔧 ແຈ້ງສ້ອມ</button>';
          }
          if (isAsset && isBroken && _can('maintenance.view')) {
            var mrLinkId = asStatus ? asStatus.mrId : '';

  if (srpjData.length) {

      return '<th class="text-left px-4 py-2 text-xs font-bold text-slate-500">'+h+'</th>';

    el.innerHTML += _historySection('srpj_'+branchId, '📋', 'ໃບເບີກຫຼ້າສຸດ', srTh, srpjData,
      function(row) {

      function(row){

  // Dispatch-in history (CW → Branch) — collapsible top 5
  var branchDispatches = (STATE.data.dispatches||[]).filter(function(d){

  if (branchDispatches.length) {

      return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase">'+h+'</th>';
    }).join('');
    el.innerHTML += _historySection('disp_'+branchId, '🏛️', 'ປະຫວັດການຮັບຈາກຄັງຫລັກ (CW → ສາຂາ)', dpTh, branchDispatches,
      function(d) {
        var sc = d.status==='APPROVED'?'bg-emerald-100 text-emerald-700':d.status==='PENDING'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
        var itemsSummary = (d.items||[]).map(function(it){
          var p = (STATE.data.products||[]).find(function(x){return x.id===it.productId;})||{};
          return '<div class="whitespace-nowrap text-xs">'+p.name+' <span class="font-bold text-slate-700">×'+(it.qtyApproved||it.qty)+'</span> <span class="text-slate-400">'+p.unit+'</span></div>';
        }).join('');
        var ts = d.status==='APPROVED'?d.approvedAt:d.status==='REJECTED'?d.rejectedAt:d.createdAt;
        return '<tr class="border-b border-slate-100 hover:bg-purple-50/20">' +

          '<td class="px-4 py-2.5">'+itemsSummary+'</td>' +

          '<td class="px-4 py-2.5 text-xs text-slate-400 max-w-xs truncate">'+(d.note||'—')+'</td>' +
          '<td class="px-4 py-2.5"><span class="px-2 py-0.5 rounded-full text-xs font-bold '+sc+'">'+d.status+'</span></td>' +
          '</tr>';
      },
      'bg-purple-50/60',
      function(d){ return d.createdAt||d.approvedAt||''; },
      ['BD#','ສາຂາ','ສິນຄ້າ (ລາຍການ)','ວັນທີຮ້ອງຂໍ','ວັນທີ/ເວລາ','ໝາຍເຫດ','Status'],
      function(d){
        var branch2=STATE.data.branches.find(function(b){return b.id===d.toLocId;})||{name:'—'};
        var items=(d.items||[]).map(function(it){ return it.productName+' x'+(it.qtyApproved||it.qty); }).join(', ');
        var ts=d.status==='APPROVED'?d.approvedAt:d.status==='REJECTED'?d.rejectedAt:d.createdAt;
        return [d.bdNumber, branch2.name, items, d.requiredDate||'', String(ts||'').slice(0,16).replace('T',' '), d.note||'', d.status];
      }
    );
  }

  // Adjustment log (admin only)
  if (STATE.user.role === 'ADMIN') {
    el.innerHTML += _renderAdjustLog(branchId);
  }
}

// ── APPROVE TAB ─────────────────────────────────────────
function _renderBranchApproveTab(branchId) {
  if (!branchId) return;
  var u = STATE.user;
  var canManage = _can('branches.manage')||_can('dispatch.approve')||_can('sr.approve')||_can('project.approve');
  var el = document.getElementById('branchTabContent');
  if (!el) return;

  // Get pending SRs for this branch
  var pendingSRs = (STATE.data.srs||[]).filter(function(r){ return r.branchId===branchId && r.status==='PENDING'; });
  // Get all SRs (recent) for this branch
  var allSRs = (STATE.data.srs||[]).filter(function(r){ return r.branchId===branchId; })
    .sort(function(a,b){
      var da = a.approvedAt||a.rejectedAt||a.updatedAt||a.requestedAt||'';
      var db = b.approvedAt||b.rejectedAt||b.updatedAt||b.requestedAt||'';
      return db.localeCompare(da);
    });
  // Get pending Projects for this branch
  var pendingPJs = ((STATE.data.projects||[])||[]).filter(function(p){ return p.branchId===branchId && p.status==='PENDING'; });

  var srStatusMap = {
    PENDING:   {cls:'bg-amber-50 border border-amber-300 text-amber-700',  label:'⏳ ລໍຖ້າ'},
    APPROVED:  {cls:'bg-emerald-50 border border-emerald-300 text-emerald-700', label:'✅ ອະນຸມັດ'},
    REJECTED:  {cls:'bg-red-50 border border-red-300 text-red-600',        label:'❌ ປະຕິເສດ'},
    FULFILLED: {cls:'bg-blue-50 border border-blue-300 text-blue-700',     label:'📦 ສຳເລັດ'},
    DRAFT:     {cls:'bg-slate-50 border border-slate-200 text-slate-500',  label:'📝 Draft'}
  };

  // ─ SR Section ─
  var srPendingHtml = '';
  if (pendingSRs.length) {
    srPendingHtml = pendingSRs.map(function(r){
      var site = STATE.data.sites.find(function(s){return s.id===r.siteId;})||{name:r.siteId||'—'};
      var items = (r.items||[]).map(function(i){
        var p = (STATE.data.products||[]).find(function(x){return x.id===i.productId;})||{};
        return '<div class="flex items-center justify-between text-xs py-1 border-b border-amber-100 last:border-0">' +
          '<span class="text-slate-700">'+(p.name||'?')+'</span>' +
          '<span class="font-bold text-slate-800">x'+i.qtyRequested+' '+p.unit+'</span>' +
          '</div>';
      }).join('');
      return '<div class="card overflow-hidden border-l-4 border-amber-400 mb-3">' +
        '<div class="flex items-center justify-between px-4 py-3 bg-amber-50 border-b border-amber-100">' +
        '<div>' +
        '<div class="flex items-center gap-2"><span class="font-mono text-sm font-bold text-amber-700">'+r.srNumber+'</span>' +
        '<span class="text-xs bg-amber-200 text-amber-800 px-2 py-0.5 rounded-full font-semibold">⏳ ລໍຖ້າ</span></div>' +
        '<div class="text-xs text-slate-500 mt-0.5">📍 '+site.name+' · 👤 '+r.requestedBy+' · 📅 '+r.requestedAt+'</div>' +
        '</div>' +
        (canManage ? '<div class="flex gap-2">' +
          '<button type="button" onclick="openSRForm(\''+r.siteId+'\',\''+r.id+'\')" class="btn btn-secondary text-xs px-3">✏️ ດູ/ແກ້ໄຂ</button>' +
          '<button type="button" onclick="openApproveModal(\''+r.id+'\')" class="btn text-xs px-3 bg-emerald-600 hover:bg-emerald-700 text-white">✅ ອະນຸມັດ</button>' +
          '<button type="button" onclick="openRejectModal(\''+r.id+'\')" class="btn btn-secondary text-xs px-3 text-red-600 border-red-300 hover:bg-red-50">❌ ປະຕິເສດ</button>' +
          '</div>' : '') +
        '</div>' +
        '<div class="px-4 py-2">'+items+'</div>' +
        '</div>';
    }).join('');
  }

  // ─ Project Pending Section ─
  var pjPendingHtml = '';
  if (pendingPJs.length) {
    pjPendingHtml = pendingPJs.map(function(pj){
      var st = SERVICE_TYPES.find(function(x){return x.id===pj.serviceType;})||{icon:'📋',label:pj.serviceType||'—'};
      var items = (pj.items||[]).map(function(i){
        var p = (STATE.data.products||[]).find(function(x){return x.id===i.productId;})||{};
        var branchQty = ((STATE.data.stock||[])[i.productId]||{})[branchId]||0;
        var enough = branchQty >= (i.qty||0);
        return '<div class="flex items-center justify-between text-xs py-1 border-b border-purple-100 last:border-0">' +
          '<span class="text-slate-700">'+(p.name||'?')+'</span>' +
          '<span class="font-bold text-slate-800">x'+i.qty+' '+p.unit+'</span>' +
          '<span class="'+(enough?'text-emerald-600':'text-red-500')+' font-semibold">ມີ: '+branchQty+(enough?' ✓':' ⚠️')+'</span>' +
          '</div>';
      }).join('');
      return '<div class="card overflow-hidden border-l-4 border-purple-400 mb-3">' +
        '<div class="flex items-center justify-between px-4 py-3 bg-purple-50 border-b border-purple-100">' +
        '<div>' +
        '<div class="flex items-center gap-2">' +
        '<span class="font-mono text-sm font-bold text-purple-700">'+(pj.pjNumber||'—')+'</span>' +
        '<span class="text-xs bg-purple-200 text-purple-800 px-2 py-0.5 rounded-full font-semibold">⏳ ໂປຣເຈັກ</span>' +
        '<span class="text-xs text-slate-600">'+st.icon+' '+pj.name+'</span>' +
        '</div>' +
        '<div class="text-xs text-slate-500 mt-0.5">👤 '+pj.reportedBy+' · 📅 '+pj.date+(pj.clientName?' · 👥 '+pj.clientName:'')+'</div>' +
        '</div>' +
        (canManage ? '<div class="flex gap-2">' +
          '<button type="button" onclick="approveProject(\''+pj.id+'\',\''+pj.branchId+'\')" class="btn text-xs px-3 bg-emerald-600 hover:bg-emerald-700 text-white">✅ ອະນຸມັດ</button>' +
          '<button type="button" onclick="rejectProject(\''+pj.id+'\',\''+pj.branchId+'\')" class="btn btn-secondary text-xs px-3 text-red-600 border-red-300 hover:bg-red-50">❌ ປະຕິເສດ</button>' +
          '</div>' : '') +
        '</div>' +
        '<div class="px-4 py-2">'+items+'</div>' +
        '</div>';
    }).join('');
  }

  // ─ Combined SR + PJ History ─
  var _today = new Date().toISOString().slice(0,10);
  var allPJs = ((STATE.data.projects||[])||[]).filter(function(p){ return p.branchId===branchId; });

  var pjStatusMap = {
    PENDING:  {cls:'bg-amber-50 border border-amber-300 text-amber-700',    label:'⏳ ລໍຖ້າ'},
    APPROVED: {cls:'bg-emerald-50 border border-emerald-300 text-emerald-700', label:'✅ ອະນຸມັດ'},
    REJECTED: {cls:'bg-red-50 border border-red-300 text-red-700',          label:'❌ ປະຕິເສດ'}
  };

  // Build unified rows array (SR + PJ), sort newest first
  var unifiedRows = [];
  allSRs.forEach(function(r){
    var latestDate = r.approvedAt||r.rejectedAt||r.updatedAt||r.requestedAt||'';
    unifiedRows.push({type:'SR', id:r.id, number:r.srNumber, status:r.status, latestDate:latestDate,
      siteId:r.siteId, items:(r.items||[]), raw:r});
  });
  allPJs.forEach(function(p){
    var latestDate = p.approvedAt||p.rejectedAt||p.updatedAt||p.date||'';
    unifiedRows.push({type:'PJ', id:p.id, number:p.pjNumber||p.id, status:p.status, latestDate:latestDate,
      siteId:p.siteId, items:(p.items||[]), raw:p});
  });
  unifiedRows.sort(function(a,b){ return (b.latestDate||'').localeCompare(a.latestDate||''); });

  var srHistoryRows = unifiedRows.map(function(row){
    var isToday = row.latestDate === _today;
    var isSR = row.type === 'SR';
    var site = STATE.data.sites.find(function(s){return s.id===row.siteId;})||{name:row.siteId||'—'};

    var sm = isSR
      ? (srStatusMap[row.status]||{cls:'bg-slate-50 border text-slate-500',label:row.status})
      : (pjStatusMap[row.status]||{cls:'bg-slate-50 border text-slate-500',label:row.status});

    var itemsText = row.items.map(function(i){
      var p = (STATE.data.products||[]).find(function(x){return x.id===i.productId;})||{};
      return (p.name||'?')+' x'+(i.qtyApproved||i.qty||i.qtyRequested||0);
    }).join(', ');

    var typeBadge = isSR
      ? '<span class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold mr-1">SR</span>'
      : '<span class="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-bold mr-1">PJ</span>';

    var canEdit = isSR && (row.status==='PENDING'||row.status==='DRAFT');
    var editBtn = canEdit

      : (!isSR && row.status==='PENDING'

    '<div class="text-xs text-slate-500">ລໍຖ້າອະນຸມັດ</div></div></div>' +
    '<div class="card px-4 py-3 flex items-center gap-3 border-l-4 border-emerald-400">' +
    '<span class="text-2xl">✅</span>' +
    '<div><div class="text-xl font-black text-emerald-600">'+(STATE.data.srs||[]).filter(function(r){return r.branchId===branchId&&r.status==='APPROVED';}).length+'</div>' +
    '<div class="text-xs text-slate-500">ອະນຸມັດແລ້ວ (SR)</div></div></div>' +

    '<div class="text-xs text-slate-500">ສຳເລັດ (SR)</div></div></div>' +

    // Pending items needing action
    ((pendingSRs.length + pendingPJs.length) > 0 ?
      '<div class="mb-5">' +
      '<div class="flex items-center gap-2 mb-3"><span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse inline-block"></span>' +
      '<span class="font-bold text-slate-700">ລໍຖ້າການອະນຸມັດ ('+(pendingSRs.length+pendingPJs.length)+')</span></div>' +
      srPendingHtml + pjPendingHtml +
      '</div>' :
      '<div class="card p-6 text-center text-slate-400 mb-5"><div class="text-3xl mb-2">✅</div><div class="font-semibold">ບໍ່ມີລາຍການລໍຖ້າ</div></div>'
    ) +

    // SR + PJ History
    '<div class="card overflow-hidden">' +

    ) +

}

function _renderSiteCard(s, b) {
  var canManage = STATE.user.role === 'ADMIN' || STATE.user.role === 'MANAGER';
  var siteStock = [];
  STATE.data.products.forEach(function(p){
    var qty = ((STATE.data.stock||[])[p.id]||{})[s.id]||0;
    siteStock.push({p:p, qty:qty});
  });
  var inStock   = siteStock.filter(function(x){ return x.qty > 0; });
  var lowItems  = inStock.filter(function(x){ return x.qty <= x.p.reorderPoint; }).length;
  var totalVal  = inStock.reduce(function(sum,x){ return sum+(x.qty*x.p.costPrice); }, 0);
  var pendingSR = (STATE.data.srs||[]).filter(function(r){ return r.siteId===s.id && r.status==='PENDING'; }).length;

  // Service type badges
  var svcColors = {CLEANING:'bg-blue-100 text-blue-700', GARDEN:'bg-emerald-100 text-emerald-700', PEST:'bg-amber-100 text-amber-700'};
  var svcBadges = (s.serviceTypes||[]).map(function(t){
    var st = SERVICE_TYPES.find(function(x){return x.id===t;})||{icon:'?',label:t};
    return '<span class="text-xs px-2 py-0.5 rounded-full font-semibold '+(svcColors[t]||'bg-slate-100 text-slate-600')+'">'+st.icon+' '+st.label+'</span>';
  }).join('');

  return '<div class="card overflow-hidden hover:shadow-lg transition-shadow">' +
    // Header
    '<div class="bg-gradient-to-r from-blue-700 to-blue-600 px-4 py-3 flex items-center justify-between">' +
    '<div class="flex items-center gap-2">' +
    '<div class="w-8 h-8 rounded-xl bg-white/20 flex items-center justify-center text-sm">📍</div>' +
    '<div><div class="font-bold text-white text-sm">'+s.name+'</div>' +
    '<div class="text-blue-200 text-xs">'+s.clientName+'</div></div>' +
    '</div>' +
    '<div class="flex items-center gap-1">' +
    (pendingSR>0?'<span class="bg-amber-400 text-amber-900 text-xs font-bold px-1.5 py-0.5 rounded-full">'+pendingSR+' SR</span>':'') +
    '</div></div>' +
    // Service type badges
    (svcBadges ? '<div class="px-4 pt-2 pb-1 flex flex-wrap gap-1">'+svcBadges+'</div>' : '') +
    // Stats
    '<div class="grid grid-cols-3 divide-x divide-slate-100 border-b border-slate-100">' +
    '<div class="py-3 text-center"><div class="text-lg font-black text-slate-800">'+inStock.length+'</div><div class="text-xs text-slate-400">ສິນຄ້າ</div></div>' +
    '<div class="py-3 text-center"><div class="text-lg font-black '+(lowItems>0?'text-amber-500':'text-emerald-500')+'">'+lowItems+'</div><div class="text-xs text-slate-400">Low ⚠️</div></div>' +
    '<div class="py-3 text-center"><div class="text-sm font-bold text-blue-700">'+fmtNum(totalVal)+'</div><div class="text-xs text-slate-400">LAK</div></div>' +
    '</div>' +
    // Top items preview
    '<div class="px-4 py-2 space-y-1">' +
    inStock.slice(0,3).map(function(x){
      var isLow = x.qty <= x.p.reorderPoint;
      return '<div class="flex items-center justify-between text-xs">' +
        '<span class="text-slate-600 truncate flex-1">'+x.p.name+'</span>' +
        '<span class="font-bold ml-2 '+(isLow?'text-amber-600':'text-slate-700')+'">'+x.qty+' '+x.p.unit+(isLow?' ⚠️':'')+'</span>' +
        '</div>';
    }).join('') +
    (inStock.length > 3 ? '<div class="text-xs text-slate-400">+'+( inStock.length-3)+' more items...</div>' : '') +
    '</div>' +
    // Actions
    '<div class="px-4 py-3 flex gap-2 border-t border-slate-100">' +
    '<button type="button" onclick="event.stopPropagation();openSiteStockModal(\''+s.id+'\')" class="btn btn-secondary text-xs flex-1">📦 ເຂົ້າໄປດູ</button>' +
    '<button type="button" onclick="event.stopPropagation();openSRForm(\''+s.id+'\',null)" class="btn btn-primary text-xs flex-1">📋 ເບີກ</button>' +
    '</div>' +
    '<div class="px-4 pb-2 flex gap-2">' +
    '<button type="button" onclick="event.stopPropagation();openCreateUsage(\''+s.id+'\')" class="flex-1 btn btn-secondary text-xs border-emerald-300 text-emerald-700 hover:bg-emerald-50">🔧 ລາຍງານໃຊ້</button>' +
    '</div>' +
    (canManage ? '<div class="px-4 pb-3 flex gap-1.5"><button type="button" onclick="event.stopPropagation();openSiteForm(\''+s.id+'\',\''+b.id+'\')" class="text-slate-400 hover:text-slate-600 text-xs">✏️ Edit</button>' +
    (STATE.user.role==='ADMIN' ? '<button type="button" onclick="event.stopPropagation();confirmDeleteSite(\''+s.id+'\',\''+s.name+'\')" class="text-red-400 hover:text-red-600 text-xs ml-1">🗑️ ລຶບ</button>' : '') +
    '</div>' : '') +
    '</div>';
}

function _renderProjectCards(projects, branchId, canManage) {
  var pjStatusColors = {
    PENDING:    'bg-amber-100 text-amber-700 border-amber-300',
    APPROVED:   'bg-emerald-100 text-emerald-700 border-emerald-300',
    IN_PROGRESS:'bg-blue-100 text-blue-700 border-blue-300',
    COMPLETED:  'bg-slate-100 text-slate-600 border-slate-300',
    REJECTED:   'bg-red-100 text-red-600 border-red-300',
    CANCELLED:  'bg-slate-100 text-slate-400 border-slate-200'
  };
  var pjStatusLabels = {
    PENDING:'⏳ ລໍຖ້າ', APPROVED:'✅ ອະນຸມັດ', IN_PROGRESS:'🔄 ດຳເນີນການ',
    COMPLETED:'🏁 ສຳເລັດ', REJECTED:'❌ ປະຕິເສດ', CANCELLED:'🚫 ຍົກເລີກ'
  };
  var pjBorderColors = {
    PENDING:'border-amber-400', APPROVED:'border-emerald-400', IN_PROGRESS:'border-blue-400',
    COMPLETED:'border-slate-300', REJECTED:'border-red-300', CANCELLED:'border-slate-200'
  };
  if (!projects.length) {
    return '<div class="card p-10 text-center text-slate-400">' +
      '<div class="text-4xl mb-3">📋</div>' +
      '<div class="font-semibold text-slate-600 mb-1">ຍັງບໍ່ມີໂປຣເຈັກ</div>' +
      (canManage ? '<button type="button" onclick="openProjectForm(null,\''+branchId+'\')" class="btn btn-primary mt-3">+ ສ້າງໂປຣເຈັກໃໝ່</button>' : '') +
      '</div>';
  }
  return '<div class="space-y-4">' +
    projects.map(function(pj){
      var st = SERVICE_TYPES.find(function(x){return x.id===pj.serviceType;})||{icon:'📋',label:pj.serviceType||'—'};
      var sc = pjStatusColors[pj.status]||'bg-slate-100 text-slate-600 border-slate-200';
      var bc = pjBorderColors[pj.status]||'border-slate-200';
      var slabel = pjStatusLabels[pj.status]||pj.status;
      var totalQty = (pj.items||[]).reduce(function(a,it){return a+(Number(it.qtyApproved||it.qty)||0);},0);
      var isPending  = pj.status === 'PENDING';
      var isApproved = pj.status === 'APPROVED' || pj.status === 'IN_PROGRESS';

      // Stock deduction summary (only for approved)
      var deductInfo = '';
      if (isApproved && (pj.items||[]).some(function(it){return it.branchStockBefore!==undefined;})) {
        deductInfo = '<div class="px-5 py-2 bg-emerald-50 border-t border-emerald-100 text-xs text-emerald-700">' +
          '🏢 ຕັດ Branch Stock: ' +
          (pj.items||[]).filter(function(it){return it.qtyApproved;}).map(function(it){
            var p = STATE.data.products.find(function(x){return x.id===it.productId;})||{name:it.productId,unit:''};
            return '<strong>'+p.name+'</strong> -'+it.qtyApproved+' '+p.unit+
              (it.branchStockBefore!==undefined?' ('+it.branchStockBefore+'→'+it.branchStockAfter+')':'');
          }).join(' · ') + '</div>';
      }

      return '<div class="card overflow-hidden border-l-4 '+bc+'">' +
        // Header
        '<div class="flex items-start justify-between px-5 py-3 bg-slate-50 border-b border-slate-100">' +
        '<div class="flex items-center gap-3">' +
        '<div class="bg-purple-100 rounded-xl px-3 py-1.5"><div class="text-xs font-mono font-bold text-purple-700">'+(pj.pjNumber||'—')+'</div></div>' +
        '<div>' +
        '<div class="font-bold text-slate-800 text-sm">'+pj.name+'</div>' +
        '<div class="text-xs text-slate-500 flex items-center gap-2 mt-0.5">' +
        '<span>'+st.icon+' '+st.label+'</span><span>·</span>' +
        '<span>📅 '+pj.date+'</span><span>·</span>' +
        '<span>👤 '+pj.reportedBy+'</span>' +
        (pj.clientName?'<span>·</span><span>👥 '+pj.clientName+'</span>':'') +
        '</div>' +
        (pj.note?'<div class="text-xs text-slate-400 mt-0.5 italic">"'+pj.note+'"</div>':'') +
        '</div></div>' +
        '<div class="flex items-center gap-2 flex-shrink-0">' +
        '<span class="text-xs font-bold px-3 py-1 rounded-full border '+sc+'">'+slabel+'</span>' +
        (canManage?'<button type="button" onclick="openProjectForm(\''+pj.id+'\',\''+pj.branchId+'\')" class="btn btn-secondary text-xs px-2 py-1">✏️</button>':'') +
        '</div></div>' +

        // Status hint for PENDING (no buttons - use ອະນຸມັດ tab)
        (isPending ?
          '<div class="flex items-center gap-2 px-5 py-2.5 bg-amber-50 border-b border-amber-100">' +
          '<span class="text-amber-500">⏳</span>' +
          '<span class="text-xs text-amber-700 font-semibold">ລໍຖ້າການອະນຸມັດ — ໄປທີ່ tab</span>' +
          '<span class="text-xs font-bold bg-amber-200 text-amber-800 px-2 py-0.5 rounded-full">✅ ອະນຸມັດ</span>' +
          '<span class="text-xs text-amber-600">ເພື່ອດຳເນີນການ</span>' +
          '</div>' : '') +

        // Items table
        '<div class="overflow-x-auto"><table class="w-full text-sm">' +
        '<thead><tr class="border-b border-slate-100 bg-purple-50/40">' +
        ['#','SKU','ສິນຄ້າ','ຈຳນວນ','Stock ສາຂາ','ໜ່ວຍ'].map(function(h){
          return '<th class="text-left px-4 py-2 text-xs font-bold text-slate-500">'+h+'</th>';
        }).join('')+'</tr></thead><tbody>' +
        (pj.items||[]).map(function(it,idx){
          var p = STATE.data.products.find(function(x){return x.id===it.productId;})||{name:it.productId||'—',sku:'—',unit:''};
          var branchQty = ((STATE.data.stock||[])[it.productId]||{})[pj.branchId]||0;
          var qtyUsed = it.qtyApproved||it.qty||0;
          var stockAfterTxt = isApproved && it.branchStockBefore!==undefined
            ? '<span class="text-emerald-600 text-xs">'+it.branchStockBefore+'→'+it.branchStockAfter+'</span>'
            : '<span class="text-slate-500 text-xs">'+branchQty+'</span>';
          return '<tr class="border-b border-slate-50 hover:bg-purple-50/20">' +
            '<td class="px-4 py-2 text-xs text-slate-400">'+(idx+1)+'</td>' +
            '<td class="px-4 py-2 font-mono text-xs text-slate-500">'+p.sku+'</td>' +
            '<td class="px-4 py-2 font-semibold text-slate-800">'+p.name+'</td>' +
            '<td class="px-4 py-2 font-bold text-purple-700">'+qtyUsed+'</td>' +
            '<td class="px-4 py-2">'+stockAfterTxt+'</td>' +
            '<td class="px-4 py-2 text-xs text-slate-400">'+p.unit+'</td>' +
            '</tr>';
        }).join('') +
        '</tbody></table></div>' +
        deductInfo +
        '<div class="px-5 py-2 bg-slate-50 border-t text-xs text-slate-500 flex justify-between">' +
        '<span>'+(pj.items||[]).length+' ລາຍການ · ລວມ <strong>'+totalQty+'</strong> ໜ່ວຍ</span>' +
        (pj.approvedBy?'<span class="text-emerald-600">✅ ອະນຸມັດໂດຍ: '+pj.approvedBy+' · '+pj.approvedAt+'</span>':
         pj.rejectedBy?'<span class="text-red-500">❌ ປະຕິເສດ: '+(pj.rejectNote||'—')+'</span>':'') +
        '</div></div>';
    }).join('') +
    '</div>';
}

function openProjectForm(pjId, branchId, preSiteId) {
  var pj = pjId ? ((STATE.data.projects||[])||[]).find(function(p){return p.id===pjId;})||null : null;
  var branch = STATE.data.branches.find(function(b){return b.id===branchId;})||{};
  var sites = STATE.data.sites.filter(function(s){return s.branchId===branchId&&s.status==='ACTIVE';});

  var siteOpts = '<option value="">— ເລືອກໄຊງານ (optional) —</option>'+
    sites.map(function(s){
      return '<option value="'+s.id+'"'+(((pj&&pj.siteId===s.id)||preSiteId===s.id)?'selected':'')+'>'+s.name+'</option>';
    }).join('');

  var typeOpts = SERVICE_TYPES.map(function(st){
    return '<option value="'+st.id+'"'+(pj&&pj.serviceType===st.id?' selected':'')+'>'+st.icon+' '+st.label+' ('+st.labelEn+')</option>';
  }).join('');

  var statusOpts = ['PENDING','APPROVED','IN_PROGRESS','COMPLETED','REJECTED','CANCELLED'].map(function(s){
    return '<option value="'+s+'"'+(pj&&pj.status===s?' selected':'')+'>'+s+'</option>';
  }).join('');

  var isApproved = pj && (pj.status==='APPROVED'||pj.status==='IN_PROGRESS'||pj.status==='COMPLETED');
  var isPending  = pj && pj.status==='PENDING';

  var prodOpts = STATE.data.products.map(function(p){
    return '<option value="'+p.id+'">'+p.sku+' – '+p.name+'</option>';
  }).join('');

  // Build existing items HTML
  var existItems = (pj&&pj.items||[{productId:'',qty:1,note:''}]).map(function(it,i){
    var po = STATE.data.products.map(function(p){
      return '<option value="'+p.id+'"'+(p.id===it.productId?' selected':'')+'>'+p.sku+' – '+p.name+'</option>';
    }).join('');
    return _pjItemRowHtml(po, it.qty, it.note);
  }).join('');

  openModal((pjId?'✏️ ແກ້ໄຂ':'📋 ສ້າງ')+'ໂປຣເຈັກ / Project Job',
    '<div class="space-y-4">' +
    // Branch locked banner
    '<div class="flex items-center gap-3 bg-purple-50 border border-purple-200 rounded-xl px-4 py-2.5">' +
    '<span class="text-purple-600 text-lg">🏢</span>' +
    '<div><div class="font-bold text-purple-800 text-sm">'+branch.name+'</div>' +
    '<div class="text-purple-500 text-xs">ສາຂາທີ່ເລືອກ</div></div>' +
    (pj ? '<span class="ml-auto text-xs font-bold px-3 py-1 rounded-full border '+(
      pj.status==='PENDING'?'bg-amber-50 text-amber-700 border-amber-200':
      pj.status==='APPROVED'?'bg-emerald-50 text-emerald-700 border-emerald-200':
      pj.status==='REJECTED'?'bg-red-50 text-red-600 border-red-200':
      'bg-slate-100 text-slate-600 border-slate-200')+'">'+pj.status+'</span>' : '') +
    '</div>' +
    '<input type="hidden" id="pj_branch" value="'+branchId+'">' +

    '<div class="grid grid-cols-2 gap-3">' +
    '<div class="col-span-2"><label class="field-label">ຊື່ໂປຣເຈັກ *</label>' +
    '<input id="pj_name" class="input" placeholder="e.g. Deep Cleaning — Lobby" value="'+(pj?pj.name||'':'')+'"'+(isApproved?' disabled':'')+'>'+
    '</div>' +
    '<div><label class="field-label">ປະເພດງານ *</label>' +
    '<select id="pj_type" class="select"'+(isApproved?' disabled':'')+'>'+typeOpts+'</select></div>' +

function _pjScanForRow(btn) {
  var row = btn.closest('.pj-item-row');

  openBarcodePicker(null, function(p) {
    var sel = row.querySelector('.pj-select-prod');

function _pjAddItem(branchId) {
  var container = document.getElementById('pjItemsList');
  if (!container) return;
  var row = document.createElement('div');
  row.innerHTML = _pjItemRowHtml(null, 1, '');
  container.appendChild(row.firstChild);
  // Update stock badge for first product
  var newRow = container.lastElementChild;
  if (newRow) _pjUpdateStock(newRow.querySelector('.pj-select-prod'), branchId);
}

function _pjUpdateStock(sel, branchId) {
  var row = sel.closest('.pj-item-row');
  var bid = branchId || document.getElementById('pj_branch').value;
  var badge = row.querySelector('.pj-stock-badge');
  if (!badge) return;
  var pid = sel.value;
  var stock = ((STATE.data.stock||[])[pid]||{})[bid] || 0;
  var p = STATE.data.products.find(function(x){return x.id===pid;})||{unit:''};
  badge.textContent = stock+' '+(p.unit||'');
  badge.className = 'pj-stock-badge text-xs font-bold px-2 py-1 rounded-lg ' +
    (stock===0?'bg-red-100 text-red-600':stock<=(p.reorderPoint||0)?'bg-amber-100 text-amber-700':'bg-emerald-100 text-emerald-700');
}

function submitProject(branchId) {
  var name = (document.getElementById('pj_name')||{}).value||'';
  if (!name.trim()) { showToast('ກະລຸນາໃສ່ຊື່ໂປຣເຈັກ','warn'); return; }
  var items = [];
  document.querySelectorAll('#pjItemsList .pj-item-row').forEach(function(row){
    var pid = row.querySelector('.pj-select-prod').value;
    var qty = Number(row.querySelector('.pj-qty').value);
    if (pid && qty > 0) items.push({productId:pid, qty:qty});
  });
  var pjIdEl = document.getElementById('pj_id');
  var statusEl = document.getElementById('pj_status');
  var data = {
    id:           pjIdEl ? pjIdEl.value : null,
    name:         name,
    serviceType:  (document.getElementById('pj_type')||{}).value,
    branchId:     branchId,
    clientName:   (document.getElementById('pj_client')||{}).value||'',
    date:         (document.getElementById('pj_date')||{}).value,
    status:       statusEl ? statusEl.value : (pjIdEl ? undefined : 'PENDING'),
    note:         (document.getElementById('pj_note')||{}).value||'',
    reportedBy:   STATE.user.fullName||STATE.user.username,
    items:        items
  };
  // Remove undefined status so existing status is preserved on edit
  if (!data.status) delete data.status;

  callServer('saveProject', [data], function(res){
    if (res.success) {
      showToast('✅ '+(data.id?'ອັບເດດ':'ສ້າງ')+'ໂປຣເຈັກ '+res.pjNumber+' ແລ້ວ · ລໍຖ້າອະນຸມັດ','success');
      closeModal();
      _srTab = 'projects';
      renderBranches();
    } else showToast('Error','error');
  });
}

function approveProject(pjId, branchId) {
  callServer('approveProject', [pjId], function(res){
    if (!res.success) { showToast('Error: '+(res.message||'Failed'),'error'); return; }
    var msg = '✅ ອະນຸມັດໂປຣເຈັກແລ້ວ · ຕັດ Stock: '+
      (res.deductions||[]).map(function(d){ return d.name+' -'+d.qty+' ('+d.before+'→'+d.after+')'; }).join(', ');
    showToast(msg, 'success', 5000);
    closeModal();
    _refreshApproveTabRealtime();
  });
}

function rejectProject(pjId, branchId) {
  var note = prompt('ເຫດຜົນທີ່ປະຕິເສດ (optional):') || '';
  callServer('rejectProject', [pjId, note], function(res){
    if (!res.success) { showToast('Error','error'); return; }
    showToast('❌ ປະຕິເສດໂປຣເຈັກແລ້ວ','warn');
    closeModal();
    _refreshApproveTabRealtime();
  });
}

var _CAT_CHIP_COLORS = {
  CONSUMABLE:  'blue',
  CHEMICAL:    'emerald',

function _buildCatChips(siteId, allRows, activeCat, showZero) {
  var cats = ((STATE.data.categories||[])||[]).filter(function(c){ return c.status !== 'INACTIVE'; });

  var html = '<button type="button" onclick="window._siteStockCatFilter=\'ALL\';_refreshSiteStockContent(\''+siteId+'\')" ' +
    'class="px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 '+(activeCat==='ALL'?'bg-slate-800 text-white shadow':'bg-slate-100 text-slate-600 hover:bg-slate-200')+'">'+
    'ທັງໝົດ <span class="opacity-70">('+totalVisible+')</span></button>';

  cats.forEach(function(cat){
    var c = _CAT_CHIP_COLORS[cat.type] || _CAT_CHIP_COLORS.DEFAULT;
    var isActive = activeCat === cat.id;
    var cnt = allRows.filter(function(x){ return x.cat.id === cat.id && (showZero || x.qty > 0); }).length;
    html += '<button type="button" onclick="window._siteStockCatFilter=\''+cat.id+'\';_refreshSiteStockContent(\''+siteId+'\')" ' +

      '<span>'+(cat.nameLao||cat.name)+'</span> <span class="opacity-70">('+cnt+')</span></button>';
  });
  return html;

// ── Stock Adjustment Log ─────────────────────────────────
function _renderAdjustLog(locId) {
  var logs = ((STATE.data.movements||[])||[]).filter(function(m){
    return m.type==='ADJUST' && m.locId===locId;
  }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); }).slice(0,10);

  if (!logs.length) return '';

  var today = new Date().toISOString().slice(0,10);
  var rows = logs.map(function(m){
    var p = STATE.data.products.find(function(x){return x.id===m.productId;})||{name:m.productId,sku:'—',unit:''};
    var diff = (m.after||0) - (m.before||0);
    var diffCls = diff > 0 ? 'text-emerald-600' : diff < 0 ? 'text-red-500' : 'text-slate-400';
    var diffTxt = diff > 0 ? '+'+diff : String(diff);
    var isToday = m.date === today;
    var user = m.by || '—';
    return '<tr class="border-b border-slate-100 last:border-0 hover:bg-amber-50/30">' +
      '<td class="px-3 py-2.5 text-xs '+(isToday?'text-blue-500 font-semibold':'text-slate-400')+' whitespace-nowrap">'+(isToday?'🕐 ມື້ນີ້':m.date)+'</td>' +
      '<td class="px-3 py-2.5"><div class="font-semibold text-slate-700 text-xs">'+p.name+'</div><div class="text-xs text-slate-400 font-mono">'+p.sku+'</div></td>' +
      '<td class="px-3 py-2.5 text-xs text-slate-500 whitespace-nowrap">'+m.before+' → '+m.after+' <span class="text-xs text-slate-400">'+p.unit+'</span></td>' +
      '<td class="px-3 py-2.5 text-xs font-bold whitespace-nowrap '+diffCls+'">'+diffTxt+'</td>' +
      '<td class="px-3 py-2.5 text-xs text-slate-500 max-w-xs">'+( m.note||'—')+'</td>' +
      '<td class="px-3 py-2.5 text-xs text-slate-400 whitespace-nowrap">'+user+'</td>' +
      '</tr>';
  }).join('');

  return '<div class="card mt-4 overflow-hidden border-l-4 border-amber-300">' +
    '<div class="flex items-center gap-2 px-4 py-3 border-b border-slate-100 bg-amber-50/40">' +
    '<span>⚙️</span>' +
    '<span class="font-bold text-slate-700 text-sm">ປະຫວັດການແກ້ໄຂ Stock</span>' +
    '<span class="ml-auto text-xs text-slate-400">'+logs.length+' ລາຍການ</span>' +
    '</div>' +
    '<div class="overflow-x-auto"><table class="w-full">' +
    '<thead><tr class="border-b border-slate-100 bg-slate-50">' +
    '<th class="text-left px-3 py-2 text-xs font-bold text-slate-500">ວັນທີ</th>' +
    '<th class="text-left px-3 py-2 text-xs font-bold text-slate-500">ສິນຄ້າ</th>' +
    '<th class="text-left px-3 py-2 text-xs font-bold text-slate-500">ກ່ອນ → ຫຼັງ</th>' +
    '<th class="text-left px-3 py-2 text-xs font-bold text-slate-500">ຜົນ</th>' +
    '<th class="text-left px-3 py-2 text-xs font-bold text-slate-500">ເຫດຜົນ</th>' +
    '<th class="text-left px-3 py-2 text-xs font-bold text-slate-500">ຜູ້ແກ້ໄຂ</th>' +
    '</tr></thead>' +
    '<tbody>'+rows+'</tbody></table></div></div>';
}

  var qty = Number((document.getElementById('rp_qty')||{}).value||0);
  callServer('setReorderPoint',[{productId:productId, locId:locId, value:val||null}],function(res){

      var p=(STATE.data.products||[]).find(function(x){return x.id===productId;});

function executeDeleteProduct(id) {
  var input = (document.getElementById('deleteConfirmInput')||{value:''}).value.trim();
  if (input !== 'DELETE') { showToast('ກະລຸນາພິມ DELETE ໃຫ້ຖືກຕ້ອງ', 'warn'); return; }
  var idx = (STATE.data.products||[]).findIndex(function(x){return x.id===id;});
  if (idx > -1) {
    (STATE.data.products||[]).splice(idx, 1);
    delete (STATE.data.stock||[])[id];
    STATE.data.products = (STATE.data.products||[]).slice();
  }
  showToast('🗑️ ລຶບສິນຄ້າສຳເລັດ', 'success');

  renderProducts();
}

function executeDeleteBranch(id) {
  var input = (document.getElementById('deleteConfirmInput')||{value:''}).value.trim();
  if (input !== 'DELETE') { showToast('ກະລຸນາພິມ DELETE ໃຫ້ຖືກຕ້ອງ', 'warn'); return; }
  // Remove branch
  var bi = (STATE.data.branches||[]).findIndex(function(x){return x.id===id;});
  if (bi > -1) (STATE.data.branches||[]).splice(bi, 1);
  // Remove all sites under this branch
  STATE.data.sites = (STATE.data.sites||[]).filter(function(s){return s.branchId!==id;});
  // Clear stock at this branch location
  (STATE.data.products||[]).forEach(function(p){ if((STATE.data.stock||[])[p.id]) delete (STATE.data.stock||[])[p.id][id]; });
  // Sync STATE
  STATE.data.branches = (STATE.data.branches||[]).slice();
  STATE.data.sites    = (STATE.data.sites||[]).slice();
  if (_activeBranch === id) _activeBranch = (STATE.data.branches||[]).length ? (STATE.data.branches||[])[0].id : null;
  buildBranchTree();
  showToast('🗑️ ລຶບສາຂາ + ໄຊງານທັງໝົດ ສຳເລັດ', 'success');
  closeModal();
  window._baTab = 'branches';
  showPage('branches');
}

  openModal('📦 '+site.name, html, true);

// ── Helper: KPI card ─────────────────────────────────────────
function _smKpi(icon, label, val, color) {
  var c = {blue:'bg-blue-50 text-blue-700', amber:'bg-amber-50 text-amber-600', emerald:'bg-emerald-50 text-emerald-600', slate:'bg-slate-50 text-slate-700', purple:'bg-purple-50 text-purple-700'}[color]||'bg-slate-50 text-slate-700';
  return '<div class="rounded-xl p-3 text-center '+c+'">' +
    '<div class="text-lg">' + icon + '</div>' +
    '<div class="text-base font-black mt-0.5">'+val+'</div>' +
    '<div class="text-[10px] font-semibold opacity-70 mt-0.5">'+label+'</div>' +
    '</div>';
}

// ── Helper: Tab button ──────────────────────────────────────
function _smTabBtn(id, activeTab, label, count, badge, badgeColor) {
  var isActive = id === activeTab;
  var badgeHtml = badge>0 ? '<span class="ml-1 bg-'+(badgeColor||'blue')+'-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">'+badge+'</span>' : (count>0?'<span class="ml-1 text-[10px] opacity-50">('+count+')</span>':'');
  return '<button id="smt_btn_'+id+'" type="button" onclick="_switchSiteModalTab(\''+id+'\',\''+window._siteStockId+'\')" ' +
    'class="flex items-center gap-1.5 px-4 py-2.5 text-sm '+(isActive?'font-bold border-b-2 border-blue-600 text-blue-700 bg-white':'font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50')+' transition-all whitespace-nowrap">'+
    label+badgeHtml+'</button>';
}

// ── Helper: build stock table rows (shared) ──────────────────
function _buildSiteStockRows(filtered, siteId, site) {
  return filtered.map(function(x){
    var isLow    = x.qty>0 && x.qty<=x.p.reorderPoint;
    var isZero   = x.qty===0;
    var isAsset  = _isAssetCategory(x.p.categoryId);
    var asStatus = isAsset ? _getAssetStatus(x.p.id, siteId) : null;
    var isBroken = asStatus && (asStatus.status==='UNDER_MAINTENANCE'||asStatus.status==='CANNOT_REPAIR'||asStatus.status==='DISPOSED');
    var stCfg    = asStatus ? (_ASSET_STATUS_CFG[asStatus.status]||_ASSET_STATUS_CFG.OPERATIONAL) : (isAsset ? _ASSET_STATUS_CFG.OPERATIONAL : null);
    var statusBadge = isZero ? '<span class="text-xs text-slate-300">—</span>' :
      isAsset && stCfg ?
        '<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full font-bold '+stCfg.cls+'"><span class="w-1.5 h-1.5 rounded-full '+stCfg.dot+' flex-shrink-0"></span>'+stCfg.label+'</span>' :
        (isLow ? '<span class="text-xs font-bold text-amber-600 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full">⚠️ Low</span>' :
                 '<span class="text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">✅ OK</span>');
    var maintBtn = '';
    if (isAsset && _can('maintenance.create') && !isBroken && !isZero)
      maintBtn = '<button type="button" onclick="openCreateMRFromStock(\''+x.p.id+'\',\''+x.p.sku+'\',\''+x.p.name.replace(/'/g,'')+'\',\''+siteId+'\')" class="text-[10px] px-2 py-1 rounded-lg bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 font-semibold">🔧 ແຈ້ງສ້ອມ</button>';
    if (isAsset && isBroken && _can('maintenance.view'))
      maintBtn = '<button type="button" onclick="openMRDetail(\''+(asStatus?asStatus.mrId:'')+'\')" class="text-[10px] px-2 py-1 rounded-lg bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-300 font-semibold">🔍 MR</button>';
    var adjustBtn = STATE.user.role==='ADMIN' ? '<button type="button" onclick="openAdjustStock(\''+x.p.id+'\',\''+siteId+'\',\''+(site?site.name:'Site')+'\')" class="text-[10px] px-2 py-1 rounded-lg bg-amber-50 hover:bg-amber-100 text-amber-600 border border-amber-200 font-semibold" title="Admin: ແກ້ໄຂ Stock">⚙️</button>' : '';
    var pct = x.p.reorderPoint>0 ? Math.min(100,Math.round(x.qty/x.p.reorderPoint*100)) : 100;
    var barCls = isZero?'bg-slate-200':isLow?(x.qty===0?'bg-red-500':'bg-amber-400'):'bg-emerald-400';
    return '<tr class="border-b border-slate-100 last:border-0 '+(isBroken?'bg-amber-50/40':isZero?'opacity-30':isLow?'bg-red-50/20':'')+' hover:bg-blue-50/20 transition-colors" data-pid="'+x.p.id+'">' +
      '<td class="px-3 py-2.5 font-mono text-xs text-slate-400 whitespace-nowrap">'+x.p.sku+'</td>' +
      '<td class="px-3 py-2.5">' +
        '<div class="font-semibold text-slate-800 text-sm '+(isBroken?'text-amber-700':'')+' leading-tight">'+x.p.name+'</div>' +
        '<div class="text-xs text-slate-400">'+x.p.nameLao+'</div>' +
      '</td>' +
      '<td class="px-3 py-2.5">' +
        '<div class="text-xs font-medium text-slate-600">'+x.cat.name+'</div>' +
        '<div class="text-[10px] text-slate-400">'+((x.cat&&x.cat.nameLao)||'')+'</div>' +
      '</td>' +
      '<td class="px-3 py-2.5">' +
        '<div class="flex items-center gap-2">' +
        '<div class="w-12 bg-slate-100 rounded-full h-1.5 flex-shrink-0"><div class="'+barCls+' h-1.5 rounded-full transition-all" style="width:'+pct+'%"></div></div>' +
        '<span class="font-bold text-sm '+(isZero?'text-slate-300':isLow?'text-red-600':'text-slate-800')+'">'+x.qty+'</span>' +
        '<span class="text-xs text-slate-400">'+x.p.unit+'</span>' +
        (isLow&&!isZero?'<span class="text-amber-500 text-xs">⚠️</span>':'') +
        '</div>' +
      '</td>' +
      '<td class="px-3 py-2.5 text-xs text-slate-500 whitespace-nowrap">'+fmtNum(x.qty*x.p.costPrice)+'</td>' +
      '<td class="px-3 py-2.5">'+statusBadge+'</td>' +
      '<td class="px-3 py-2.5"><div class="flex gap-1 flex-wrap">'+adjustBtn+maintBtn+'</div></td>' +
      '</tr>';
  }).join('');
}

// ── Helper: SR tab content ───────────────────────────────────
function _buildSiteModalSRContent(siteId) {
  var srs = (STATE.data.srs||[]).filter(function(r){return r.siteId===siteId;})
    .sort(function(a,b){ return (b.requestedAt||'').localeCompare(a.requestedAt||''); });
  if (!srs.length) return '<div class="text-center py-12 text-slate-400"><div class="text-4xl mb-2">📋</div><div class="font-semibold mb-1">ຍັງບໍ່ມີໃບເບີກ</div><div class="text-xs">ໃບເບີກສິນຄ້າຂອງໄຊງານນີ້ຈະສະແດງຢູ່ນີ້</div></div>';

  var statusMap = {
    PENDING:  {cls:'text-amber-700 bg-amber-50 border border-amber-200',    icon:'⏳', label:'ລໍຖ້າ',   hdr:'bg-amber-50/60'},
    APPROVED: {cls:'text-emerald-700 bg-emerald-50 border border-emerald-200', icon:'✅', label:'ອະນຸມັດ', hdr:'bg-emerald-50/40'},
    REJECTED: {cls:'text-red-600 bg-red-50 border border-red-200',          icon:'❌', label:'ປະຕິເສດ', hdr:'bg-red-50/30'},
    FULFILLED:{cls:'text-blue-700 bg-blue-50 border border-blue-200',        icon:'📦', label:'ສຳເລັດ',  hdr:'bg-blue-50/30'},
    DRAFT:    {cls:'text-slate-500 bg-slate-50 border border-slate-200',     icon:'📝', label:'Draft',   hdr:'bg-slate-50'}
  };

  // Count badges
  var pendingN = srs.filter(function(r){return r.status==='PENDING';}).length;

  var html =
    '<div class="flex items-center justify-between mb-3">' +
    '<div class="flex items-center gap-2">' +
    '<span class="text-xs text-slate-500">ທັງໝົດ <strong>'+srs.length+'</strong> ໃບ</span>' +
    (pendingN > 0 ? '<span class="text-xs font-bold text-amber-700 bg-amber-100 border border-amber-200 px-2 py-0.5 rounded-full">⏳ ລໍຖ້າ '+pendingN+'</span>' : '') +

  srs.forEach(function(r){
    var sm = statusMap[r.status]||{cls:'text-slate-500 bg-slate-50',icon:'•',label:r.status,hdr:'bg-slate-50'};
    var canEdit = r.status==='PENDING' || r.status==='DRAFT';
    var items = (r.items||[]).map(function(i){
      var p = (STATE.data.products||[]).find(function(x){return x.id===i.productId;})||{};
      var approvedBadge = (r.status==='APPROVED'||r.status==='FULFILLED')&&(i.qtyApproved>0)
        ? '<span class="ml-1 text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded-full">✓ '+i.qtyApproved+'</span>' : '';
      return '<div class="flex items-center justify-between py-1.5 border-b border-slate-50 last:border-0">' +
        '<div class="flex items-center gap-2 min-w-0">' +

        '</div>' +
        '<div class="flex items-center gap-1 flex-shrink-0 ml-2">' +
        '<span class="text-xs font-bold text-slate-700">×'+i.qtyRequested+' <span class="font-normal text-slate-400">'+i.unit+'</span></span>' +
        approvedBadge +
        '</div>' +
        '</div>';
    }).join('');

    html +=
      '<div class="card mb-3 overflow-hidden border border-slate-200 hover:shadow-sm transition-shadow">' +
      '<div class="flex items-center justify-between px-4 py-3 border-b border-slate-100 '+sm.hdr+'">' +
      '<div class="flex-1 min-w-0">' +
      '<div class="flex items-center gap-2 flex-wrap">' +
      '<span class="font-mono text-sm font-bold text-slate-700">'+r.srNumber+'</span>' +
      '<span class="text-[11px] font-bold px-2 py-0.5 rounded-full border '+sm.cls+'">'+sm.icon+' '+sm.label+'</span>' +
      '</div>' +
      '<div class="text-xs text-slate-500 mt-0.5 flex flex-wrap gap-x-3">' +
      '<span>📅 ຂໍ: '+r.requestedAt+'</span>' +

      (r.approvedAt?'<span class="text-emerald-600">✅ ອະນຸ: '+r.approvedAt+'</span>':'') +
      (r.note?'<span class="italic text-slate-400">"'+r.note+'"</span>':'') +

      '<div class="px-4 py-2">'+items+'</div>' +

  return html;
}

    '</div>' +
    '<div class="flex items-center gap-2 bg-orange-50 rounded-xl px-3 py-2">' +
    '<span class="text-orange-600">📦</span>' +
    '<div><div class="text-sm font-black text-orange-700">'+totalUsageItems+'</div><div class="text-[10px] text-slate-500">ລາຍການ</div></div>' +
    '</div>' +

      var cost = it.unitCost!==undefined ? it.unitCost : p.costPrice||0;
      var val  = it.totalCost!==undefined ? it.totalCost : (Number(it.qty)||0)*cost;
      var before = it.stockBefore!==undefined?it.stockBefore:'—';
      var after  = it.stockAfter !==undefined?it.stockAfter :'—';
      var afterNum = Number(it.stockAfter);
      var afterCls = (!isNaN(afterNum)&&afterNum===0)?'text-red-600 font-bold':
                     (!isNaN(afterNum)&&afterNum<=(p.reorderPoint||0))?'text-amber-600 font-bold':'text-blue-600';
      return '<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/60">' +
        '<td class="px-3 py-2 font-mono text-xs text-slate-400">'+p.sku+'</td>' +

        '<td class="px-3 py-2 text-xs text-slate-400 whitespace-nowrap">'+before+'</td>' +

        '<td class="px-3 py-2 text-xs text-slate-400">'+(it.note||'—')+'</td>' +
        '</tr>';
    }).join('');

    html +=
      '<div class="card overflow-hidden border border-slate-200 hover:shadow-sm transition-shadow">' +

      '<div class="flex items-start justify-between px-4 py-3 bg-gradient-to-r from-slate-50 to-white border-b border-slate-100">' +

      (u.note?'<div class="text-xs text-slate-400 mt-0.5 italic">"'+u.note+'"</div>':'') +
      '</div></div>' +

      '<div class="flex items-center gap-3 text-right flex-shrink-0">' +
      '<div><div class="text-sm font-black text-red-600">−'+itemsQty+'</div><div class="text-[10px] text-slate-400">ໜ່ວຍ</div></div>' +
      '<div><div class="text-sm font-black text-blue-700">'+fmtNum(itemsVal)+'</div><div class="text-[10px] text-slate-400">LAK</div></div>' +
      '</div>' +
      '</div>' +
      // Items table
      '<div class="overflow-x-auto">' +
      '<table class="w-full">' +
      '<thead><tr class="bg-slate-50 border-b border-slate-200">' +
      ['SKU','ສິນຄ້າ','ກ່ອນ','ຕັດ','ຫຼັງ','ມູນຄ່າ','ໝາຍເຫດ'].map(function(h){
        return '<th class="text-left px-3 py-2 text-[10px] font-bold text-slate-500 uppercase tracking-wide">'+h+'</th>';
      }).join('')+'</tr></thead>' +
      '<tbody>'+itemRows+'</tbody>' +
      '<tfoot><tr class="bg-slate-50 border-t border-slate-200">' +
      '<td colspan="3" class="px-3 py-2 text-xs text-slate-500">'+(u.items||[]).length+' ລາຍການ</td>' +
      '<td class="px-3 py-2 text-xs font-bold text-red-600">−'+itemsQty+' ໜ່ວຍ</td>' +
      '<td class="px-3 py-2"></td>' +
      '<td class="px-3 py-2 text-xs font-bold text-blue-700">'+fmtNum(itemsVal)+'</td>' +
      '<td class="px-3 py-2"></td>' +
      '</tr></tfoot>' +
      '</table></div>' +
      // Status badge
      '<div class="flex items-center justify-between px-4 py-2 bg-slate-50 border-t border-slate-100">' +
      '<span class="text-xs text-slate-400">Status:</span>' +
      '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200">✅ SUBMITTED</span>' +
      '</div>' +
      '</div>';
  });

  html += '</div>';
  return html;
}

// ── Helper: Site Activity Log (Admin only) — Adjust stock for this site only ──
function _buildSiteActivityLog(siteId) {
  var logs = ((STATE.data.movements||[])||[])
    .filter(function(m){ return m.type==='ADJUST' && m.locId===siteId; })
    .sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

  if (!logs.length) return
    '<div class="text-center py-12 text-slate-400">' +
    '<div class="text-4xl mb-2">⚙️</div>' +
    '<div class="font-semibold mb-1">ຍັງບໍ່ມີປະຫວັດການແກ້ໄຂ</div>' +
    '<div class="text-xs">ການ Adjust Stock ໃນໄຊງານນີ້ຈະສະແດງຢູ່ນີ້</div>' +
    '</div>';

  var today = new Date().toISOString().slice(0,10);

  var html =
    '<div class="flex items-center gap-2 mb-3 pb-3 border-b border-slate-100">' +
    '<span class="text-xs text-slate-500">ທັງໝົດ <strong>'+logs.length+'</strong> ລາຍການ</span>' +
    '<span class="text-xs font-bold text-amber-700 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full">⚙️ Adjust Stock</span>' +
    '</div>' +
    '<div class="overflow-x-auto">' +
    '<table class="w-full text-xs">' +
    '<thead><tr class="bg-slate-50 border-b border-slate-200">' +
    ['ວັນທີ','ສິນຄ້າ','ກ່ອນ','ຫຼັງ','ຜົນ','ເຫດຜົນ','ຜູ້ແກ້ໄຂ'].map(function(h){
      return '<th class="text-left px-3 py-2 font-bold text-slate-500 uppercase tracking-wide whitespace-nowrap">'+h+'</th>';
    }).join('')+
    '</tr></thead><tbody>';

  logs.forEach(function(m){
    var p    = (STATE.data.products||[]).find(function(x){return x.id===m.productId;})||{name:m.productId,sku:'—',unit:''};
    var diff = (m.after||0)-(m.before||0);
    var diffCls = diff>0?'text-emerald-600 font-bold':diff<0?'text-red-500 font-bold':'text-slate-400';
    var diffTxt = diff>0?'+'+diff:String(diff);
    var isToday = m.date===today;
    html +=
      '<tr class="border-b border-slate-50 last:border-0 hover:bg-amber-50/30 transition-colors">' +
      '<td class="px-3 py-2.5 whitespace-nowrap '+(isToday?'text-blue-600 font-semibold':'text-slate-400')+'">'+
        (isToday?'🕐 ມື້ນີ້':m.date)+'</td>' +
      '<td class="px-3 py-2.5">' +
        '<div class="font-semibold text-slate-800">'+p.name+'</div>' +
        '<div class="text-[10px] text-slate-400 font-mono">'+p.sku+'</div>' +
      '</td>' +
      '<td class="px-3 py-2.5 text-slate-500">'+m.before+'</td>' +
      '<td class="px-3 py-2.5 text-slate-700 font-semibold">'+m.after+' <span class="font-normal text-slate-400">'+p.unit+'</span></td>' +
      '<td class="px-3 py-2.5 '+diffCls+'">'+diffTxt+'</td>' +
      '<td class="px-3 py-2.5 text-slate-500 max-w-xs truncate" title="'+(m.note||'')+'">'+( m.note||'—')+'</td>' +
      '<td class="px-3 py-2.5 text-slate-400 whitespace-nowrap">'+(m.by||'—')+'</td>' +
      '</tr>';
  });

  html += '</tbody></table></div>';
  return html;
}

function _refreshSiteStockContent(siteId) {
  var site   = STATE.data.sites.find(function(s){return s.id===siteId;})||{};
  var prods  = (STATE.data.products && STATE.data.products.length) ? STATE.data.products : (STATE.data.products||[]);
  var cats   = (STATE.data.categories && STATE.data.categories.length) ? STATE.data.categories : (STATE.data.categories||[]);
  var q      = ((document.getElementById('siteModalSearch')||{}).value||'').toLowerCase();
  var allRows = prods.map(function(p){
    var cat = cats.find(function(c){return c.id===p.categoryId;})||{name:'—',id:''};
    return {p:p, qty:((STATE.data.stock||[])[p.id]||{})[siteId]||0, cat:cat};
  });

  var cf = window._siteStockCatFilter;
  var sz = window._siteStockShowZero;
  var filtered = allRows.filter(function(x){
    var matchCat  = cf==='ALL' || x.cat.id===cf;
    var matchZero = sz || x.qty > 0;
    var matchQ    = !q || (x.p.name||'').toLowerCase().indexOf(q)>-1 || (x.p.sku||'').toLowerCase().indexOf(q)>-1;
    return matchCat && matchZero && matchQ;
  });

  var chips = _buildCatChips(siteId, allRows, cf, sz);
  var chipsEl = document.getElementById('siteStockChips');
  if (chipsEl) chipsEl.innerHTML = chips;

  var tbody = document.getElementById('siteStockTbody');
  if (tbody) tbody.innerHTML = _buildSiteStockRows(filtered, siteId, site);
}

    headStyles: {fillColor:[29,78,216], textColor:255, fontStyle:'bold'},
    columnStyles: {

function _srMiniList(siteId) {
  var srs = (STATE.data.srs||[]).filter(function(r){ return r.siteId===siteId; })
    .sort(function(a,b){
      var da = a.approvedAt||a.rejectedAt||a.updatedAt||a.requestedAt||'';
      var db = b.approvedAt||b.rejectedAt||b.updatedAt||b.requestedAt||'';
      return db.localeCompare(da);
    }).slice(0,5);
  if (!srs.length) return '<div class="text-slate-400 text-xs py-4 text-center">ຍັງບໍ່ມີໃບເບີກ</div>';
  var statusMap = {
    PENDING:   {cls:'text-amber-600 bg-amber-50 border border-amber-200',     label:'PENDING'},
    APPROVED:  {cls:'text-emerald-600 bg-emerald-50 border border-emerald-200', label:'APPROVED'},
    REJECTED:  {cls:'text-red-600 bg-red-50 border border-red-200',           label:'REJECTED'},
    FULFILLED: {cls:'text-blue-600 bg-blue-50 border border-blue-200',        label:'FULFILLED'},
    DRAFT:     {cls:'text-slate-500 bg-slate-50 border border-slate-200',     label:'DRAFT'}
  };
  return srs.map(function(r){
    var s = statusMap[r.status] || {cls:'text-slate-500 bg-slate-50', label:r.status};
    var items = r.items.map(function(i){
      var p = (STATE.data.products||[]).find(function(x){return x.id===i.productId;})||{};
      return (p.name||'?')+' x'+(i.qtyApproved||i.qtyRequested);
    }).join(', ');
    var canEdit = r.status==='PENDING' || r.status==='DRAFT';
    // Show most relevant date: approved/rejected > requested
    var latestDate = r.approvedAt||r.rejectedAt||r.updatedAt||r.requestedAt||'';
    var dateLabel  = (r.approvedAt||r.rejectedAt) ? latestDate : r.requestedAt||'';
    var isToday    = dateLabel === new Date().toISOString().slice(0,10);
    return '<div class="flex items-center gap-2 py-2.5 border-b border-slate-100 last:border-0 hover:bg-slate-50 rounded px-1">' +
      '<span class="font-mono text-xs text-blue-500 font-semibold flex-shrink-0">'+r.srNumber+'</span>' +
      '<span class="text-xs text-slate-600 flex-1 min-w-0 truncate">'+items+'</span>' +
      '<span class="text-xs font-bold px-2.5 py-0.5 rounded-full flex-shrink-0 '+s.cls+'">'+s.label+'</span>' +
      '<span class="text-xs flex-shrink-0 '+(isToday?'text-blue-500 font-semibold':'text-slate-400')+'">'+
        (isToday?'🕐 ມື້ນີ້':dateLabel)+'</span>' +
      (canEdit ? '<button type="button" onclick="openSRForm(null,\''+r.id+'\')" class="flex-shrink-0 text-xs px-2 py-1 rounded-lg bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold border border-blue-200 transition-colors">✏️</button>' : '') +
      '</div>';
  }).join('');
}


// ─── Stock Request Form (เบิกของ) ─────────────────────────────
function openSRForm(siteId, srId) {

  var u = STATE.user;

  });

  var effectiveSiteId = sr.siteId || siteId || '';
  var lockedSite   = effectiveSiteId ? STATE.data.sites.find(function(s){return s.id===effectiveSiteId;})||null : null;
  var lockedBranch = lockedSite ? STATE.data.branches.find(function(b){return b.id===lockedSite.branchId;})||{} : {};

    siteFieldHtml =
      '<input type="hidden" id="sr_site" value="'+lockedSite.id+'">' +

      '<div class="flex-1">' +
      '<div class="font-bold text-blue-800 text-sm">'+lockedSite.name+'</div>' +
      '<div class="text-blue-500 text-xs">🏢 '+lockedBranch.name+(lockedSite.clientName?' · '+lockedSite.clientName:'')+'</div>' +
      '</div>' +
      '<span class="text-xs text-blue-400 bg-blue-100 px-2 py-0.5 rounded-full">ໄຊງານທີ່ເລືອກ</span>' +
      '</div>';
  } else {
    var siteOpts = '<option value="">— ເລືອກໄຊງານ —</option>' + sites.map(function(s){
      var b = STATE.data.branches.find(function(x){return x.id===s.branchId;})||{};
      return '<option value="'+s.id+'" '+(effectiveSiteId===s.id?'selected':'')+'>📍 '+s.name+' ('+b.name+')</option>';
    }).join('');
    siteFieldHtml = '<select id="sr_site" class="select" onchange="srUpdateBranch()">'+siteOpts+'</select>';

  var itemsHtml = (sr.items||[{productId:'',qtyRequested:1,unit:'',note:''}]).map(function(item,i){
    return _srItemRow(i, item.productId, item.qtyRequested, item.note, lockedSite ? lockedSite.branchId : '');

  var canEditStatus = !isEdit || sr.status === 'PENDING' || sr.status === 'DRAFT';

  var branchStockPanel = '';

    var prods = (STATE.data.products||[]);
    var stockItems = prods.map(function(p){
      return { p:p, qty:((STATE.data.stock||[])[p.id]||{})[lockedBranch.id]||0 };
    }).filter(function(x){ return x.qty > 0; });
    var outItems = prods.filter(function(p){

    });

    var rows = prods.map(function(p){
      var qty = ((STATE.data.stock||[])[p.id]||{})[lockedBranch.id]||0;
      var isLow  = qty>0 && qty<=p.reorderPoint;
      var isZero = qty===0;
      var barW   = p.reorderPoint>0 ? Math.min(100, Math.round(qty/Math.max(qty,p.reorderPoint)*100)) : (qty>0?100:0);
      var barCls = isZero?'bg-slate-200':isLow?'bg-amber-400':'bg-emerald-400';
      var qtyCls = isZero?'text-slate-300':isLow?'text-amber-600 font-bold':'text-emerald-700 font-bold';
      return '<tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/70">' +

          '<div class="w-14 bg-slate-100 rounded-full h-1.5 flex-shrink-0"><div class="'+barCls+' h-1.5 rounded-full" style="width:'+barW+'%"></div></div>' +
          '<span class="text-sm '+qtyCls+'">'+qty+'</span>' +
          '<span class="text-[10px] text-slate-400">'+p.unit+'</span>' +
          (isZero?'<span class="text-[10px] font-bold text-red-500 bg-red-50 border border-red-200 px-1.5 rounded-full">ໝົດ</span>':
           isLow ?'<span class="text-[10px] font-bold text-amber-600 bg-amber-50 border border-amber-200 px-1.5 rounded-full">⚠️ ໃກ້ໝົດ</span>':'') +
          '</div>' +
        '</td>' +
        '</tr>';

      '<div class="rounded-xl border border-slate-200 overflow-hidden">' +
      // Header — collapsible toggle
      '<button type="button" onclick="srToggleBranchStock()" ' +
      'class="w-full flex items-center gap-2 px-4 py-3 bg-slate-50 hover:bg-slate-100 transition-colors text-left border-b border-slate-200">' +
      '<span class="text-base">🧴</span>' +
      '<div class="flex-1">' +
      '<span class="font-bold text-slate-700 text-sm">ສິນຄ້າທີ່ໃຊ້ — ກວດ Stock ສາຂາ</span>' +
      '<span class="ml-2 text-xs text-slate-400">🏢 '+lockedBranch.name+'</span>' +
      '</div>' +
      '<div class="flex items-center gap-2 flex-shrink-0">' +
      '<span class="text-xs font-bold text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">✅ '+stockItems.length+' ລາຍການ</span>' +

      '<span id="srBranchStockChevron" class="text-slate-400 text-xs transition-transform">▼</span>' +
      '</div>' +
      '</button>' +
      '<div id="srBranchStockPanel" class="">' +
      '<div class="overflow-y-auto" style="max-height:220px;">' +
      '<table class="w-full">' +
      '<thead class="sticky top-0 bg-white z-10"><tr class="border-b border-slate-200 bg-slate-50">' +
      '<th class="text-left px-2 py-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wide">ສິນຄ້າ / Product</th>' +
      '<th class="text-left px-2 py-1.5 text-[10px] font-bold text-slate-500 uppercase tracking-wide">ມີໃນສາຂາ</th>' +
      '</tr></thead>' +
      '<tbody>'+rows+'</tbody>' +
      '</table></div></div></div>';
  }

  openModal((isEdit?'✏️ Edit':'📋 New') + ' Stock Request (ເບີກຂອງ)',
    '<div class="space-y-4">' +
    '<div class="grid grid-cols-2 gap-3">' +
    '<div class="col-span-2"><label class="field-label">Job Site / ໄຊງານ</label>'+siteFieldHtml+'</div>' +
    '<div><label class="field-label">Required Date *</label><input id="sr_date" type="date" class="input" value="'+(sr.requiredDate||'')+'"></div>' +
    '<div><label class="field-label">Note / ໝາຍເຫດ</label><input id="sr_note" class="input" value="'+(sr.note||'')+'" placeholder="Optional"></div>' +
    '</div>' +

    // ── Branch stock panel (shown when site is known) ──────
    branchStockPanel +

    '<div>' +
    '<div class="flex justify-between items-center mb-2">' +
    '<label class="field-label mb-0">Items / ລາຍການ *</label>' +
    '<button type="button" onclick="srAddItem()" class="text-blue-600 text-xs font-semibold hover:text-blue-800">+ Add Item</button>' +
    '</div>' +
    '<div id="srItemsList" class="space-y-2">'+itemsHtml+'</div>' +
    '</div>' +

    (isEdit && !canEditStatus ?
      '<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">⚠️ This request has been '+sr.status+' and cannot be fully edited.</div>'
    : '') +

    '<div class="flex gap-2">' +
    '<button onclick="submitSRForm(\''+( srId||'')+'\')" class="btn btn-primary flex-1">'+(isEdit?'💾 Update Request':'📤 Submit Request')+'</button>' +
    '<button onclick="closeModal()" class="btn btn-secondary">Cancel</button>' +
    '</div></div>', true);
}

// Toggle branch stock panel collapse
function srToggleBranchStock() {
  var panel   = document.getElementById('srBranchStockPanel');
  var chevron = document.getElementById('srBranchStockChevron');
  if (!panel) return;
  var hidden = panel.style.display === 'none';
  panel.style.display   = hidden ? '' : 'none';
  if (chevron) chevron.style.transform = hidden ? '' : 'rotate(-90deg)';
}

function _srItemRow(idx, productId, qty, note, branchId) {
  var prods = (STATE.data.products||[]);
  var prodOpts = prods.map(function(p){
    return '<option value="'+p.id+'" '+(p.id===productId?'selected':'')+'>'+p.sku+' — '+p.name+' ('+p.unit+')</option>';
  }).join('');

  // Build branch stock badge for currently-selected product
  var bId = branchId || _srGetBranchId();
  var selProd = prods.find(function(p){return p.id===productId;})||null;
  var bQty = (selProd && bId) ? (((STATE.data.stock||[])[selProd.id]||{})[bId]||0) : null;
  var stockBadge = _srStockBadgeHtml(bQty, selProd);

  return '<div id="srRow_'+idx+'" class="p-3 bg-slate-50 rounded-xl space-y-2 border border-slate-200">' +
    // Product row: select + scan + remove
    '<div class="scan-field-wrap">' +
    '<select id="srProd_'+idx+'" class="select text-sm flex-1" onchange="srRefreshStockBadge('+idx+')">' +
    prodOpts+'</select>' +

    '<button onclick="srRemoveItem('+idx+')" class="text-red-400 hover:text-red-600 px-2 font-bold text-xl flex-shrink-0">×</button>' +
    '</div>' +
    // Branch stock badge (live update)
    '<div id="srStockBadge_'+idx+'" class="flex items-center gap-2 text-xs">'+stockBadge+'</div>' +
    // Qty + note row
    '<div class="grid gap-2" style="grid-template-columns:90px 1fr">' +
    '<input id="srQty_'+idx+'" type="number" min="1" class="input text-sm" value="'+(qty||1)+'" placeholder="Qty">' +
    '<input id="srNote_'+idx+'" class="input text-sm" value="'+(note||'')+'" placeholder="Note (optional)">' +
    '</div>' +
    '</div>';
}

// Get branch ID from current SR form context
function _srGetBranchId() {
  var siteId = (document.getElementById('sr_site')||{}).value || '';
  if (!siteId) return '';
  var site = STATE.data.sites.find(function(s){return s.id===siteId;})||{};
  return site.branchId||'';
}

// Build badge HTML for branch stock
function _srStockBadgeHtml(qty, prod) {
  if (qty === null || qty === undefined || !prod) {
    return '<span class="text-slate-400 text-[10px]">— ກວດ Stock ສາຂາ</span>';
  }
  var isZero = qty === 0;
  var isLow  = qty > 0 && qty <= (prod.reorderPoint||0);
  var barW   = prod.reorderPoint>0 ? Math.min(100, Math.round(qty/Math.max(qty,prod.reorderPoint)*100)) : (qty>0?80:0);
  var barCls = isZero?'bg-red-400':isLow?'bg-amber-400':'bg-emerald-400';
  var badge  = isZero
    ? '<span class="font-bold text-red-600 bg-red-50 border border-red-200 px-2 py-0.5 rounded-full text-[10px]">❌ ໝົດສາຂາ</span>'
    : isLow
    ? '<span class="font-bold text-amber-600 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full text-[10px]">⚠️ ໃກ້ໝົດ</span>'
    : '<span class="font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full text-[10px]">✅ ພໍ</span>';
  return '<span class="text-slate-500 text-[10px]">🏢 ສາຂາ:</span>' +

}

function submitSRForm(srId) {
  var siteId = document.getElementById('sr_site').value;
  var date = document.getElementById('sr_date').value;
  var note = document.getElementById('sr_note').value;
  if (!siteId || !date) { showToast('Site and date required', 'warn'); return; }

  var site = STATE.data.sites.find(function(s){return s.id===siteId;})||{};
  var items = [];
  var rows = document.querySelectorAll('[id^="srRow_"]');
  rows.forEach(function(row) {
    var idx = row.id.replace('srRow_','');
    var prodId = (document.getElementById('srProd_'+idx)||{}).value||'';
    var qty = Number((document.getElementById('srQty_'+idx)||{}).value||0);
    var rowNote = (document.getElementById('srNote_'+idx)||{}).value||'';
    var prod = (STATE.data.products||[]).find(function(p){return p.id===prodId;})||{};
    if (prodId && qty>0) items.push({productId:prodId,qtyRequested:qty,qtyApproved:0,unit:prod.unit||'',note:rowNote});
  });
  if (!items.length) { showToast('Add at least one item', 'warn'); return; }

  var data = { id:srId||undefined, siteId:siteId, branchId:site.branchId||'', requestedBy:STATE.user.id,
    requestedAt: srId ? undefined : new Date().toISOString().slice(0,10),
    requiredDate:date, note:note, status:'PENDING', items:items };

  callServer('saveSR', [data], function(res){
    if (res.success) {
      showToast((srId?'Request updated ✅':'Request submitted ✅')+' '+res.srNumber);
      closeModal();
      _srTab = 'requests';
      renderBranches();
    } else showToast('Error saving request', 'error');
  });
}

// ─── SR List & Approval tab ────────────────────────────────────
function _renderSRTab() {
  var canApprove = STATE.user.role === 'ADMIN' || STATE.user.role === 'MANAGER';
  var filter  = window._srFilter  || 'PENDING';
  var srFrom  = window._srDateFrom || new Date(Date.now()-90*86400000).toISOString().slice(0,10);
  var srTo    = window._srDateTo   || new Date().toISOString().slice(0,10);

  callServer('getSRsPaged', [{
      page:1, perPage:200,
      dateFrom: srFrom,
      dateTo:   srTo
    }], function(res){
    var allSRs = res.data || [];

    // Access filter
    var u = STATE.user;
    if (u.role !== 'ADMIN' && u.role !== 'MANAGER') {
      var allowedS = [].concat(u.siteIds||[]);
      if (allowedS.indexOf('ALL') === -1) {
        allSRs = allSRs.filter(function(r){ return allowedS.indexOf(r.siteId) > -1; });
      }
    }

    var statuses = ['PENDING','APPROVED','REJECTED','FULFILLED'];
    var counts = {};
    statuses.forEach(function(s){ counts[s] = allSRs.filter(function(r){return r.status===s;}).length; });

    var filtered = filter === 'ALL' ? allSRs : allSRs.filter(function(r){return r.status===filter;});

    var html =
      '<div class="flex justify-between items-center mb-4">' +
      '<div class="flex gap-1 flex-wrap">' +
      ['ALL','PENDING','APPROVED','REJECTED','FULFILLED'].map(function(s){
        var cnt = s==='ALL' ? allSRs.length : (counts[s]||0);
        var active = filter===s;
        var colors = {PENDING:'bg-amber-100 text-amber-700',APPROVED:'bg-emerald-100 text-emerald-700',REJECTED:'bg-red-100 text-red-700',FULFILLED:'bg-blue-100 text-blue-700',ALL:'bg-slate-200 text-slate-700'};
        return '<button onclick="window._srFilter=\''+s+'\';_renderSRTab()" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all '+(active?colors[s]+' ring-2 ring-offset-1 ring-current':colors[s]+' opacity-60')+'">' +
          s + (cnt>0?' ('+cnt+')':'') + '</button>';
      }).join('') +
      '</div>' +
      '<button onclick="openSRForm(null,null)" class="btn btn-primary text-sm">+ New Request</button>' +
      '</div>' +

      (filtered.length === 0 ?
        '<div class="card p-8 text-center text-slate-400">No '+filter.toLowerCase()+' requests</div>' :
        filtered.map(function(r) { return _renderSRCard(r, canApprove); }).join('')
      );

    var el = document.getElementById('branchTabContent');
    if (el) el.innerHTML = html;
  });
}


// ── USAGE TAB ─────────────────────────────────────────────

        .filter(function(s){ return s.branchId === branchId; })
        .map(function(s){ return s.id; });
      data = data.filter(function(r){ return branchSiteIds.indexOf(r.siteId) > -1; });

          '<div class="text-xs text-slate-400">🔧 '+rep.workType+' · '+rep.startTime+' – '+rep.endTime+' · 👤 '+rep.reportedBy+'</div>' +
          (rep.note?'<div class="text-xs text-slate-400 italic mt-0.5">📝 '+rep.note+'</div>':'') +
          '</div>' +
          '</div>' +
          '<div class="bg-slate-50 rounded-xl p-3 space-y-1">' +
          (rep.items||[]).map(function(it){
            var prod = STATE.data.products.find(function(p){return p.id===it.productId;})||{};

              '<span class="font-semibold text-slate-800">'+it.qtyUsed+' '+it.unit+'</span></div>';
