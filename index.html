function _renderCWHistorySections(canManage) {
  var wrap = document.getElementById('cwHistorySections');
  if (!wrap) return;
  wrap.innerHTML = '';

  // ── 1. Stock In / Lot Tracking ──
  callServer('getLots', [null, 'CW001'], function(lr){
    var cwLots = lr.data || [];
    // pre-compute FIFO order once
    var fifoOrder = cwLots.slice().sort(function(a,b){
      return (a.receivedAt||a.receivedDate||'').localeCompare(b.receivedAt||b.receivedDate||'');
    });
    var lotTh = ['Lot #','ສິນຄ້າ','ຈຳນວນ','ວັນທີ Stock In','ໝົດອາຍຸ','Days Left','FIFO','ໝາຍເຫດ'].map(function(h){
      return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase whitespace-nowrap">'+h+'</th>';
    }).join('');
    var titleBtn = '📥 ປະຫວັດ Stock In (Lot Tracking)' +
      (canManage ? '<button onclick="showPage(\'pr\')" class="ml-3 btn btn-warning text-xs px-3 py-1">📝 ສ້າງ PR ຂໍຊື້</button>' : '');
    wrap.insertAdjacentHTML('beforeend',
      _historySection('cwLot', '📥', titleBtn, lotTh, cwLots,
        function(l) {
          var fifoIdx = fifoOrder.findIndex(function(x){return x.id===l.id;});
          var expBg = l.daysLeft<=0?'bg-red-50/30':l.daysLeft<=30?'bg-amber-50/20':'';
          var expTxt = l.daysLeft<=0 ? '<span class="text-red-600 font-bold">🔴 EXPIRED</span>'
            : l.daysLeft<=7  ? '<span class="text-orange-600 font-bold">🟠 '+l.daysLeft+'d</span>'
            : l.daysLeft<=30 ? '<span class="text-amber-600">🟡 '+l.daysLeft+'d</span>'
            : '<span class="text-emerald-600">🟢 '+l.daysLeft+'d</span>';
          return '<tr class="border-b border-slate-100 hover:bg-slate-50/50 '+expBg+'">' +
            '<td class="px-4 py-2.5 font-mono text-xs font-bold text-slate-700 whitespace-nowrap">'+l.lotNumber+'</td>' +
            '<td class="px-4 py-2.5"><div class="font-semibold text-slate-800">'+l.productName+'</div><div class="text-xs text-slate-400 font-mono">'+l.sku+'</div></td>' +
            '<td class="px-4 py-2.5 font-bold whitespace-nowrap">'+l.qty+' <span class="text-xs font-normal text-slate-400">'+l.unit+'</span></td>' +
            '<td class="px-4 py-2.5 text-xs whitespace-nowrap">'+fmtDT(l.receivedAt||l.receivedDate)+'</td>' +
            '<td class="px-4 py-2.5 text-xs text-slate-500 whitespace-nowrap">'+(l.expiryDate||'—')+'</td>' +
            '<td class="px-4 py-2.5 text-xs whitespace-nowrap">'+expTxt+'</td>' +
            '<td class="px-4 py-2.5">'+(fifoIdx===0?'<span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full">1st OUT</span>':'<span class="text-slate-300 text-xs">#'+(fifoIdx+1)+'</span>')+'</td>' +
            '<td class="px-4 py-2.5 text-xs text-slate-400 max-w-xs truncate">'+(l.note||'—')+'</td>' +
            '</tr>';
        },
        null,
        null,
        ['Lot#','SKU','ສິນຄ້າ','ຈຳນວນ','ໜ່ວຍ','ວັນທີ Stock In','ໝົດອາຍຸ','Days Left','ໝາຍເຫດ'],
        function(l){ return [l.lotNumber, l.sku, l.productName, l.qty, l.unit, String(l.receivedAt||l.receivedDate||'').slice(0,16).replace('T',' '), l.expiryDate||'', l.daysLeft, l.note||'']; },
        6
      )
    );

    // ── 2. Dispatch History ──
    callServer('getDispatches', [], function(dr){
      var dps = dr.data || [];
      var dpTh = ['BD#','ສາຂາ','ລາຍການ','ວັນທີ / ເວລາ','ໝາຍເຫດ','Status',''].map(function(h){
        return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase">'+h+'</th>';
      }).join('');
      wrap.insertAdjacentHTML('beforeend',
        _historySection('cwDisp', '📋', 'ປະຫວັດການຈ່າຍໃຫ້ສາຂາ (Dispatch History)', dpTh, dps,
          function(d) {
            var sc = d.status==='APPROVED'?'bg-emerald-100 text-emerald-700':d.status==='PENDING'?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700';
            var branch = STATE.data.branches.find(function(b){return b.id===d.toLocId;})||{name:d.toLocName||'—'};
            var itemsSummary = (d.items||[]).slice(0,2).map(function(it){
              return '<div class="whitespace-nowrap text-xs">'+it.productName+' <span class="font-bold">×'+(it.qtyApproved||it.qty)+'</span></div>';
            }).join('')+((d.items||[]).length>2?'<div class="text-xs text-slate-400">+'+((d.items||[]).length-2)+' more</div>':'');
            return '<tr class="border-b border-slate-100 hover:bg-slate-50/50">' +
              '<td class="px-4 py-2.5 font-mono text-xs text-slate-500 whitespace-nowrap">'+d.bdNumber+'</td>' +

              '<td class="px-4 py-2.5"><span class="px-2 py-0.5 rounded-full text-xs font-bold '+sc+'">'+d.status+'</span></td>' +
              '<td class="px-4 py-2.5">'+(d.status==='PENDING'&&canManage?'<button onclick="openDispatchApproval(\''+d.id+'\')" class="btn btn-success text-xs px-2 py-1">✅</button>':'')+'</td>' +
              '</tr>';
          },
          null,
          null,
          ['BD#','ສາຂາ','ສິນຄ້າ (ລາຍການ)','ວັນທີ','ໝາຍເຫດ','Status'],
          function(d){
            var branch = STATE.data.branches.find(function(b){return b.id===d.toLocId;})||{name:d.toLocName||'—'};
            var items = (d.items||[]).map(function(it){ return it.productName+' x'+(it.qtyApproved||it.qty); }).join(', ');
            return [d.bdNumber, branch.name, items, String(d.approvedAt||d.createdAt||'').slice(0,16).replace('T',' '), d.note||'', d.status];
          },
          6
        )
      );

      // ── 3. Transfer History ──
      callServer('getTransfers', [null], function(tr){
        var trs = tr.data || [];
        var locIcon = function(type){ return type==='BRANCH'?'🏢':type==='SITE'?'📍':'🏛️'; };
        var allLocs = [].concat(STATE.data.warehouses||[], STATE.data.branches||[], STATE.data.sites||[]);
        var trTh = ['TR#','ສິນຄ້າ','ຈາກ','ໄປ','ຈຳນວນ','ວັນທີ / ເວລາ','ໝາຍເຫດ'].map(function(h){
          return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase">'+h+'</th>';
        }).join('');
        wrap.insertAdjacentHTML('beforeend',
          _historySection('cwTr', '📋', 'ປະຫວັດການໂອນ (Transfer History)', trTh, trs,
            function(t) {
              var prod = STATE.data.products.find(function(p){return p.id===t.productId;})||{};
              var from = allLocs.find(function(l){return l.id===t.fromLocId;})||{name:t.fromLocId};

                '<td class="px-4 py-2.5 font-mono text-xs text-slate-500 whitespace-nowrap">'+t.trNumber+'</td>' +
                '<td class="px-4 py-2.5"><span class="font-semibold text-slate-800">'+prod.name+'</span> <span class="text-xs text-slate-400 font-mono">'+prod.sku+'</span></td>' +
                '<td class="px-4 py-2.5 text-sm text-slate-600 whitespace-nowrap">'+locIcon(t.fromLocType)+' '+from.name+'</td>' +
                '<td class="px-4 py-2.5 text-sm text-slate-600 whitespace-nowrap">'+locIcon(t.toLocType)+' '+to.name+'</td>' +
                '<td class="px-4 py-2.5 font-bold whitespace-nowrap">'+t.qty+' <span class="text-xs font-normal text-slate-400">'+prod.unit+'</span></td>' +
                '<td class="px-4 py-2.5 text-xs whitespace-nowrap">'+fmtDT(t.transferredAt)+'</td>' +

function confirmApproveDispatch(bdId) {
  var bd = (STATE.data.dispatches||[]).find(function(x){return x.id===bdId;});
  if (!bd) return;
  var approvedItems = (bd.items||[]).map(function(it,i){
    var qty = Number((document.getElementById('bdApprQty_'+i)||{}).value||0);

  });
  callServer('approveDispatch', [bdId, approvedItems], function(res){

      showToast('✅ ອະນຸມັດແລ້ວ — Stock ຖືກຕັດຈາກ CW', 'success');

      renderInventoryForLocation('CW001','COMPANY','Company Warehouse');

}

function _doRejectDispatch(bdId) {
  var reason = (document.getElementById('bdRejectReason')||{}).value||'';
  if (!reason.trim()) { showToast('ກະລຸນາໃສ່ເຫດຜົນ', 'warn'); return; }
  callServer('rejectDispatch', [bdId, reason], function(res){
    if (res.success){
      showToast('❌ ປະຕິເສດໃບຈ່າຍແລ້ວ', 'warn');
      closeModal();
      renderInventoryForLocation('CW001','COMPANY','Company Warehouse');
    } else showToast('Error','error');
  });
}

function trCheckStock() {
  var pid  = (document.getElementById('tr_prod')||{}).value;
  var from = (document.getElementById('tr_from')||{}).value;
  if (!pid||!from) return;
  callServer('getStock',[from],function(res){
    var s = (res.data||[]).find(function(x){return x.productId===pid;})||{qty:0,unit:''};
    var icon = from==='CW001'?'🏛️':from.startsWith('B')?'🏢':'📍';
    var info = document.getElementById('trStockInfo');
    if (info) info.innerHTML = icon+' ສະຕ໋ອກທີ່ມີ: <strong class="text-slate-800">'+fmtNum(s.qty)+' '+s.unit+'</strong>';
  });
}

function submitTransfer() {
  var pid  = (document.getElementById('tr_prod')||{}).value;
  var from = (document.getElementById('tr_from')||{}).value;
  var to   = (document.getElementById('tr_to')||{}).value;
  var qty  = Number((document.getElementById('tr_qty')||{}).value||0);
  var note = (document.getElementById('tr_note')||{}).value||'';
  if (!qty||qty<=0){ showToast('ກະລຸນາໃສ່ຈຳນວນ','warn'); return; }
  if (from===to){ showToast('ຕ້ອງການ Location ຕ່າງກັນ','warn'); return; }
  var fromType = from==='CW001'?'COMPANY':(from.startsWith('B')?'BRANCH':'SITE');
  var toType   = to==='CW001'?'COMPANY':(to.startsWith('B')?'BRANCH':'SITE');
  callServer('saveTransfer',[{productId:pid,fromLocId:from,fromLocType:fromType,toLocId:to,toLocType:toType,qty:qty,note:note}],function(res){
    if (res.success){ showToast('✅ ໂອນສຳເລັດ — '+res.trNumber); renderTransfer(); }
    else showToast('Error','error');
  });
}

function loadStockCard() {
  var prod = STATE.data.products.find(function(p){return p.id===document.getElementById('sc_prod').value;})||{};
  var locId = document.getElementById('sc_loc').value;
  var loc = (STATE.data.branches.find(function(b){return b.id===locId;})||STATE.data.sites.find(function(s){return s.id===locId;})||(locId==='CW001'?{name:'Company Warehouse'}:{name:locId}));

  callServer('getStockCard',[prod.id,locId],function(res){
    var moves = res.data||[];
    var opening = res.openingBalance||0;
    var closing = res.closingBalance||0;
    var totalIn  = moves.filter(function(m){return m.type==='IN';}).reduce(function(s,m){return s+m.qty;},0);
    var totalOut = moves.filter(function(m){return m.type!=='IN';}).reduce(function(s,m){return s+m.qty;},0);

    window._stockCardData = {moves:moves,prod:prod,loc:loc,opening:opening,closing:closing,totalIn:totalIn,totalOut:totalOut};
    window._scPage = 1; window._scPerPage = 50;

    document.getElementById('stockCardBody').innerHTML =
      '<div class="card overflow-hidden" id="scCardWrap">' +
      '<div class="bg-gradient-to-r from-slate-700 to-slate-600 px-5 py-4">' +
      '<div class="flex items-start justify-between">' +
      '<div><div class="font-bold text-white text-base">📊 STOCK CARD</div>' +
      '<div class="text-slate-300 text-sm">'+prod.name+' ('+prod.sku+') · '+loc.name+'</div>' +
      '<div class="text-slate-400 text-xs mt-1">'+document.getElementById('sc_from').value+' → '+document.getElementById('sc_to').value+'</div>' +
      '</div>' +
      '<button onclick="exportStockCardCSV()" class="btn text-xs px-3 py-1.5 bg-white/20 text-white hover:bg-white/30">⬇️ Export CSV</button>' +
      '</div></div>' +
      '<div class="grid grid-cols-4 divide-x divide-slate-100 border-b border-slate-100">' +
      [['Opening',opening,'text-slate-700'],['Total IN',totalIn,'text-emerald-600'],['Total OUT',totalOut,'text-amber-600'],['Closing',closing,'text-blue-700']].map(function(sv){
        return '<div class="p-4 text-center"><div class="text-xs text-slate-400 mb-1">'+sv[0]+'</div>' +
          '<div class="text-xl font-black '+sv[2]+'">'+fmtNum(sv[1])+'</div>' +
          '<div class="text-xs text-slate-400">'+prod.unit+'</div></div>';
      }).join('')+'</div>' +
      '<div id="scLedgerBody"></div>' +
      '</div>';

    _renderStockCardTable();
  });
}

function _renderStockCardTable() {
  var d = window._stockCardData;
  var el = document.getElementById('scLedgerBody');
  if (!d || !el) return;
  var pag = paginateData(d.moves, window._scPage||1, window._scPerPage||50);
  // Build running balance for visible page
  var startBal = d.opening;
  // Re-calculate balance from start for current page
  for (var i = 0; i < (pag.page-1)*pag.perPage; i++) {
    var m0 = d.moves[i];
    if (m0) startBal = m0.type==='IN' ? startBal+m0.qty : startBal-m0.qty;
  }
  var bal = startBal;
  var rows = pag.items.map(function(m){
    var isIn = m.type==='IN';
    bal = isIn ? bal+m.qty : bal-m.qty;
    return '<tr class="border-b border-slate-100 hover:bg-slate-50/50 '+(isIn?'':'bg-orange-50/10')+'">' +
      '<td class="px-4 py-2.5 text-xs text-slate-400">'+m.date+'</td>' +
      '<td class="px-4 py-2.5"><span class="text-xs font-bold px-2 py-0.5 rounded-full '+(isIn?'bg-emerald-100 text-emerald-700':'bg-amber-100 text-amber-700')+'">'+m.type+'</span></td>' +
      '<td class="px-4 py-2.5 font-mono text-xs text-slate-500">'+m.ref+'</td>' +
      '<td class="px-4 py-2.5 font-mono text-xs text-blue-600">'+(m.lot||'-')+'</td>' +
      '<td class="px-4 py-2.5 font-bold text-emerald-600">'+(isIn?'+'+m.qty:'—')+'</td>' +
      '<td class="px-4 py-2.5 font-bold text-amber-600">'+(!isIn?'-'+m.qty:'—')+'</td>' +
      '<td class="px-4 py-2.5 font-black text-slate-800">'+fmtNum(bal)+'</td>' +
      '<td class="px-4 py-2.5 text-xs text-slate-400">'+m.by+'</td>' +
      '<td class="px-4 py-2.5 text-xs text-slate-400">'+m.note+'</td></tr>';
  }).join('');

  el.innerHTML =
    '<div class="overflow-x-auto"><table class="w-full text-sm">' +
    '<thead class="bg-slate-50 border-b"><tr>' +
    ['Date','Type','Ref','Lot','IN','OUT','Balance','By','Note'].map(function(h){
      return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase">'+h+'</th>';
    }).join('')+'</tr></thead><tbody>' +
    (rows || '<tr><td colspan="9" class="py-8 text-center text-slate-400">ຍັງບໍ່ມີ Movement</td></tr>') +
    '</tbody></table></div>' +
    '<div class="px-4 pb-2">'+renderPagBar(pag, '_scPage', '_scPage')+'</div>';
}
function _scPage(pg,pp){window._scPage=pg;if(pp)window._scPerPage=pp;_renderStockCardTable();}

function exportStockCardCSV() {
  var d = window._stockCardData;
  if (!d) return;
  var rows = [['Date','Type','Ref','Lot','IN','OUT','Balance','By','Note']];
  var bal = d.opening;
  d.moves.forEach(function(m){
    var isIn = m.type==='IN';
    bal = isIn ? bal+m.qty : bal-m.qty;
    rows.push([m.date,m.type,m.ref,m.lot||'-',isIn?m.qty:'',!isIn?m.qty:'',bal,m.by,m.note]);
  });
  var csv = rows.map(function(r){return r.map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.download='StockCard_'+d.prod.sku+'_'+d.loc.name+'.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('✅ CSV Downloaded');
}

function renderMovements() {
  window._mvF = window._mvF || {search:'', type:'ALL', prod:'ALL', loc:'ALL', dateFrom:'', dateTo:'', page:1, perPage:25};
  var f = window._mvF;

  // Build from (STATE.data.movements||[]) (all available data)
  var allMov = ((STATE.data.movements||[])||[]).slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  // Enrich
  allMov = allMov.map(function(m){
    var p = (STATE.data.products||[]).find(function(x){return x.id===m.productId;})||{name:m.productId||'—',unit:'',sku:''};
    var isCW=m.locId==='CW001', isB=!isCW&&(m.locId||'').startsWith('B');
    var locObj=isCW?{name:'CW (ຄັງຫລັກ)'}:isB?((STATE.data.branches||[]).find(function(b){return b.id===m.locId;})||{name:m.locId}):((STATE.data.sites||[]).find(function(s){return s.id===m.locId;})||{name:m.locId||'—'});
    return Object.assign({},m,{productName:p.name, sku:p.sku, unit:p.unit, locName:locObj.name||m.locId});
  });

  // Filter
  var filtered = allMov.filter(function(m){
    var s=(f.search||'').toLowerCase();
    if (s && m.productName.toLowerCase().indexOf(s)<0 && (m.sku||'').toLowerCase().indexOf(s)<0 && (m.locName||'').toLowerCase().indexOf(s)<0 && (m.note||'').toLowerCase().indexOf(s)<0) return false;
    if (f.type!=='ALL' && m.type!==f.type) return false;
    if (f.prod!=='ALL' && m.productId!==f.prod) return false;
    if (f.loc!=='ALL' && m.locId!==f.loc) return false;
    if (!_inDateRange(m.date, f.dateFrom, f.dateTo)) return false;
    return true;
  });

  var pag = paginateData(filtered, f.page, f.perPage);

  var typeColors = {IN:'bg-emerald-100 text-emerald-700',OUT:'bg-orange-100 text-orange-700',USAGE:'bg-purple-100 text-purple-700',TRANSFER_IN:'bg-blue-100 text-blue-700',TRANSFER_OUT:'bg-sky-100 text-sky-700',ADJUST:'bg-slate-100 text-slate-600'};

  // Options
  var typeOpts = [{v:'ALL',l:'ທຸກ Type'},'IN','OUT','USAGE','TRANSFER_IN','TRANSFER_OUT','ADJUST'].map(function(t){
    return typeof t==='string' ? {v:t,l:t} : t;

    .concat((STATE.data.sites||[]).map(function(s){return {v:s.id,l:'📍 '+s.name};}));

  var today = new Date().toISOString().slice(0,10);
  var d7 = new Date(Date.now()-7*86400000).toISOString().slice(0,10);

  var kpiIN  = filtered.filter(function(m){return m.type==='IN';}).reduce(function(s,m){return s+(m.qty||0);},0);
  var kpiOUT = filtered.filter(function(m){return m.type==='OUT'||m.type==='USAGE';}).reduce(function(s,m){return s+(m.qty||0);},0);

  document.getElementById('pageContent').innerHTML =
    // KPIs
    '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4">' +
    [['📋','ທັງໝົດ',fmtNum(filtered.length)+' ລ/ການ','from-slate-600 to-slate-800'],
     ['⬆️','Stock IN','+'+fmtNum(kpiIN),'from-emerald-500 to-emerald-700'],

     ['🔄','ໜ້ານີ້',pag.from+'–'+pag.to,'from-blue-500 to-blue-700']].map(function(k){
      return '<div class="kpi-card bg-gradient-to-br '+k[3]+' text-white shadow-sm"><div class="flex justify-between items-start mb-1"><span class="text-white/70 text-xs">'+k[1]+'</span><span style="font-size:16px">'+k[0]+'</span></div><div class="text-lg font-black">'+k[2]+'</div></div>';
    }).join('') + '</div>' +

    // Filter bar
    renderFilterBar({
      searchId:'mvSearch', search:f.search, searchPlaceholder:'SKU / ສິນຄ້າ / ສາງ / Note...',
      onSearch:'_mvSearch(this.value)', onClearSearch:"_mvSet('search','')",

        '<button onclick="_mvReset()" class="btn btn-secondary text-xs px-3 py-1.5">↺ Reset</button>'
    }) +

    // Table
    '<div class="card overflow-hidden">' +
    '<div class="overflow-x-auto">' +
    '<table class="w-full text-sm">' +

function _redrawPR() {
  var f = window._prF || {};
  var data = (window._prData||[]).slice();
  var canApprove = STATE.user.role==='ADMIN'||STATE.user.role==='MANAGER';
  var s = (f.search||'').toLowerCase();

  var filtered = data.filter(function(pr){
    if (f.status && f.status!=='ALL' && pr.status !== f.status) return false;
    if (f.branch && f.branch!=='ALL' && pr.branchId !== f.branch) return false;
    if (f.dateFrom && _dateStr(pr.date) < f.dateFrom) return false;
    if (f.dateTo   && _dateStr(pr.date) > f.dateTo)   return false;
    if (s && (pr.prNumber||'').toLowerCase().indexOf(s)<0 &&
             (pr.requestedBy||'').toLowerCase().indexOf(s)<0 &&
             ((pr.items||[]).some(function(it){
               var p2=STATE.data.products.find(function(x){return x.id===it.productId;})||{};
               return (p2.name||'').toLowerCase().indexOf(s)>-1;
             }))) return true;
    if (s && (pr.prNumber||'').toLowerCase().indexOf(s)<0 &&
             (pr.requestedBy||'').toLowerCase().indexOf(s)<0) return false;
    return true;
  }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

  var pag = paginateData(filtered, f.page||1, f.perPage||10);

  var activeFilters = [
    {value:(f.status!=='ALL'?f.status:''), label:'Status', displayValue:f.status, clearFn:"_prSetF('status','ALL')"},
    {value:(f.branch!=='ALL'?f.branch:''), label:'Branch', displayValue:(STATE.data.branches.find(function(b){return b.id===f.branch;})||{name:f.branch}).name, clearFn:"_prSetF('branch','ALL')"},
    {value:f.dateFrom, label:'From', displayValue:f.dateFrom, clearFn:"_prSetF('dateFrom','')"},
    {value:f.dateTo,   label:'To',   displayValue:f.dateTo,   clearFn:"_prSetF('dateTo','')"},
  ];

  var faEl = document.getElementById('prFilterArea');
  if (faEl) faEl.innerHTML = renderFilterBar({
    searchId:'prSearch', search:f.search,
    searchPlaceholder:'🔍 PR# / ຜູ້ຂໍ / ສິນຄ້າ...',
    onSearch:"_prSetF('search',this.value)", onClearSearch:"_prSetF('search','')",
    dropdowns:[
      {id:'prStatus', value:f.status, onChange:"_prSetF('status',this.value)", options:[{v:'ALL',l:'All Status'},{v:'PENDING',l:'⏳ PENDING'},{v:'APPROVED',l:'✅ APPROVED'},{v:'REJECTED',l:'❌ REJECTED'}]},
      {id:'prBranch', value:f.branch, onChange:"_prSetF('branch',this.value)", options:[{v:'ALL',l:'All Branches'}].concat(STATE.data.branches.map(function(b){return {v:b.id,l:b.name};}))},
    ],
    activeFilters: activeFilters,
    rightHtml: renderDateRange('prFrom','prTo',f.dateFrom,f.dateTo,"_prDateChange()") +
      '<button onclick="openCreatePR(false)" class="btn btn-warning text-sm">📝 New PR</button>'
  });

  var laEl = document.getElementById('prListArea');
  if (laEl) {
    var cardsHtml = pag.total === 0
      ? '<div class="card p-10 text-center text-slate-400"><div class="text-4xl mb-3">📋</div>ບໍ່ພົບ PR ທີ່ກົງກັບ filter</div>'
      : pag.items.map(function(pr){ return _renderPRCard(pr,canApprove); }).join('');
    laEl.innerHTML =
      '<div class="text-xs text-slate-500 mb-3 px-1">ສະແດງ <strong>'+pag.from+'–'+pag.to+'</strong> ຈາກ <strong class="text-blue-600">'+fmtNum(pag.total)+'</strong> PR' +
      (pag.total < (window._prData||[]).length ? ' (ກັ່ນຕອງ)' : '') + '</div>' +
      '<div class="space-y-3">'+cardsHtml+'</div>' +
      renderPagBar(pag, '_prPage', '_prPage');
  }
}

function _renderPRCard(pr, canApprove) {
  var branch = STATE.data.branches.find(function(b){return b.id===pr.branchId;})||{name:'—'};
  var site   = STATE.data.sites.find(function(s){return s.id===pr.siteId;})||{};
  var sc = pr.status==='APPROVED'?'bg-emerald-100 text-emerald-700':pr.status==='PENDING'?'bg-amber-100 text-amber-700':pr.status==='REJECTED'?'bg-red-100 text-red-700':'bg-slate-100 text-slate-600';
  var total = (pr.items||[]).reduce(function(s,it){
    var p2=(STATE.data.products||[]).find(function(x){return x.id===it.productId;})||{costPrice:0};
    return s+(it.qtyRequested||0)*(it.unitPrice||p2.costPrice||0);
  },0);
  var relPO = pr.poId ? (STATE.data.pos||[]).find(function(p){return p.id===pr.poId;}) : null;
  var poLots = relPO ? ((STATE.data.lots||[])||[]).filter(function(l){return l.poId===relPO.id;}) : [];

  // Workflow progress indicator
  var steps = [
    {label:'📝 PR', done:true},
    {label:'✅ Approve', done:pr.status==='APPROVED'||pr.status==='RECEIVED'},
    {label:'🛒 PO', done:!!relPO},
    {label:'📦 Lots', done:poLots.length>0}
  ];
  var progressHtml = '<div class="flex items-center gap-1 text-[10px] mb-2">' +
    steps.map(function(s,i){
      return (i>0?'<span class="text-slate-300">›</span>':'') +
        '<span class="px-1.5 py-0.5 rounded-full font-bold '+(s.done?'bg-emerald-100 text-emerald-700':'bg-slate-100 text-slate-400')+'">'+s.label+'</span>';
    }).join('') + '</div>';

  return '<div class="card p-0 overflow-hidden">' +
    '<div class="flex items-center gap-3 px-4 py-3 border-b border-slate-100 bg-slate-50/60">' +
    '<span class="font-bold font-mono text-slate-700 text-sm">'+pr.prNumber+'</span>' +
    '<span class="text-xs px-2 py-0.5 rounded-full font-bold '+sc+'">'+pr.status+'</span>' +
    '<span class="text-xs text-slate-400 ml-1">'+fmtDate(pr.requestedAt)+'</span>' +
    '<span class="text-xs text-slate-500 ml-1">🏢 '+branch.name+(site.name?' · 📍'+site.name:'')+'</span>' +
    '<span class="ml-auto font-bold text-slate-700 text-sm">LAK '+fmtNum(total)+'</span>' +
    '</div>' +
    '<div class="px-4 py-3">' +
    progressHtml +
    '<div class="overflow-x-auto"><table class="w-full text-xs mb-3">' +
    '<thead><tr class="border-b border-slate-100">' +

function _prProdChange(sel) {
  var pid = sel.value;
  var p = (STATE.data.products||[]).find(function(x){return x.id===pid;})||{};
  var row = sel.closest('.item-row');
  var priceEl = row.querySelector('.input-price'); if(priceEl) priceEl.value = p.costPrice||0;
  var rp = _getRp(pid,'CW001');
  var rpEl = row.querySelector('.prRp'); if(rpEl) rpEl.textContent = rp;
  var sup = (STATE.data.suppliers||[]).find(function(s){return s.id===p.supplierId;})||{};
  var supEl = row.querySelector('.prSupName'); if(supEl) supEl.textContent = sup.name||'';
  // Stock info
  var cwQty = pid ? (((STATE.data.stock||[])[pid]||{})['CW001']||0) : 0;
  var siEl = row.querySelector('.prStockInfo');
  if (siEl) siEl.innerHTML = pid ? '<span class="text-xs '+(cwQty<=rp?'text-amber-600 font-bold':'text-emerald-600')+' ml-2">CW: '+cwQty+' '+p.unit+(cwQty<=rp?' ⚠️':'')+'</span>' : '';
  _calcPRTotal();
}

// Barcode scan for top barcode input → add new item row
function _prAddByBarcode() {
  var val = (document.getElementById('pr_barcode_input')||{}).value || '';
  val = val.trim();
  if (!val) return;
  var p = (STATE.data.products||[]).find(function(x){ return (x.barcode||'').toLowerCase() === val.toLowerCase() || (x.sku||'').toLowerCase() === val.toLowerCase(); });
  if (!p) {
    showToast('⚠️ ບໍ່ພົບສິນຄ້າ barcode: "'+val+'"', 'warn');
    return;
  }
  // Check if already in list — if so, increment qty
  var existing = null;
  document.querySelectorAll('#prItems .item-row').forEach(function(row){
    var sel = row.querySelector('.select-prod');
    if (sel && sel.value === p.id) existing = row;
  });
  if (existing) {
    var qEl = existing.querySelector('.input-qty');
    if (qEl) { qEl.value = Number(qEl.value||1) + 1; _calcPRTotal(); }
    showToast('➕ ເພີ່ມ qty: '+p.name, 'success');
  } else {
    var rp = _getRp(p.id,'CW001');
    var div = document.createElement('div');
    div.innerHTML = _prItemRow(Date.now(), p.id, 1, rp, p);
    document.getElementById('prItems').appendChild(div.firstChild);
    showToast('✅ ເພີ່ມ: '+p.name, 'success');
    _calcPRTotal();
  }
  var el = document.getElementById('pr_barcode_input');
  if (el) { el.value = ''; el.focus(); }
}

// Scan per item row — opens camera picker, sets that row's product
function _prScanForRow(btn) {
  var row = btn.closest('.item-row');
  window._prScanTargetRow = row;
  openBarcodePicker('_prRowBarcodeTmp', '_prRowBarcodePicked');
}
function _prRowBarcodePicked(barcode) {
  if (!barcode || !window._prScanTargetRow) return;
  var row = window._prScanTargetRow;
  var p = (STATE.data.products||[]).find(function(x){ return (x.barcode||'') === barcode || (x.sku||'') === barcode; });
  if (!p) { showToast('⚠️ ບໍ່ພົບສິນຄ້າ: '+barcode, 'warn'); return; }
  var sel = row.querySelector('.select-prod');
  if (sel) { sel.value = p.id; _prProdChange(sel); }
}
function _prBarcodePicked(barcode) {
  var el = document.getElementById('pr_barcode_input');
  if (el) el.value = barcode;
  _prAddByBarcode();
}
function _calcPRTotal() {
  var total = 0;
  document.querySelectorAll('#prItems .item-row').forEach(function(row){
    var qty = Number((row.querySelector('.input-qty')||{}).value||0);
    var price = Number((row.querySelector('.input-price')||{}).value||0);
    total += qty*price;
  });
  var el = document.getElementById('prTotal');
  if (el) el.textContent = 'ລວມທັງໝົດ: LAK '+fmtNum(total);
}

function addPRItem() {
  var div=document.createElement('div');
  div.innerHTML=_prItemRow(Date.now(),'',1,0,{});
  document.getElementById('prItems').appendChild(div.firstChild);
  _calcPRTotal();
}

function submitPR() {
  var items=[];
  document.querySelectorAll('#prItems .item-row').forEach(function(row){
    var pid=(row.querySelector('.select-prod')||{}).value;
    var qty=Number((row.querySelector('.input-qty')||{}).value||0);
    var price=Number((row.querySelector('.input-price')||{}).value||0);
    var note=(row.querySelector('.input-note')||{}).value||'';
    if(pid&&qty>0) items.push({productId:pid,qty:qty,unitPrice:price,note:note});
  });
  if(!items.length){showToast('ກະລຸນາເພີ່ມຢ່າງໜ້ອຍ 1 ລາຍການ','warn');return;}
  var data={
    branchId:'CW001', siteId:'',
    requestedBy:STATE.user.id,
    requiredDate:(document.getElementById('pr_date')||{}).value||'',
    supplierId:(document.getElementById('pr_sup')||{}).value||'',
    note:(document.getElementById('pr_note')||{}).value||'',
    items:items
  };
  callServer('savePR',[data],function(res){
    if(res.success){
      showToast('✅ PR ສ້າງສຳເລັດ: '+res.prNumber,'success');
      closeModal();
      renderPR();
    } else showToast('Error: '+(res.message||'Failed'),'error');
  });
}

function approvePR(id) {
  var pr=(STATE.data.prs||[]).find(function(x){return x.id===id;});
  if(!pr) return;
  if(!confirm('Approve PR '+pr.prNumber+' ແລ້ວ Auto-create PO?')) return;
  callServer('approvePR',[id,STATE.user.id,true],function(res){
    if(res.success){
      showToast('✅ PR Approved — PO: '+(res.firstPO?res.firstPO.poNumber:'created'),'success');
      renderPR();
    } else showToast('Error','error');
  });
}

function openRejectPR(id) {
  openModal('❌ Reject PR','<div class="space-y-4">' +
    '<p class="text-sm text-slate-600">ກະລຸນາໃສ່ເຫດຜົນ:</p>' +
    '<textarea id="rejectReason" class="input" rows="3" placeholder="Reason / ເຫດຜົນ..." style="height:80px;resize:vertical"></textarea>' +
    '<button onclick="submitRejectPR(\''+id+'\')" class="btn btn-danger w-full">Confirm Rejection</button></div>');

function submitRejectPR(id) {
  var reason=(document.getElementById('rejectReason')||{}).value||'';
  if(!reason){showToast('ກະລຸນາໃສ່ເຫດຜົນ','warn');return;}
  callServer('rejectPR',[id,STATE.user.id,reason],function(res){
    if(res.success){showToast('PR Rejected');closeModal();renderPR();}
    else showToast('Error','error');

function printPreviewDoc() {
  var doc = document.getElementById('prPreviewDoc') || document.getElementById('poPreviewDoc');
  if (!doc) return;
  var w = window.open('','_blank','width=800,height=700');
  w.document.write('<html><head><title>Print</title><style>body{margin:20px;font-family:sans-serif;}@media print{body{margin:0;}}</style></head><body>');
  w.document.write(doc.outerHTML);
  w.document.write('</body></html>');
  w.document.close();
  w.focus();
  setTimeout(function(){ w.print(); }, 600);
}

function downloadPRpdf(prId) {
  var pr = (STATE.data.prs||[]).find(function(x){return x.id===prId;});
  if(!pr){showToast('PR ບໍ່ພົບ','error');return;}
  var branch=STATE.data.branches.find(function(b){return b.id===pr.branchId;})||{name:'Company Warehouse'};
  var total=(pr.items||[]).reduce(function(s,it){
    var p2=(STATE.data.products||[]).find(function(x){return x.id===it.productId;})||{costPrice:0};
    return s+(it.qtyRequested||0)*(it.unitPrice||p2.costPrice||0);
  },0);
  var doc=new jspdf.jsPDF('p','mm','a4');
  var pw=doc.internal.pageSize.getWidth();
  doc.setFillColor(30,64,175); doc.rect(0,0,pw,28,'F');
  doc.setFontSize(16); doc.setTextColor(255,255,255); doc.setFont(undefined,'bold');
  doc.text('PURCHASE REQUEST / ໃບຂໍຊື້ສິນຄ້າ',pw/2,12,{align:'center'});
  doc.setFontSize(10); doc.setFont(undefined,'normal');
  doc.text('InventoryPro WMS — ລະບົບຈັດການສາງ',pw/2,20,{align:'center'});
  doc.setTextColor(30,30,30); doc.setFontSize(10);
  var infoY=35;
  var leftW=pw/2-10; var rightX=pw/2+5;
  doc.setFillColor(245,247,250); doc.roundedRect(10,infoY,leftW,35,2,2,'F');
  doc.roundedRect(rightX,infoY,leftW,35,2,2,'F');
  var infoLeft=[['PR Number:',pr.prNumber],['Status:',pr.status],['Branch:',branch.name],['Created By:',pr.requestedBy]];
  var infoRight=[['Date:',fmtDate(pr.requestedAt)],['Required:',fmtDate(pr.requiredDate)],['Note:',pr.note||'—'],['','']];
  infoLeft.forEach(function(r,i){ doc.setFont(undefined,'bold'); doc.text(r[0],14,infoY+8+i*7); doc.setFont(undefined,'normal'); doc.text(r[1],55,infoY+8+i*7); });
  infoRight.forEach(function(r,i){ doc.setFont(undefined,'bold'); doc.text(r[0],rightX+4,infoY+8+i*7); doc.setFont(undefined,'normal'); doc.text(String(r[1]),rightX+30,infoY+8+i*7); });
  var rows=(pr.items||[]).map(function(it,i){
    var p2=(STATE.data.products||[]).find(function(x){return x.id===it.productId;})||{};
    var up=it.unitPrice||p2.costPrice||0;
    return [i+1,p2.sku||'',p2.name+'\n'+(p2.nameLao||''),it.qtyRequested,it.unit||p2.unit||'',fmtNum(up),fmtNum((it.qtyRequested||0)*up),it.note||'—'];
  });
  doc.autoTable({
    head:[['#','SKU','ສິນຄ້າ','Qty','ໜ່ວຍ','ລາຄາ/ໜ່ວຍ','ລວມ (LAK)','ໝາຍເຫດ']],
    body:rows, startY:infoY+42,
    styles:{fontSize:9,cellPadding:3},
    headStyles:{fillColor:[30,64,175],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[248,250,252]},
    columnStyles:{0:{cellWidth:8},1:{cellWidth:18},5:{halign:'right'},6:{halign:'right',fontStyle:'bold'}},
    margin:{left:10,right:10},
    didDrawPage:function(d){ doc.setFontSize(8); doc.setTextColor(150,150,150); doc.text('Print: '+new Date().toLocaleString(),10,doc.internal.pageSize.getHeight()-8); }
  });
  var finalY=doc.lastAutoTable.finalY||120;
  doc.setFillColor(239,246,255); doc.roundedRect(pw-80,finalY+4,70,14,2,2,'F');
  doc.setFontSize(11); doc.setTextColor(30,64,175); doc.setFont(undefined,'bold');
  doc.text('TOTAL: LAK '+fmtNum(total),pw-15,finalY+13,{align:'right'});
  var sigY=finalY+28;
  doc.setTextColor(80,80,80); doc.setFont(undefined,'normal'); doc.setFontSize(9);
  doc.text('ລາຍເຊັນຜູ້ຂໍ / Requested by:',12,sigY);
  doc.text('ລາຍເຊັນຜູ້ອະນຸມັດ / Approved by:',pw/2+5,sigY);
  doc.line(10,sigY+14,70,sigY+14); doc.line(pw/2+5,sigY+14,pw-10,sigY+14);
  doc.text(pr.requestedBy||'',10,sigY+20); doc.text(pr.approvedBy||'',pw/2+5,sigY+20);
  doc.save('PR_'+pr.prNumber+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  showToast('📄 PR PDF ດາວໂຫລດສຳເລັດ','success');
}

function renderPO() {
  window._poF = window._poF || {search:'', status:'ALL', supplier:'ALL', dateFrom:'', dateTo:'', page:1, perPage:10};
  callServer('getPOs', [{}], function(res) {
    var data = res.data || [];
    window._poData = data;
    var canManage=_can('pr.approve')||_can('po.receive');
    var pending=data.filter(function(p){return p.status==='PENDING';}).length;
    var received=data.filter(function(p){return p.status==='RECEIVED';}).length;
    var totalVal=data.reduce(function(s,p){return s+Number(p.totalAmount||0);},0);

    document.getElementById('pageContent').innerHTML =
      '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">' +
      _kpiMini('📋','PO ທັງໝົດ',data.length,'from-slate-600 to-slate-800') +
      _kpiMini('⏳','PENDING',pending,'from-amber-500 to-amber-700') +
      _kpiMini('✅','RECEIVED',received,'from-emerald-500 to-emerald-700') +
      _kpiMini('💰','TOTAL VALUE','LAK '+fmtNum(totalVal),'from-blue-600 to-blue-800') +
      '</div>' +
      '<div id="poFilterArea"></div>' +
      '<div id="poListArea"></div>';

    callServer('getSuppliers',[],function(r){if(r.success) STATE.data.suppliers=r.data; _redrawPO();});
  });
}

function _redrawPO() {
  var f = window._poF || {};
  var data = (window._poData||[]).slice();
  var canManage=_can('pr.approve')||_can('po.receive');
  var s = (f.search||'').toLowerCase();

  var filtered = data.filter(function(po){
    if (f.status   && f.status!=='ALL'   && po.status !== f.status) return false;
    if (f.supplier && f.supplier!=='ALL' && po.supplierId !== f.supplier) return false;
    if (f.dateFrom && _dateStr(po.date) < f.dateFrom) return false;
    if (f.dateTo   && _dateStr(po.date) > f.dateTo)   return false;
    if (s && (po.poNumber||'').toLowerCase().indexOf(s)<0 &&
             (po.prNumber||'').toLowerCase().indexOf(s)<0) return false;
    return true;
  }).sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

  var pag = paginateData(filtered, f.page||1, f.perPage||10);
  var suppliers = STATE.data.suppliers||[];

  var activeFilters = [
    {value:(f.status!=='ALL'?f.status:''), label:'Status', displayValue:f.status, clearFn:"_poSetF('status','ALL')"},
    {value:(f.supplier!=='ALL'?f.supplier:''), label:'Supplier', displayValue:(suppliers.find(function(s2){return s2.id===f.supplier;})||{name:f.supplier}).name, clearFn:"_poSetF('supplier','ALL')"},
    {value:f.dateFrom, label:'From', displayValue:f.dateFrom, clearFn:"_poSetF('dateFrom','')"},
    {value:f.dateTo,   label:'To',   displayValue:f.dateTo,   clearFn:"_poSetF('dateTo','')"},
  ];

  var faEl = document.getElementById('poFilterArea');
  if (faEl) faEl.innerHTML = renderFilterBar({
    searchId:'poSearch', search:f.search,
    searchPlaceholder:'🔍 PO# / PR#...',
    onSearch:"_poSetF('search',this.value)", onClearSearch:"_poSetF('search','')",
    dropdowns:[
      {id:'poStatus',   value:f.status,   onChange:"_poSetF('status',this.value)",   options:[{v:'ALL',l:'All Status'},{v:'PENDING',l:'⏳ PENDING'},{v:'RECEIVED',l:'✅ RECEIVED'}]},
      {id:'poSupplier', value:f.supplier, onChange:"_poSetF('supplier',this.value)", options:[{v:'ALL',l:'All Suppliers'}].concat(suppliers.map(function(s2){return {v:s2.id,l:s2.name};}))},
    ],
    activeFilters: activeFilters,
    rightHtml: renderDateRange('poFrom','poTo',f.dateFrom,f.dateTo,"_poDateChange()")
  });

  var laEl = document.getElementById('poListArea');
  if (laEl) {
    var cardsHtml = pag.total === 0
      ? '<div class="card p-10 text-center text-slate-400"><div class="text-4xl mb-3">📋</div>ບໍ່ພົບ PO ທີ່ກົງກັບ filter</div>'
      : pag.items.map(function(po){ return _renderPOCard(po,canManage); }).join('');
    laEl.innerHTML =
      '<div class="text-xs text-slate-500 mb-3 px-1">ສະແດງ <strong>'+pag.from+'–'+pag.to+'</strong> ຈາກ <strong class="text-blue-600">'+fmtNum(pag.total)+'</strong> PO</div>' +
      '<div class="space-y-3">'+cardsHtml+'</div>' +
      renderPagBar(pag, '_poPage', '_poPage');
  }
}
function _poSetF(k,v){window._poF[k]=v;window._poF.page=1;_redrawPO();}
function _poPage(pg,pp){window._poF.page=pg;if(pp)window._poF.perPage=pp;_redrawPO();}
function _poDateChange(){window._poF.dateFrom=(document.getElementById('poFrom')||{}).value||'';window._poF.dateTo=(document.getElementById('poTo')||{}).value||'';window._poF.page=1;_redrawPO();}

  // Lots created from this PO

          '<span class="text-slate-600 font-semibold">'+p2.name+'</span>' +
          '<span class="text-blue-700 font-bold">'+fmtNum(l.qty)+' '+p2.unit+'</span>' +
          '<span class="text-slate-400">LAK '+fmtNum(l.unitCost||0)+'/ໜ່ວຍ</span>' +
          (l.expiryDate?'<span class="ml-auto text-slate-400">Exp: '+l.expiryDate+'</span>':'') +
          '</div>';
      }).join('') +
      '</div></div>';
  }

  return '<div class="card p-0 overflow-hidden">' +
    '<div class="flex flex-wrap items-center gap-3 px-4 py-3 border-b border-slate-100 bg-slate-50/60">' +
    '<span class="font-bold font-mono text-slate-700 text-sm">'+po.poNumber+'</span>' +
    '<span class="text-xs px-2 py-0.5 rounded-full font-bold '+sc+'">'+po.status+'</span>' +
    '<span class="text-xs text-slate-400">'+fmtDate(po.createdAt)+'</span>' +
    '<span class="text-xs text-slate-500">🚚 '+supplier.name+'</span>' +
    (relPR?'<button onclick="showPage(\'pr\')" class="text-xs text-blue-500 hover:text-blue-700 underline font-semibold">📝 From: '+relPR.prNumber+'</button>':'') +
    '<span class="ml-auto font-black text-slate-800">LAK '+fmtNum(total)+'</span>' +
    '</div>' +
    '<div class="px-4 py-3">' +
    '<div class="overflow-x-auto"><table class="w-full text-xs mb-2">' +
    '<thead><tr class="border-b border-slate-100">' +
    ['ສິນຄ້າ / SKU','Qty ສັ່ງ','ລາຄາ/ໜ່ວຍ','ລວມ','ຮັບແລ້ວ'].map(function(h){ return '<th class="text-left pb-1.5 text-slate-500 font-semibold">'+h+'</th>'; }).join('')+'</tr></thead><tbody>' +
    (po.items||[]).map(function(it){
      var p2=((STATE.data.products||[])||[]).find(function(x){return x.id===it.productId;})||{name:'?',sku:'',nameLao:''};

function receivePO(id) {
  var po = (STATE.data.pos||[]).find(function(x){return x.id===id;});
  if (!po) return;
  var supplier = (STATE.data.suppliers||[]).find(function(s){return s.id===po.supplierId;})||{name:'—'};

  // Build per-item lot entry rows
  var today = new Date().toISOString().split('T')[0];
  var nextyear = new Date(Date.now()+365*86400000).toISOString().split('T')[0];
  var autoLotBase = 'L'+new Date().toISOString().slice(0,7).replace('-','');

  var itemRows = (po.items||[]).map(function(it, idx){
    var p = (STATE.data.products||[]).find(function(x){return x.id===it.productId;})||{name:'?',unit:'',sku:''};
    var suggestLot = autoLotBase+'-'+String(idx+1).padStart(2,'0');
    return '<div class="border border-slate-200 rounded-xl p-3 space-y-2 bg-white" id="poLotRow_'+idx+'">' +
      '<div class="flex items-center gap-2 mb-1">' +
      '<div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-sm">📦</div>' +
      '<div><div class="font-bold text-slate-800 text-sm">'+p.name+'</div>' +
      '<div class="text-xs text-slate-400 font-mono">'+p.sku+' · PO Qty: <strong>'+it.qty+'</strong> '+p.unit+'</div></div>' +
      '</div>' +
      '<div class="grid grid-cols-2 gap-2">' +
      '<div><label class="text-xs font-semibold text-slate-500">Lot Number *</label>' +
      '<input id="pl_lot_'+idx+'" class="input text-sm" value="'+suggestLot+'"></div>' +
      '<div><label class="text-xs font-semibold text-slate-500">ຈຳນວນຮັບ ('+p.unit+') *</label>' +
      '<input id="pl_qty_'+idx+'" type="number" class="input text-sm" value="'+it.qty+'" min="0" max="'+it.qty+'"></div>' +
      '<div><label class="text-xs font-semibold text-slate-500">ລາຄາ/ໜ່ວຍ (LAK) *</label>' +
      '<input id="pl_cost_'+idx+'" type="number" class="input text-sm" value="'+(it.unitPrice||p.costPrice||0)+'" min="0"></div>' +
      '<div><label class="text-xs font-semibold text-slate-500">ວັນທີຮັບ</label>' +
      '<input id="pl_rec_'+idx+'" type="date" class="input text-sm" value="'+today+'"></div>' +
      '<div><label class="text-xs font-semibold text-slate-500">⏰ Expiry Date</label>' +
      '<input id="pl_exp_'+idx+'" type="date" class="input text-sm" value="'+nextyear+'"></div>' +
      '<div><label class="text-xs font-semibold text-slate-500">Supplier Batch / Note</label>' +
      '<input id="pl_note_'+idx+'" class="input text-sm" value="'+po.poNumber+'" placeholder="PO Ref..."></div>' +
      '</div>' +
      '<div id="pl_lotcost_'+idx+'" class="text-xs text-blue-700 bg-blue-50 rounded-lg px-2 py-1 font-semibold"></div>' +
      '</div>';
  });

  var totalItems = (po.items||[]).length;

  openModal('📦 ຮັບສິນຄ້າ + ສ້າງ Lot — '+po.poNumber,
    '<div class="space-y-3">' +
    '<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 flex items-center gap-3 text-sm">' +
    '<span class="text-xl">🚚</span>' +
    '<div><div class="font-bold text-emerald-800">Supplier: '+supplier.name+'</div>' +
    '<div class="text-xs text-emerald-600">'+po.poNumber+' · ລາຍການ: '+totalItems+' ລາຍການ · ຮັບເຂົ້າ <strong>ຄັງຫລັກ (CW001)</strong></div></div>' +

  // Wire up live cost preview
  (po.items||[]).forEach(function(it, idx){

    }

function submitReceivePOLots(poId) {
  var po = (STATE.data.pos||[]).find(function(x){return x.id===poId;});
  if (!po) return;
  var lots = [];
  var ok = true;
  (po.items||[]).forEach(function(it, idx){
    var lotNum = ((document.getElementById('pl_lot_'+idx)||{}).value||'').trim();
    var qty    = Number((document.getElementById('pl_qty_'+idx)||{value:0}).value||0);
    var cost   = Number((document.getElementById('pl_cost_'+idx)||{value:0}).value||0);
    var rec    = (document.getElementById('pl_rec_'+idx)||{}).value||'';
    var exp    = (document.getElementById('pl_exp_'+idx)||{}).value||'';
    var note   = (document.getElementById('pl_note_'+idx)||{}).value||'';
    if (!lotNum) { showToast('ກະລຸນາໃສ່ Lot Number ສຳລັບ item '+(idx+1),'warn'); ok=false; return; }
    if (qty <= 0) { showToast('ຈຳນວນຕ້ອງ > 0 ສຳລັບ item '+(idx+1),'warn'); ok=false; return; }
    if (!exp) { showToast('ກະລຸນາໃສ່ Expiry Date ສຳລັບ item '+(idx+1),'warn'); ok=false; return; }
    lots.push({productId:it.productId, locationId:'CW001', lotNumber:lotNum,
      qty:qty, unitCost:cost, receivedDate:rec, expiryDate:exp, note:note, poId:poId});
  });
  if (!ok) return;

  // Save all lots sequentially (sync in mock mode)
  var saved = 0;
  lots.forEach(function(lotData){
    callServer('saveLot',[lotData],function(res){
      if(res.success) saved++;
    });
  });

  // Mark PO as RECEIVED
  po.status = 'RECEIVED';
  po.receivedDate = new Date().toISOString().slice(0,10);
  (po.items||[]).forEach(function(it,idx){
    it.receivedQty = Number((document.getElementById('pl_qty_'+idx)||{value:it.qty}).value||it.qty);
  });

  var totalVal = lots.reduce(function(s,l){return s+l.qty*l.unitCost;},0);
  showToast('✅ ຮັບສິນຄ້າ + ສ້າງ '+lots.length+' Lots ສຳເລັດ — LAK '+fmtNum(totalVal),'success');
  closeModal();

  // After closing, offer to navigate to Lots page
  setTimeout(function(){
    if(confirm('ໄປດູ Lot / Batch ທີ່ຮັບເຂົ້າໃໝ່?')) { showPage('lots'); }
    else renderPO();
  }, 400);
}

function downloadPOpdf(poId) {
  var po=(STATE.data.pos||[]).find(function(x){return x.id===poId;});
  if(!po){showToast('PO ບໍ່ພົບ','error');return;}
  var supplier=(STATE.data.suppliers||[]).find(function(s){return s.id===po.supplierId;})||{name:'—',contact:'',phone:''};
  var total=(po.items||[]).reduce(function(s,it){return s+Number(it.totalPrice||0);},0)||Number(po.totalAmount||0);
  var relPR=po.prId?(STATE.data.prs||[]).find(function(p){return p.id===po.prId;}):null;
  var doc=new jspdf.jsPDF('p','mm','a4');
  var pw=doc.internal.pageSize.getWidth();
  // Header
  doc.setFillColor(5,150,105); doc.rect(0,0,pw,28,'F');
  doc.setFontSize(16); doc.setTextColor(255,255,255); doc.setFont(undefined,'bold');
  doc.text('PURCHASE ORDER / ໃບສັ່ງຊື້ສິນຄ້າ',pw/2,12,{align:'center'});
  doc.setFontSize(10); doc.setFont(undefined,'normal');
  doc.text('InventoryPro WMS — ລະບົບຈັດການສາງ',pw/2,20,{align:'center'});
  doc.setTextColor(30,30,30); doc.setFontSize(10);
  var infoY=35; var leftW=pw/2-10; var rightX=pw/2+5;
  doc.setFillColor(240,253,244); doc.roundedRect(10,infoY,leftW,42,2,2,'F');
  doc.setFillColor(240,249,255); doc.roundedRect(rightX,infoY,leftW,42,2,2,'F');
  var infoLeft=[['PO Number:',po.poNumber],['Status:',po.status],['From PR:',relPR?relPR.prNumber:'—'],['Created By:',po.createdBy||''],['Created:',fmtDate(po.createdAt)]];
  var infoRight=[['Supplier:',supplier.name],['Contact:',supplier.contact||'—'],['Phone:',supplier.phone||'—'],['Expected:',fmtDate(po.expectedDate)],['Terms:',supplier.paymentTerms||'—']];
  infoLeft.forEach(function(r,i){
    doc.setFont(undefined,'bold'); doc.text(r[0],14,infoY+8+i*7);
    doc.setFont(undefined,'normal'); doc.text(String(r[1]),55,infoY+8+i*7);
  });
  infoRight.forEach(function(r,i){
    doc.setFont(undefined,'bold'); doc.text(r[0],rightX+4,infoY+8+i*7);
    doc.setFont(undefined,'normal'); doc.text(String(r[1]),rightX+32,infoY+8+i*7);
  });
  var rows=(po.items||[]).map(function(it,i){
    var p2=(STATE.data.products||[]).find(function(x){return x.id===it.productId;})||{};
    return [i+1,p2.sku||'',p2.name+'\n'+(p2.nameLao||''),it.qty,p2.unit||'',fmtNum(it.unitPrice||0),fmtNum(it.totalPrice||0),it.receivedQty||0];
  });
  doc.autoTable({
    head:[['#','SKU','ສິນຄ້າ','Qty','ໜ່ວຍ','ລາຄາ/ໜ່ວຍ','ລວມ (LAK)','ຮັບແລ້ວ']],
    body:rows,
    startY:infoY+48,
    styles:{fontSize:9,cellPadding:3},
    headStyles:{fillColor:[5,150,105],textColor:[255,255,255],fontStyle:'bold'},
    alternateRowStyles:{fillColor:[240,253,244]},
    columnStyles:{0:{cellWidth:8},1:{cellWidth:18},5:{halign:'right'},6:{halign:'right',fontStyle:'bold'},7:{halign:'center'}},
    margin:{left:10,right:10},
    didDrawPage:function(){
      doc.setFontSize(8); doc.setTextColor(150,150,150);
      doc.text('Print: '+new Date().toLocaleString(),10,doc.internal.pageSize.getHeight()-8);
    }
  });
  var finalY=doc.lastAutoTable.finalY||120;
  doc.setFillColor(220,252,231); doc.roundedRect(pw-85,finalY+4,75,16,2,2,'F');
  doc.setFontSize(12); doc.setTextColor(5,150,105); doc.setFont(undefined,'bold');
  doc.text('TOTAL: LAK '+fmtNum(total),pw-15,finalY+15,{align:'right'});
  var sigY=finalY+32;
  doc.setTextColor(80,80,80); doc.setFont(undefined,'normal'); doc.setFontSize(9);
  doc.text('ສ່ວນຂາຍ / Supplier Signature:',12,sigY);
  doc.text('ຜູ້ອະນຸມັດ / Approved by:',pw/2+5,sigY);
  doc.line(10,sigY+14,80,sigY+14); doc.line(pw/2+5,sigY+14,pw-10,sigY+14);
  doc.save('PO_'+po.poNumber+'_'+new Date().toISOString().slice(0,10)+'.pdf');
  showToast('📄 PO PDF ດາວໂຫລດສຳເລັດ','success');
}

function renderUsage() {

    var approved  = data.filter(function(r){return r.status==='APPROVED';}).length;

function _redrawUsage() {
  var f = window._usageF || {};

  var s = (f.search||'').toLowerCase();

  var filtered = data.filter(function(rep){
    if (f.site   && f.site!=='ALL'   && rep.siteId !== f.site) return false;
    if (f.status && f.status!=='ALL' && rep.status !== f.status) return false;
    if (f.dateFrom && _dateStr(rep.reportDate) < f.dateFrom) return false;
    if (f.dateTo   && _dateStr(rep.reportDate) > f.dateTo)   return false;
    if (s && (rep.reportNumber||'').toLowerCase().indexOf(s)<0 &&

function _urSiteChanged(sel) {
  // Refresh all item rows with new site stock
  var sid = sel.value;
  document.querySelectorAll('#urItemsList .ur-item-row').forEach(function(row){
    var pid = row.querySelector('.ur-select-prod').value;
    _urUpdateStock(row, pid, sid);
  });
}

function _urAddItem(siteId) {
  var sid = siteId || (document.getElementById('ur_site')||{}).value || '';
  var container = document.getElementById('urItemsList');
  if (!container) return;
  var idx = container.children.length;

  var div = document.createElement('div');
  div.innerHTML = _urItemRowHtml(idx, '', sid, 0);
  var row = div.firstElementChild;
  container.appendChild(row);
  var firstProd = STATE.data.products[0];
  if (firstProd) {
    var sel = row.querySelector('.ur-select-prod');
    if (sel) { sel.value = firstProd.id; _urUpdateStock(row, firstProd.id, sid); }
  }
}

function _urItemRowHtml(idx, productId, siteId, stockQty) {
  var prodOpts = STATE.data.products.map(function(p){
    return '<option value="'+p.id+'" '+(p.id===productId?'selected':'')+'>'+p.sku+' – '+p.name+'</option>';
  }).join('');

  return '<div class="ur-item-row grid gap-2 items-center p-2 bg-slate-50 rounded-xl" style="grid-template-columns:1fr 80px 80px auto">' +
    // Product select + scan
    '<div class="scan-field-wrap">' +
    '<select class="select ur-select-prod text-sm" onchange="_urOnProdChange(this)">' + prodOpts + '</select>' +
    '<button type="button" onclick="_urScanForRow(this)" class="btn-scan flex-shrink-0 text-xs" title="ສະແກນ">⬛ Scan</button>' +
    '</div>' +
    // Stock badge
    '<div class="text-center"><span class="ur-stock-badge text-xs font-bold px-2 py-1 rounded-lg bg-blue-50 text-blue-700">—</span></div>' +
    // Qty input
    '<div><input type="number" class="input ur-qty text-sm text-center" placeholder="0" min="0.1" step="0.1" oninput="_urCheckOverflow(this)"></div>' +
    // Remove
    '<button onclick="this.closest(\'.ur-item-row\').remove();_urValidateAll()" class="text-red-400 hover:text-red-600 text-xl leading-none">✕</button>' +
    '</div>';
}

function _urScanForRow(btn) {
  var row = btn.closest('.ur-item-row');
  openBarcodePicker(null, function(p) {
    var sel = row.querySelector('.ur-select-prod');
    if (sel) { sel.value = p.id; _urOnProdChange(sel); }
  });
}

function _urOnProdChange(sel) {
  var row = sel.closest('.ur-item-row');
  var sid = (document.getElementById('ur_site')||{}).value || '';
  _urUpdateStock(row, sel.value, sid);
}

function _urUpdateStock(row, productId, siteId) {
  var badge = row.querySelector('.ur-stock-badge');
  if (!badge || !productId || !siteId) return;
  var stock = ((STATE.data.stock||[])[productId]||{})[siteId] || 0;
  var p = STATE.data.products.find(function(x){return x.id===productId;}) || {};
  var isLow = stock <= (p.reorderPoint||0);
  badge.textContent = stock + ' ' + (p.unit||'');
  badge.className = 'ur-stock-badge text-xs font-bold px-2 py-1 rounded-lg ' +
    (stock === 0 ? 'bg-red-100 text-red-600' : isLow ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700');
  _urValidateAll();
}

function _urCheckOverflow(input) { _urValidateAll(); }

function _urValidateAll() {
  var sid = (document.getElementById('ur_site')||{}).value || '';
  var warnings = [];
  document.querySelectorAll('#urItemsList .ur-item-row').forEach(function(row){
    var pid = row.querySelector('.ur-select-prod').value;
    var qty = Number((row.querySelector('.ur-qty')||{}).value || 0);
    var stock = ((STATE.data.stock||[])[pid]||{})[sid] || 0;
    var p = STATE.data.products.find(function(x){return x.id===pid;})||{name:pid};
    if (qty > 0 && qty > stock) {
      warnings.push('⚠️ <strong>'+p.name+'</strong>: ໃຊ້ '+qty+' '+p.unit+' ແຕ່ມີ '+stock+' '+p.unit);
      var badge = row.querySelector('.ur-stock-badge');
      if (badge) badge.className = 'ur-stock-badge text-xs font-bold px-2 py-1 rounded-lg bg-red-100 text-red-600';
    }
  });
  var warnEl = document.getElementById('urStockWarning');
  if (warnEl) {
    if (warnings.length) {
      warnEl.className = 'bg-amber-50 border border-amber-300 rounded-xl p-3 text-xs text-amber-800';
      warnEl.innerHTML = '<div class="font-bold mb-1">⚠️ ສິນຄ້າໃນ Site ອາດບໍ່ພໍ:</div>' + warnings.map(function(w){return '<div>'+w+'</div>';}).join('');
    } else {
      warnEl.className = 'hidden';
    }
  }
}

function addURItem() { _urAddItem(); }

function submitUsageReport() {
  var siteEl = document.getElementById('ur_site');
  var siteId  = siteEl ? siteEl.value : '';
  var branchId = (siteEl && siteEl.dataset && siteEl.dataset.branch) ? siteEl.dataset.branch
    : (siteEl && siteEl.selectedOptions && siteEl.selectedOptions[0] ? siteEl.selectedOptions[0].getAttribute('data-branch') : '');
  if (!branchId && siteId) {
    var sObj = STATE.data.sites.find(function(s){return s.id===siteId;});
    if (sObj) branchId = sObj.branchId;
  }

  if (!siteId) { showToast('ກະລຸນາເລືອກໄຊງານ', 'warn'); return; }

  var items = [];
  document.querySelectorAll('#urItemsList .ur-item-row').forEach(function(row){
    var pid = row.querySelector('.ur-select-prod').value;
    var qty = Number(row.querySelector('.ur-qty').value);
    var note = '';
    if (pid && qty > 0) items.push({productId:pid, qty:qty, note:note});
  });
  if (!items.length) { showToast('ກະລຸນາເພີ່ມສິນຄ້າທີ່ໃຊ້ຢ່າງໜ້ອຍ 1 ລາຍການ', 'warn'); return; }

  var data = {
    siteId:      siteId,
    branchId:    branchId,
    reportedBy:  STATE.user.fullName || STATE.user.username,
    reportDate:  document.getElementById('ur_date').value,
    startTime:   (document.getElementById('ur_start')||{}).value || '',
    endTime:     (document.getElementById('ur_end')||{}).value || '',
    workType:    (document.getElementById('ur_type')||{}).value || '',
    staffCount:  Number((document.getElementById('ur_staff')||{}).value || 1),
    note:        (document.getElementById('ur_note')||{}).value || '',
    items:       items
  };

  callServer('saveUsageReport', [data], function(res){
    if (res.success) {
      // Build toast with what was deducted
      var deducted = data.items.map(function(it){
        var p = STATE.data.products.find(function(x){return x.id===it.productId;})||{name:it.productId,unit:''};
        return p.name+' −'+it.qty+' '+p.unit;
      }).join(', ');
      showToast('✅ '+res.urNumber+' · ຕັດ Stock: '+deducted, 'success');
      closeModal();
      // Refresh site stock + usage history if on site view
      if (window._currentSiteId === siteId) {
        _loadSiteStock(siteId);
        _loadSiteUsage(siteId);
      }
    } else { showToast('Error: '+(res.message||'ບໍ່ສາມາດບັນທຶກໄດ້'), 'error'); }
  });
}

function _rptQuickDateBtns() {
  var today = new Date().toISOString().split('T')[0];
  var w7 = new Date(Date.now()-7*86400000).toISOString().split('T')[0];
  var m1 = new Date(Date.now()-30*86400000).toISOString().split('T')[0];
  var m3 = new Date(Date.now()-90*86400000).toISOString().split('T')[0];
  var y1 = new Date(Date.now()-365*86400000).toISOString().split('T')[0];
  return ['<span class="text-xs text-slate-400 font-semibold">ຊ່ວງ:</span>',
    '<button onclick="_rptQuick(\''+w7+'\',\''+today+'\')" class="btn btn-secondary text-xs px-2 py-1">7d</button>',
    '<button onclick="_rptQuick(\''+m1+'\',\''+today+'\')" class="btn btn-secondary text-xs px-2 py-1">30d</button>',
    '<button onclick="_rptQuick(\''+m3+'\',\''+today+'\')" class="btn btn-secondary text-xs px-2 py-1">3m</button>',
    '<button onclick="_rptQuick(\''+y1+'\',\''+today+'\')" class="btn btn-secondary text-xs px-2 py-1">1y</button>'
  ].join('');
}
function _rptQuick(from, to) {

  var t = document.getElementById('rpt_to');   if(t) t.value = to;
  _rptGenerate();
}

// ── Generate dispatcher ───────────────────────────────────
function _rptGenerate() {
  var tab = window._rptTab || 'movement';
  var f   = window._rptF   || {};
  var el  = document.getElementById('rptOutput');
  if (!el) return;
  switch(tab) {
    case 'movement':  window._rptRows = _rptBuildMovement(f);  _rptRenderTable(el, _rptCols('movement'),  window._rptRows, 'movement'); break;
    case 'valuation': window._rptRows = _rptBuildValuation(f); _rptRenderTable(el, _rptCols('valuation'), window._rptRows, 'valuation'); break;
    case 'dispatch':  window._rptRows = _rptBuildDispatch(f);  _rptRenderTable(el, _rptCols('dispatch'),  window._rptRows, 'dispatch'); break;
    case 'sr':        window._rptRows = _rptBuildSR(f);        _rptRenderTable(el, _rptCols('sr'),        window._rptRows, 'sr'); break;
    case 'usage':     window._rptRows = _rptBuildUsage(f);     _rptRenderTable(el, _rptCols('usage'),     window._rptRows, 'usage'); break;
    case 'project':   window._rptRows = _rptBuildProject(f);   _rptRenderTable(el, _rptCols('project'),   window._rptRows, 'project'); break;
    case 'expiry':    window._rptRows = _rptBuildExpiry(f);    _rptRenderTable(el, _rptCols('expiry'),    window._rptRows, 'expiry'); break;
    case 'maintenance': window._rptRows = _rptBuildMaintenance(f); _rptRenderTable(el, _rptCols('maintenance'), window._rptRows, 'maintenance'); break;
  }
  var cnt = document.getElementById('rptResultCount');
  if (cnt) cnt.textContent = fmtNum((window._rptRows||[]).length) + ' ລາຍການ';
}
