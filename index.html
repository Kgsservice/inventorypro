<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>InventoryPro by KGS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { font-family: 'IBM Plex Sans', 'Noto Sans Lao', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .barcode-lines {
    width: 80px; height: 24px;
    background: repeating-linear-gradient(90deg, #1e293b 0px, #1e293b 1px, transparent 1px, transparent 3px, #1e293b 3px, #1e293b 5px, transparent 5px, transparent 6px, #1e293b 6px, #1e293b 7px, transparent 7px, transparent 9px, #1e293b 9px, #1e293b 11px, transparent 11px, transparent 14px, #1e293b 14px, #1e293b 15px, transparent 15px, transparent 17px, #1e293b 17px, #1e293b 19px, transparent 19px, transparent 20px);
  }
  .btn-scan {
    display:inline-flex;align-items:center;justify-content:center;
    gap:4px;padding:8px 12px;border-radius:10px;border:2px solid #3b82f6;
    background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .btn-scan:hover { background:#3b82f6;color:#fff; }
  .btn-scan:active { transform:scale(0.95); }
  .scan-field-wrap { display:flex;align-items:center;gap:6px; }
  .scan-field-wrap .select,.scan-field-wrap .input { flex:1;min-width:0; }
  .barcode-lines-lg {
    width: 120px; height: 36px; margin: 0 auto;
    background: repeating-linear-gradient(90deg, #1e293b 0px, #1e293b 1px, transparent 1px, transparent 3px, #1e293b 3px, #1e293b 5px, transparent 5px, transparent 6px, #1e293b 6px, #1e293b 7px, transparent 7px, transparent 9px, #1e293b 9px, #1e293b 11px, transparent 11px, transparent 14px, #1e293b 14px, #1e293b 15px, transparent 15px, transparent 17px, #1e293b 17px, #1e293b 19px, transparent 19px, transparent 20px);
  }
  body { background: #f0f4f8; }
  .nav-item.active { background: rgba(255,255,255,0.15); border-left: 3px solid #60a5fa; }
  .nav-item { border-left: 3px solid transparent; }
  .branch-node.active-branch { background: rgba(255,255,255,0.12); border-left: 3px solid #60a5fa; }
  .branch-node { border-left: 3px solid transparent; }
  .site-node.active-site { background: rgba(255,255,255,0.1); border-left: 3px solid #34d399; }
  .site-node { border-left: 3px solid transparent; }
  .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
  .badge-pending  { background:#fef3c7; color:#92400e; border:1px solid #fcd34d; }
  .badge-approved { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
  .badge-rejected { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
  .badge-received { background:#e0e7ff; color:#3730a3; border:1px solid #a5b4fc; }
  .badge-submitted{ background:#ede9fe; color:#5b21b6; border:1px solid #c4b5fd; }
  .badge-low { background:#fee2e2; color:#dc2626; }
  .tag-iso { background:#dbeafe; color:#1e40af; border:1px solid #bfdbfe; font-size:10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display:inline-block; }
  .modal-overlay { background: rgba(15,23,42,0.6); backdrop-filter: blur(4px); }
  .sidebar { width: 260px; min-height: 100vh; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
  .main-content { flex: 1; min-width: 0; }
  @media (max-width: 768px) {
    .sidebar { position: fixed; left: -260px; top:0; z-index:100; transition: left 0.3s; }
    .sidebar.open { left: 0; }
    .mobile-overlay { display:block; }
  }
  .btn { padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: #2563eb; color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-success { background: #16a34a; color: white; }
  .btn-success:hover { background: #15803d; }
  .btn-danger { background: #dc2626; color: white; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-secondary { background: #f1f5f9; color: #334155; border: 1px solid #e2e8f0; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-warning { background: #d97706; color: white; }
  .btn-warning:hover { background: #b45309; }
  .input { width:100%; padding:8px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; outline:none; transition:border 0.15s; }
  .input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
  .select { width:100%; padding:8px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; background:white; outline:none; }
  .select:focus { border-color:#2563eb; }
  label.field-label { font-size:12px; font-weight:600; color:#374151; display:block; margin-bottom:4px; }
  .table-row:hover { background:#f8fafc; }
  .kpi-card { border-radius:12px; padding:20px; }
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:#f1f5f9; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  .lang-lao { font-size: 11px; color: #64748b; }
  .iso-tag { display:inline-flex; align-items:center; gap:3px; padding:2px 6px; border-radius:4px; }

  /* ── Onboarding Story ─────────────────────────────── */
  #storyOverlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0); pointer-events: none;
    transition: background 0.4s;
  }
  #storyOverlay.active {
    background: rgba(0,0,0,0.55); pointer-events: all;
  }
  #storyCard {
    position: fixed; z-index: 10000;
    background: #fff; border-radius: 20px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1);
    max-width: 420px; width: calc(100vw - 32px);
    opacity: 0; transform: scale(0.92) translateY(16px);
    transition: opacity 0.35s, transform 0.35s;
    overflow: hidden;
    pointer-events: all;
  }
  #storyCard.visible { opacity: 1; transform: scale(1) translateY(0); }
  .story-spotlight {
    position: fixed; z-index: 9998; border-radius: 12px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.52);
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes story-pulse {
    0%,100% { box-shadow: 0 0 0 9999px rgba(0,0,0,0.52), 0 0 0 3px rgba(99,102,241,0.8); }
    50%      { box-shadow: 0 0 0 9999px rgba(0,0,0,0.52), 0 0 0 6px rgba(99,102,241,0.5); }
  }
  .story-spotlight.pulse { animation: story-pulse 1.8s infinite; }
  .story-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1;
    transition: all 0.2s; cursor: pointer; flex-shrink: 0;
  }
  .story-dot.active { background: #6366f1; transform: scale(1.4); }
  .story-dot.done   { background: #10b981; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════ -->
<!-- LOGIN SCREEN -->
<!-- ════════════════════════════════════════════════ -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 60%, #1e3a5f 100%)">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background:rgba(59,130,246,0.2);">
        <span style="font-size:32px">📦</span>
      </div>
      <h1 class="text-2xl font-bold text-white">InventoryPro <span class="text-blue-400 font-normal text-lg">by KGS</span></h1>
      
    </div>
    <div class="card p-6 shadow-2xl">
      <div class="mb-4 text-center">
        <span class="text-sm font-semibold text-slate-700">Sign In / ເຂົ້າລະບົບ</span>
      </div>
      <div id="loginError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl p-3 mb-4 flex items-center gap-2">
        <span>⚠️</span><span id="loginErrorMsg"></span>
      </div>
      <div class="space-y-4">
        <!-- Username -->
        <div>
          <label class="field-label">Username / ຊື່ຜູ້ໃຊ້</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">👤</span>
            <input id="loginUser" class="input pl-9" placeholder="ໃສ່ຊື່ຜູ້ໃຊ້..." autocomplete="username">
          </div>
        </div>
        <!-- Password + show/hide -->
        <div>
          <label class="field-label">Password / ລະຫັດຜ່ານ</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base">🔑</span>
            <input id="loginPass" type="password" class="input pl-9 pr-11" placeholder="ໃສ່ລະຫັດຜ່ານ..." autocomplete="current-password"
              oninput="_loginPassStrength(this.value)">
            <button type="button" id="loginPassToggle" onclick="_toggleLoginPass()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600 transition-colors text-lg select-none"
              title="ສະແດງ/ເຊື່ອງລະຫັດ">👁️</button>
          </div>
          <!-- live chars while typing -->
          <div id="loginPassHint" class="mt-1 text-xs text-slate-400 font-mono tracking-widest min-h-4 pl-1 select-none"></div>
        </div>
        <!-- Remember me -->
        <div class="flex items-center gap-2 pt-1">
          <div class="relative inline-block">
            <input type="checkbox" id="loginRemember" class="sr-only peer">
            <div onclick="_toggleRemember()" class="w-10 h-5 rounded-full cursor-pointer transition-all duration-200 bg-slate-200 peer-checked:bg-blue-500 flex items-center px-0.5">
              <div id="loginRememberKnob" class="w-4 h-4 rounded-full bg-white shadow transition-all duration-200 translate-x-0"></div>
            </div>
          </div>
          <label onclick="_toggleRemember()" class="text-sm text-slate-600 cursor-pointer select-none">ຈື່ຂໍ້ມູນ Login</label>
          <span id="loginSavedBadge" class="hidden text-xs bg-emerald-100 text-emerald-700 font-semibold px-2 py-0.5 rounded-full">✅ ບັນທຶກໄວ້</span>
        </div>
        <!-- Sign in button -->
        <button id="loginBtn" onclick="doLogin()" class="btn btn-primary w-full flex items-center justify-center gap-2 text-base" style="padding:11px">
          <span id="loginBtnIcon">🔓</span>
          <span id="loginBtnText">Sign In / ເຂົ້າລະບົບ</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════ -->
<!-- MAIN APP -->
<!-- ════════════════════════════════════════════════ -->
<div id="app" class="hidden flex" style="min-height:100vh">

  <!-- MOBILE OVERLAY -->
  <div id="mobileOverlay" class="hidden fixed inset-0 z-50 bg-black/50" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <nav class="sidebar flex-shrink-0" id="sidebar">
    <!-- Logo / Brand -->
    <div class="p-4 border-b" style="border-color:rgba(255,255,255,0.1)">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 flex items-center justify-center flex-shrink-0 shadow-lg">
          <span style="font-size:18px">📦</span>
        </div>
        <div>
          <div class="text-white font-black text-sm leading-tight">InventoryPro</div>
          <div class="text-blue-400 font-semibold leading-tight" style="font-size:10px">by KGS</div>
        </div>
      </div>
      <!-- User info -->
      <div class="mt-3 flex items-center gap-2 bg-white/5 rounded-xl px-2.5 py-2">
        <div class="w-7 h-7 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-black flex-shrink-0" id="userAvatar">A</div>
        <div class="min-w-0">
          <div class="text-white text-xs font-semibold truncate" id="userNameDisplay">-</div>
          <div class="text-slate-400 truncate" style="font-size:10px" id="userRoleDisplay">-</div>
        </div>
      </div>
    </div>

    <div class="p-3 overflow-y-auto" style="max-height:calc(100vh - 160px); padding-bottom:100px">

      <!-- ══ ໜ້າຫຼັກ ══════════════════════════════════════ -->
      <button onclick="showPage('dashboard')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="dashboard">
        <span>🏠</span> <span class="font-semibold">Dashboard <span class="text-slate-500 text-xs font-normal">/ ໜ້າຫຼັກ</span></span>
      </button>

      <!-- ══ ສາງ & Stock ═══════════════════════════════════ -->
      <div class="flex items-center gap-2 px-3 py-1.5 mt-3 mb-1">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-slate-500 text-xs font-bold uppercase tracking-wider whitespace-nowrap">🏛️ ສາງ & Stock</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <!-- Branch/Site Tree -->
      <div id="branchTree"></div>

      <button onclick="showPage('scan')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="scan">
        <span>🔲</span> <span>Barcode Scan <span class="text-slate-500 text-xs">/ ສະແກນ</span></span>
      </button>
      <button onclick="showPage('lowstock')" class="nav-item w-full text-left flex items-center justify-between gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="lowstock">
        <div class="flex items-center gap-3"><span>⚠️</span> <span>Low Stock <span class="text-slate-500 text-xs">/ ໃກ້ໝົດ</span></span></div>
        <span id="lowStockNavBadge" class="hidden text-xs bg-red-500 text-white rounded-full px-1.5 font-bold">0</span>
      </button>
      <button onclick="showPage('lots')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="lots">
        <span>🔢</span> <span>Lot / Batch <span class="text-slate-500 text-xs">/ ລ໋ອດ</span></span>
      </button>
      <button onclick="showPage('stockcard')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="stockcard">
        <span>📋</span> <span>Stock Card <span class="text-slate-500 text-xs">/ ບັດສິນຄ້າ</span></span>
      </button>
      <button onclick="showPage('movements')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="movements">
        <span>🔃</span> <span>Movements <span class="text-slate-500 text-xs">/ ການເຄື່ອນໄຫວ</span></span>
      </button>

      <!-- ══ ການຈັດຊື້ ════════════════════════════════════ -->
      <div class="flex items-center gap-2 px-3 py-1.5 mt-3 mb-1">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-slate-500 text-xs font-bold uppercase tracking-wider whitespace-nowrap">🛒 ການຈັດຊື້</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <button onclick="showPage('pr')" class="nav-item w-full text-left flex items-center justify-between gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="pr">
        <div class="flex items-center gap-3"><span>📝</span> <span>PR <span class="text-slate-500 text-xs">/ ໃບຂໍຊື້</span></span></div>
        <span id="prBadge" class="hidden text-xs bg-amber-500 text-white rounded-full px-1.5">0</span>
      </button>
      <button onclick="showPage('po')" class="nav-item w-full text-left flex items-center justify-between gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="po">
        <div class="flex items-center gap-3"><span>🛒</span> <span>PO <span class="text-slate-500 text-xs">/ ໃບສັ່ງຊື້</span></span></div>
        <span id="poBadge" class="hidden text-xs bg-purple-500 text-white rounded-full px-1.5">0</span>
      </button>

      <!-- ══ ການດຳເນີນງານ ═══════════════════════════════ -->
      <div class="flex items-center gap-2 px-3 py-1.5 mt-3 mb-1">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-slate-500 text-xs font-bold uppercase tracking-wider whitespace-nowrap">⚙️ ການດຳເນີນງານ</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <button onclick="showPage('usage')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="usage">
        <span>🧴</span> <span>ການໃຊ້ <span class="text-slate-500 text-xs">/ Usage</span></span>
      </button>
      <button onclick="showPage('maintenance')" class="nav-item w-full text-left flex items-center justify-between gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="maintenance">
        <div class="flex items-center gap-3"><span>🔧</span> <span>ສ້ອມແປງ <span class="text-slate-500 text-xs">/ Maintenance</span></span></div>
        <span id="maintBadge" class="hidden text-xs bg-orange-500 text-white rounded-full px-1.5">0</span>
      </button>

      <!-- ══ ລາຍງານ ══════════════════════════════════════ -->
      <div class="flex items-center gap-2 px-3 py-1.5 mt-3 mb-1">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-slate-500 text-xs font-bold uppercase tracking-wider whitespace-nowrap">📈 ລາຍງານ</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <button onclick="showPage('reports')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="reports">
        <span>📊</span> <span>Reports & Analytics <span class="text-slate-500 text-xs">/ ສະຖິຕິ</span></span>
      </button>
      <button onclick="showPage('activity')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="activity">
          <span>📰</span> <span>Activity Feed <span class="text-slate-500 text-xs">/ ກິດຈະກຳ</span></span>
        </button>
        <button onclick="showPage('audit')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="audit">
        <span>🔍</span> <span>Audit Log <span class="text-slate-500 text-xs">/ ບັນທຶກ</span></span>
      </button>

      <!-- ══ Admin ══════════════════════════════════════ -->
      <div id="adminNav" class="hidden">
        <div class="flex items-center gap-2 px-3 py-1.5 mt-3 mb-1">
          <div class="flex-1 h-px bg-white/10"></div>
          <span class="text-slate-500 text-xs font-bold uppercase tracking-wider whitespace-nowrap">🛡️ Admin</span>
          <div class="flex-1 h-px bg-white/10"></div>
        </div>
        <button onclick="showPage('products')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="products">
          <span>🗂️</span> <span>ສິນຄ້າ <span class="text-slate-500 text-xs">/ Products</span></span>
        </button>
        <button onclick="showPage('branchadmin')" class="nav-item w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5" data-page="branchadmin">

function _toggleLoginPass() {
  var inp = document.getElementById('loginPass');
  var btn = document.getElementById('loginPassToggle');
  if (!inp) return;
  if (inp.type === 'password') {
    inp.type = 'text';
    if (btn) btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    if (btn) btn.textContent = '👁️';
  }
  inp.focus();
}

function _loginPassStrength(val) {
  var hint = document.getElementById('loginPassHint');
  if (!hint) return;
  if (!val) { hint.textContent = ''; return; }
  // Show masked dots while typing (password type) or actual chars (text type)
  var inp = document.getElementById('loginPass');
  if (inp && inp.type === 'text') {
    hint.textContent = '';
  } else {
    hint.textContent = '•'.repeat(val.length) + '  (' + val.length + ' ຕົວ)';
  }
}

var _loginRememberOn = false;
function _toggleRemember() {
  _loginRememberOn = !_loginRememberOn;
  var knob = document.getElementById('loginRememberKnob');
  var cb   = document.getElementById('loginRemember');
  if (knob) knob.style.transform = _loginRememberOn ? 'translateX(20px)' : 'translateX(0)';
  if (cb)   cb.checked = _loginRememberOn;
}

function _loadSavedLogin() {
  try {
    var saved = localStorage.getItem('kgs_login');
    if (!saved) return;
    var d = JSON.parse(saved);
    var uEl = document.getElementById('loginUser');
    var pEl = document.getElementById('loginPass');
    var badge = document.getElementById('loginSavedBadge');
    if (uEl && d.u) uEl.value = d.u;
    if (pEl && d.p) pEl.value = d.p;
    if (d.u && d.p) {
      _loginRememberOn = true;
      var knob = document.getElementById('loginRememberKnob');
      var cb   = document.getElementById('loginRemember');
      if (knob) knob.style.transform = 'translateX(20px)';
      if (cb)   cb.checked = true;
      if (badge) badge.classList.remove('hidden');
    }
  } catch(e) {}
}

function doLogin() {
  var u = (document.getElementById('loginUser').value || '').trim();
  var p = document.getElementById('loginPass').value || '';
  if (!u || !p) { showLoginError('ກະລຸນາໃສ່ Username ແລະ Password'); return; }
  showLoginError('');
  var btnIcon = document.getElementById('loginBtnIcon');
  var btnText = document.getElementById('loginBtnText');
  if (btnIcon) btnIcon.textContent = '⏳';
  if (btnText) btnText.textContent = 'ກຳລັງເຂົ້າລະບົບ...';
  callServer('login', [u, p], function(res) {
    if (btnIcon) btnIcon.textContent = '🔓';
    if (btnText) btnText.textContent = 'Sign In / ເຂົ້າລະບົບ';
    if (res.success) {
      // Save credentials if remember is on
      if (_loginRememberOn) {
        try { localStorage.setItem('kgs_login', JSON.stringify({u:u, p:p})); } catch(e) {}
      } else {
        try { localStorage.removeItem('kgs_login'); } catch(e) {}
      }
      // Reset pass field type
      var pEl = document.getElementById('loginPass');
      if (pEl) pEl.type = 'password';
      var tog = document.getElementById('loginPassToggle');
      if (tog) tog.textContent = '👁️';
      STATE.user = res.user || res.data;
      if (res.data && res.data.user) STATE.user = res.data.user;
      if (res.data && res.data.token) STATE.token = res.data.token;
      initApp();
    } else {
      showLoginError(res.error || res.message || 'Login ບໍ່ສຳເລັດ — ກວດ Username/Password');
      // Shake card
      var card = document.querySelector('#loginScreen .card');
      if (card) { card.style.animation='shake 0.4s'; setTimeout(function(){card.style.animation='';},400); }
    }
  });
}

function showLoginError(msg) {
  var el  = document.getElementById('loginError');
  var msg2 = document.getElementById('loginErrorMsg');
  if (msg) {
    if (msg2) msg2.textContent = msg;
    else if (el) el.textContent = msg;
    if (el) el.classList.remove('hidden');
  } else {
    if (el) el.classList.add('hidden');
  }
}

function doLogout() {
  if (STATE && STATE.token) {

  STATE.user  = null;

  document.getElementById('app').classList.add('hidden');

  // Restore saved login if remember is on, else clear

  try { saved = JSON.parse(localStorage.getItem('kgs_login')||'null'); } catch(e){}

// SERVER CALL — 3 modes:
//   1. GAS_URL set  → HTTP fetch to Google Apps Script
//   2. google.script.run  → Apps Script sidebar mode
//   3. DEMO MODE → local mock data
// ════════════════════════════════════════════════════════

// ▼▼▼ ວາງ Web App URL ຂອງທ່ານທີ່ນີ້ ▼▼▼
var GAS_URL = 'https://script.google.com/macros/s/AKfycbx8JDhiFJ5_fAiYtZdB5EdSPrEpf430_FbvK1fAmw3mFXs1u8HA2X8D1bm-XPshjsMrVA/exec';
// ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

function callServer(fn, args, cb) {
  // Mode 1: HTTP fetch to GAS Web App
  if (GAS_URL && GAS_URL.length > 10) {
    var token = (STATE && STATE.token) ? STATE.token : '';
    fetch(GAS_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain'}, // text/plain avoids CORS preflight
      body: JSON.stringify({action:fn, args:args||[], token:token}),
      redirect: 'follow'
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.error === 'SESSION_EXPIRED') {
        showToast('Session ໝົດ — ກະລຸນາ Login ໃໝ່', 'error');
        setTimeout(doLogout, 1000);
        return;
      }
      if (cb) cb(data);
    })
    .catch(function(err){
      showToast('Network error: '+err.message, 'error');
      if (cb) cb({success:false, error:err.message});
    });
    return;
  }
  // Mode 2: Apps Script sidebar
  if (typeof google !== 'undefined' && google.script) {
    var runner = google.script.run
      .withSuccessHandler(cb)
      .withFailureHandler(function(e){
        showToast('Error: '+e.message, 'error');
        if (cb) cb({success:false, error:e.message});
      });
    runner[fn].apply(runner, args||[]);
    return;
  }
  // Mode 3: Demo mock (no GAS_URL, no google.script)
  setTimeout(function(){ cb(getMockData(fn, args)); }, 30);
}

var MOCK = {

// ─── Per-location Reorder Point helper (GLOBAL) ──────────
// Priority: MOCK.reorderPoints[pid|locId] > product.reorderPoint
// ── Bilingual category label helper ──────────────────────
function _catLabel(c) {

  return c.name + (c.nameLao ? ' / ' + c.nameLao : '');
}
function _catLabelById(catId) {

  return _catLabel(c);
}

function _getRp(productId, locId) {
  MOCK.reorderPoints = MOCK.reorderPoints || {};
  var key = productId + '|' + locId;
  return (MOCK.reorderPoints[key] !== undefined)
    ? MOCK.reorderPoints[key]
    : ((STATE.data.products||[]).find(function(p){return p.id===productId;})||{}).reorderPoint || 0;
}

// ─── FIFO Lot Deduction helper (GLOBAL) ──────────────────
// Deducts qty from oldest lots first (FIFO by receivedAt).
// Returns array of {lotId, lotNumber, qty, unitCost} deducted.
function _fifoDeductLot(productId, locationId, qtyNeeded) {
  MOCK.avco = MOCK.avco || {};  // cache only
  // Get lots at this location, oldest first
  var avail = (STATE.data.lots||[]).filter(function(l){
    return l.productId===productId && l.locationId===locationId && (l.qty||0)>0;
  }).sort(function(a,b){
    return (a.receivedAt||a.receivedDate||'').localeCompare(b.receivedAt||b.receivedDate||'');
  });
  var deducted = [];
  var remaining = qtyNeeded;
  for (var i=0; i<avail.length && remaining>0; i++) {
    var lot = avail[i];
    var take = Math.min(lot.qty, remaining);
    lot.qty -= take;
    if (lot.qty <= 0) {
      lot.qty = 0;
      // remove from (STATE.data.lots||[]) if zero
      var li2 = (STATE.data.lots||[]).findIndex(function(x){return x.id===lot.id;});
      if (li2>-1) (STATE.data.lots||[])[li2].qty=0;
    }
    deducted.push({lotId:lot.id, lotNumber:lot.lotNumber, qty:take, unitCost:lot.unitCost||0});
    remaining -= take;
  }
  // Recompute AVCO after deduction
  var avcoRem = (STATE.data.lots||[]).filter(function(l){return l.productId===productId&&l.locationId===locationId&&l.qty>0;});
  var tv=avcoRem.reduce(function(s,l){return s+(l.qty*(l.unitCost||0));},0);
  var tq=avcoRem.reduce(function(s,l){return s+l.qty;},0);
  MOCK.avco[productId+'|'+locationId] = tq>0?tv/tq:0;
  return deducted;
}

// ─── Get AVCO cost for product+location ───────────────────
function _getAvco(productId, locationId) {
  MOCK.avco = MOCK.avco || {};  // cache only
  var key = productId+'|'+locationId;
  if (MOCK.avco[key] !== undefined) return MOCK.avco[key];
  // Compute from lots on demand
  var lots = (STATE.data.lots||[]).filter(function(l){return l.productId===productId&&l.locationId===locationId&&l.qty>0;});
  if (!lots.length) return ((STATE.data.products||[]).find(function(p){return p.id===productId;})||{}).costPrice||0;
  var tv=lots.reduce(function(s,l){return s+(l.qty*(l.unitCost||0));},0);
  var tq=lots.reduce(function(s,l){return s+l.qty;},0);
  return tq>0?tv/tq:0;
}

// ─── Get FIFO cost (oldest lot's unitCost) ─────────────────
function _getFifoCost(productId, locationId) {
  var lots = (STATE.data.lots||[]).filter(function(l){return l.productId===productId&&l.locationId===locationId&&l.qty>0;});
  if (!lots.length) return ((STATE.data.products||[]).find(function(p){return p.id===productId;})||{}).costPrice||0;
  lots.sort(function(a,b){return (a.receivedAt||a.receivedDate||'').localeCompare(b.receivedAt||b.receivedDate||'');});
  return lots[0].unitCost || 0;
}

// Paginate any array. Returns {items, page, perPage, total, pages, from, to}
function paginateData(items, page, perPage) {
  var total = items.length;
  // 99999 = ທັງໝົດ (show all)
  if (perPage >= 99999) {
    return { items: items.slice(), page:1, perPage:99999, total:total, pages:1, from:total===0?0:1, to:total };
  }
  var pages = Math.max(1, Math.ceil(total / perPage));
  page = Math.max(1, Math.min(page, pages));
  var start = (page - 1) * perPage;
  return {
    items: items.slice(start, start + perPage),
    page: page, perPage: perPage,
    total: total, pages: pages,
    from: total === 0 ? 0 : start + 1,
    to: Math.min(start + perPage, total)
  };
}

// Render a pagination bar. onPageFn = JS expression string called with (page, perPage)

function fmtNum(n) { return Number(n||0).toLocaleString(); }
// ─── History Section Registry ──────────────────────────────
// Stores full data + fns per section id for filter/export
window._histReg = {};

function _mkHistRows(rows, renderFn, limit) {
  if (!rows.length) return '<tr><td colspan="99" class="px-4 py-6 text-center text-slate-400 text-sm">ຍັງບໍ່ມີລາຍການ</td></tr>';
  var html = rows.slice(0, limit).map(renderFn).join('');
  if (rows.length > limit) {
    html += '<tr id="histExtraToggleRow" style="display:none"><td colspan="99" class="p-0">' +
      '<table class="w-full"><tbody>' +
      rows.slice(limit).map(renderFn).join('') +
      '</tbody></table></td></tr>';
  }
  return html;
}

// Build page rows HTML for pagination mode
function _mkHistPageRows(rows, renderFn) {
  if (!rows.length) return '<tr><td colspan="99" class="px-4 py-6 text-center text-slate-400 text-sm">ຍັງບໍ່ມີລາຍການ</td></tr>';
  return rows.map(renderFn).join('');
}

// Build pagination bar for _historySection pagination mode
function _mkHistPagBar(id, page, pages, total, perPage) {
  if (pages <= 1) {
    return '<div class="flex items-center justify-between px-4 py-2 border-t border-slate-100 bg-slate-50/60">' +
      '<span class="text-xs text-slate-400">ທັງໝົດ <strong class="text-slate-600">'+total+'</strong> ລາຍການ</span>' +
      '</div>';
  }
  var from = (page-1)*perPage + 1;
  var to   = Math.min(page*perPage, total);

  // page buttons: always show first, last, current ± 1, with ellipsis
  function pgBtn(pg, label, active, disabled) {
    if (disabled) return '<button disabled class="min-w-[28px] h-7 px-1.5 rounded-lg border border-slate-100 text-xs text-slate-300 bg-white cursor-not-allowed">'+label+'</button>';
    if (active)   return '<button class="min-w-[28px] h-7 px-1.5 rounded-lg border border-blue-500 bg-blue-500 text-white text-xs font-bold">'+label+'</button>';
    return '<button onclick="_histGoPage(\''+id+'\','+pg+')" class="min-w-[28px] h-7 px-1.5 rounded-lg border border-slate-200 bg-white text-xs text-slate-600 hover:bg-blue-50 hover:border-blue-300 transition-colors">'+label+'</button>';
  }

  var btns = pgBtn(page-1,'‹', false, page===1);
  var s = Math.max(1, page-1), e = Math.min(pages, page+1);
  if (page<=2) { s=1; e=Math.min(pages,3); }
  if (page>=pages-1) { s=Math.max(1,pages-2); e=pages; }
  if (s>1) { btns += pgBtn(1,'1',false,false); if(s>2) btns += '<span class="text-slate-300 text-xs px-0.5">…</span>'; }
  for (var i=s; i<=e; i++) btns += pgBtn(i, i, i===page, false);
  if (e<pages) { if(e<pages-1) btns += '<span class="text-slate-300 text-xs px-0.5">…</span>'; btns += pgBtn(pages,pages,false,false); }
  btns += pgBtn(page+1,'›', false, page===pages);

  return '<div class="flex items-center justify-between px-4 py-2 border-t border-slate-100 bg-slate-50/60">' +
    '<span class="text-xs text-slate-400">ສະແດງ <strong class="text-slate-600">'+from+'–'+to+'</strong> ຈາກ <strong class="text-blue-600">'+total+'</strong> ລາຍການ</span>' +
    '<div class="flex items-center gap-1">'+btns+'</div>' +
    '</div>';
}

// Navigate to page in pagination-mode history section
function _histGoPage(id, page) {
  var reg = window._histReg[id]; if (!reg || !reg.perPage) return;
  reg.currentPage = page;
  var rows   = reg.rows;
  var pp     = reg.perPage;
  var pages  = Math.max(1, Math.ceil(rows.length / pp));
  page = Math.max(1, Math.min(page, pages));
  reg.currentPage = page;
  var pageRows = rows.slice((page-1)*pp, page*pp);
  var body = document.getElementById('histBody_'+id);
  if (body) body.innerHTML = _mkHistPageRows(pageRows, reg.renderFn);
  var foot = document.getElementById('histPagFoot_'+id);
  if (foot) foot.outerHTML = '<div id="histPagFoot_'+id+'">'+_mkHistPagBar(id, page, pages, rows.length, pp)+'</div>';
}

// dateKeyFn(row) → ISO date string (e.g. "2025-03-08T10:00:00Z")
// xlsxHeaders    → array of header strings
// xlsxRowFn(row) → array of cell values
// perPage        → if set, use pagination mode instead of date-filter + show-all toggle
function _historySection(id, icon, title, thHtml, dataRows, renderFn, bgClass, dateKeyFn, xlsxHeaders, xlsxRowFn, perPage) {
  var usePag = !!perPage;
  var pp     = perPage || 6;
  var page   = 1;
  var total  = dataRows.length;
  var pages  = Math.max(1, Math.ceil(total / pp));

  // Store in registry for filter/export/pagination
  window._histReg[id] = {
    rows: dataRows, renderFn: renderFn,
    dateKeyFn: dateKeyFn||null, xlsxHeaders: xlsxHeaders||null, xlsxRowFn: xlsxRowFn||null,
    perPage: usePag ? pp : null, currentPage: 1
  };

  // ── PAGINATION MODE ──────────────────────────────────────
  if (usePag) {
    var pageRows = dataRows.slice(0, pp);
    var toolbar =
      '<div class="flex items-center justify-between px-4 py-2 border-b border-slate-100 bg-white">' +
      '<span class="text-xs text-slate-500 font-semibold">ທັງໝົດ <strong class="text-blue-600">'+total+'</strong> ລາຍການ</span>' +
      (xlsxRowFn ? '<button onclick="_exportHist(\''+id+'\')" class="btn btn-secondary text-xs px-3 py-1 flex items-center gap-1">📥 Excel</button>' : '') +
      '</div>';

    return '<div class="card mt-4 overflow-hidden" id="histCard_'+id+'">' +
      '<div class="flex items-center gap-2 px-4 py-3 border-b border-slate-100 '+(bgClass||'bg-slate-50/60')+'">' +
      icon+' <span class="font-bold text-slate-700 text-sm">'+title+'</span>' +
      '<span class="ml-auto text-xs text-slate-400">'+total+' ລາຍການ</span>' +
      '</div>' +
      toolbar +
      '<div class="overflow-x-auto"><table class="w-full text-sm">' +
      '<thead><tr class="border-b border-slate-100 bg-slate-50">'+thHtml+'</tr></thead>' +
      '<tbody id="histBody_'+id+'">'+_mkHistPageRows(pageRows, renderFn)+'</tbody>' +
      '</table></div>' +
      '<div id="histPagFoot_'+id+'">'+_mkHistPagBar(id, page, pages, total, pp)+'</div>' +
      '</div>';
  }

  // ── DATE FILTER MODE (existing behaviour) ────────────────
  // Build unique year options from data
  var years = [];
  if (dateKeyFn) {
    dataRows.forEach(function(r){ var d=dateKeyFn(r); if(d){ var y=String(d).slice(0,4); if(y&&years.indexOf(y)<0) years.push(y); } });
    years.sort().reverse();
  }
  var yearOpts = '<option value="">ທຸກປີ</option>'+years.map(function(y){ return '<option value="'+y+'">'+y+'</option>'; }).join('');
  var monthOpts = '<option value="">ທຸກເດືອນ</option>'+
    ['01ມັງກອນ','02ກຸມພາ','03ມີນາ','04ເມສາ','05ພຶດສະພາ','06ມິຖຸນາ',
     '07ກໍລະກົດ','08ສິງຫາ','09ກັນຍາ','10ຕຸລາ','11ພະຈິກ','12ທັນວາ'].map(function(m){
    return '<option value="'+m.slice(0,2)+'">'+m.slice(2)+'</option>';
  }).join('');

  var hasMore = total > 5;
  var rowsHtml = _mkHistRows(dataRows, renderFn, 5);

  var filterBar = dateKeyFn ? (
    '<div class="flex flex-wrap items-center gap-2 px-4 py-2 border-b border-slate-100 bg-white">' +
    '<span class="text-xs text-slate-400 font-semibold">📅 Filter:</span>' +
    '<select id="hf_y_'+id+'" class="select text-xs py-1" style="max-width:90px" onchange="_filterHist(\''+id+'\')">' + yearOpts + '</select>' +
    '<select id="hf_m_'+id+'" class="select text-xs py-1" style="max-width:110px" onchange="_filterHist(\''+id+'\')">' + monthOpts + '</select>' +
    '<input id="hf_d_'+id+'" type="number" min="1" max="31" class="input text-xs py-1" style="max-width:60px" placeholder="ມື້" oninput="_filterHist(\''+id+'\')">' +
    '<button onclick="_clearHistFilter(\''+id+'\')" class="text-xs text-slate-400 hover:text-slate-600 underline">ລ້າງ</button>' +
    '<span id="hfCount_'+id+'" class="text-xs text-slate-400 ml-1">'+total+' ລາຍການ</span>' +
    (xlsxRowFn ? '<button onclick="_exportHist(\''+id+'\')" class="ml-auto btn btn-secondary text-xs px-3 py-1 flex items-center gap-1">📥 Excel</button>' : '') +
    '</div>'
  ) : (
    xlsxRowFn ? (
      '<div class="flex items-center gap-2 px-4 py-2 border-b border-slate-100 bg-white">' +
      '<span class="ml-auto text-xs text-slate-400">'+total+' ລາຍການ</span>' +
      '<button onclick="_exportHist(\''+id+'\')" class="btn btn-secondary text-xs px-3 py-1 flex items-center gap-1">📥 Excel</button>' +
      '</div>'
    ) : ''
  );

  return '<div class="card mt-4 overflow-hidden" id="histCard_'+id+'">' +
    '<div class="flex items-center gap-2 px-4 py-3 border-b border-slate-100 '+(bgClass||'bg-slate-50/60')+'">' +
    icon+' <span class="font-bold text-slate-700 text-sm">'+title+'</span>' +
    (hasMore ? '<button id="histBtn_'+id+'" onclick="_toggleHist(\''+id+'\')" class="ml-auto text-xs font-semibold text-blue-600 hover:underline whitespace-nowrap">ເບິ່ງທັງໝົດ ('+total+') ▼</button>' : '<span class="ml-auto text-xs text-slate-400">'+total+' ລາຍການ</span>') +
    '</div>' +
    filterBar +
    '<div class="overflow-x-auto"><table class="w-full text-sm">' +
    '<thead><tr class="border-b border-slate-100 bg-slate-50">'+thHtml+'</tr></thead>' +
    '<tbody id="histBody_'+id+'">'+rowsHtml+'</tbody>' +
    '</table></div></div>';
}

function _toggleHist(id) {
  var row = document.querySelector('#histCard_'+id+' #histExtraToggleRow');
  var btn = document.getElementById('histBtn_'+id);
  if (!row || !btn) return;
  var open = row.style.display !== 'none';
  row.style.display = open ? 'none' : '';
  btn.innerHTML = open ? 'ເບິ່ງທັງໝົດ ▼' : 'ຫຍໍ້ ▲';
}

function _filterHist(id) {
  var reg = window._histReg[id]; if (!reg) return;
  var y = (document.getElementById('hf_y_'+id)||{}).value||'';
  var m = (document.getElementById('hf_m_'+id)||{}).value||'';
  var d = ((document.getElementById('hf_d_'+id)||{}).value||'').padStart(2,'0');
  var filtered = reg.rows.filter(function(row){
    if (!reg.dateKeyFn) return true;
    var iso = String(reg.dateKeyFn(row)||'');
    if (!iso) return !y && !m && !d;
    if (y && !iso.startsWith(y)) return false;
    if (m && iso.slice(5,7) !== m) return false;
    if (d && d!=='00' && iso.slice(8,10) !== d) return false;
    return true;
  });
  var countEl = document.getElementById('hfCount_'+id);
  if (countEl) countEl.textContent = filtered.length+' ລາຍການ';
  var body = document.getElementById('histBody_'+id);
  if (body) body.innerHTML = _mkHistRows(filtered, reg.renderFn, 5);
  var btn = document.getElementById('histBtn_'+id);
  if (btn) {
    if (filtered.length > 5) { btn.style.display=''; btn.innerHTML='ເບິ່ງທັງໝົດ ('+filtered.length+') ▼'; }
    else btn.style.display='none';
  }
}

function _clearHistFilter(id) {
  var yEl=document.getElementById('hf_y_'+id);
  var mEl=document.getElementById('hf_m_'+id);
  var dEl=document.getElementById('hf_d_'+id);
  if(yEl) yEl.value=''; if(mEl) mEl.value=''; if(dEl) dEl.value='';
  _filterHist(id);
}

function _exportHist(id) {
  var reg = window._histReg[id]; if (!reg || !reg.xlsxRowFn) return;
  var rows = reg.rows;
  // For date-filter mode, export only the currently filtered rows
  if (!reg.perPage && reg.dateKeyFn) {
    var y = (document.getElementById('hf_y_'+id)||{}).value||'';
    var m = (document.getElementById('hf_m_'+id)||{}).value||'';
    var d = ((document.getElementById('hf_d_'+id)||{}).value||'').padStart(2,'0');
    rows = reg.rows.filter(function(row){
      var iso = String(reg.dateKeyFn(row)||'');
      if (!iso) return !y && !m && !d;
      if (y && !iso.startsWith(y)) return false;
      if (m && iso.slice(5,7) !== m) return false;
      if (d && d!=='00' && iso.slice(8,10) !== d) return false;
      return true;
    });
  }
  var wb = XLSX.utils.book_new();
  var wsData = [reg.xlsxHeaders].concat(rows.map(reg.xlsxRowFn));
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = reg.xlsxHeaders.map(function(h){ return {wch: Math.max(h.length+2, 14)}; });
  XLSX.utils.book_append_sheet(wb, ws, 'History');
  XLSX.writeFile(wb, 'History_'+id+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

function fmtDate(s) { return s ? String(s).split('T')[0] : '-'; }
// Format datetime: if today → "🕐 ມື້ນີ້ HH:MM", else "YYYY-MM-DD HH:MM"
function fmtDT(iso) {
  if (!iso) return '—';
  var d = new Date(iso);
  if (isNaN(d)) return String(iso).slice(0,16).replace('T',' ');
  var today = new Date();
  var hhmm = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  var isToday = d.toISOString().slice(0,10) === today.toISOString().slice(0,10);
  return isToday
    ? '<span class="text-blue-500 font-semibold">🕐 ມື້ນີ້ '+hhmm+'</span>'
    : d.toISOString().slice(0,10)+' '+hhmm;
}

function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'fixed top-4 right-4 z-50 rounded-xl px-4 py-3 text-sm font-semibold shadow-xl';
  if (type === 'error') el.classList.add('bg-red-500','text-white');
  else if (type === 'warn') el.classList.add('bg-amber-500','text-white');
  else el.classList.add('bg-emerald-500','text-white');
  el.classList.remove('hidden');
  setTimeout(function(){ el.classList.add('hidden'); }, 3000);
}

function renderCurrentPage() {

    {id:'usage',       icon:'🧴', label:'ລາຍງານໃຊ້'},

    {id:'maintenance', icon:'🔧', label:'ສ້ອມແປງ'},
    {id:'reports',     icon:'📊', label:'ລາຍງານ'},

    {id:'faq',         icon:'💬', label:'ຖາມ-ຕອບ (AI)'},
  ];

      '<span>'+ch.icon+'</span><span>'+ch.label+'</span></button>';
  }).join('');

  try {
    pc.innerHTML =
      '<div class="flex" style="height:calc(100vh - 56px); overflow:hidden">' +

      // ── Left chapter nav ─────────────────────────────
      '<div class="hidden md:flex flex-col gap-0.5 bg-white border-r border-slate-200 flex-shrink-0 overflow-y-auto" style="width:196px">' +
      '<div class="text-xs font-black text-slate-400 uppercase tracking-wider px-4 pt-4 pb-2">📖 ຫົວຂໍ້</div>' +

      // ── Content area ────────────────────────────────
      '<div class="flex-1 overflow-y-auto bg-slate-50" id="helpContent" style="padding:24px 24px 40px">' +
      _helpRenderSection(_helpSection) +
      '</div></div>';
  } catch(err) {
    pc.innerHTML = '<div class="p-8 text-red-600"><b>❌ Help Error:</b> '+err.message+'</div>';
    console.error('renderHelp error:', err);
  }

function _helpGo(id) {
  _helpSection = id;
  var el = document.getElementById('helpContent');
  if (el) { el.innerHTML = _helpRenderSection(id); el.scrollTop = 0; }
  // Update nav active state
  document.querySelectorAll('[onclick^="_helpGo"]').forEach(function(b){
    var isAct = b.getAttribute('onclick') === "_helpGo('"+id+"')";
    b.className = 'w-full text-left flex items-center gap-2 px-3 py-2 rounded-xl text-sm transition-all '+(isAct?'bg-blue-600 text-white font-bold shadow':'text-slate-600 hover:bg-slate-100 hover:text-slate-900');
  });
}

// ── Section renderer ──────────────────────────────────
function _helpRenderSection(id) {
  var sections = {
    overview:    _hOverview,
    login:       _hLogin,
    stock:       _hStock,
    scan:        _hScan,
    sr:          _hSR,
    pr_po:       _hPRPO,
    usage:       _hUsage,
    dispatch:    _hDispatch,
    transfer:    _hTransfer,
    lots:        _hLots,
    maintenance: _hMaintenance,
    reports:     _hReports,
    admin:       _hAdmin,
    faq:         _hFAQ,
  };
  return (sections[id] ? sections[id]() : '') + _hFooter();
}

// ── HTML helpers ──────────────────────────────────────
function _hH(icon, title, sub) {
  return '<div class="mb-6"><div class="flex items-center gap-3 mb-1"><span class="text-3xl">'+icon+'</span><div><h2 class="text-xl font-black text-slate-800">'+title+'</h2>'+(sub?'<p class="text-sm text-slate-500">'+sub+'</p>':'')+'</div></div></div>';
}
function _hStep(n, title, desc) {
  return '<div class="flex gap-3 mb-4"><div class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-black flex items-center justify-center flex-shrink-0 mt-0.5">'+n+'</div><div><div class="font-bold text-slate-800 text-sm">'+title+'</div><div class="text-sm text-slate-600 mt-0.5">'+desc+'</div></div></div>';
}
function _hBox(color, icon, title, body) {
  var colors = {blue:'bg-blue-50 border-blue-200 text-blue-800', green:'bg-emerald-50 border-emerald-200 text-emerald-800', amber:'bg-amber-50 border-amber-200 text-amber-800', red:'bg-red-50 border-red-200 text-red-800', purple:'bg-purple-50 border-purple-200 text-purple-800', slate:'bg-slate-50 border-slate-200 text-slate-700'};
  var cls = colors[color] || colors.slate;
  return '<div class="border rounded-xl p-4 mb-4 '+cls+'"><div class="font-bold text-sm mb-1">'+icon+' '+title+'</div><div class="text-sm leading-relaxed">'+body+'</div></div>';
}
function _hExample(label, rows) {
  return '<div class="bg-white border border-slate-200 rounded-xl mb-4 overflow-hidden shadow-sm"><div class="bg-slate-800 text-white text-xs font-bold px-4 py-2 flex items-center gap-2"><span>📌</span> ຕົວຢ່າງ: '+label+'</div><div class="p-4 space-y-2 text-sm">'+rows+'</div></div>';
}
function _hRow(label, val, cls) {
  return '<div class="flex items-start gap-2"><span class="text-slate-500 text-xs w-32 flex-shrink-0 pt-0.5">'+label+'</span><span class="font-semibold '+(cls||'text-slate-800')+'">'+val+'</span></div>';
}
function _hFlow(steps) {
  return '<div class="flex flex-wrap items-center gap-2 mb-4">'+steps.map(function(s,i){return '<div class="flex items-center gap-1">'+(i>0?'<span class="text-slate-300 text-sm">→</span>':'')+'<span class="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-xs font-semibold text-slate-700 shadow-sm">'+s+'</span></div>';}).join('')+'</div>';
}
function _hTable(headers, rows) {
  return '<div class="overflow-x-auto mb-4"><table class="w-full text-xs border-collapse"><thead><tr>'+headers.map(function(h){return '<th class="bg-slate-700 text-white px-3 py-2 text-left font-bold">'+h+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r,i){return '<tr class="'+(i%2?'bg-slate-50':'bg-white')+'">'+r.map(function(d){return '<td class="px-3 py-2 border-b border-slate-100 text-slate-700">'+d+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table></div>';

function _hFooter() {
  return '<div class="mt-8 pt-4 border-t border-slate-200 text-center text-xs text-slate-400">InventoryPro by KGS — ຄູ່ມືໃຊ້ງານ v1.0 &nbsp;·&nbsp; <button onclick="_helpGo(\'faq\')" class="text-blue-500 hover:underline">💬 ມີຄຳຖາມ? ຖາມ AI ໄດ້ທີ່ນີ້</button></div>';
}
function _hCard(icon, title, desc) {

function _hRole(role, items) {

// ── FAQ Answer engine ─────────────────────────────────
function _helpAskPreset(q) {
  document.getElementById('helpChatInput').value = q;
  _helpAsk();
}

function _helpAsk() {
  var inp = document.getElementById('helpChatInput');
  if (!inp) return;
  var q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  _helpChat.push({role:'user', text:q});
  _helpRenderChat();
  // Find answer
  setTimeout(function(){
    var ans = _helpGetAnswer(q);
    _helpChat.push({role:'bot', text:ans});
    _helpRenderChat();
  }, 400);
}

function _helpRenderChat() {
  var box = document.getElementById('helpChatBox');
  if (!box) return;
  box.innerHTML = _helpChat.map(function(m){
    return '<div class="flex '+(m.role==='user'?'justify-end':'justify-start')+' mb-3">' +
      '<div class="max-w-xs md:max-w-md px-4 py-2.5 rounded-2xl text-sm leading-relaxed '+(m.role==='user'?'bg-blue-600 text-white rounded-tr-sm':'bg-white border border-slate-200 text-slate-800 rounded-tl-sm shadow-sm')+'">'+m.text+'</div></div>';
  }).join('');
  box.scrollTop = box.scrollHeight;
}

// ACTIVITY FEED  — ກິດຈະກຳທຸກຄົນໃນລະບົບ

// ── Build a unified activity stream from all MOCK data ───
function _collectActivity(opts) {
  opts = opts || {};
  var today   = new Date().toISOString().slice(0,10);
  var dateFrom = opts.dateFrom || today;
  var dateTo   = opts.dateTo   || today;
  var userFilter = opts.user   || 'ALL';
  var typeFilter = opts.type   || 'ALL';
  var limit    = opts.limit    || 999;

  var events = [];

  function inRange(d) {
    var ds = String(d||'').slice(0,10);
    return ds >= dateFrom && ds <= dateTo;
  }
  function locName(id) {
    if (!id) return '—';
    if (id==='CW001') return '🏛️ CW';
    var b=(STATE.data.branches||[]).find(function(x){return x.id===id;});
    if (b) return '🏢 '+b.name;
    var s=(STATE.data.sites||[]).find(function(x){return x.id===id;});
    if (s) return '📍 '+s.name;
    return id;
  }
  function prodName(id) {
    var p=(STATE.data.products||[]).find(function(x){return x.id===id;});
    return p ? p.name : id;
  }

  // ── 1. Login events (simulated from sessions / audit log) ─
  // Use (STATE.data.users||[]) as basis — we don't have real session log in mock
  // So we build from audit if available, else simulate
  var auditLogins = ((STATE.data.auditLog||[])||[]).filter(function(a){
    return inRange(a.date) && a.action==='login';
  });
  if (auditLogins.length === 0 && dateFrom === today) {
    // Simulate: current user just logged in
    auditLogins = [{date:new Date().toISOString(), action:'login', by:STATE.user&&STATE.user.username, note:''}];
  }
  auditLogins.forEach(function(a){
    events.push({
      ts: a.date, by: a.by||a.username||'?', type:'LOGIN',
      icon:'🔑', color:'indigo',
      title: (a.by||a.username||'?') + ' ເຂົ້າລະບົບ',
      detail: 'Login ສຳເລັດ',
      tag:'AUTH'
    });
  });

  // ── 2. Stock Movements ────────────────────────────────────
  ((STATE.data.movements||[])||[]).filter(function(m){ return inRange(m.date); }).forEach(function(m){
    var typeMap = {
      ADJUST:'⚙️', STOCK_COUNT:'📋', PO_RECEIVE:'📥', SR_FULFILL:'📤',
      SR_RECEIVE:'📦', USAGE:'🧴', DISPATCH_OUT:'🚚', DISPATCH_IN:'📬',
      TRANSFER_OUT:'➡️', TRANSFER_IN:'⬅️', RECEIVE_LOT:'📥'
    };
    var labelMap = {
      ADJUST:'ປັບ Stock', STOCK_COUNT:'ນັບ Stock', PO_RECEIVE:'ຮັບສິນຄ້າ PO',
      SR_FULFILL:'Fulfill SR', SR_RECEIVE:'ຮັບຈາກ SR', USAGE:'ລາຍງານໃຊ້',
      DISPATCH_OUT:'Dispatch ຈ່າຍ', DISPATCH_IN:'Dispatch ຮັບ',
      TRANSFER_OUT:'ໂອນ (ຈ່າຍ)', TRANSFER_IN:'ໂອນ (ຮັບ)', RECEIVE_LOT:'ຮັບ Lot'
    };
    var colorMap = {
      ADJUST:'slate',STOCK_COUNT:'slate',PO_RECEIVE:'green',SR_FULFILL:'blue',
      SR_RECEIVE:'green',USAGE:'orange',DISPATCH_OUT:'red',DISPATCH_IN:'green',
      TRANSFER_OUT:'purple',TRANSFER_IN:'purple',RECEIVE_LOT:'green'
    };
    var pname = prodName(m.productId);
    var qty   = Number(m.qty||0);
    events.push({
      ts: m.date||m.createdAt, by: m.by||'—', type: m.type||'MOVEMENT',
      icon: typeMap[m.type]||'📦',
      color: colorMap[m.type]||'slate',
      title: (labelMap[m.type]||m.type) + ': ' + pname,
      detail: (qty>0?'+':'')+qty+' · '+locName(m.locId)+(m.note?' · '+m.note:''),
      tag:'STOCK'
    });
  });

  // ── 3. SR Events ─────────────────────────────────────────
  ((STATE.data.srs||[])||[]).forEach(function(sr){
    var rows = [
      {d:sr.createdAt||sr.date, who:sr.requestedBy, act:'ສ້າງ SR', ic:'📋', col:'amber'},
      {d:sr.approvedAt,         who:sr.approvedBy,  act:'Approve SR', ic:'✅', col:'green'},
      {d:sr.fulfilledAt,        who:sr.fulfilledBy||sr.approvedBy, act:'Fulfill SR', ic:'📦', col:'blue'},
      {d:sr.rejectedAt,         who:sr.rejectedBy,  act:'Reject SR', ic:'❌', col:'red'},
    ];
    rows.forEach(function(r){
      if (!r.d || !inRange(r.d)) return;
      var items = (sr.items||[]);
      var detail = items.length+' ລາຍການ · '+locName(sr.siteId);
      events.push({ts:r.d, by:r.who||'—', type:'SR',
        icon:r.ic, color:r.col,
        title: r.act+' ('+sr.id+')',
        detail: detail, tag:'SR'});
    });
  });

  // ── 4. PR Events ─────────────────────────────────────────
  ((STATE.data.prs||[])||[]).forEach(function(pr){
    var rows = [
      {d:pr.createdAt||pr.date, who:pr.requestedBy, act:'ສ້າງ PR', ic:'📝', col:'amber'},
      {d:pr.approvedAt,         who:pr.approvedBy,  act:'Approve PR', ic:'✅', col:'green'},
      {d:pr.rejectedAt,         who:pr.rejectedBy,  act:'Reject PR',  ic:'❌', col:'red'},
    ];
    rows.forEach(function(r){
      if (!r.d || !inRange(r.d)) return;
      events.push({ts:r.d, by:r.who||'—', type:'PR',
        icon:r.ic, color:r.col,
        title: r.act+' ('+pr.id+')',
        detail: fmtNum(pr.totalCost||0)+' ກີບ', tag:'PR'});
    });
  });

  // ── 5. PO Receive ─────────────────────────────────────────
  ((STATE.data.pos||[])||[]).forEach(function(po){
    if (po.receivedDate && inRange(po.receivedDate)) {
      events.push({ts:po.receivedDate, by:po.receivedBy||po.createdBy||'—', type:'PO',
        icon:'📥', color:'green',
        title: 'ຮັບສິນຄ້າ PO ('+po.id+')',
        detail: fmtNum(po.totalCost||0)+' ກີບ', tag:'PO'});
    }
  });

  // ── 6. Usage Reports ─────────────────────────────────────
  ((STATE.data.usages||[])||[]).filter(function(u){ return inRange(u.date||u.createdAt); }).forEach(function(u){
    var items = Array.isArray(u.items)?u.items:(typeof u.items==='string'?JSON.parse(u.items||'[]'):[]);
    events.push({ts:u.date||u.createdAt, by:u.reportedBy||'—', type:'USAGE',
      icon:'🧴', color:'orange',
      title: 'ລາຍງານໃຊ້ · '+locName(u.siteId),
      detail: items.length+' ລາຍການ · ລວມ '+fmtNum(u.totalCost||0)+' ກີບ', tag:'USAGE'});
  });

  // ── 7. Maintenance ────────────────────────────────────────
  ((STATE.data.maintenance||[])||[]).forEach(function(m){
    var rows=[
      {d:m.createdAt||m.date, who:m.reportedBy, act:'ແຈ້ງ MR', ic:'🔧', col:'amber'},
      {d:m.approvedAt,        who:m.approvedBy, act:'Approve MR', ic:'✅', col:'green'},
      {d:m.completedAt,       who:m.completedBy||m.assignedTo, act:'Complete MR', ic:'🎉', col:'blue'},
    ];
    rows.forEach(function(r){
      if (!r.d||!inRange(r.d)) return;
      events.push({ts:r.d, by:r.who||'—', type:'MR',
        icon:r.ic, color:r.col,
        title:r.act+' · '+(m.assetName||m.assetId||'Asset'),
        detail:locName(m.locId)+(m.cost?' · '+fmtNum(m.cost)+' ກີບ':''), tag:'MAINT'});
    });
  });

  // ── 8. Dispatch ───────────────────────────────────────────
  ((STATE.data.dispatches||[])||[]).forEach(function(d){
    if (d.approvedAt && inRange(d.approvedAt)) {
      events.push({ts:d.approvedAt, by:d.approvedBy||d.by||'—', type:'DISPATCH',
        icon:'🚚', color:'blue',
        title:'Approve Dispatch · '+locName(d.fromLocId)+' → '+locName(d.toLocId),
        detail:(d.items||[]).length+' ລາຍການ', tag:'DISPATCH'});
    }
    if (d.createdAt && inRange(d.createdAt)) {
      events.push({ts:d.createdAt, by:d.by||'—', type:'DISPATCH',
        icon:'📤', color:'slate',
        title:'ສ້າງ Dispatch · '+locName(d.fromLocId)+' → '+locName(d.toLocId),
        detail:(d.items||[]).length+' ລາຍການ', tag:'DISPATCH'});
    }
  });

  // ── Filter by user / type ─────────────────────────────────
  if (userFilter !== 'ALL') {
    events = events.filter(function(e){ return e.by===userFilter; });
  }
  if (typeFilter !== 'ALL') {
    events = events.filter(function(e){ return e.tag===typeFilter; });
  }

  // ── Sort by timestamp desc ────────────────────────────────
  events.sort(function(a,b){ return String(b.ts).localeCompare(String(a.ts)); });
  return events.slice(0, limit);
}

// ── Colour helpers ────────────────────────────────────────
var _actColors = {
  indigo :{bg:'bg-indigo-100', text:'text-indigo-700', dot:'bg-indigo-500', badge:'bg-indigo-50 border-indigo-200 text-indigo-700'},
  green  :{bg:'bg-emerald-100',text:'text-emerald-700',dot:'bg-emerald-500',badge:'bg-emerald-50 border-emerald-200 text-emerald-700'},
  amber  :{bg:'bg-amber-100',  text:'text-amber-700',  dot:'bg-amber-500',  badge:'bg-amber-50 border-amber-200 text-amber-700'},
  red    :{bg:'bg-red-100',    text:'text-red-700',    dot:'bg-red-500',    badge:'bg-red-50 border-red-200 text-red-700'},

function _actTagColor(tag) {
  return {LOGIN:'indigo',STOCK:'slate',SR:'amber',PR:'amber',PO:'green',
    USAGE:'orange',MAINT:'blue',DISPATCH:'blue'}[tag]||'slate';
}

// ── Build HTML for activity feed ──────────────────────────
function _buildActivityFeed(opts) {
  var events = _collectActivity(opts);
  var compact = opts && opts.compact;
  if (!events.length) {
    return '<div class="py-10 text-center text-slate-400">' +
      '<div class="text-4xl mb-2">📭</div>' +

// ── Get all unique users who have activity ────────────────
function _actGetUsers() {
  var users = new Set();
  ((STATE.data.movements||[])||[]).forEach(function(m){ if(m.by) users.add(m.by); });
  ((STATE.data.srs||[])||[]).forEach(function(sr){ if(sr.requestedBy) users.add(sr.requestedBy); if(sr.approvedBy) users.add(sr.approvedBy); });
  ((STATE.data.prs||[])||[]).forEach(function(pr){ if(pr.requestedBy) users.add(pr.requestedBy); if(pr.approvedBy) users.add(pr.approvedBy); });
  ((STATE.data.usages||[])||[]).forEach(function(u){ if(u.reportedBy) users.add(u.reportedBy); });
  ((STATE.data.maintenance||[])||[]).forEach(function(m){ if(m.reportedBy) users.add(m.reportedBy); });
  if (STATE.user && STATE.user.username) users.add(STATE.user.username);
  return Array.from(users).filter(Boolean);
}

// ── Collect events with optional tag or tags filter ───────
function _collectActivityTagged(opts) {
  var all = _collectActivity(opts);
  if (opts.tag)  return all.filter(function(e){ return e.tag===opts.tag; });
  if (opts.tags) return all.filter(function(e){ return opts.tags.indexOf(e.tag)>=0; });
  return all;
}

// ── Build timeline HTML for dashboard widget ──────────────
function _buildDashTimeline(events) {
  if (!events.length) {
    return '<div class="py-12 text-center text-slate-400">'+
      '<div class="text-4xl mb-2">📭</div>'+

      '<div class="text-xs">ໃນຊ່ວງເວລາທີ່ເລືອກ</div></div>';
  }

  // Group by date
  var today2 = new Date().toISOString().slice(0,10);
  var grouped = {}, dayOrder = [];
  events.forEach(function(e){
    var day = String(e.ts||'').slice(0,10) || 'unknown';
    if (!grouped[day]) { grouped[day]=[]; dayOrder.push(day); }
    grouped[day].push(e);
  });

  var colorMap = {
    indigo:'#6366f1', green:'#10b981', amber:'#f59e0b',
    red:'#ef4444', blue:'#3b82f6', orange:'#f97316',
    purple:'#8b5cf6', slate:'#94a3b8'
  };
  var bgMap = {
    indigo:'#eef2ff', green:'#ecfdf5', amber:'#fffbeb',
    red:'#fef2f2', blue:'#eff6ff', orange:'#fff7ed',
    purple:'#f5f3ff', slate:'#f8fafc'
  };
  var tagBadge = {
    LOGIN:'#6366f1',SR:'#f59e0b',PR:'#f59e0b',PO:'#10b981',
    STOCK:'#94a3b8',USAGE:'#f97316',MAINT:'#3b82f6',DISPATCH:'#3b82f6'
  };

  return dayOrder.map(function(day){
    var dayLbl = day === today2
      ? '<span style="color:#6366f1;font-weight:900">📅 ວັນນີ້</span> <span style="color:#94a3b8;font-size:11px">'+day+'</span>'
      : '<span style="color:#64748b;font-weight:800">📅 '+day+'</span>';
    var items = grouped[day];

    var rows = items.map(function(e, i){
      var col   = colorMap[e.color]  || '#94a3b8';
      var bg    = bgMap[e.color]     || '#f8fafc';
      var tbg   = tagBadge[e.tag]    || '#94a3b8';
      var time  = String(e.ts||'').slice(11,16) || String(e.ts||'').slice(0,10);
      var isLast= i === items.length-1;

      return '<div style="display:flex;gap:12px;position:relative;padding:10px 16px 10px 0;'+
        (!isLast ? 'border-bottom:1px solid #f1f5f9' : '')+'">' +
        // Timeline spine
        '<div style="display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0;padding-left:16px">'+
        '<div style="width:32px;height:32px;border-radius:10px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:15px;border:1.5px solid '+col+'22;flex-shrink:0">'+e.icon+'</div>'+
        (!isLast ? '<div style="width:2px;flex:1;min-height:8px;background:linear-gradient(to bottom,'+col+'44,transparent);margin-top:4px"></div>' : '')+
        '</div>'+
        // Content
        '<div style="flex:1;min-width:0;padding-top:4px">'+
        '<div style="display:flex;align-items:flex-start;gap:8px;justify-content:space-between">'+
        '<span style="font-size:13px;font-weight:700;color:#1e293b;line-height:1.3">'+e.title+'</span>'+
        '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'+
        '<span style="font-size:10px;color:#94a3b8">'+time+'</span>'+
        '<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;color:#fff;background:'+tbg+'">'+e.tag+'</span>'+
        '</div></div>'+
        '<div style="display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap">'+
        // Avatar + name
        '<div style="display:flex;align-items:center;gap:4px;background:#f1f5f9;border-radius:20px;padding:2px 8px 2px 4px">'+
        '<div style="width:16px;height:16px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#3b82f6);color:#fff;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center">'+
        String(e.by||'?')[0].toUpperCase()+
        '</div>'+
        '<span style="font-size:11px;font-weight:600;color:#475569">'+e.by+'</span>'+
        '</div>'+
        (e.detail ? '<span style="font-size:11px;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px" title="'+e.detail+'">'+e.detail+'</span>' : '')+
        '</div></div></div>';
    }).join('');

    return '<div style="margin-bottom:0">'+
      '<div style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:#f8fafc;border-bottom:1px solid #e2e8f0">'+
      dayLbl+
      '<div style="flex:1;height:1px;background:#e2e8f0"></div>'+
      '<span style="font-size:10px;color:#94a3b8;font-weight:700">'+items.length+' ເຫດການ</span>'+
      '</div>'+
      rows+
      '</div>';
  }).join('');
}

// ── Widget interaction helpers ────────────────────────────
function _dashActRefresh() {
  var w = document.getElementById('dashActWidget');
  if (w) w.remove();
  _dashAct.limit = 12;
  _buildDashActivityWidget();
}
function _dashActSetType(t) {
  _dashAct.type = t;
  _dashActRefresh();
}
function _dashActQuick(df, dt) {
  _dashAct.dateFrom = df;
  _dashAct.dateTo   = dt;
  _dashActRefresh();
}
function _dashActMore() {
  _dashAct.limit += 20;
  _dashActRefresh();
}

// ════════════════════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════════════════════
function renderDashboard() {
  // Destroy any existing charts to prevent canvas reuse errors
  ['_dashChartBranch','_dashChartCat','_dashChartUsage','_dashChartTop'].forEach(function(k){
    if (window[k]) { try { window[k].destroy(); } catch(e){} window[k]=null; }
  });

  callServer('getDashboardData', [STATE.user.id, STATE.user.role, STATE.user.branchIds, STATE.user.siteIds], function(d) {
    if (!d.success) return;
    STATE.data.dashboard = d;
    var role = STATE.user.role;

    // ── Nav badges ───────────────────────────────────────
    var _lsc = d.lowStockCount||0;
    if (_lsc>0) {
      document.getElementById('lowStockAlert').classList.remove('hidden');
      document.getElementById('lowStockAlertCount').textContent=_lsc;
      var nb=document.getElementById('lowStockNavBadge');
      if(nb){nb.textContent=_lsc;nb.classList.remove('hidden');}
    }
    if(d.pendingPRCount>0){var pb=document.getElementById('prBadge');if(pb){pb.textContent=d.pendingPRCount;pb.classList.remove('hidden');}}
    if(d.pendingPOCount>0){var ob=document.getElementById('poBadge');if(ob){ob.textContent=d.pendingPOCount;ob.classList.remove('hidden');}}

    // ── Compute chart data from MOCK ──────────────────────
    var branches  = STATE.data.branches||(STATE.data.branches||[]);
    var products  = STATE.data.products||(STATE.data.products||[]);
    var cats      = STATE.data.categories||(STATE.data.categories||[]);

    // Branch stock value
    var branchVals = branches.map(function(b){
      return {name:b.name.replace('Vientiane ','VTE '), val:products.reduce(function(s,p){return s+(((STATE.data.stock||[])[p.id]||{})[b.id]||0)*p.costPrice;},0)};
    });
    // CW value
    var cwVal = products.reduce(function(s,p){return s+(((STATE.data.stock||[])[p.id]||{})['CW001']||0)*p.costPrice;},0);

    // Category breakdown (all locations)
    var catVals = cats.map(function(c){
      var v = products.filter(function(p){return p.categoryId===c.id;}).reduce(function(s,p){
        var total=0;
        Object.keys((STATE.data.stock||[])[p.id]||{}).forEach(function(loc){total+=(((STATE.data.stock||[])[p.id]||{})[loc]||0)*p.costPrice;});
        return s+total;
      },0);
      return {name:c.nameLao||c.name, val:v};
    }).filter(function(x){return x.val>0;});

    // Top 5 most-used products
    var usageMap = {};
    ((STATE.data.usages||[])||[]).forEach(function(u){
      (u.items||[]).forEach(function(it){usageMap[it.productId]=(usageMap[it.productId]||0)+it.qty;});
    });
    var topProds = Object.keys(usageMap).map(function(pid){
      var p=products.find(function(x){return x.id===pid;})||{name:pid,unit:''};
      return {name:p.name.length>14?p.name.slice(0,13)+'…':p.name, qty:usageMap[pid]};
    }).sort(function(a,b){return b.qty-a.qty;}).slice(0,5);

    // Usage trend: last 7 usage reports
    var sortedU = ((STATE.data.usages||[])||[]).slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    var trendLabels = sortedU.slice(-7).map(function(u){return (u.date||'').slice(5);});
    var trendVals   = sortedU.slice(-7).map(function(u){return (u.items||[]).reduce(function(s,it){return s+it.qty;},0);});

    // Pending counts
    var pendingSR = (STATE.data.srs||[]).filter(function(r){return r.status==='PENDING';}).length;
    var pendingMR = ((STATE.data.maintenance||[])||[]).filter(function(r){return r.status==='PENDING';}).length;
    var pendingBD = ((STATE.data.dispatches||[])||[]).filter(function(r){return r.status==='PENDING';}).length;
    var expiredLots  = ((STATE.data.lots||[])||[]).filter(function(l){return new Date(l.expiryDate)<new Date();});
    var expiringLots = ((STATE.data.lots||[])||[]).filter(function(l){var d2=Math.floor((new Date(l.expiryDate)-new Date())/86400000);return d2>=0&&d2<=30;});
    var totalPending = pendingSR + pendingMR + pendingBD + (d.pendingPRCount||0);

    // ── KPI cards (same for ALL roles) ───────────────────
    var kRow1 = [
      {icon:'💰',lo:'ມູນຄ່າທັງໝົດ',        val:'LAK '+fmtNum(d.totalStockValue||0), sub:'ທຸກສະຖານທີ',       bg:'bg-gradient-to-br from-blue-600 to-blue-800',    click:''},
      {icon:'🏛️',lo:'ຄັງບໍລິສັດ',           val:'LAK '+fmtNum(cwVal),               sub:'Company Warehouse', bg:'bg-gradient-to-br from-purple-600 to-purple-900', click:"selectLocation('CW001','COMPANY','Company Warehouse')"},
      {icon:'⚠️',lo:'ສິນຄ້າໃກ້ໝົດ',         val:_lsc,                               sub:'Low / Out of stock',bg:_lsc>0?'bg-gradient-to-br from-red-500 to-red-700':'bg-gradient-to-br from-emerald-500 to-emerald-700', click:"showPage('lowstock')"},
      {icon:'📋',lo:'ໃບເບີກ Pending',        val:pendingSR,                          sub:'Stock Requests',    bg:pendingSR>0?'bg-gradient-to-br from-amber-500 to-amber-700':'bg-gradient-to-br from-slate-500 to-slate-700', click:"showPage('branches')"},
      {icon:'📝',lo:'PR ລໍຖ້າ',              val:d.pendingPRCount||0,                sub:'Awaiting approval', bg:(d.pendingPRCount>0)?'bg-gradient-to-br from-orange-500 to-orange-700':'bg-gradient-to-br from-slate-500 to-slate-700', click:"showPage('pr')"},
      {icon:'🛒',lo:'PO ລໍຖ້າ',              val:d.pendingPOCount||0,                sub:'Awaiting delivery', bg:(d.pendingPOCount>0)?'bg-gradient-to-br from-indigo-500 to-indigo-700':'bg-gradient-to-br from-slate-500 to-slate-700', click:"showPage('po')"},
      {icon:'🔧',lo:'ແຈ້ງສ້ອມ Pending',      val:pendingMR,                          sub:'Maintenance',       bg:pendingMR>0?'bg-gradient-to-br from-rose-500 to-rose-700':'bg-gradient-to-br from-slate-500 to-slate-700', click:"showPage('maintenance')"},
      {icon:'📤',lo:'Dispatch ລໍຖ້າ',        val:pendingBD,                          sub:'Branch Dispatch',   bg:pendingBD>0?'bg-gradient-to-br from-teal-500 to-teal-700':'bg-gradient-to-br from-slate-500 to-slate-700', click:"selectLocation('CW001','COMPANY','Company Warehouse')"},
    ];

    function kpiCard(k) {
      return '<div class="rounded-2xl p-4 text-white shadow-md '+(k.click?'cursor-pointer hover:opacity-90 active:scale-95 transition-transform':'')+' '+k.bg+'" '+(k.click?'onclick="'+k.click+'"':'')+' >' +
        '<div class="flex items-start justify-between mb-2"><span class="text-white/70 text-xs font-semibold leading-tight">'+k.lo+'</span><span class="text-2xl leading-none">'+k.icon+'</span></div>' +
        '<div class="text-xl font-black leading-tight">'+k.val+'</div>' +
        '<div class="text-white/60 text-[11px] mt-1">'+k.sub+'</div>'+
        '</div>';
    }

    // ── Quick Action: Pending Approvals only ──────────────
    var totalPendingLabel = totalPending > 0
      ? ' <span class="bg-red-500 text-white text-xs font-black px-2 py-0.5 rounded-full ml-1">'+totalPending+'</span>'
      : '';

    // ── Alerts bar ────────────────────────────────────────
    var alerts = [];
    if (expiredLots.length)  alerts.push('<span class="flex items-center gap-1.5 bg-red-100 text-red-700 border border-red-200 rounded-xl px-3 py-1.5 text-xs font-bold cursor-pointer hover:bg-red-200" onclick="showPage(\'lots\')">⛔ '+expiredLots.length+' Lot ໝົດອາຍຸ</span>');
    if (expiringLots.length) alerts.push('<span class="flex items-center gap-1.5 bg-amber-50 text-amber-700 border border-amber-200 rounded-xl px-3 py-1.5 text-xs font-bold cursor-pointer hover:bg-amber-100" onclick="showPage(\'lots\')">⚠️ '+expiringLots.length+' Lot ໃກ້ໝົດ (30d)</span>');
    if (pendingSR>0)          alerts.push('<span class="flex items-center gap-1.5 bg-amber-50 text-amber-700 border border-amber-200 rounded-xl px-3 py-1.5 text-xs font-bold cursor-pointer hover:bg-amber-100" onclick="showPage(\'branches\')">📋 '+pendingSR+' SR ລໍຖ້າ</span>');
    if (pendingMR>0)          alerts.push('<span class="flex items-center gap-1.5 bg-rose-50 text-rose-700 border border-rose-200 rounded-xl px-3 py-1.5 text-xs font-bold cursor-pointer hover:bg-rose-100" onclick="showPage(\'maintenance\')">🔧 '+pendingMR+' MR Pending</span>');
    if (pendingBD>0)          alerts.push('<span class="flex items-center gap-1.5 bg-teal-50 text-teal-700 border border-teal-200 rounded-xl px-3 py-1.5 text-xs font-bold cursor-pointer hover:bg-teal-100" onclick="selectLocation(\'CW001\',\'COMPANY\',\'Company Warehouse\')">📤 '+pendingBD+' Dispatch ລໍຖ້າ</span>');

    // ── Low stock list ────────────────────────────────────
    var lowListHTML = '';

      var top6 = d.lowStockItems.slice(0,6);

        var pct = Math.min(100, Math.round((item.qty/(item.reorderPoint||1))*100));

          : '<span class="text-[10px] font-bold text-amber-600 bg-amber-50 border border-amber-200 px-1.5 py-0.5 rounded-full flex-shrink-0">⚠️</span>';
        return '<div class="flex items-center gap-2 py-2 border-b border-slate-50 last:border-0">' +
          '<div class="flex-1 min-w-0">' +
          '<div class="flex items-center gap-1.5 leading-tight"><span class="font-semibold text-slate-800 text-xs truncate">'+item.name+'</span>'+badge2+'</div>' +

          '<div class="flex items-center gap-2 mt-1"><div class="flex-1 bg-slate-100 rounded-full h-1"><div class="'+barCls+' h-1 rounded-full" style="width:'+pct+'%"></div></div>' +
          '<span class="text-[10px] text-slate-500 flex-shrink-0 font-bold">'+item.qty+'/'+item.reorderPoint+'</span></div>' +
          '</div></div>';
      }).join('');
      if (d.lowStockItems.length>6) {
        lowListHTML += '<div class="pt-2 text-center"><button onclick="showPage(\'lowstock\')" class="text-xs text-red-600 hover:underline font-semibold">ເບິ່ງທັງໝົດ ('+d.lowStockItems.length+') →</button></div>';
      }

      lowListHTML = '<div class="py-6 text-center text-emerald-600 text-sm font-semibold">✅ Stock ທຸກລາຍການ OK</div>';
    }

    // ── Recent SRs ────────────────────────────────────────
    var recentSRs = (STATE.data.srs||[]).slice(0,6);
    var srListHTML = recentSRs.length ? recentSRs.map(function(r){
      var site = (STATE.data.sites||(STATE.data.sites||[])).find(function(s){return s.id===r.siteId;})||{name:r.siteId};
      var sc = r.status==='PENDING'?'bg-amber-100 text-amber-700':r.status==='APPROVED'?'bg-emerald-100 text-emerald-700':r.status==='FULFILLED'?'bg-blue-100 text-blue-700':'bg-slate-100 text-slate-500';
      return '<div class="flex items-center gap-2 py-2 border-b border-slate-50 last:border-0">' +
        '<div class="flex-1 min-w-0">' +
        '<div class="font-semibold text-slate-800 text-xs">'+r.srNumber+'</div>' +
        '<div class="text-[10px] text-slate-400 truncate">📍 '+site.name+' · '+(r.items||[]).length+' ລາຍການ</div>' +
        '</div>' +
        '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full flex-shrink-0 '+sc+'">'+r.status+'</span>' +
        '</div>';
    }).join('') : '<div class="py-4 text-center text-slate-400 text-xs">ຍັງບໍ່ມີ SR</div>';

    // ── Render HTML shell ─────────────────────────────────
    document.getElementById('pageContent').innerHTML =
      // Greeting
      '<div class="flex items-center justify-between mb-5">' +
      '<div>' +
      '<h2 class="text-xl font-black text-slate-800">👋 ສະບາຍດີ, '+(STATE.user.fullNameLao||STATE.user.fullName||STATE.user.username)+'</h2>' +
      '<div class="text-xs text-slate-400 mt-0.5">'+new Date().toLocaleDateString('lo-LA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+' · '+(['ADMIN','MANAGER','SITE_STAFF'][['ADMIN','MANAGER','SITE_STAFF'].indexOf(role)]||role)+'</div>' +
      '</div>' +
      '<button onclick="renderDashboard()" class="btn btn-secondary text-xs px-3 py-1.5 flex items-center gap-1.5">🔄 Refresh</button>' +
      '</div>' +

      // Alerts row
      (alerts.length ? '<div class="flex flex-wrap gap-2 mb-4">'+alerts.join('')+'</div>' : '') +

      // KPI row
      '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-5">' +
      kRow1.map(kpiCard).join('') +
      '</div>' +



      // Charts row
      '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">' +
      // Branch stock value bar
      '<div class="card p-4">' +
      '<div class="flex items-center justify-between mb-3"><span class="text-sm font-bold text-slate-700">📊 Stock Value ຕາມສາຂາ</span><span class="text-xs text-slate-400">LAK</span></div>' +
      '<div style="height:180px"><canvas id="dashChartBranch"></canvas></div>' +
      '</div>' +
      // Category donut
      '<div class="card p-4">' +
      '<div class="flex items-center justify-between mb-3"><span class="text-sm font-bold text-slate-700">🥧 ສັດສ່ວນຕາມ Category</span><span class="text-xs text-slate-400">ມູນຄ່າ</span></div>' +
      '<div class="flex items-center gap-4">' +
      '<div style="height:160px;width:160px;flex-shrink:0"><canvas id="dashChartCat"></canvas></div>' +
      '<div id="dashCatLegend" class="flex-1 min-w-0 space-y-1 text-xs"></div>' +
      '</div></div>' +
      '</div>' +

      '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">' +
      // Usage trend line
      '<div class="card p-4">' +
      '<div class="flex items-center justify-between mb-3"><span class="text-sm font-bold text-slate-700">📈 ປະຫວັດການໃຊ້ (7 ຄັ້ງຫຼ້າສຸດ)</span></div>' +
      '<div style="height:160px"><canvas id="dashChartUsage"></canvas></div>' +
      '</div>' +
      // Top 5 products used
      '<div class="card p-4">' +
      '<div class="flex items-center justify-between mb-3"><span class="text-sm font-bold text-slate-700">📦 Top 5 ສິນຄ້າທີ່ໃຊ້ຫຼາຍ</span></div>' +
      '<div style="height:160px"><canvas id="dashChartTop"></canvas></div>' +
      '</div>' +
      '</div>' +

      // Bottom: Low stock + Recent SRs
      '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">' +
      // Low stock
      '<div class="card overflow-hidden">' +
      '<div class="flex items-center gap-2 px-4 py-3 bg-red-50 border-b border-red-100">' +
      '<span class="text-sm font-bold text-red-700">⚠️ ສິນຄ້າໃກ້ໝົດ / Low Stock</span>' +
      '<span class="ml-1 bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">'+_lsc+'</span>' +
      '<button onclick="showPage(\'lowstock\')" class="ml-auto text-xs text-red-600 hover:underline font-semibold">ທັງໝົດ →</button>' +
      '</div>' +

      '<div class="flex items-center gap-2 px-4 py-3 bg-amber-50 border-b border-amber-100">' +
      '<span class="text-sm font-bold text-amber-700">📋 ໃບເບີກຫຼ້າສຸດ</span>' +
      '<button onclick="showPage(\'branches\')" class="ml-auto text-xs text-amber-700 hover:underline font-semibold">ທັງໝົດ →</button>' +

    setTimeout(function() {

        window._dashChartBranch = new Chart(ctxB.getContext('2d'), {

          data: {
            labels: branchVals.map(function(b){return b.name;}),
            datasets:[{
