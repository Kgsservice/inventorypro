function _renderSRCard(r, canApprove) {
  var site = STATE.data.sites.find(function(s){return s.id===r.siteId;})||{};
  var branch = STATE.data.branches.find(function(b){return b.id===r.branchId;})||{};
  var statusColors = {
    PENDING:'border-amber-300 bg-amber-50/30',
    APPROVED:'border-emerald-300 bg-emerald-50/30',
    REJECTED:'border-red-300 bg-red-50/30',
    FULFILLED:'border-blue-300 bg-blue-50/30'
  };
  var borderCls = statusColors[r.status]||'border-slate-200';

  var itemsSummary = r.items.map(function(i){
    var p = (STATE.data.products||[]).find(function(x){return x.id===i.productId;})||{};
    var approved = (r.status==='APPROVED'||r.status==='FULFILLED') ? ' <span class="text-emerald-600">(Approved: '+i.qtyApproved+')</span>' : '';
    return '<div class="flex justify-between items-center py-1.5 border-b border-slate-100 last:border-0">' +
      '<div class="text-sm text-slate-700"><span class="font-mono text-xs text-slate-400">'+p.sku+'</span> '+p.name+'</div>' +
      '<div class="text-sm font-semibold text-slate-700">'+i.qtyRequested+' '+i.unit+approved+'</div></div>';
  }).join('');

  var actions = '';
  if (r.status === 'PENDING') {
    if (canApprove) {
      actions += '<button onclick="openApproveModal(\''+r.id+'\')" class="btn btn-success text-xs">✅ Approve</button>' +
        '<button onclick="openRejectModal(\''+r.id+'\')" class="btn btn-danger text-xs">✖ Reject</button>';
    }
    actions += '<button onclick="openSRForm(\''+r.siteId+'\',\''+r.id+'\')" class="btn btn-secondary text-xs">✏️ Edit</button>';
  } else if (r.status === 'APPROVED' && canApprove) {
    actions += '<button onclick="fulfillSR(\''+r.id+'\')" class="btn btn-primary text-xs">📦 Mark Fulfilled → Update Stock</button>';
  }
  if (r.status === 'REJECTED' || r.status === 'FULFILLED') {
    actions += '<button onclick="openSRForm(\''+r.siteId+'\',null)" class="btn btn-secondary text-xs">+ New Similar</button>';
  }

  return '<div class="card mb-3 border-2 '+borderCls+'">' +
    '<div class="px-4 py-3 flex items-start justify-between gap-4">' +
    '<div class="flex-1">' +
    '<div class="flex items-center gap-3 mb-1">' +
    '<span class="mono text-xs text-slate-500">'+r.srNumber+'</span>' +
    badge(r.status) +
    '</div>' +
    '<div class="flex flex-wrap gap-4 text-xs text-slate-500">' +
    '<span>📍 '+site.name+'</span><span>🏢 '+branch.name+'</span>' +
    '<span>📅 Required: <strong>'+r.requiredDate+'</strong></span>' +
    '<span>👤 '+r.requestedBy+'</span>' +
    (r.status==='REJECTED'?'<span class="text-red-600">Reason: '+r.rejectedReason+'</span>':'') +
    (r.status==='FULFILLED'?'<span class="text-blue-600">✅ Fulfilled: '+r.fulfilledAt+'</span>':'') +
    '</div>' +
    (r.note?'<div class="text-xs text-slate-500 mt-1 italic">"'+r.note+'"</div>':'') +
    '</div>' +
    '<div class="flex flex-wrap gap-2 flex-shrink-0">'+actions+'</div>' +
    '</div>' +
    '<div class="border-t border-slate-100 px-4 py-2">' +
    itemsSummary +
    '</div>' +
    '</div>';
}

    '<button onclick="closeModal()" class="btn btn-secondary">Cancel</button></div></div>', true);

function submitApprove(srId, count) {
  var approvals = [];
  for (var i=0; i<count; i++) {
    var pid = (document.getElementById('approve_pid_'+i)||{}).value;
    var qty = Number((document.getElementById('approve_qty_'+i)||{}).value||0);
    if (pid) approvals.push({productId:pid, qtyApproved:qty});
  }
  callServer('approveSR', [srId, approvals], function(res){
    if (res.success) {
      var sr = (STATE.data.srs||[]).find(function(r){return r.id===srId;})||{};
      var added = (sr.items||[]).filter(function(it){return Number(it.qtyApproved)>0;})
        .map(function(it){
          var p = STATE.data.products.find(function(x){return x.id===it.productId;})||{name:it.productId,unit:''};
          return p.name+' +'+it.qtyApproved+' '+p.unit;
        }).join(', ');
      showToast('✅ ອະນຸມັດແລ້ວ — Stock ເພີ່ມ: '+added, 'success');
      closeModal();
      _refreshApproveTabRealtime();
    } else showToast('Error', 'error');
  });
}

function openRejectModal(srId) {
  var sr = (STATE.data.srs||[]).find(function(r){return r.id===srId;})||{};
  openModal('❌ ປະຕິເສດໃບເບີກ — '+sr.srNumber,
    '<div class="space-y-3">' +
    '<div class="bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-700">ກະລຸນາໃສ່ເຫດຜົນ (ຈະໃຊ້ "ປະຕິເສດ" ຖ້າວ່າງ)</div>' +
    '<textarea id="reject_reason" class="input h-20" placeholder="ເຫດຜົນ... (optional)"></textarea>' +
    '<div class="flex gap-2">' +
    '<button type="button" onclick="submitReject(\''+srId+'\')" class="btn btn-danger flex-1">❌ ຢືນຢັນປະຕິເສດ</button>' +
    '<button type="button" onclick="closeModal()" class="btn btn-secondary">ຍົກເລີກ</button></div></div>');

function submitReject(srId) {
  var reason = (document.getElementById('reject_reason')||{}).value||'';
  if (!reason.trim()) reason = 'ປະຕິເສດ';
  callServer('rejectSR', [srId, reason], function(res){

      showToast('❌ ປະຕິເສດໃບເບີກແລ້ວ', 'warn');
      closeModal();

// ── Realtime refresh — updates approve tab + all visible SR sections ──
function _refreshApproveTabRealtime() {
  var branchId = _activeBranch;

  // ✅ Always reload site stock so Tab & Modal show updated qty after SR approval
  if (window._currentSiteId) {
    _loadSiteStock(window._currentSiteId);
  }
  // ✅ If site stock modal open — re-render modal rows from fresh (STATE.data.stock||[])
  if (window._siteStockId && document.getElementById('siteStockChips')) {
    _refreshSiteStockContent(window._siteStockId);
  }
  // ✅ Reload visible branch stock sections
  if (branchId && document.getElementById('section_'+branchId)) {
    _renderStockSection(branchId, _can('inventory.branch.manage'), false);
  }

  // 1. Rebuild approve tab content in-place (fastest — no full page rebuild)
  if (_srTab === 'approve' && branchId) {
    _renderBranchApproveTab(branchId);
    renderBranches();
    return;
  }

  // 2. If on stock tab — patch branch SR tbody in-place, no flicker
  if (_srTab === 'stock' && branchId) {
    _patchBranchSRTbody(branchId);
  }

  // 3. If site stock modal is open — patch its SR section
  _patchSiteStockSRIfOpen();

  // 4. Always sync tab badge counts via full re-render
  _srTab = 'approve';
  renderBranches();
}

function _patchBranchSRTbody(branchId) {
  var tbody = document.getElementById('branchSRTbody_'+branchId);
  if (!tbody) return;
  tbody.innerHTML = _buildBranchSRPJRows(branchId, 8);
}

// Shared helper — builds merged SR+PJ rows for branch lists
function _buildBranchSRPJRows(branchId, limit) {
  var today = new Date().toISOString().slice(0,10);
  var statusMap = {
    PENDING:   {cls:'text-amber-600 bg-amber-50 border border-amber-200',     label:'ລໍຖ້າ'},
    APPROVED:  {cls:'text-emerald-600 bg-emerald-50 border border-emerald-200', label:'ອະນຸມັດ'},
    REJECTED:  {cls:'text-red-600 bg-red-50 border border-red-200',           label:'ປະຕິເສດ'},
    FULFILLED: {cls:'text-blue-600 bg-blue-50 border border-blue-200',        label:'ສຳເລັດ'},
    DRAFT:     {cls:'text-slate-500 bg-slate-50 border border-slate-200',     label:'Draft'}
  };
  var rows = [];
  ((STATE.data.srs||[])||[]).filter(function(r){ return r.branchId===branchId; }).forEach(function(r){
    rows.push({type:'SR', id:r.id, number:r.srNumber, status:r.status,
      latestDate:r.approvedAt||r.rejectedAt||r.updatedAt||r.requestedAt||'',
      siteId:r.siteId, items:r.items||[]});
  });
  ((STATE.data.projects||[])||[]).filter(function(p){ return p.branchId===branchId; }).forEach(function(p){
    rows.push({type:'PJ', id:p.id, number:p.pjNumber||p.id, status:p.status,
      latestDate:p.approvedAt||p.rejectedAt||p.updatedAt||p.date||'',
      siteId:p.siteId, items:p.items||[]});
  });
  rows.sort(function(a,b){ return (b.latestDate||'').localeCompare(a.latestDate||''); });
  if (limit) rows = rows.slice(0, limit);

  return rows.map(function(row){
    var isSR = row.type==='SR';
    var s = statusMap[row.status]||{cls:'text-slate-500 bg-slate-50', label:row.status};
    var site = (STATE.data.sites||[]).find(function(x){return x.id===row.siteId;})||{name:row.siteId||'—'};
    var items = row.items.map(function(i){
      var p = ((STATE.data.products||[])||[]).find(function(x){return x.id===i.productId;})||{};
      return (p.name||'?')+' x'+(i.qtyApproved||i.qty||i.qtyRequested||0);
    }).join(', ');
    var isToday = row.latestDate === today;
    var typeBadge = isSR
      ? '<span class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold mr-1">SR</span>'
      : '<span class="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-bold mr-1">PJ</span>';
    var editBtn = (isSR && (row.status==='PENDING'||row.status==='DRAFT'))
      ? '<button type="button" onclick="openSRForm(null,\''+row.id+'\')" class="text-xs px-2 py-1 rounded-lg bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold border border-blue-200">✏️</button>'
      : (!isSR && row.status==='PENDING'
        ? '<button type="button" onclick="openProjectForm(\''+row.id+'\',\''+branchId+'\')" class="text-xs px-2 py-1 rounded-lg bg-purple-50 hover:bg-purple-100 text-purple-600 font-semibold border border-purple-200">✏️</button>'
        : '');
    return '<tr class="border-b border-slate-100 last:border-0 hover:bg-slate-50/60">' +
      '<td class="px-4 py-2.5 whitespace-nowrap">'+typeBadge+'<span class="font-mono text-xs '+(isSR?'text-blue-500':'text-purple-500')+' font-semibold">'+row.number+'</span></td>' +

function downloadSiteTemplate() {
  var branchList = STATE.data.branches.map(function(b){ return b.id; }).join('|');
  var header = 'code,name,nameLao,clientName,manager,address,branchId';
  var example = [
    'SI010,ACME Site,ໄຊ ACME,ACME Co.,Mr.Smith,Vientiane,B001',
    'SI011,Factory Site,ໄຊໂຮງງານ,Factory Ltd.,,Luang Prabang,B002',
    '# branchId: '+branchList
  ].join('\n');
  var csv = header + '\n' + example;
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='site_import_template.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('📥 Template ດາວໂຫລດສຳເລັດ');
}

// ── Preview imported CSV ───────────────────────────────
function previewSiteImport(input) {
  var file = input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var text = e.target.result;
      if (text.charCodeAt(0)===0xFEFF) text=text.slice(1);
      var lines = text.split('\n').filter(function(l){ return l.trim() && !l.trim().startsWith('#'); });
      if (lines.length<2) { showToast('ໄຟລ໌ວ່າງ ຫຼື ຜິດຮູບແບບ','warn'); return; }

      function parseRow(line) {
        var cols=[],cur='',inQ=false;
        for(var i=0;i<line.length;i++){
          var ch=line[i];
          if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
          else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
          else cur+=ch;
        }
        cols.push(cur.trim()); return cols;
      }

      var headers = parseRow(lines[0]);
      var idx = function(h){ return headers.indexOf(h); };
      var rows = lines.slice(1).map(function(l){ return parseRow(l); });

      window._siteImportRows = rows.map(function(cols){
        return {
          code: cols[idx('code')]||'',
          name: cols[idx('name')]||'',
          nameLao: cols[idx('nameLao')]||'',
          clientName: cols[idx('clientName')]||'',
          manager: cols[idx('manager')]||'',
          address: cols[idx('address')]||'',
          branchId: cols[idx('branchId')]||''
        };
      }).filter(function(r){ return r.code && r.name; });

      if (!window._siteImportRows.length) { showToast('ບໍ່ພົບຂໍ້ມູນທີ່ຖືກຕ້ອງ','warn'); return; }

      // Show preview table
      var el = document.getElementById('siteImportPreview');
      if (el) el.innerHTML =
        '<div class="card overflow-hidden mt-3">' +
        '<div class="px-4 py-2 bg-blue-50 border-b border-blue-100 text-xs font-bold text-blue-700">'+window._siteImportRows.length+' ລາຍການພ້ອມນຳເຂົ້າ</div>' +
        '<div class="overflow-x-auto"><table class="w-full text-xs"><thead class="bg-slate-50"><tr>' +
        ['Code','ຊື່','Client','Branch'].map(function(h){ return '<th class="px-3 py-2 text-left font-bold text-slate-500">'+h+'</th>'; }).join('')+
        '</tr></thead><tbody>' +
        window._siteImportRows.map(function(r){
          var br = STATE.data.branches.find(function(b){return b.id===r.branchId;})||{};
          var valid = r.code&&r.name&&br.name;
          return '<tr class="border-b border-slate-100 '+(valid?'':'bg-red-50/40')+'">' +
            '<td class="px-3 py-1.5 font-mono">'+r.code+'</td>' +
            '<td class="px-3 py-1.5 font-semibold">'+r.name+'</td>' +
            '<td class="px-3 py-1.5 text-slate-500">'+r.clientName+'</td>' +
            '<td class="px-3 py-1.5">'+(br.name||'<span class="text-red-500">⚠️ ບໍ່ພົບ '+r.branchId+'</span>')+'</td></tr>';
        }).join('') +
        '</tbody></table></div></div>';

      var btn = document.getElementById('btnSiteImport');
      if (btn) btn.classList.remove('hidden');

    } catch(ex) { showToast('Parse error: '+ex.message,'error'); }
  };
  reader.readAsText(file, 'UTF-8');
}

// ── Submit Excel import ────────────────────────────────
function submitSiteImport() {
  var rows = window._siteImportRows;
  if (!rows||!rows.length) { showToast('ບໍ່ມີຂໍ້ມູນ','warn'); return; }
  var overrideBranch = (document.getElementById('si_import_branch')||{}).value;
  var done=0, total=rows.length, errors=[];

  rows.forEach(function(r, idx){
    var data = Object.assign({}, r);
    if (overrideBranch && !data.branchId) data.branchId = overrideBranch;
    if (!data.branchId) data.branchId = overrideBranch || (STATE.data.branches[0]||{}).id;
    callServer('saveSite', [data], function(res){
      if (res.success) {
        done++;
        var uname = data.code.toLowerCase()+'_staff';
        var upass = data.code.toLowerCase()+'123';
        callServer('saveUser', [{username:uname,password:upass,fullName:data.name+' Staff',
          fullNameLao:data.nameLao||data.name,role:'SITE_STAFF',
          branchIds:data.branchId,siteIds:res.id||data.code}], function(){});
      } else errors.push(r.code);
      if (done+errors.length >= total) {
        showToast('✅ ນຳເຂົ້າ '+done+'/'+total+' ໄຊງານ'+(errors.length?' | ⚠️ '+errors.join(','):''));
        closeModal();
        callServer('getSites', ['ALL'], function(r2){ if(r2.success) { STATE.data.sites=r2.data; renderBranchAdmin(); } });
      }
    });
  });
}

          branchIds:data.branchId,siteIds:res.id}],
          function(ur){ showToast('✅ ເພີ່ມໄຊ' + (ur.success?' · 👤 '+uname+'/'+upass:''), 'success'); });

}

  var canManage = STATE.user.role === 'ADMIN' || STATE.user.role === 'MANAGER';
  var tab = activeTab || window._baTab || 'branches';
  window._baTab = tab;
  var branches = STATE.data.branches;
  var sites = STATE.data.sites;

  // ── Stats ──
  var totalSites = sites.filter(function(s){return s.status==='ACTIVE';}).length;
  var totalBranches = branches.filter(function(b){return b.status==='ACTIVE';}).length;

  document.getElementById('pageContent').innerHTML =
    // Page header
    '<div class="flex items-center justify-between mb-5">' +
    '<div>' +
    '<h2 class="text-xl font-black text-slate-800">🏢 ຈັດການສາຂາ &amp; ໄຊງານ</h2>' +
    '<p class="text-sm text-slate-400 mt-0.5">Branches &amp; Job Sites Management</p>' +
    '</div>' +
    '<div class="flex gap-2">' +
    (tab==='branches' && canManage ? '<button onclick="openBranchForm()" class="btn btn-primary">+ ເພີ່ມສາຂາ</button>' : '') +
    (tab==='sites' && canManage ? '<button onclick="openSiteForm()" class="btn btn-primary">+ ເພີ່ມໄຊງານ</button>' : '') +
    '</div></div>' +

    // Stats row
    '<div class="grid grid-cols-4 gap-3 mb-5">' +
    _baStatCard('🏢', totalBranches, 'ສາຂາທັງໝົດ', 'text-blue-700') +
    _baStatCard('📍', totalSites, 'ໄຊງານທັງໝົດ', 'text-emerald-700') +
    _baStatCard('✅', branches.filter(function(b){return b.status==='ACTIVE';}).length, 'ສາຂາ Active', 'text-emerald-700') +
    _baStatCard('🏗️', sites.filter(function(s){return s.status==='ACTIVE';}).length, 'ໄຊ Active', 'text-purple-700') +
    '</div>' +

    // Tabs
    '<div class="flex gap-1 mb-5 p-1 bg-slate-100 rounded-xl w-fit">' +
    _baTabBtn('branches', tab, '🏢 ສາຂາ ('+branches.length+')') +
    _baTabBtn('sites', tab, '📍 ໄຊງານ ('+sites.length+')') +
    '</div>' +

    '<div id="baContent"></div>';

  if (tab === 'branches') _renderBaPageBranches(branches, sites, canManage);
  else _renderBaPageSites(sites, branches, canManage);
}

function _baStatCard(icon, val, lbl, cls) {
  return '<div class="card p-4 text-center"><div class="text-2xl mb-1">'+icon+'</div>' +
    '<div class="font-black text-2xl '+cls+'">'+val+'</div>' +
    '<div class="text-xs text-slate-400 mt-0.5">'+lbl+'</div></div>';
}

function _baTabBtn(key, active, label) {
  var isActive = key === active;
  return '<button onclick="renderBranchAdmin(\''+key+'\')" class="px-4 py-2 rounded-lg text-sm font-semibold transition-all ' +
    (isActive ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700') + '">'+label+'</button>';
}

// ── Sites tab ─────────────────────────────────────────────
function _renderBaPageSites(sites, branches, canManage) {
  var el = document.getElementById('baContent');
  if (!el) return;

  // Group by branch
  var grouped = {};
  branches.forEach(function(b){ grouped[b.id] = []; });
  sites.forEach(function(s){
    if (!grouped[s.branchId]) grouped[s.branchId] = [];
    grouped[s.branchId].push(s);
  });

  if (!sites.length) {
    el.innerHTML = '<div class="card p-10 text-center text-slate-400"><div class="text-4xl mb-2">📍</div>ຍັງບໍ່ມີໄຊງານ</div>';
    return;
  }

  el.innerHTML = '<div class="space-y-5">' +
    branches.map(function(b){
      var bSites = grouped[b.id] || [];
      if (!bSites.length) return '';
      return '<div>' +
        '<div class="flex items-center gap-2 mb-3">' +
        '<div class="w-7 h-7 rounded-lg bg-slate-700 flex items-center justify-center text-white text-xs font-bold">'+b.code+'</div>' +
        '<span class="font-bold text-slate-700">'+b.name+'</span>' +
        '<span class="text-xs text-slate-400">('+bSites.length+' sites)</span>' +
        (canManage ? '<button onclick="openSiteForm(null,\''+b.id+'\')" class="ml-auto btn btn-primary text-xs">+ ເພີ່ມໄຊ</button>' : '') +
        '</div>' +
        '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">' +
        bSites.map(function(s){
          var pendingSR = (STATE.data.srs||[]).filter(function(r){return r.siteId===s.id&&r.status==='PENDING';}).length;
          return '<div class="card p-4">' +
            '<div class="flex items-start justify-between gap-2 mb-3">' +
            '<div class="flex items-center gap-2">' +
            '<div class="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center text-lg">📍</div>' +
            '<div>' +
            '<div class="font-bold text-slate-800 text-sm">'+s.name+'</div>' +
            '<div class="text-xs text-slate-400">'+s.nameLao+'</div>' +
            '</div></div>' +
            badge(s.status||'ACTIVE') +
            '</div>' +
            '<div class="space-y-1 text-xs text-slate-500 mb-3">' +
            '<div>🏭 ລູກຄ້າ: <span class="font-semibold text-slate-700">'+s.clientName+'</span></div>' +
            '<div>🔑 Code: <span class="font-mono bg-slate-100 px-1.5 py-0.5 rounded text-slate-600">'+s.code+'</span></div>' +
            (s.manager?'<div>👤 '+s.manager+'</div>':'') +
            (s.address?'<div>📌 '+s.address+'</div>':'') +
            (pendingSR?'<div class="text-amber-600 font-bold">⏳ '+pendingSR+' SR ລໍຖ້າ</div>':'') +
            '</div>' +
            (canManage ?
              '<div class="flex gap-1.5 pt-2 border-t border-slate-100">' +
              '<button type="button" onclick="event.stopPropagation();openSiteForm(\''+s.id+'\',\''+s.branchId+'\')" class="btn btn-secondary text-xs flex-1">✏️ ແກ້ໄຂ</button>' +
              (STATE.user.role==='ADMIN' ? '<button type="button" onclick="event.stopPropagation();confirmDeleteSite(\''+s.id+'\',\''+s.name+'\')" class="btn text-xs px-3 bg-red-50 hover:bg-red-100 text-red-600 border border-red-200">🗑️</button>' : '') +
              '</div>' : '') +
            '</div>';
        }).join('') +
        '</div></div>';
    }).filter(Boolean).join('') +
    '</div>';
}

function submitCategoryForm(id) {
  var data = {
    id:id||undefined,
    code:  (document.getElementById('cf_code')||{}).value||'',
    name:  (document.getElementById('cf_name')||{}).value||'',
    nameLao:(document.getElementById('cf_namelao')||{}).value||'',
    type:  (document.getElementById('cf_type')||{}).value||'OTHER',
    status:'ACTIVE'
  };
  if (!data.code||!data.name) { showToast('ໃສ່ Code ແລະ ຊື່','warn'); return; }
  callServer('saveCategory',[data],function(res){
    if (res.success) {
      // Reload from server to avoid double-insert
      callServer('getCategories',[],function(r){
        if(r.success) STATE.data.categories = r.data;
        showToast('✅ ບັນທຶກໝວດໝູ່ສຳເລັດ','success');
        closeModal();
        renderCategories();
      });
    } else showToast('Error','error');
  });
}

    '<input id="del_confirm_input" class="input mt-1 border-2 border-amber-300 font-mono text-center text-lg tracking-widest" placeholder="DELETE" autocomplete="off" oninput="this.value=this.value.toUpperCase()">' +
    '</div>' +
    '<div class="flex gap-2">' +
    '<button onclick="closeModal()" class="btn btn-secondary flex-1">ຍົກເລີກ / Cancel</button>' +
    '<button onclick="_execDelete()" class="btn flex-1 bg-red-600 hover:bg-red-700 text-white border-0">🗑️ ລຶ້ງ / Delete</button>' +
    '</div></div>');
}
function _execDelete() {
  var inp = ((document.getElementById('del_confirm_input')||{}).value||'').trim();
  if (inp !== 'DELETE') { showToast('ພິມ DELETE ເພື່ອຢືນຢັນ / Type DELETE to confirm','warn'); return; }
  if (typeof window._pendingDeleteFn === 'function') window._pendingDeleteFn();
  window._pendingDeleteFn = null;
}

// ── Permission check helper ───────────────────────────────
function _can(perm) {
  var u = STATE.user;
  if (!u) return false;
  if (u.role === 'ADMIN') return true; // ADMIN always has all
  // Custom perms override role defaults
  var perms = u.permissions || ROLE_DEFAULTS[u.role] || [];
  return perms.indexOf(perm) > -1;
}

// ── Apply perms to current user after login / user switch ─
function _applyUserPerms(user) {
  if (!user.permissions || !user.permissions.length) {
    user.permissions = (ROLE_DEFAULTS[user.role] || []).slice();
  }
  STATE.user = user;
}

}

function _permToggleGroup(cb) {
  var group = cb.dataset.group;
  var checked = cb.checked;
  document.querySelectorAll('input[name="perm_cb"]').forEach(function(el){
    if ((PERMS[el.value]||{}).group === group) el.checked = checked;
  });
  _permUpdateCounter();
}

function _permLoadPreset(role) {
  var defaults = ROLE_DEFAULTS[role] || [];
  document.querySelectorAll('input[name="perm_cb"]').forEach(function(el){
    el.checked = defaults.indexOf(el.value) > -1;
  });
  var rs = document.getElementById('pmRoleSelect');
  if (rs) rs.value = role;
  _permUpdateCounter();
  // update group-all checkboxes
  document.querySelectorAll('.grp-all').forEach(function(gcb){
    var g = gcb.dataset.group;
    var groupKeys = Object.keys(PERMS).filter(function(k){return PERMS[k].group===g;});
    var checkedKeys = groupKeys.filter(function(k){
      var cb = document.querySelector('input[name="perm_cb"][value="'+k+'"]');
      return cb && cb.checked;
    });
    gcb.checked = checkedKeys.length === groupKeys.length;
    gcb.indeterminate = checkedKeys.length>0 && checkedKeys.length<groupKeys.length;
  });
  showToast('Loaded '+role+' defaults ✅','success');
}

function _permLoadRoleDefaults() {
  var rs = document.getElementById('pmRoleSelect');
  if (rs) _permLoadPreset(rs.value);
}

function _permClearAll() {
  document.querySelectorAll('input[name="perm_cb"]').forEach(function(el){ el.checked = false; });
  document.querySelectorAll('.grp-all').forEach(function(el){ el.checked = false; });
  _permUpdateCounter();
}

function _permUpdateCounter() {
  var allCbs = document.querySelectorAll('input[name="perm_cb"]');
  var total = allCbs.length;
  var checked = 0;
  allCbs.forEach(function(cb){ if(cb.checked) checked++; });
  var pct = total ? Math.round(checked/total*100) : 0;
  var bar = document.getElementById('permProgressBar');
  var lbl = document.getElementById('permCountLabel');
  if (bar) { bar.style.width=pct+'%'; bar.className='h-full rounded-full transition-all '+(pct>=80?'bg-emerald-500':pct>=50?'bg-blue-500':pct>=30?'bg-amber-500':'bg-red-400'); }
  if (lbl) lbl.textContent = checked+' / '+total+' perms';

  // update per-group counters
  var groupCounts = {};
  allCbs.forEach(function(cb){
    var g = (PERMS[cb.value]||{group:'Other'}).group;
    if (!groupCounts[g]) groupCounts[g]={total:0,checked:0};
    groupCounts[g].total++;
    if(cb.checked) groupCounts[g].checked++;
  });
  Object.keys(groupCounts).forEach(function(g){
    var el = document.getElementById('grpCnt_'+g.replace(/\s/g,'_'));
    if(el) el.textContent=groupCounts[g].checked+'/'+groupCounts[g].total;
  });
}

// attach live counter updates to checkboxes
document.addEventListener('change', function(e){
  if (e.target && e.target.name === 'perm_cb') _permUpdateCounter();
});

function _savePermMatrix(userId) {
  var perms = [];
  document.querySelectorAll('input[name="perm_cb"]:checked').forEach(function(cb){ perms.push(cb.value); });
  var role = (document.getElementById('pmRoleSelect')||{}).value || 'SITE_STAFF';

function submitUserForm(id) {
  var username = document.getElementById('uf_user').value.trim();
  var fullName = document.getElementById('uf_name').value.trim();
  var role     = document.getElementById('uf_role').value;
  var pw       = document.getElementById('uf_pw').value;
  var status   = document.getElementById('uf_status').value;

  if (!username || !fullName) { showToast('Username ແລະ ຊື່ ຕ້ອງໃສ່','warn'); return; }
  if (!id && !pw) { showToast('ຕ້ອງໃສ່ Password ສຳລັບ User ໃໝ່','warn'); return; }

  // Collect branch IDs
  var allBranch = document.getElementById('uf_allBranch');
  var branchIds = (allBranch && allBranch.checked) ? 'ALL' :
    [].slice.call(document.querySelectorAll('input[name="uf_branch"]:checked')).map(function(c){return c.value;}).join(',') || 'ALL';

  // Collect site IDs
  var allSite = document.getElementById('uf_allSite');
  var siteIds = (allSite && allSite.checked) ? 'ALL' :
    [].slice.call(document.querySelectorAll('input[name="uf_site"]:checked')).map(function(c){return c.value;}).join(',') || 'ALL';

  var data = {
    id: id||undefined,
    username: username,
    fullName: fullName,
    fullNameLao: document.getElementById('uf_namelao').value,
    email: document.getElementById('uf_email').value,
    role: role,
    branchIds: branchIds,
    siteIds: siteIds,
    status: status,
    permissions: ROLE_DEFAULTS[role] // default perms for role — can be customised via Perms button
  };
  if (pw) data.password = pw;

  callServer('saveUser', [data], function(res){
    if (res.success) {
      showToast(id?'✅ User ອັບເດດສຳເລັດ':'✅ ສ້າງ User ໃໝ່ສຳເລັດ','success');
      closeModal();
      renderUsers();
    } else showToast('Error: '+(res.message||''),'error');
  });
}

// MAINTENANCE — SMART REFRESH HELPER
// Refreshes only the relevant panel/section depending on
// which page the user is currently on — never navigates away
// ════════════════════════════════════════════════════════
function _refreshAfterMaintUpdate(mr) {
  var locId     = (mr && (mr.siteId || mr.branchId)) || '';
  var branchId  = (mr && mr.branchId) || '';
  var siteId    = (mr && mr.siteId)   || '';

  // ── Helper to refresh mini panel ──────────────────────
  function _refreshMiniPanel(lid) {
    var mp = document.getElementById('maintPanel_'+lid);
    if (mp) {
      var lt = lid.startsWith('SI') ? 'SITE' : 'BRANCH';
      mp.innerHTML = _renderMaintMiniPanel(lid, lt);
    }
  }

  // ── 1. Refresh mini panel for site AND its parent branch ──
  if (siteId)   _refreshMiniPanel(siteId);
  if (branchId) _refreshMiniPanel(branchId);

  // ── 2. Refresh stock status badge column ────────────────
  function _refreshStock(lid) {
    var sec = document.getElementById('section_'+lid);
    if (sec) {
      _renderStockSection(lid, _can('inventory.branch.manage'), lid.startsWith('SI'));
    }
  }
  if (siteId)   _refreshStock(siteId);
  if (branchId) _refreshStock(branchId);

  // ── 3. Refresh maintenance tab if open ──────────────────
  var smt = document.getElementById('siteMaintTable');
  if (smt) _loadSiteMaintenance(siteId || branchId);

  // ── 4. Refresh branch maintenance accordion if open ─────
  var bmt = document.getElementById('branchMaintList_'+branchId);
  if (bmt) _renderBranchMaintList(branchId);

  // ── 5. If user is on Maintenance Tracking page, refresh list
  if (currentPage === 'maintenance') {
    // Re-pull data and redraw without full page reload
    callServer('getMaintenanceRequests',[{}],function(res){
      window._mrData = _filterMRByAccess(res.data||[]);
      _updateMaintKPIs();
      _redrawMR();
    });
  }

  // ── 6. Update nav badge ──────────────────────────────────
  var pending = ((STATE.data.maintenance||[])||[]).filter(function(m){return m.status==='PENDING';}).length;
  var mb = document.getElementById('maintBadge');
  if (mb) { mb.textContent = pending; pending > 0 ? mb.classList.remove('hidden') : mb.classList.add('hidden'); }
}

// Filter maintenance by current user's access
function _filterMRByAccess(data) {
  if (STATE.user.role === 'ADMIN' || STATE.user.role === 'MANAGER') return data;
  var allowedB = String(STATE.user.branchIds||'').split(',').filter(Boolean);
  var allowedS = String(STATE.user.siteIds||'').split(',').filter(Boolean);
  if (allowedB.indexOf('ALL')>-1 || allowedS.indexOf('ALL')>-1) return data;
  return data.filter(function(r){
    return allowedB.indexOf(r.branchId)>-1 || allowedS.indexOf(r.siteId)>-1;
  });
}

// Update KPI cards without full re-render
function _updateMaintKPIs() {
  var data = window._mrData || [];
  [
    ['kpi_maint_total',   function(d){return d.length;}],
    ['kpi_maint_pending', function(d){return d.filter(function(r){return r.status==='PENDING';}).length;}],
    ['kpi_maint_prog',    function(d){return d.filter(function(r){return r.status==='IN_PROGRESS';}).length;}],
    ['kpi_maint_done',    function(d){return d.filter(function(r){return r.status==='COMPLETED';}).length;}],
  ].forEach(function(p){
    var el = document.getElementById(p[0]);
    if (el) el.textContent = p[1](data);
  });
}

// BRANCH MAINTENANCE LIST (shown in Branch page accordion)
// ═══════════════════════════════════════════════════════════
function _renderBranchMaintList(branchId) {
  var el = document.getElementById('branchMaintList_'+branchId);
  if (!el) return;
  var branch = ((STATE.data.branches||[])||[]).find(function(b){return b.id===branchId;})||{};
  // Include MRs for this branch AND all its sites
  var siteIds = ((STATE.data.sites||[])||[]).filter(function(s){return s.branchId===branchId;}).map(function(s){return s.id;});
  var mrs = ((STATE.data.maintenance||[])||[]).filter(function(m){
    return m.branchId===branchId || siteIds.indexOf(m.siteId)>-1;
  }).sort(function(a,b){
    var o={PENDING:0,APPROVED:1,IN_PROGRESS:2,CANNOT_REPAIR:3,REJECTED:4,COMPLETED:5,DISPOSED:6};
    return (o[a.status]||9)-(o[b.status]||9);
  });

  var isApprover = _can('maintenance.approve');
  var canUpdate  = _can('maintenance.update');
  var canDispose = _can('maintenance.dispose');

  if (!mrs.length) {
    el.innerHTML = '<div class="py-6 text-center text-slate-400 text-sm">ບໍ່ມີໃບສ້ອມໃນສາຂານີ້</div>';
    return;
  }

  // Stats bar
  var pending   = mrs.filter(function(m){return m.status==='PENDING';}).length;
  var inProg    = mrs.filter(function(m){return m.status==='IN_PROGRESS';}).length;
  var completed = mrs.filter(function(m){return m.status==='COMPLETED';}).length;
  var totalCost = mrs.reduce(function(s,m){return s+(m.actualCost||0);},0);

  el.innerHTML =
    // Stats row
    '<div class="flex flex-wrap gap-2 mb-3 p-3 bg-slate-50 rounded-xl text-xs">' +
    '<span class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 font-semibold border border-amber-200">⏳ ລໍຖ້າ: '+pending+'</span>' +
    '<span class="px-2 py-1 rounded-full bg-purple-100 text-purple-700 font-semibold border border-purple-200">🔧 ກຳລັງສ້ອມ: '+inProg+'</span>' +
    '<span class="px-2 py-1 rounded-full bg-emerald-100 text-emerald-700 font-semibold border border-emerald-200">✅ ສຳເລັດ: '+completed+'</span>' +
    (totalCost>0?'<span class="px-2 py-1 rounded-full bg-blue-100 text-blue-700 font-semibold border border-blue-200">💰 ຄ່າສ້ອມທັງໝົດ: LAK '+fmtNum(totalCost)+'</span>':'')+
    '<button onclick="openCreateMRFromStock(null,null,null,\''+branchId+'\')" class="ml-auto btn text-xs py-1 bg-orange-500 hover:bg-orange-600 text-white border-0">🔧 + ແຈ້ງສ້ອມ</button>' +
    '</div>' +
    // MR rows
    mrs.map(function(m){
      var st = _MR_STATUS[m.status]||_MR_STATUS.PENDING;
      var pr = _MR_PRIORITY[m.priority]||_MR_PRIORITY.NORMAL;
      var it = _MR_ISSUE[m.issueType]||_MR_ISSUE.OTHER;
      var locLabel = m.siteId
        ? (((STATE.data.sites||[])||[]).find(function(s){return s.id===m.siteId;})||{name:m.siteId}).name
        : (((STATE.data.branches||[])||[]).find(function(b){return b.id===m.branchId;})||{name:m.branchId}).name;

      var actions = '<button onclick="openMRDetail(\''+m.id+'\')" class="btn btn-secondary text-[10px] px-2 py-0.5">👁</button>';
      if (m.status==='PENDING' && isApprover)
        actions += '<button onclick="openMRApproval(\''+m.id+'\')" class="btn btn-primary text-[10px] px-2 py-0.5">✅ ອະນຸມັດ</button>'+
                   '<button onclick="openMRReject(\''+m.id+'\')" class="btn btn-secondary text-[10px] px-2 py-0.5 text-red-600">❌</button>';
      if (m.status==='APPROVED' && canUpdate)
        actions += '<button onclick="openMRProgress(\''+m.id+'\')" class="btn btn-secondary text-[10px] px-2 py-0.5 text-blue-600">🔧 ເລີ່ມ</button>';
      if (m.status==='IN_PROGRESS' && isApprover)
        actions += '<button onclick="openMRComplete(\''+m.id+'\')" class="btn text-[10px] px-2 py-0.5 bg-emerald-600 text-white hover:bg-emerald-700">✅ ສ້ອມສຳເລັດ+ລາຄາ</button>'+
                   '<button onclick="openMRCannotRepair(\''+m.id+'\')" class="btn btn-secondary text-[10px] px-2 py-0.5 text-orange-600">🚫</button>';
      if ((m.status==='CANNOT_REPAIR'||m.status==='COMPLETED') && canDispose)
        actions += '<button onclick="openMRDispose(\''+m.id+'\')" class="btn btn-secondary text-[10px] px-2 py-0.5 text-red-600">🗑️</button>';

      var resultLine = '';
      if (m.status==='COMPLETED')
        resultLine = '<span class="text-[10px] bg-emerald-100 text-emerald-700 rounded px-1.5 py-0.5 font-semibold">✅ ສ້ອມສຳເລັດ '+fmtDate(m.completedDate)+' · LAK '+fmtNum(m.actualCost)+'</span>';
      else if (m.status==='CANNOT_REPAIR')
        resultLine = '<span class="text-[10px] bg-orange-100 text-orange-700 rounded px-1.5 py-0.5">🚫 '+m.cannotRepairReason+'</span>';

      return '<div class="border border-slate-100 rounded-xl p-3 mb-2 hover:bg-slate-50/50 transition-colors '+(m.priority==='CRITICAL'&&m.status==='PENDING'?'border-red-300 bg-red-50/20':'')+'">' +
        '<div class="flex flex-wrap items-start gap-2">' +
        '<div class="flex-1 min-w-0">' +
        '<div class="flex flex-wrap items-center gap-1.5 mb-1">' +
        '<span class="font-mono text-[10px] text-slate-400">'+m.mrNumber+'</span>' +
        '<span class="text-[10px] font-bold px-1.5 py-0.5 rounded-full '+st.cls+'">'+st.icon+' '+st.en+'</span>' +
        '<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full '+pr.cls+'">'+pr.icon+' '+m.priority+'</span>' +
        '<span class="text-[10px] text-slate-400">'+it.icon+' '+it.label+'</span>' +
        '<span class="text-[10px] text-slate-400">📍 '+locLabel+'</span>' +
        '</div>' +
        '<div class="text-sm font-semibold text-slate-800">'+m.assetName+' <span class="font-mono text-xs font-normal text-slate-400">'+m.assetSku+'</span></div>' +
        '<div class="text-xs text-slate-500 mt-0.5 line-clamp-1">'+m.description+'</div>' +
        (resultLine?'<div class="mt-1">'+resultLine+'</div>':'')+
        '<div class="text-[10px] text-slate-400 mt-1">ແຈ້ງ: '+fmtDate(m.reportDate)+' · ໂດຍ: '+m.reportedByName+
        (m.assignedTo?' · 👤 ຊ່າງ: <strong class="text-slate-600">'+m.assignedTo+'</strong>':'')+
        '</div>'+
        '</div>' +
        '<div class="flex flex-wrap gap-1 flex-shrink-0">'+actions+'</div>'+
        '</div></div>';
    }).join('');
}

// ── Toggle Branch Maintenance Accordion ──────────────────
function _toggleBranchMaint(branchId) {
  var col   = document.getElementById('branchMaintCollapse_'+branchId);
  var arrow = document.getElementById('branchMaintArrow_'+branchId);
  if (!col) return;
  var isOpen = !col.classList.contains('hidden');
  if (isOpen) {
    col.classList.add('hidden');
    if (arrow) arrow.textContent = '▼';
  } else {
    col.classList.remove('hidden');
    if (arrow) arrow.textContent = '▲';
    _renderBranchMaintList(branchId);
  }
}

window._mrF = window._mrF || {search:'',status:'ALL',branch:'ALL',priority:'ALL',dateFrom:'',dateTo:'',page:1,perPage:15};

function renderMaintenance() {
  window._mrF = window._mrF || {search:'',status:'ALL',branch:'ALL',priority:'ALL',dateFrom:'',dateTo:'',page:1,perPage:15};
  callServer('getMaintenanceRequests',[{}], function(res){
    window._mrData = _filterMRByAccess(res.data||[]);
    var data      = window._mrData;
    var total     = data.length;
    var pending   = data.filter(function(r){return r.status==='PENDING';}).length;
    var inProg    = data.filter(function(r){return r.status==='IN_PROGRESS';}).length;
    var completed = data.filter(function(r){return r.status==='COMPLETED';}).length;
    var critical  = data.filter(function(r){return r.priority==='CRITICAL'&&r.status!=='COMPLETED'&&r.status!=='DISPOSED';}).length;

    // Update nav badge
    var mb = document.getElementById('maintBadge');
    if (mb) { mb.textContent = pending; pending>0 ? mb.classList.remove('hidden') : mb.classList.add('hidden'); }

    document.getElementById('pageContent').innerHTML =
      '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">' +
      _kpiMiniId('kpi_maint_total',  '🔧','ທັງໝົດ',total,  'from-slate-600 to-slate-800')+
      _kpiMiniId('kpi_maint_pending','⏳','ລໍຖ້າ', pending,'from-amber-500 to-amber-700')+
      _kpiMiniId('kpi_maint_prog',   '🔵','ກຳລັງສ້ອມ',inProg,'from-blue-500 to-blue-700')+
      (critical>0
        ? _kpiMiniId('kpi_maint_done','🔴','CRITICAL!!',critical,'from-red-600 to-red-800')
        : _kpiMiniId('kpi_maint_done','✅','ສ້ອມເສັດ', completed,'from-emerald-500 to-emerald-700'))+
      '</div>'+
      '<div id="mrFilterArea"></div>'+
      '<div id="mrListArea"></div>';
    _redrawMR();
  });
}

// KPI mini with stable ID for live update
function _kpiMiniId(elId, icon, label, val, gradient) {
  return '<div class="card p-4 bg-gradient-to-br '+gradient+' text-white rounded-2xl">' +
    '<div class="text-2xl mb-1">'+icon+'</div>' +
    '<div class="text-xs text-white/70">'+label+'</div>' +
    '<div class="text-2xl font-bold" id="'+elId+'">'+val+'</div>' +
    '</div>';
}

function _redrawMR() {
  var f = window._mrF||{};
  var data = (window._mrData||[]).slice();
  var s = (f.search||'').toLowerCase();

  var filtered = data.filter(function(r){
    if(f.status&&f.status!=='ALL'&&r.status!==f.status) return false;
    if(f.branch&&f.branch!=='ALL'&&r.branchId!==f.branch) return false;
    if(f.priority&&f.priority!=='ALL'&&r.priority!==f.priority) return false;
    if(f.dateFrom&&_dateStr(r.reportDate)<f.dateFrom) return false;
    if(f.dateTo&&_dateStr(r.reportDate)>f.dateTo) return false;
    if(s&&(r.mrNumber||'').toLowerCase().indexOf(s)<0&&
           (r.assetName||'').toLowerCase().indexOf(s)<0&&
           (r.description||'').toLowerCase().indexOf(s)<0&&
           (r.reportedByName||'').toLowerCase().indexOf(s)<0&&
           (r.locationName||'').toLowerCase().indexOf(s)<0) return false;
    return true;
  }).sort(function(a,b){
    // Critical first, then by date desc
    var pa={CRITICAL:0,HIGH:1,NORMAL:2,LOW:3}; var pb=pa;
    if(a.status==='COMPLETED'||a.status==='DISPOSED') return 1;
    if(b.status==='COMPLETED'||b.status==='DISPOSED') return -1;
    if((pa[a.priority]||2)!==(pb[b.priority]||2)) return (pa[a.priority]||2)-(pb[b.priority]||2);
    return (b.reportDate||'').localeCompare(a.reportDate||'');
  });

  var pag = paginateData(filtered,f.page||1,f.perPage||15);

  var branchOpts = [{v:'ALL',l:'ທຸກສາຂາ'}].concat((STATE.data.branches||[]).map(function(b){return {v:b.id,l:b.name};}));
  var statusOpts = [{v:'ALL',l:'ທຸກ Status'}].concat(Object.keys(_MR_STATUS).map(function(k){return {v:k,l:_MR_STATUS[k].icon+' '+_MR_STATUS[k].en};}));
  var priorityOpts = [{v:'ALL',l:'ທຸກ Priority'}].concat(Object.keys(_MR_PRIORITY).map(function(k){return {v:k,l:_MR_PRIORITY[k].icon+' '+k};}));

  var activeFilters = [
    {value:(f.status!=='ALL'?f.status:''),label:'Status',displayValue:f.status,clearFn:"_mrSetF('status','ALL')"},
    {value:(f.branch!=='ALL'?f.branch:''),label:'Branch',displayValue:f.branch,clearFn:"_mrSetF('branch','ALL')"},
    {value:(f.priority!=='ALL'?f.priority:''),label:'Priority',displayValue:f.priority,clearFn:"_mrSetF('priority','ALL')"},
    {value:f.dateFrom,label:'From',displayValue:f.dateFrom,clearFn:"_mrSetF('dateFrom','')"},
    {value:f.dateTo,label:'To',displayValue:f.dateTo,clearFn:"_mrSetF('dateTo','')"},
  ];

  var fa = document.getElementById('mrFilterArea');
  if(fa) fa.innerHTML = renderFilterBar({
    searchId:'mrSearch',search:f.search,
    searchPlaceholder:'🔍 MR# / Asset / ຜູ້ແຈ້ງ / Location...',
    onSearch:"_mrSetF('search',this.value)",onClearSearch:"_mrSetF('search','')",
    dropdowns:[
      {id:'mrStatus',  value:f.status,   onChange:"_mrSetF('status',this.value)",   options:statusOpts},
      {id:'mrBranch',  value:f.branch,   onChange:"_mrSetF('branch',this.value)",   options:branchOpts},
      {id:'mrPriority',value:f.priority, onChange:"_mrSetF('priority',this.value)", options:priorityOpts},
    ],
    activeFilters:activeFilters,
    rightHtml:renderDateRange('mrFrom','mrTo',f.dateFrom,f.dateTo,"_mrDateChange()")+
      (_can('maintenance.create')?'<button onclick="openCreateMR()" class="btn btn-primary text-sm">🔧 + ແຈ້ງສ້ອມ</button>':'')+
      (_can('maintenance.report')?'<button onclick="_mrExportExcel()" class="btn btn-secondary text-sm">⬇️ Excel</button>'+
       '<button onclick="_mrExportPDF()" class="btn btn-secondary text-sm">📄 PDF</button>':'')
  });

  var la = document.getElementById('mrListArea');
  if(!la) return;
  if(!pag.total){
    la.innerHTML='<div class="card p-10 text-center text-slate-400"><div class="text-4xl mb-3">🔧</div>ບໍ່ມີໃບສ້ອມແປງ</div>';
    return;
  }

  var cards = pag.items.map(function(r){
    var st = _MR_STATUS[r.status]||_MR_STATUS.PENDING;
    var pr = _MR_PRIORITY[r.priority]||_MR_PRIORITY.NORMAL;
    var it = _MR_ISSUE[r.issueType]||_MR_ISSUE.OTHER;
    var isAdmin = STATE.user.role==='ADMIN';
    var canApprove = _can('maintenance.approve');

    // Action buttons based on status
    var actions = '';
    if(r.status==='PENDING'&&canApprove)
      actions+='<button onclick="openMRApproval(\''+r.id+'\')" class="btn btn-primary text-xs px-2 py-1">✅ ອະນຸມັດ</button>'+
               '<button onclick="openMRReject(\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-red-600 border-red-200">❌ ປະຕິເສດ</button>';
    if(r.status==='APPROVED'&&_can('maintenance.update'))
      actions+='<button onclick="openMRProgress(\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-blue-600">🔧 ເລີ່ມ/ອັບເດດ</button>';
    if(r.status==='IN_PROGRESS'&&_can('maintenance.complete'))
      actions+='<button onclick="openMRComplete(\''+r.id+'\')" class="btn text-xs px-2 py-1 bg-emerald-600 text-white hover:bg-emerald-700">✅ ສ້ອມສຳເລັດ</button>'+
               '<button onclick="openMRCannotRepair(\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-orange-600 border-orange-200">🚫 ສ້ອມບໍ່ໄດ້</button>';
    if((r.status==='CANNOT_REPAIR'||r.status==='COMPLETED')&&_can('maintenance.dispose'))
      actions+='<button onclick="openMRDispose(\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-red-600 border-red-200">🗑️ ທຳລາຍ</button>';
    actions+='<button onclick="openMRDetail(\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1">👁 ລາຍລະອຽດ</button>';

    return '<div class="card mb-3 overflow-hidden hover:shadow-md transition-shadow '+
      (r.priority==='CRITICAL'&&r.status==='PENDING'?'ring-2 ring-red-400':'')+'">'+
      // Top stripe by status
      '<div class="h-1 w-full" style="background:'+(r.status==='COMPLETED'?'#10b981':r.status==='CANNOT_REPAIR'?'#f97316':r.status==='DISPOSED'?'#94a3b8':r.status==='IN_PROGRESS'?'#8b5cf6':r.status==='REJECTED'?'#ef4444':'#f59e0b')+'"></div>'+
      '<div class="p-4">'+
      '<div class="flex flex-wrap justify-between items-start gap-3">'+
      // Left info
      '<div class="flex-1 min-w-0">'+
      '<div class="flex items-center gap-2 flex-wrap mb-1">'+
      '<span class="font-mono font-bold text-slate-700 text-sm">'+r.mrNumber+'</span>'+
      '<span class="text-xs px-2 py-0.5 rounded-full font-bold '+st.cls+'">'+st.icon+' '+st.en+'</span>'+
      '<span class="text-xs px-2 py-0.5 rounded-full font-semibold '+pr.cls+'">'+pr.icon+' '+r.priority+'</span>'+
      '<span class="text-xs text-slate-400">'+it.icon+' '+it.label+'</span>'+
      '</div>'+
      // Asset info
      '<div class="flex items-center gap-2 mb-1">'+
      '<div class="text-sm font-bold text-slate-800">'+r.assetName+'</div>'+
      '<span class="font-mono text-xs text-slate-400">'+r.assetSku+'</span>'+
      '</div>'+
      '<div class="text-xs text-slate-500 mb-1">📍 '+r.locationName+
      (r.assignedTo?' · 👤 ຊ່າງ: <span class="font-semibold text-slate-700">'+r.assignedTo+'</span>':'')+
      ' · 📅 ແຈ້ງ: '+fmtDate(r.reportDate)+'</div>'+
      '<div class="text-xs text-slate-600 bg-slate-50 rounded-lg px-3 py-1.5 line-clamp-2">'+r.description+'</div>'+
      // Cannot repair / disposal info
      (r.status==='CANNOT_REPAIR'?'<div class="mt-1.5 text-xs bg-orange-50 border border-orange-200 rounded-lg px-3 py-1.5 text-orange-700">🚫 <strong>ສ້ອມບໍ່ໄດ້:</strong> '+r.cannotRepairReason+'</div>':'')+
      (r.status==='DISPOSED'?'<div class="mt-1.5 text-xs bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 text-red-700">🗑️ <strong>ທຳລາຍ:</strong> '+r.disposalReason+' · '+fmtDate(r.disposalDate)+'</div>':'')+
      // Completion info
      (r.status==='COMPLETED'?'<div class="mt-1.5 text-xs bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-1.5 text-emerald-700">✅ ສ້ອມສຳເລັດ: '+fmtDate(r.completedDate)+' · ຄ່າໃຊ້ຈ່າຍ: <strong>'+fmtNum(r.actualCost)+' LAK</strong></div>':'')+
      '</div>'+
      // Right actions
      '<div class="flex flex-col gap-1.5 flex-shrink-0">'+
      '<div class="text-xs text-slate-400 text-right">By: '+r.reportedByName+'</div>'+
      (r.scheduledDate?'<div class="text-xs text-slate-400 text-right">📅 Schedule: '+fmtDate(r.scheduledDate)+'</div>':'')+
      '<div class="flex flex-wrap gap-1.5 justify-end mt-1">'+actions+'</div>'+
      '</div>'+
      '</div>'+
      '</div></div>';
  }).join('');

  la.innerHTML = cards + '<div class="mt-2">'+renderPagBar(pag,'_mrPage','_mrPage')+'</div>';
}

// MAINTENANCE MINI PANEL  (shown in Branch / Site pages)
// ═══════════════════════════════════════════════════════════
function _renderMaintMiniPanel(locId, locType) {
  if (!_can('maintenance.view')) return '';

  var mrs = ((STATE.data.maintenance||[])||[]).filter(function(m){
    return m.branchId===locId || m.siteId===locId;
  });

  var active   = mrs.filter(function(m){return m.status==='PENDING'||m.status==='APPROVED'||m.status==='IN_PROGRESS';});
  var cannotR  = mrs.filter(function(m){return m.status==='CANNOT_REPAIR';});
  var done     = mrs.filter(function(m){return m.status==='COMPLETED';});
  var hasProblem = active.length > 0 || cannotR.length > 0;

  // ── Empty state ───────────────────────────────────────────
  if (!mrs.length) {
    return '<div class="flex items-center gap-3 mb-4 px-4 py-3 bg-emerald-50 border border-emerald-200 rounded-2xl">' +
      '<div class="w-8 h-8 rounded-xl bg-emerald-100 flex items-center justify-center text-base flex-shrink-0">✅</div>' +
      '<div><div class="text-sm font-bold text-emerald-700">ບໍ່ມີ Equipment ທີ່ຕ້ອງສ້ອມ</div>' +
      '<div class="text-xs text-emerald-600">ທຸກ Equipment ໃຊ້ງານໄດ້ປົກກະຕິ</div></div>' +
      (_can('maintenance.create') ?
        '<button onclick="openCreateMRFromStock(null,null,null,\''+locId+'\')" class="ml-auto btn text-xs bg-orange-500 hover:bg-orange-600 text-white border-0">🔧 ແຈ້ງສ້ອມ</button>' : '') +
      '</div>';
  }

  // ── Active MR rows ────────────────────────────────────────
  var rowsHtml = active.slice(0,4).map(function(m){
    var st = _MR_STATUS[m.status]||_MR_STATUS.PENDING;
    var pr = _MR_PRIORITY[m.priority]||_MR_PRIORITY.NORMAL;
    var isAdmin = _can('maintenance.approve');
    var btns =
      '<button onclick="openMRDetail(\''+m.id+'\')" class="btn btn-secondary text-[10px] px-2 py-0.5">👁</button>' +
      (isAdmin && m.status==='PENDING'
        ? '<button onclick="openMRApproval(\''+m.id+'\')" class="btn btn-primary text-[10px] px-2 py-0.5">✅ ອະນຸມັດ</button>' : '') +
      (isAdmin && m.status==='IN_PROGRESS'
        ? '<button onclick="openMRComplete(\''+m.id+'\')" class="btn text-[10px] px-2 py-0.5 bg-emerald-600 text-white hover:bg-emerald-700">✅ ສ້ອມສຳເລັດ</button>' : '');
    return '<div class="flex flex-wrap items-center gap-2 py-2 border-b border-slate-100 last:border-0">' +
      '<span class="font-mono text-[10px] text-slate-400 flex-shrink-0">'+m.mrNumber+'</span>' +
      '<span class="font-semibold text-xs text-slate-800">'+m.assetName+'</span>' +
      '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full flex-shrink-0 '+st.cls+'">'+st.icon+' '+st.en+'</span>' +
      '<span class="text-[10px] px-1.5 py-0.5 rounded-full flex-shrink-0 '+pr.cls+'">'+pr.icon+' '+m.priority+'</span>' +
      (m.assignedTo ? '<span class="text-[10px] text-slate-400 flex-shrink-0">👤 '+m.assignedTo+'</span>' : '') +
      '<div class="ml-auto flex gap-1 flex-shrink-0">'+btns+'</div>' +
      '</div>';
  }).join('');

  if (active.length > 4) {
    rowsHtml += '<div class="py-1.5 text-[10px] text-slate-400 text-center">...ແລະ '+(active.length-4)+' ລາຍການອີກ</div>';
  }

  return '<div class="mb-4 rounded-2xl border overflow-hidden '+(hasProblem?'border-amber-300':'border-slate-200')+'">' +
    // ── header bar ───────────────────────────────────────────
    '<div class="flex flex-wrap items-center gap-3 px-4 py-2.5 '+(hasProblem?'bg-amber-50':'bg-emerald-50')+'">' +
    '<span class="font-bold text-sm '+(hasProblem?'text-amber-800':'text-emerald-700')+'">🔧 ສະຖານະ Maintenance</span>' +
    '<div class="flex flex-wrap gap-1.5">' +
    (active.length   ? '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-300">⏳ Active: '+active.length+'</span>' : '') +
    (cannotR.length  ? '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-orange-100 text-orange-700 border border-orange-300">🚫 ສ້ອມບໍ່ໄດ້: '+cannotR.length+'</span>' : '') +
    (done.length     ? '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-300">✅ ສຳເລັດ: '+done.length+'</span>' : '') +
    '</div>' +
    '<div class="ml-auto flex gap-1.5">' +
    (_can('maintenance.create')
      ? '<button onclick="openCreateMRFromStock(null,null,null,\''+locId+'\')" class="btn text-xs bg-orange-500 hover:bg-orange-600 text-white border-0 py-1 px-3">🔧 + ແຈ້ງສ້ອມ</button>'
      : '') +
    '<button onclick="showPage(\'maintenance\')" class="btn btn-secondary text-xs py-1 px-3">ເບິ່ງທັງໝົດ →</button>' +
    '</div></div>' +
    // ── rows ─────────────────────────────────────────────────
    (rowsHtml ? '<div class="bg-white px-4">'+rowsHtml+'</div>' : '') +
    '</div>';
}

// MAINTENANCE TAB CONTENT  (inside Site page tab)

function _loadSiteMaintenance(locId) {
  var el = document.getElementById('siteMaintTable');
  if (!el) return;

  var mrs = ((STATE.data.maintenance||[])||[])
    .filter(function(m){ return m.branchId===locId || m.siteId===locId; })
    .sort(function(a,b){
      var o={PENDING:0,APPROVED:1,IN_PROGRESS:2,CANNOT_REPAIR:3,REJECTED:4,COMPLETED:5,DISPOSED:6};
      return (o[a.status]||9)-(o[b.status]||9);
    });

  if (!mrs.length) {
    el.innerHTML =
      '<div class="card p-10 text-center">' +
      '<div class="text-5xl mb-3">🔧</div>' +
      '<div class="text-slate-500 font-semibold mb-4">ບໍ່ມີໃບສ້ອມແປງໃນ location ນີ້</div>' +
      (_can('maintenance.create')
        ? '<button onclick="openCreateMRFromStock(null,null,null,\''+locId+'\')" class="btn btn-primary">🔧 + ສ້າງໃບແຈ້ງສ້ອມ</button>'
        : '') +
      '</div>';
    return;
  }

  var isApprover = _can('maintenance.approve');
  var canUpdate  = _can('maintenance.update');
  var canDispose = _can('maintenance.dispose');

  el.innerHTML =
    '<div class="flex justify-between items-center mb-3">' +
    '<span class="text-sm font-bold text-slate-700">'+mrs.length+' ໃບສ້ອມແປງ</span>' +
    (_can('maintenance.create')
      ? '<button onclick="openCreateMRFromStock(null,null,null,\''+locId+'\')" class="btn btn-primary text-sm">🔧 + ແຈ້ງສ້ອມໃໝ່</button>'
      : '') +
    '</div>' +
    mrs.map(function(m){
      var st = _MR_STATUS[m.status]||_MR_STATUS.PENDING;
      var pr = _MR_PRIORITY[m.priority]||_MR_PRIORITY.NORMAL;
      var it = _MR_ISSUE[m.issueType]||_MR_ISSUE.OTHER;

      var actions = '<button onclick="openMRDetail(\''+m.id+'\')" class="btn btn-secondary text-xs px-2 py-1">👁 ລາຍລະອຽດ</button>';
      if (m.status==='PENDING' && isApprover)
        actions += '<button onclick="openMRApproval(\''+m.id+'\')" class="btn btn-primary text-xs px-2 py-1">✅ ອະນຸມັດ</button>' +
                   '<button onclick="openMRReject(\''+m.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-red-600 border-red-200">❌ ປະຕິເສດ</button>';
      if (m.status==='APPROVED' && canUpdate)
        actions += '<button onclick="openMRProgress(\''+m.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-blue-600">🔧 ເລີ່ມ</button>';
      if (m.status==='IN_PROGRESS' && isApprover)
        actions +=
          '<button onclick="openMRComplete(\''+m.id+'\')" class="btn text-xs px-2 py-1 bg-emerald-600 text-white hover:bg-emerald-700">' +
          '✅ ສ້ອມສຳເລັດ + ລາຄາ</button>' +
          '<button onclick="openMRCannotRepair(\''+m.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-orange-600 border-orange-200">🚫 ສ້ອມບໍ່ໄດ້</button>';
      if ((m.status==='CANNOT_REPAIR'||m.status==='COMPLETED') && canDispose)
        actions += '<button onclick="openMRDispose(\''+m.id+'\')" class="btn btn-secondary text-xs px-2 py-1 text-red-600 border-red-200">🗑️ ທຳລາຍ</button>';

      // cost/result summary line
      var resultLine = '';
      if (m.status==='COMPLETED')
        resultLine = '<div class="mt-1 text-[10px] bg-emerald-50 border border-emerald-200 rounded-lg px-2 py-1 text-emerald-700">' +
          '✅ ສ້ອມສຳເລັດ: '+fmtDate(m.completedDate)+' · <strong>ລາຄາຈິງ: LAK '+fmtNum(m.actualCost)+'</strong></div>';
      else if (m.status==='CANNOT_REPAIR')
        resultLine = '<div class="mt-1 text-[10px] bg-orange-50 border border-orange-200 rounded-lg px-2 py-1 text-orange-700">' +
          '🚫 '+m.cannotRepairReason+'</div>';
      else if (m.status==='DISPOSED')
        resultLine = '<div class="mt-1 text-[10px] bg-red-50 border border-red-200 rounded-lg px-2 py-1 text-red-700">' +
          '🗑️ ທຳລາຍ: '+fmtDate(m.disposalDate)+' ('+m.disposalMethod+')</div>';

      return '<div class="card mb-2 overflow-hidden hover:shadow-md transition-shadow' +
        (m.priority==='CRITICAL'&&m.status!=='COMPLETED'&&m.status!=='DISPOSED' ? ' ring-2 ring-red-400' : '') + '">' +
        // status stripe
        '<div class="h-1" style="background:' +
          (m.status==='COMPLETED'?'#10b981':m.status==='CANNOT_REPAIR'?'#f97316':
           m.status==='DISPOSED'?'#94a3b8':m.status==='IN_PROGRESS'?'#8b5cf6':
           m.status==='REJECTED'?'#ef4444':'#f59e0b') + '"></div>' +
        '<div class="p-3 flex flex-wrap items-start gap-3">' +
        // left
        '<div class="flex-1 min-w-0">' +
        '<div class="flex flex-wrap items-center gap-2 mb-1">' +
        '<span class="font-mono text-[10px] text-slate-400">'+m.mrNumber+'</span>' +
        '<span class="text-[10px] font-bold px-2 py-0.5 rounded-full '+st.cls+'">'+st.icon+' '+st.en+'</span>' +
        '<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded-full '+pr.cls+'">'+pr.icon+' '+m.priority+'</span>' +
        '<span class="text-[10px] text-slate-400">'+it.icon+' '+it.label+'</span>' +
        '</div>' +
        '<div class="text-sm font-bold text-slate-800">'+m.assetName+
        ' <span class="font-mono text-xs font-normal text-slate-400">'+m.assetSku+'</span></div>' +
        '<div class="text-xs text-slate-500 mt-0.5">'+m.description+'</div>' +
        resultLine +
        '<div class="text-[10px] text-slate-400 mt-1">' +
        'ແຈ້ງ: '+fmtDate(m.reportDate)+' · ໂດຍ: '+m.reportedByName +
        (m.assignedTo ? ' · 👤 ຊ່າງ: <strong class="text-slate-600">'+m.assignedTo+'</strong>' : '') +
        (m.scheduledDate ? ' · 📅 '+fmtDate(m.scheduledDate) : '') +
        '</div>' +
        '</div>' +
        // right: action buttons
        '<div class="flex flex-col gap-1 flex-shrink-0 items-end"><div class="flex flex-wrap gap-1 justify-end">'+actions+'</div></div>' +
        '</div></div>';
    }).join('');
}

// ═══════════════════════════════════════════════════════════
// openCreateMRFromStock
//   productId / sku / productName  →  null  = generic (no pre-selected asset)
//                                  →  value = pre-filled from stock row
//   locId  →  Branch ID (B001…) or Site ID (SI001…)
// ═══════════════════════════════════════════════════════════
function openCreateMRFromStock(productId, sku, productName, locId) {
  var safeLocId = locId || '';
  var isSiteLoc = safeLocId.startsWith('SI');
  var branch = isSiteLoc
    ? ((STATE.data.branches||[]).find(function(b){
        return !!(STATE.data.sites||[]).find(function(s){return s.id===safeLocId && s.branchId===b.id;});
      })||{})
    : ((STATE.data.branches||[]).find(function(b){return b.id===safeLocId;})||{});
  var site    = isSiteLoc ? ((STATE.data.sites||[]).find(function(s){return s.id===safeLocId;})||{}) : {};
  var locName = isSiteLoc ? (site.name||safeLocId) : (branch.name||safeLocId);

  // ── Product dropdown: assets first, then all others ──
  var assetProds = (STATE.data.products||[]).filter(function(p){
    var cat = ((STATE.data.categories||[])||[]).find(function(c){return c.id===p.categoryId;});
    return cat && _ASSET_CAT_TYPES.indexOf(cat.type||cat.code) > -1;
  });
  var nonAssetProds = (STATE.data.products||[]).filter(function(p){
    var cat = ((STATE.data.categories||[])||[]).find(function(c){return c.id===p.categoryId;});
    return !(cat && _ASSET_CAT_TYPES.indexOf(cat.type||cat.code) > -1);
  });
  var allProds = assetProds.concat(nonAssetProds);
  if (!allProds.length) allProds = (STATE.data.products||[]); // fallback

  var assetOptHtml = '<option value="">— ເລືອກ Equipment / ສິນຄ້າ —</option>' +
    (assetProds.length ? '<optgroup label="🔩 Equipment / Asset">' +
    assetProds.map(function(p){
      var sel = (p.id === productId) ? ' selected' : '';
      return '<option value="'+p.id+'|'+p.sku+'|'+encodeURIComponent(p.name)+'"'+sel+'>'+p.sku+' — '+p.name+'</option>';
    }).join('') + '</optgroup>' : '') +
    (nonAssetProds.length ? '<optgroup label="📦 ສິນຄ້າທົ່ວໄປ / General Stock">' +
    nonAssetProds.map(function(p){
      var sel = (p.id === productId) ? ' selected' : '';
      return '<option value="'+p.id+'|'+p.sku+'|'+encodeURIComponent(p.name)+'"'+sel+'>'+p.sku+' — '+p.name+'</option>';
    }).join('') + '</optgroup>' : '');

  var branchOptHtml = (STATE.data.branches||[]).map(function(b){
    return '<option value="'+b.id+'"'+(b.id===branch.id?' selected':'')+'>🏢 '+b.name+'</option>';
  }).join('');

  var siteOptHtml = '<option value="">— ສ່ວນກາງ / ສາຂາເທົ່ານັ້ນ —</option>' +
    (STATE.data.sites||[]).map(function(s){
      return '<option value="'+s.id+'"'+(s.id===safeLocId?' selected':'')+'>📍 '+s.name+' ('+s.clientName+')</option>';
    }).join('');

  var isAssetItem = productId ? (function(){
    var p2 = ((STATE.data.products||[])||[]).find(function(p){return p.id===productId;});
    if (!p2) return false;
    var cat2 = ((STATE.data.categories||[])||[]).find(function(c){return c.id===p2.categoryId;});
    return cat2 && _ASSET_CAT_TYPES.indexOf(cat2.type||cat2.code) > -1;
  })() : false;

  var preFillBanner = productId
    ? '<div class="flex items-center gap-3 p-3 bg-orange-50 border-2 border-orange-300 rounded-xl">' +
      '<span class="text-3xl flex-shrink-0">'+(isAssetItem?'🔩':'📦')+'</span>' +
      '<div><div class="font-bold text-orange-800">'+productName+'</div>' +
      '<div class="font-mono text-xs text-orange-600">'+sku+'</div></div>' +
      (isAssetItem ?
        '<div class="ml-auto text-right">' +
        '<div class="text-[10px] text-slate-400">Status ທັນທີ:</div>' +
        '<span class="text-xs font-bold px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-300">🔧 UNDER MAINTENANCE</span>' +
        '</div>' : '') +
      '</div>'
    : '';

  openModal('🔧 ແຈ້ງສ້ອມແປງ / Maintenance Request',
    '<div class="space-y-3">' +
    preFillBanner +
    // ── asset picker ────────────────────────────────────────
    '<div>' +
    '<label class="field-label">🔩 Equipment / ສິນຄ້າທີ່ຕ້ອງການສ້ອມ *</label>' +
    '<select id="mr_asset" class="select" onchange="_mrAssetChange(this)">' + assetOptHtml + '</select>' +
    '<div id="mr_assetInfo" class="hidden mt-2 p-2 bg-orange-50 rounded-lg text-xs text-slate-600 border border-orange-200"></div>' +
    '</div>' +
    // ── location ─────────────────────────────────────────────
    '<div class="grid grid-cols-2 gap-2">' +
    '<div><label class="field-label">🏢 Branch *</label><select id="mr_branch" class="select">'+branchOptHtml+'</select></div>' +
    '<div><label class="field-label">📍 Site (optional)</label><select id="mr_site" class="select">'+siteOptHtml+'</select></div>' +
    '</div>' +
    // ── issue details ─────────────────────────────────────────
    '<div class="grid grid-cols-2 gap-2">' +
    '<div><label class="field-label">ປະເພດບັນຫາ *</label><select id="mr_issue" class="select">' +
    Object.keys(_MR_ISSUE).map(function(k){
      return '<option value="'+k+'">'+_MR_ISSUE[k].icon+' '+_MR_ISSUE[k].label+'</option>';
    }).join('')+'</select></div>' +
    '<div><label class="field-label">Priority *</label><select id="mr_priority" class="select">' +
    Object.keys(_MR_PRIORITY).map(function(k){
      return '<option value="'+k+'"'+(k==='NORMAL'?' selected':'')+'>'+_MR_PRIORITY[k].icon+' '+k+'</option>';
    }).join('')+'</select></div>' +
    '</div>' +
    '<div><label class="field-label">ວັນທີ</label>' +
    '<input id="mr_date" type="date" class="input" value="'+new Date().toISOString().split('T')[0]+'"></div>' +
    // ── description ──────────────────────────────────────────
    '<div><label class="field-label">ຄຳອະທິບາຍ (EN) *</label>' +
    '<textarea id="mr_desc" class="input" rows="2" placeholder="Describe the fault / issue clearly..."></textarea></div>' +
    '<div><label class="field-label">ຄຳອະທິບາຍ (ລາວ)</label>' +
    '<textarea id="mr_descLao" class="input" rows="2" placeholder="ອະທິບາຍບັນຫາ..."></textarea></div>' +
    // ── info box ─────────────────────────────────────────────
    '<div class="p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-600">' +
    '<div class="font-bold text-slate-700 mb-1.5">📋 ຂັ້ນຕອນຫຼັງແຈ້ງ:</div>' +
    '<div class="space-y-0.5">' +
    '<div>1️⃣ ສ້ອງໃບ → <span class="font-bold text-amber-600">🔧 UNDER MAINTENANCE</span> ທັນທີ</div>' +
    '<div>2️⃣ Admin / Manager ອະນຸມັດ → assign ຊ່າງ + ວັນ schedule</div>' +
    '<div>3️⃣ ສ້ອມສຳເລັດ → Admin ໃສ່ <span class="font-bold text-emerald-700">ລາຄາຕົວຈິງ (LAK)</span> → <span class="font-bold text-emerald-600">✅ OPERATIONAL</span></div>' +
    '<div>4️⃣ ສ້ອມບໍ່ໄດ້ → ລະບຸເຫດຜົນ → ທຳລາຍ</div>' +
    '</div></div>' +
    '<button onclick="submitCreateMRFromStock(\''+safeLocId+'\')" class="btn btn-primary w-full py-3">📤 ສ່ງໃບແຈ້ງສ້ອມ</button>' +
    '</div>', true);

  // Auto-show asset info if pre-filled
  if (productId) {
    setTimeout(function(){
      var sel = document.getElementById('mr_asset');
      if (sel && sel.value) _mrAssetChange(sel);
    }, 80);
  }
}

function submitCreateMRFromStock(locId) {
  var assetVal = (document.getElementById('mr_asset')||{}).value||'';
  var desc     = ((document.getElementById('mr_desc')||{}).value||'').trim();
  if (!assetVal) { showToast('ເລືອກ Equipment / Asset ກ່ອນ','warn'); return; }
  if (!desc)     { showToast('ໃສ່ຄຳອະທິບາຍບັນຫາ','warn'); return; }

  var parts    = assetVal.split('|');
  var assetId  = parts[0];
  var assetSku = parts[1];

function _mrAssetChange(sel) {

function submitMRDispose(id){
  var d = {
    disposalDate:   (document.getElementById('dp_date')||{}).value||'',
    disposalReason: ((document.getElementById('dp_reason')||{}).value||'').trim(),
    disposalNote:   ((document.getElementById('dp_note')||{}).value||''),
    disposalMethod: (document.getElementById('dp_method')||{}).value||'DISCARD',
  };
  if (!d.disposalDate || !d.disposalReason) { showToast('ໃສ່ວັນທີ ແລະ ເຫດຜົນ','warn'); return; }
  callServer('disposeMaintenance',[id,d], function(res){
    if (res.success) {
      var mr = res.data;
      var assetLocKey = mr.siteId || mr.branchId || '';
      if (mr.assetId && assetLocKey) _setAssetStatusLocal(mr.assetId, assetLocKey, 'DISPOSED', mr.id, mr.mrNumber, d.disposalReason);
      closeModal();
      showToast('🗑️ ທຳລາຍ Asset ສຳເລັດ — ບັນທຶກຖາວອນ','success');
      _refreshAfterMaintUpdate(mr);
    }
  });
}

function openMRDetail(id){
  var mr=((STATE.data.maintenance||[])||[]).find(function(x){return x.id===id;})||{};
  var st=_MR_STATUS[mr.status]||_MR_STATUS.PENDING;
  var pr=_MR_PRIORITY[mr.priority]||_MR_PRIORITY.NORMAL;
  var it=_MR_ISSUE[mr.issueType]||_MR_ISSUE.OTHER;

  function row(label,val){return '<tr><td class="py-1.5 pr-4 text-xs font-semibold text-slate-500 whitespace-nowrap">'+label+'</td><td class="py-1.5 text-xs text-slate-700">'+val+'</td></tr>';}

  var histHtml = (mr.repairHistory&&mr.repairHistory.length)?
    mr.repairHistory.map(function(h){
      return '<div class="flex gap-2 p-2 bg-slate-50 rounded-lg text-xs">'+
        '<div class="w-2 h-2 rounded-full bg-emerald-500 flex-shrink-0 mt-0.5"></div>'+

  var html=
    '<div class="space-y-3">'+
    // Status banner
    '<div class="flex items-center gap-2 p-3 rounded-xl '+st.cls+'">'+
    '<span class="text-2xl">'+st.icon+'</span>'+
    '<div><div class="font-bold text-sm">'+st.en+' / '+st.label+'</div>'+
    '<div class="text-xs opacity-70">'+mr.mrNumber+' · '+pr.icon+' '+mr.priority+'</div></div></div>'+
    // Info table
    '<table class="w-full">'+
    row('Asset',mr.assetName+' <span class="font-mono text-slate-400">('+mr.assetSku+')</span>')+
    row('Location',mr.locationName)+
    row('Issue Type',it.icon+' '+it.label)+
    row('Reported',fmtDate(mr.reportDate)+' by '+mr.reportedByName)+
    row('Description','<span class="text-slate-600">'+mr.description+'</span>'+
      (mr.descriptionLao?'<br><span class="text-slate-400">'+mr.descriptionLao+'</span>':''))+
    (mr.approvedAt?row('Approved',fmtDate(mr.approvedAt)+' by '+mr.approvedByName+(mr.approvalNote?' — <em>'+mr.approvalNote+'</em>':'')):'')+
    (mr.assignedTo?row('Assigned to',mr.assignedTo+(mr.scheduledDate?' · 📅 '+fmtDate(mr.scheduledDate):'')+(mr.estimatedCost?' · ปLAK '+fmtNum(mr.estimatedCost):'')  ):'')+
    (mr.progressNote?row('Progress',mr.progressNote):'')+
    (mr.completedDate?row('Completed',fmtDate(mr.completedDate)+' · ຄ່າຈິງ: <strong class="text-emerald-700">LAK '+fmtNum(mr.actualCost)+'</strong>'):'')+
    (mr.cannotRepairReason?row('Cannot Repair','<span class="text-orange-700 font-semibold">'+mr.cannotRepairReason+'</span><br><span class="text-xs text-slate-400">by '+mr.cannotRepairBy+' · '+fmtDate(mr.cannotRepairDate)+'</span>'):'')+
    (mr.disposalDate?row('Disposal','<span class="text-red-700 font-semibold">'+mr.disposalReason+'</span><br>'+
      'Method: '+mr.disposalMethod+' · Date: '+fmtDate(mr.disposalDate)+'<br>'+
      'Approved by: <strong>'+mr.disposalApprovedBy+'</strong>'+(mr.disposalNote?'<br>Note: '+mr.disposalNote:'')):'')+

    '<div class="mt-2"><div class="text-xs font-bold text-slate-500 uppercase mb-1.5">📋 Repair History</div>'+histHtml+'</div>'+
    '</div>';

// ── Export Excel ──────────────────────────────────────────
function _mrExportExcel(){
  var data = window._mrData||[];
  if(!data.length){showToast('ບໍ່ມີຂໍ້ມູນ','warn');return;}
  var wb=XLSX.utils.book_new();

  // Sheet 1: Main list
  var headers=['MR#','Asset','SKU','Location','Issue','Priority','Status','Reported By','Report Date','Assigned To','Scheduled','Est.Cost(LAK)','Actual Cost(LAK)','Completed','Cannot Repair Reason','Disposal Date','Disposal Method','Disposal Reason'];
  var rows=data.map(function(r){return[
    r.mrNumber,r.assetName,r.assetSku,r.locationName,
    (_MR_ISSUE[r.issueType]||{label:r.issueType}).label,r.priority,r.status,
    r.reportedByName,r.reportDate,r.assignedTo||'',r.scheduledDate||'',
    r.estimatedCost||0,r.actualCost||0,r.completedDate||'',
    r.cannotRepairReason||'',r.disposalDate||'',r.disposalMethod||'',r.disposalReason||''
  ];});
  var ws1=XLSX.utils.aoa_to_sheet([
    ['📋 Maintenance Report — '+new Date().toLocaleString()],[],
    headers
  ].concat(rows));
  ws1['!cols']=headers.map(function(){return {wch:18};});
  ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:headers.length-1}}];
  XLSX.utils.book_append_sheet(wb,ws1,'Maintenance');

  // Sheet 2: Summary
  var byStatus={};
  data.forEach(function(r){byStatus[r.status]=(byStatus[r.status]||0)+1;});
  var sum=[['Summary'],['Status','Count']].concat(Object.keys(byStatus).map(function(k){return[k,byStatus[k]];}));
  var ws2=XLSX.utils.aoa_to_sheet(sum);
  ws2['!cols']=[{wch:20},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');

  XLSX.writeFile(wb,'Maintenance_Report_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('✅ Excel ດາວໂຫລດສຳເລັດ','success');
}

// ── Export PDF ────────────────────────────────────────────
function _mrExportPDF(){
  var data = window._mrData||[];
  if(!data.length){showToast('ບໍ່ມີຂໍ້ມູນ','warn');return;}
  if(typeof jspdf==='undefined'){showToast('jsPDF not loaded','error');return;}
  var doc=new jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  var pw=doc.internal.pageSize.getWidth();
  doc.setFillColor(30,41,59);doc.rect(0,0,pw,22,'F');
  doc.setTextColor(255,255,255);doc.setFontSize(14);doc.setFont(undefined,'bold');
  doc.text('🔧 MAINTENANCE TRACKING REPORT',10,10);
  doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(148,163,184);
  doc.text('Generated: '+new Date().toLocaleString()+'  |  Total: '+data.length+' records',10,17);

  // KPI summary
  var pending=data.filter(function(r){return r.status==='PENDING';}).length;
  var completed=data.filter(function(r){return r.status==='COMPLETED';}).length;
  var disposed=data.filter(function(r){return r.status==='DISPOSED';}).length;
  doc.setFillColor(248,250,252);doc.rect(0,22,pw,12,'F');
  doc.setTextColor(51,65,85);doc.setFontSize(9);doc.setFont(undefined,'bold');
  doc.text('Pending: '+pending,10,30);doc.text('Completed: '+completed,60,30);doc.text('Disposed: '+disposed,120,30);

  doc.autoTable({
    head:[['MR#','Asset','SKU','Location','Priority','Status','Reported','Completed','Cost (LAK)']],
    body:data.map(function(r){return[r.mrNumber,r.assetName,r.assetSku,r.locationName,r.priority,r.status,r.reportDate,r.completedDate||'—',r.actualCost?fmtNum(r.actualCost):'—'];}),
    startY:36,styles:{fontSize:7.5,cellPadding:2.5},
    headStyles:{fillColor:[30,41,59],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    alternateRowStyles:{fillColor:[248,250,252]},
    didParseCell:function(d){
      if(d.section==='body'){
        var v=String(d.cell.raw||'');
        if(v==='CANNOT_REPAIR'){d.cell.styles.textColor=[234,88,12];d.cell.styles.fontStyle='bold';}
        if(v==='DISPOSED'){d.cell.styles.textColor=[100,116,139];}
        if(v==='COMPLETED'){d.cell.styles.textColor=[5,150,105];}
        if(v==='CRITICAL'){d.cell.styles.textColor=[220,38,38];d.cell.styles.fontStyle='bold';}
      }
    },
    margin:{left:8,right:8},
    didDrawPage:function(){doc.setFontSize(7);doc.setTextColor(150,150,150);doc.text('Confidential | Page '+doc.internal.getCurrentPageInfo().pageNumber,pw/2,doc.internal.pageSize.getHeight()-5,{align:'center'});}
  });
  doc.save('Maintenance_Report_'+new Date().toISOString().slice(0,10)+'.pdf');
  showToast('📄 PDF ດາວໂຫລດສຳເລັດ','success');
}
