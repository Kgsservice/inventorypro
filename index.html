  // Build current permission matrix for each role
  function getRolePerms(role) {
    if (_CUSTOM_ROLES[role]) return _CUSTOM_ROLES[role].permissions||[];
    return (ROLE_DEFAULTS[role]||[]).slice();
  }

  // ── Header ────────────────────────────────────────────
  var html =
    '<div class="flex flex-wrap items-center justify-between gap-3 mb-5">' +
    '<div><h2 class="text-lg font-bold text-slate-800">🛡️ Role Designer</h2>' +
    '<p class="text-xs text-slate-400 mt-0.5">ກຳນົດ Role, ໜ້າ, ຟັງຊັ່ນ, ແບບຟອມ ທີ່ແຕ່ລະ Role ເຂົ້າໃຊ້ໄດ້</p></div>' +
    '<div class="flex gap-2">' +
    '<button onclick="_rdOpenCreateRole()" class="btn btn-primary text-sm">+ ສ້າງ Role ໃໝ່</button>' +
    '<button onclick="_rdSaveAll()" class="btn btn-secondary text-sm">💾 Save All Changes</button>' +
    '</div></div>' +

    // Legend
    '<div class="flex flex-wrap gap-2 mb-4">' +
    Object.keys(_RD_TYPE_STYLE).map(function(t){
      var s=_RD_TYPE_STYLE[t];
      return '<span class="flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full '+s.bg+' '+s.text+' font-semibold border border-white/30">'+s.icon+' '+s.label+'</span>';
    }).join('') +
    '<span class="text-xs text-slate-400 self-center ml-2">คลิก cell เพื่อ toggle permission</span>' +
    '</div>' +

    // Main matrix table
    '<div class="card overflow-hidden shadow-sm" style="overflow-x:auto">' +
    '<table class="w-full text-xs border-collapse" id="rdMatrix">' +
    '<thead>' +
    '<tr class="bg-slate-800">' +
    '<th class="px-3 py-3 text-left text-slate-300 font-bold sticky left-0 bg-slate-800 z-10 min-w-64">ໜ້າ / Function / Form</th>' +
    '<th class="px-2 py-3 text-center text-slate-300 font-bold min-w-12">Type</th>' +
    roles.map(function(role){
      var perms = getRolePerms(role);
      var total = Object.keys(PERMS).length;
      var pct   = Math.round(perms.length/total*100);
      var grad  = roleColors[role]||'from-slate-600 to-slate-800';
      var isCustom = !!_CUSTOM_ROLES[role];
      return '<th class="px-2 py-2 text-center min-w-28" style="min-width:110px">' +
        '<div class="bg-gradient-to-b '+grad+' rounded-lg px-2 py-1.5 mx-0.5">' +
        '<div class="text-white font-bold text-xs whitespace-nowrap">'+role+(isCustom?' ✨':'')+'</div>' +
        '<div class="text-[10px] text-white/60 mt-0.5">'+(roleLao[role]||'Custom')+'</div>' +
        '<div class="mt-1 h-1 rounded-full bg-white/20 overflow-hidden">' +
        '<div class="h-full rounded-full bg-white/80 transition-all" style="width:'+pct+'%" id="rdBar_'+role+'"></div></div>' +
        '<div class="text-[10px] text-white/60 mt-0.5" id="rdCount_'+role+'">'+perms.length+'/'+total+'</div>' +
        (isCustom ? '<button onclick="_rdDeleteCustomRole(\''+role+'\')" class="text-[9px] text-red-300 hover:text-red-100 mt-0.5 block mx-auto">✕ ລຶບ</button>' : '') +
        '</div></th>';
    }).join('') +
    '</tr></thead><tbody>';

  // Build rows grouped by page section
  ROLE_DESIGN_CATALOGUE.forEach(function(section){
    // Section header row
    html += '<tr class="bg-slate-100">' +
      '<td class="px-3 py-2.5 font-bold text-slate-700 sticky left-0 bg-slate-100 z-10" colspan="2">' +
      section.pageLabel + '<span class="ml-2 text-[10px] text-slate-400 font-normal">/ '+section.pageLao+'</span></td>' +
      roles.map(function(role){
        // Group toggle button
        var perms = getRolePerms(role);
        var groupKeys = section.perms.map(function(p){return p.key;});
        var allChecked = groupKeys.every(function(k){return perms.indexOf(k)>-1;});
        return '<td class="px-2 py-2 text-center">' +
          '<button onclick="_rdToggleSection(\''+section.page+'\',\''+role+'\')" ' +
          'class="text-[10px] px-2 py-0.5 rounded font-semibold transition-colors '+(allChecked?'bg-emerald-500 text-white hover:bg-emerald-600':'bg-slate-200 text-slate-500 hover:bg-slate-300')+'" ' +
          'title="'+(allChecked?'ປິດ':'ເປີດ')+' ທຸກ permission ໃນໝວດນີ້">'+
          (allChecked?'✅ ALL':'○ OFF')+'</button></td>';
      }).join('') +
      '</tr>';

    // Permission rows
    section.perms.forEach(function(perm){
      var ts = _RD_TYPE_STYLE[perm.type]||_RD_TYPE_STYLE.page;
      html += '<tr class="border-b border-slate-100 hover:bg-slate-50/80 transition-colors">' +
        // Label
        '<td class="px-3 py-2 sticky left-0 bg-white z-10">' +
        '<div class="flex items-center gap-2">' +
        '<span class="text-[10px] px-1.5 py-0.5 rounded '+ts.bg+' '+ts.text+' font-bold">'+ts.icon+'</span>' +
        '<div>' +
        '<div class="font-semibold text-slate-700 text-xs">'+perm.label+'</div>' +
        '<div class="text-[10px] text-slate-400">'+perm.lao+'</div>' +
        '<div class="text-[9px] font-mono text-slate-300">'+perm.key+'</div>' +
        '</div></div></td>' +
        // Type badge
        '<td class="px-2 py-2 text-center"><span class="text-[10px] '+ts.bg+' '+ts.text+' px-1.5 py-0.5 rounded font-semibold">'+ts.label+'</span></td>' +
        // Role cells
        roles.map(function(role){
          var perms = getRolePerms(role);
          var has = perms.indexOf(perm.key) > -1;
          var isAdmin = role === 'ADMIN';
          return '<td class="px-2 py-2 text-center">' +
            '<button ' +
            (isAdmin ? 'disabled title="ADMIN ມີສິດທຸກຢ່າງສະເໝີ"' : 'onclick="_rdTogglePerm(\''+perm.key+'\',\''+role+'\')" title="Click to toggle"') +
            ' class="w-8 h-8 rounded-lg font-bold text-sm transition-all '+(isAdmin?'bg-emerald-100 text-emerald-500 cursor-not-allowed opacity-60':has?'bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm':'bg-slate-100 text-slate-300 hover:bg-amber-100 hover:text-amber-500')+'" ' +
            'id="rdCell_'+perm.key+'_'+role+'">' +
            (isAdmin?'✓':has?'✓':'—') +
            '</button></td>';
        }).join('') +
        '</tr>';
    });
  });

  html += '</tbody></table></div>' +
    // Bottom action bar
    '<div class="flex flex-wrap gap-3 items-center mt-4 p-4 bg-slate-50 rounded-xl">' +
    '<div class="text-xs text-slate-500 flex-1">💡 ການປ່ຽນແປງໃນໜ້ານີ້ ມີຜົນທັນທີ ໃນ session ນີ້. Save → export JSON ເພື່ອ backup.</div>' +
    '<button onclick="_rdResetAll()" class="btn btn-secondary text-xs text-red-500 border-red-200 hover:bg-red-50">🔄 Reset ທຸກ Role</button>' +
    '<button onclick="_rdExportJSON()" class="btn btn-secondary text-xs">⬇️ Export JSON</button>' +
    '<button onclick="_rdImportJSON()" class="btn btn-secondary text-xs">⬆️ Import JSON</button>' +
    '</div>';

  document.getElementById('pageContent').innerHTML = html;
}

// ── Toggle single permission cell ─────────────────────────
function _rdTogglePerm(permKey, role) {
  if (role === 'ADMIN') return;
  if (!_CUSTOM_ROLES[role]) {
    _CUSTOM_ROLES[role] = {permissions: (ROLE_DEFAULTS[role]||[]).slice()};
  }
  var perms = _CUSTOM_ROLES[role].permissions;
  var idx = perms.indexOf(permKey);
  if (idx > -1) perms.splice(idx,1);
  else perms.push(permKey);

  // Update ROLE_DEFAULTS live so _can() picks it up immediately
  ROLE_DEFAULTS[role] = perms.slice();
  // If current user has this role, update their perms
  if (STATE.user && STATE.user.role === role) {
    STATE.user.permissions = perms.slice();
    _buildNavVisibility();
  }

  _rdRefreshCell(permKey, role);
  _rdRefreshBar(role);
}

// ── Toggle all perms in a section for a role ──────────────
function _rdToggleSection(pageKey, role) {
  if (role === 'ADMIN') return;
  var section = ROLE_DESIGN_CATALOGUE.find(function(s){return s.page===pageKey;});
  if (!section) return;
  if (!_CUSTOM_ROLES[role]) {
    _CUSTOM_ROLES[role] = {permissions: (ROLE_DEFAULTS[role]||[]).slice()};
  }
  var perms = _CUSTOM_ROLES[role].permissions;
  var keys = section.perms.map(function(p){return p.key;});
  var allOn = keys.every(function(k){return perms.indexOf(k)>-1;});
  keys.forEach(function(k){
    var idx = perms.indexOf(k);
    if (allOn) { if(idx>-1) perms.splice(idx,1); }
    else { if(idx===-1) perms.push(k); }
  });
  ROLE_DEFAULTS[role] = perms.slice();
  if (STATE.user && STATE.user.role === role) {
    STATE.user.permissions = perms.slice();
    _buildNavVisibility();
  }
  // Re-render whole page to update section header toggle buttons
  renderRoleDesigner();
}

function _rdRefreshCell(permKey, role) {
  var btn = document.getElementById('rdCell_'+permKey+'_'+role);
  if (!btn) return;
  var perms = (ROLE_DEFAULTS[role]||[]);
  var has = perms.indexOf(permKey) > -1;
  btn.className = 'w-8 h-8 rounded-lg font-bold text-sm transition-all '+(has?'bg-emerald-500 text-white hover:bg-emerald-600 shadow-sm':'bg-slate-100 text-slate-300 hover:bg-amber-100 hover:text-amber-500');
  btn.textContent = has ? '✓' : '—';
}

function _rdRefreshBar(role) {
  var perms = ROLE_DEFAULTS[role]||[];
  var total = Object.keys(PERMS).length;
  var pct = Math.round(perms.length/total*100);
  var bar = document.getElementById('rdBar_'+role);
  var cnt = document.getElementById('rdCount_'+role);
  if(bar) bar.style.width = pct+'%';
  if(cnt) cnt.textContent = perms.length+'/'+total;
}

// ── Create custom role ────────────────────────────────────
function _rdOpenCreateRole() {
  openModal('+ ສ້າງ Role ໃໝ່',
    '<div class="space-y-3">' +
    '<div><label class="field-label">Role Name (UPPER_CASE) *</label>' +
    '<input id="newRoleName" class="input font-mono" placeholder="WAREHOUSE_STAFF"></div>' +
    '<div><label class="field-label">ຊື່ (ລາວ)</label><input id="newRoleLao" class="input" placeholder="ພະນັກງານສາງ"></div>' +
    '<div><label class="field-label">Copy permissions from</label>' +
    '<select id="newRoleBase" class="select">' +
    ['ADMIN','MANAGER','BRANCH_STAFF','SITE_STAFF'].concat(Object.keys(_CUSTOM_ROLES)).map(function(r){
      return '<option value="'+r+'">'+r+'</option>';
    }).join('') +
    '<option value="BLANK">— Blank (no permissions)</option>' +
    '</select></div>' +
    '<button onclick="_rdConfirmCreateRole()" class="btn btn-primary w-full">✅ ສ້າງ Role</button>' +
    '</div>');
}

function _rdConfirmCreateRole() {
  var name = (document.getElementById('newRoleName').value||'').trim().toUpperCase().replace(/\s+/g,'_');
  if (!name) { showToast('ໃສ່ Role name ກ່ອນ','warn'); return; }
  if (ROLE_DEFAULTS[name]||_CUSTOM_ROLES[name]) { showToast('Role ນີ້ມີຢູ່ແລ້ວ','warn'); return; }
  var base = document.getElementById('newRoleBase').value;
  var perms = base==='BLANK' ? [] : (ROLE_DEFAULTS[base]||[]).slice();
  _CUSTOM_ROLES[name] = {label:name, lao:document.getElementById('newRoleLao').value, permissions:perms};
  ROLE_DEFAULTS[name] = perms.slice();
  closeModal();
  showToast('✅ ສ້າງ Role "'+name+'" ສຳເລັດ','success');
  renderRoleDesigner();
}

function _rdDeleteCustomRole(role) {
  if (!confirm('ລຶບ Role "'+role+'" ທັງໝົດ?')) return;
  delete _CUSTOM_ROLES[role];
  delete ROLE_DEFAULTS[role];
  showToast('ລຶບ Role '+role+' ແລ້ວ','success');
  renderRoleDesigner();
}

// ── Save / Reset / Export ─────────────────────────────────
function _rdSaveAll() {
  // Apply all current role defaults to all users of those roles
  var changed = 0;
  Object.keys(ROLE_DEFAULTS).forEach(function(role){
    if (STATE.user && STATE.user.role === role) {
      STATE.user.permissions = (ROLE_DEFAULTS[role]||[]).slice();
      changed++;
    }
  });
  _buildNavVisibility();
  showToast('✅ Saved & applied to current session'+(changed?' — Nav updated':''),'success');
}

function _rdResetAll() {
  if (!confirm('Reset ທຸກ Role ກັບ defaults ເດີມ?')) return;
  _CUSTOM_ROLES = {};
  ROLE_DEFAULTS.MANAGER     = ['dashboard.view','inventory.cw.view','inventory.cw.manage','inventory.branch.view','inventory.branch.manage','inventory.site.view','lots.view','stockcard.view','movements.view','pr.view','pr.create','pr.approve','po.view','po.create','po.receive','dispatch.view','dispatch.create','dispatch.approve','sr.view','sr.create','sr.approve','usage.view','usage.create','usage.approve','project.view','project.create','project.approve','reports.view','reports.export','lowstock.view','products.view','products.manage','categories.manage','suppliers.manage','branches.manage','scan.use'];
  ROLE_DEFAULTS.BRANCH_STAFF= ['dashboard.view','inventory.branch.view','inventory.site.view','lots.view','stockcard.view','movements.view','pr.view','pr.create','dispatch.view','sr.view','sr.create','usage.view','usage.create','project.view','reports.view','lowstock.view','products.view','scan.use'];
  ROLE_DEFAULTS.SITE_STAFF  = ['dashboard.view','inventory.site.view','usage.view','usage.create','sr.view','sr.create','project.view','scan.use'];
  ROLE_DEFAULTS.ADMIN       = Object.keys(PERMS);
  showToast('🔄 Reset ສຳເລັດ','success');
  renderRoleDesigner();
}

function _rdExportJSON() {
  var data = {roles: {}, exportedAt: new Date().toISOString(), version:'1.0'};
  ['ADMIN','MANAGER','BRANCH_STAFF','SITE_STAFF'].concat(Object.keys(_CUSTOM_ROLES)).forEach(function(r){
    data.roles[r] = {permissions: (ROLE_DEFAULTS[r]||[]).slice()};
    if(_CUSTOM_ROLES[r]) data.roles[r].lao = _CUSTOM_ROLES[r].lao||'';
  });
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'InventoryPro_Roles_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('⬇️ Export JSON ສຳເລັດ','success');
}

function _rdImportJSON() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = function(){
    var file = inp.files[0]; if(!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try {
        var data = JSON.parse(e.target.result);
        if(!data.roles) { showToast('Invalid JSON format','error'); return; }
        Object.keys(data.roles).forEach(function(r){
          ROLE_DEFAULTS[r] = data.roles[r].permissions||[];
          if(r!=='ADMIN'&&r!=='MANAGER'&&r!=='BRANCH_STAFF'&&r!=='SITE_STAFF') {
            _CUSTOM_ROLES[r] = data.roles[r];
          }
        });
        showToast('✅ Import '+Object.keys(data.roles).length+' roles ສຳເລັດ','success');
        renderRoleDesigner();
      } catch(ex){ showToast('Parse error: '+ex.message,'error'); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(inp); inp.click(); document.body.removeChild(inp);
}


</script>
