// ── Data builders ─────────────────────────────────────────
function _rptLocName(id) {
  if (!id) return '—';
  if (id==='CW001') return 'Company WH';
  var b=(STATE.data.branches||[]).find(function(x){return x.id===id;});
  if(b) return b.name;
  var s=(STATE.data.sites||[]).find(function(x){return x.id===id;});
  if(s) return s.name;
  return id;
}
function _rptProd(id) { return (STATE.data.products||[]).find(function(p){return p.id===id;})||{name:'—',sku:'—',unit:'—',costPrice:0}; }
function _rptCatName(catId) { var c=((STATE.data.categories||[]).find(function(x){return x.id===catId;})||{name:'—'}); return _catLabel(c); }
function _rptLocFilter(locId, f) {
  if (!f.loc || f.loc==='ALL') return true;
  return locId === f.loc;
}
function _rptDateFilter(dateStr, f) {
  var d = _dateStr(dateStr);
  if (f.dateFrom && d < f.dateFrom) return false;
  if (f.dateTo   && d > f.dateTo)   return false;
  return true;
}
function _rptProdFilter(prodId, f) {
  if (!f.prod || f.prod==='ALL') return true;
  return prodId === f.prod;
}
function _rptCatFilter(prodId, f) {
  if (!f.cat || f.cat==='ALL') return true;
  var p = _rptProd(prodId);
  return p.categoryId === f.cat;
}

// 1. Movement Report — built from (STATE.data.movements||[]) + dispatches + transfers + SRs + usages
function _rptBuildMovement(f) {
  var rows = [];

  // A. (STATE.data.movements||[]) (stock in/out adjustments)
  ((STATE.data.movements||[])||[]).forEach(function(m){
    if (!_rptDateFilter(m.date,f)) return;
    if (!_rptLocFilter(m.locId,f)) return;
    if (!_rptProdFilter(m.productId,f)) return;
    if (!_rptCatFilter(m.productId,f)) return;
    var p = _rptProd(m.productId);
    rows.push({date:m.date,type:m.type,ref:m.ref||'—',product:p.name,sku:p.sku,location:_rptLocName(m.locId),qty:m.qty,before:m.before,after:m.after,by:m.by||'—',note:m.note||''});
  });

  // B. Dispatches (CW→Branch)
  ((STATE.data.dispatches||[])||[]).filter(function(d){return d.status==='COMPLETED';}).forEach(function(d){
    var items = d.items||[{productId:d.productId,qty:d.qty}];
    items.forEach(function(it){
      if (!_rptDateFilter(d.dispatchedAt||d.createdAt,f)) return;
      if (!_rptLocFilter(d.fromLocId,f) && !_rptLocFilter(d.toLocId,f)) return;
      if (!_rptProdFilter(it.productId,f)) return;
      if (!_rptCatFilter(it.productId,f)) return;
      var p = _rptProd(it.productId);
      rows.push({date:_dateStr(d.dispatchedAt||d.createdAt),type:'DISPATCH',ref:d.bdNumber,product:p.name,sku:p.sku,location:_rptLocName(d.fromLocId)+' → '+_rptLocName(d.toLocId),qty:it.qty||d.qty,before:'—',after:'—',by:d.dispatchedBy||'—',note:d.note||''});
    });
  });

  // C. Transfers (Branch→Site)
  ((STATE.data.transfers||[])||[]).forEach(function(t){
    if (!_rptDateFilter(t.transferredAt,f)) return;
    if (!_rptLocFilter(t.fromLocId,f) && !_rptLocFilter(t.toLocId,f)) return;
    if (!_rptProdFilter(t.productId,f)) return;
    if (!_rptCatFilter(t.productId,f)) return;
    var p = _rptProd(t.productId);
    rows.push({date:_dateStr(t.transferredAt),type:'TRANSFER',ref:t.trNumber,product:p.name,sku:p.sku,location:_rptLocName(t.fromLocId)+' → '+_rptLocName(t.toLocId),qty:t.qty,before:'—',after:'—',by:t.transferredBy||'—',note:t.note||''});
  });

  // D. SR fulfillments
  ((STATE.data.srs||[])||[]).filter(function(s){return s.status==='FULFILLED'||s.status==='APPROVED';}).forEach(function(sr){
    (sr.items||[]).forEach(function(it){
      if (!_rptDateFilter(sr.fulfilledAt||sr.approvedAt||sr.requestedAt,f)) return;
      if (!_rptLocFilter(sr.siteId,f) && !_rptLocFilter(sr.branchId,f)) return;
      if (!_rptProdFilter(it.productId,f)) return;
      if (!_rptCatFilter(it.productId,f)) return;
      var p = _rptProd(it.productId);
      rows.push({date:_dateStr(sr.fulfilledAt||sr.approvedAt||sr.requestedAt),type:'SR-ISSUE',ref:sr.srNumber,product:p.name,sku:p.sku,location:_rptLocName(sr.branchId)+' → '+_rptLocName(sr.siteId),qty:it.qtyApproved||it.qtyRequested,before:'—',after:'—',by:sr.approvedBy||sr.requestedBy||'—',note:sr.note||''});
    });
  });

  // E. Usage (stock consumption)
  ((STATE.data.usages||[])||[]).forEach(function(u){
    (u.items||[]).forEach(function(it){
      if (!_rptDateFilter(u.reportDate,f)) return;
      if (!_rptLocFilter(u.siteId,f)) return;
      if (!_rptProdFilter(it.productId,f)) return;
      if (!_rptCatFilter(it.productId,f)) return;
      var p = _rptProd(it.productId);
      rows.push({date:u.reportDate,type:'USAGE',ref:u.urNumber||u.reportNumber,product:p.name,sku:p.sku,location:_rptLocName(u.siteId),qty:it.qty||it.qtyUsed,before:'—',after:'—',by:u.reportedBy||'—',note:u.workType||''});
    });
  });

  rows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  return rows;
}

// 2. Inventory Valuation — snapshot of current stock
function _rptBuildValuation(f) {
  var rows = [];
  var locs = [{id:'CW001'}].concat((STATE.data.branches||[])).concat((STATE.data.sites||[]));
  (STATE.data.products||[]).forEach(function(p){
    if (!_rptProdFilter(p.id,f)) return;
    if (!_rptCatFilter(p.id,f)) return;
    locs.forEach(function(loc){
      if (!_rptLocFilter(loc.id,f)) return;
      var qty = ((STATE.data.stock||[])[p.id]||{})[loc.id]||0;
      var rp = _getRp(p.id, loc.id);
      var val = qty * (p.costPrice||0);
      var status = qty===0 ? '🔴 Out' : qty<=rp ? '⚠️ Low' : '✅ OK';
      rows.push({sku:p.sku,product:p.name,cat:_rptCatName(p.categoryId),location:_rptLocName(loc.id),qty:qty,unit:p.unit,costPrice:p.costPrice,value:val,rp:rp,status:status});
    });
  });
  rows.sort(function(a,b){return (a.location+a.product).localeCompare(b.location+b.product);});
  return rows;
}

// 3. Dispatch Report (CW→Branch)
function _rptBuildDispatch(f) {
  var rows = [];
  ((STATE.data.dispatches||[])||[]).forEach(function(d){
    var items = d.items||[{productId:d.productId,qty:d.qty}];
    items.forEach(function(it){
      if (!_rptDateFilter(d.dispatchedAt||d.createdAt,f)) return;
      if (!_rptLocFilter(d.fromLocId,f) && !_rptLocFilter(d.toLocId,f)) return;
      if (!_rptProdFilter(it.productId,f)) return;
      if (!_rptCatFilter(it.productId,f)) return;
      var p = _rptProd(it.productId);
      rows.push({date:_dateStr(d.dispatchedAt||d.createdAt),ref:d.bdNumber,from:_rptLocName(d.fromLocId),to:_rptLocName(d.toLocId),product:p.name,sku:p.sku,qty:it.qty||d.qty,unit:p.unit,status:d.status,by:d.dispatchedBy||d.createdBy||'—',note:d.note||''});
    });
  });
  rows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  return rows;
}

// 4. SR Report (Branch→Site stock requisitions)
function _rptBuildSR(f) {
  var rows = [];
  ((STATE.data.srs||[])||[]).forEach(function(sr){
    (sr.items||[]).forEach(function(it){
      if (!_rptDateFilter(sr.requestedAt,f)) return;
      if (!_rptLocFilter(sr.siteId,f) && !_rptLocFilter(sr.branchId,f)) return;
      if (!_rptProdFilter(it.productId,f)) return;
      if (!_rptCatFilter(it.productId,f)) return;
      var p = _rptProd(it.productId);
      var site = (STATE.data.sites||[]).find(function(s){return s.id===sr.siteId;})||{name:'—'};
      var branch = (STATE.data.branches||[]).find(function(b){return b.id===sr.branchId;})||{name:'—'};
      rows.push({date:_dateStr(sr.requestedAt),ref:sr.srNumber,site:site.name,branch:branch.name,product:p.name,sku:p.sku,qtyReq:it.qtyRequested,qtyApv:it.qtyApproved||0,unit:it.unit||p.unit,status:sr.status,by:sr.requestedBy||'—'});
    });
  });
  rows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  return rows;
}

// 5. Usage Summary
function _rptBuildUsage(f) {
  var rows = [];
  var allUsages = [].concat((STATE.data.usages||[])||[]).concat((STATE.data.usages||[])||[]);
  allUsages.forEach(function(u){
    if (!_rptDateFilter(u.reportDate,f)) return;
    if (!_rptLocFilter(u.siteId,f)) return;
    var site = (STATE.data.sites||[]).find(function(s){return s.id===u.siteId;})||{name:'—'};
    (u.items||[]).forEach(function(it){
      var pid = it.productId;
      if (!_rptProdFilter(pid,f)) return;
      if (!_rptCatFilter(pid,f)) return;
      var p = _rptProd(pid);
      var qty = it.qty||it.qtyUsed||0;
      rows.push({date:u.reportDate,ref:u.urNumber||u.reportNumber,site:site.name,product:p.name,sku:p.sku,workType:u.workType||'—',qty:qty,unit:it.unit||p.unit,value:qty*(p.costPrice||0),status:u.status,by:u.reportedBy||'—'});
    });
  });
  rows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  return rows;
}

// 6. Project Report
function _rptBuildProject(f) {
  var rows = [];
  ((STATE.data.projects||[])||[]).forEach(function(pj){
    if (!_rptDateFilter(pj.date,f)) return;
    if (!_rptLocFilter(pj.siteId,f) && !_rptLocFilter(pj.branchId,f)) return;
    var site = (STATE.data.sites||[]).find(function(s){return s.id===pj.siteId;})||{name:'—'};
    (pj.items||[]).forEach(function(it){
      if (!_rptProdFilter(it.productId,f)) return;
      if (!_rptCatFilter(it.productId,f)) return;
      var p = _rptProd(it.productId);
      var qty = it.qtyApproved||it.qty||0;
      rows.push({date:pj.date,ref:pj.pjNumber,name:pj.name,site:site.name,product:p.name,sku:p.sku,qty:qty,unit:p.unit,value:qty*(p.costPrice||0),status:pj.status});
    });
  });
  rows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  return rows;
}

// 7. Expiry / Lot Report
function _rptBuildExpiry(f) {
  var today = new Date().toISOString().split('T')[0];
  var rows = [];
  ((STATE.data.lots||[])||[]).forEach(function(lot){
    if (!_rptLocFilter(lot.locationId,f)) return;
    if (!_rptProdFilter(lot.productId,f)) return;
    if (!_rptCatFilter(lot.productId,f)) return;
    // date filter on receivedDate
    if (!_rptDateFilter(lot.receivedDate||lot.receivedAt,f)) return;
    var p = _rptProd(lot.productId);
    var expiry = lot.expiryDate||'';
    var days = expiry ? Math.round((new Date(expiry)-new Date(today))/86400000) : 9999;
    var status = days <= 0 ? '🔴 Expired' : days <= 7 ? '🟠 Critical' : days <= 30 ? '🟡 Near Expiry' : '🟢 OK';
    var fifo = _getFifoCost(lot.productId, lot.locationId);
    rows.push({lot:lot.lotNumber,product:p.name,sku:p.sku,location:_rptLocName(lot.locationId),qty:lot.qty,unit:p.unit,received:_dateStr(lot.receivedAt||lot.receivedDate),expiry:expiry,days:days===9999?'—':days,fifo:fifo,status:status,_days:days});
  });
  rows.sort(function(a,b){return (a._days||9999)-(b._days||9999);});
  return rows;
}


// ── Maintenance Report builder ────────────────────────────
function _rptBuildMaintenance(f) {
  var rows = [];
  ((STATE.data.maintenance||[])||[]).forEach(function(m){
    if (!_rptDateFilter(m.date||m.createdAt, f)) return;
    // location filter — match locId
    if (f.loc && f.loc!=='ALL' && m.locId!==f.loc) return;
    // status filter stored in f.mrStatus
    if (f.mrStatus && f.mrStatus!=='ALL' && m.status!==f.mrStatus) return;
    // priority filter
    if (f.mrPriority && f.mrPriority!=='ALL' && m.priority!==f.mrPriority) return;
    // issueType filter
    if (f.mrType && f.mrType!=='ALL' && m.issueType!==f.mrType) return;
    rows.push({
      date        : _dateStr(m.date||m.createdAt),
      ref         : m.id,
      assetName   : m.assetName||'—',
      assetId     : m.assetId||'—',
      issueType   : m.issueType||'—',
      location    : _rptLocName(m.locId),
      priority    : m.priority||'NORMAL',
      description : m.description||'—',
      reportedBy  : m.reportedBy||'—',
      assignedTo  : m.assignedTo||'—',
      status      : m.status||'PENDING',
      completedAt : _dateStr(m.completedAt)||'—',
      cost        : Number(m.cost||0),
      note        : m.note||'—',
      _raw        : m
    });
  });
  rows.sort(function(a,b){ return b.date.localeCompare(a.date); });
  return rows;
}


// ── Maintenance report helpers ────────────────────────────
function _rptMaintLocTable(rows) {
  var locs = {};
  rows.forEach(function(r){
    var loc = r.location||'—';
    if (!locs[loc]) locs[loc]={total:0,pending:0,inprog:0,completed:0,cost:0};
    locs[loc].total++;
    if (r.status==='PENDING') locs[loc].pending++;
    if (r.status==='IN_PROGRESS') locs[loc].inprog++;
    if (r.status==='COMPLETED') locs[loc].completed++;
    locs[loc].cost += Number(r.cost||0);
  });
  var trs = Object.keys(locs).map(function(loc,i){
    var d=locs[loc];
    return '<tr class="'+(i%2?'bg-slate-50':'bg-white')+' border-b border-slate-100">' +
      '<td class="px-3 py-2 text-sm font-semibold text-slate-700">'+loc+'</td>' +
      '<td class="px-3 py-2 text-center text-sm font-bold">'+d.total+'</td>' +
      '<td class="px-3 py-2 text-center"><span class="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-bold">'+d.pending+'</span></td>' +
      '<td class="px-3 py-2 text-center"><span class="text-xs px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 font-bold">'+d.inprog+'</span></td>' +
      '<td class="px-3 py-2 text-center"><span class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-bold">'+d.completed+'</span></td>' +
      '<td class="px-3 py-2 text-right font-semibold text-purple-700">'+fmtNum(Math.round(d.cost))+' ກີບ</td>' +
    '</tr>';
  }).join('');
  return '<div class="overflow-x-auto"><table class="w-full text-xs">' +
    '<thead><tr class="bg-slate-700 text-white">' +
    '<th class="px-3 py-2 text-left">Location</th><th class="px-3 py-2 text-center">ທັງໝົດ</th>' +
    '<th class="px-3 py-2 text-center">Pending</th><th class="px-3 py-2 text-center">In Progress</th>' +
    '<th class="px-3 py-2 text-center">Completed</th><th class="px-3 py-2 text-right">ຄ່າໃຊ້ຈ່າຍ</th>' +
    '</tr></thead><tbody>'+trs+'</tbody></table></div>';
}

function _rptMaintChartStatus(rows) {
  var el = document.getElementById('mrChartStatus'); if(!el) return;
  if (window._mrChartS) { try{window._mrChartS.destroy();}catch(e){} }
  var counts = {PENDING:0,IN_PROGRESS:0,COMPLETED:0,CANNOT_REPAIR:0,DISPOSED:0,REJECTED:0};
  rows.forEach(function(r){ if(counts[r.status]!==undefined) counts[r.status]++; });
  var labels = ['Pending','In Progress','Completed','Cannot Repair','Disposed','Rejected'];
  var data   = [counts.PENDING,counts.IN_PROGRESS,counts.COMPLETED,counts.CANNOT_REPAIR,counts.DISPOSED,counts.REJECTED];
  var colors = ['#f59e0b','#3b82f6','#10b981','#ef4444','#6b7280','#f87171'];
  window._mrChartS = new Chart(el, {type:'doughnut', data:{labels:labels,datasets:[{data:data,backgroundColor:colors,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:12}}}}});
}

function _rptMaintChartLoc(rows) {
  var el = document.getElementById('mrChartLoc'); if(!el) return;
  if (window._mrChartL) { try{window._mrChartL.destroy();}catch(e){} }
  var locs = {};
  rows.forEach(function(r){ locs[r.location] = (locs[r.location]||0)+1; });
  var labels = Object.keys(locs);
  var data   = labels.map(function(l){return locs[l];});
  var colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
  window._mrChartL = new Chart(el, {type:'bar', data:{labels:labels,datasets:[{label:'MR Count',data:data,backgroundColor:colors.slice(0,labels.length),borderRadius:4}]},
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
}

// ── Table renderer ────────────────────────────────────────
function _rptRenderTable(el, cols, rows, tab) {
  if (!rows.length) {
    el.innerHTML = '<div class="card p-10 text-center text-slate-400"><div class="text-4xl mb-3">📊</div>ບໍ່ມີຂໍ້ມູນໃນຊ່ວງເວລານີ້<div class="text-sm mt-2">ລອງ adjust filter ຫຼືຊ່ວງເວລາ</div></div>';
    return;
  }

  // KPI summary cards
  var kpiHtml = _rptKpis(tab, rows);

  // Paginate
  var f = window._rptF||{};
  var pag = paginateData(rows, f.page||1, f.perPage||50);

  var thead = '<tr class="bg-slate-700 text-white">'+cols.map(function(c){
    return '<th class="px-3 py-2.5 text-xs font-bold uppercase whitespace-nowrap text-'+(c.r?'right':'left')+'">'+c.l+'</th>';
  }).join('')+'</tr>';

  var typeColors = {
    'DISPATCH':'bg-blue-100 text-blue-700','TRANSFER':'bg-purple-100 text-purple-700',
    'SR-ISSUE':'bg-emerald-100 text-emerald-700','USAGE':'bg-orange-100 text-orange-700',
    'IN':'bg-emerald-100 text-emerald-700','OUT':'bg-red-100 text-red-700',
    'ADJUST':'bg-slate-100 text-slate-600',
    'PENDING':'bg-amber-100 text-amber-700','APPROVED':'bg-emerald-100 text-emerald-700',
    'FULFILLED':'bg-blue-100 text-blue-700','REJECTED':'bg-red-100 text-red-700',
    'COMPLETED':'bg-emerald-100 text-emerald-700','PLANNED':'bg-slate-100 text-slate-600',
    '✅ OK':'bg-emerald-100 text-emerald-700','⚠️ Low':'bg-amber-100 text-amber-700',
    '🔴 Out':'bg-red-100 text-red-700','🔴 Expired':'bg-red-200 text-red-800',
    '🟠 Critical':'bg-orange-100 text-orange-800','🟡 Near Expiry':'bg-yellow-100 text-yellow-800',
    '🟢 OK':'bg-emerald-100 text-emerald-700',
    'IN_PROGRESS':'bg-blue-100 text-blue-700',
    'CANNOT_REPAIR':'bg-red-100 text-red-700',
    'DISPOSED':'bg-slate-200 text-slate-600',
    'HIGH':'bg-red-100 text-red-700',
    'NORMAL':'bg-slate-100 text-slate-600',
    'LOW':'bg-green-100 text-green-700'
  };

  var tbody = pag.items.map(function(row){
    return '<tr class="border-b border-slate-100 hover:bg-slate-50/60 transition-colors">' +
      cols.map(function(c){
        var v = row[c.k];
        if (v === undefined || v === null) v = '—';
        var disp = '';
        if (c.k==='type' || c.k==='status') {
          var tc = typeColors[String(v)] || 'bg-slate-100 text-slate-600';
          disp = '<span class="text-xs font-bold px-2 py-0.5 rounded-full '+tc+'">'+v+'</span>';
        } else if (c.k==='value' || c.k==='costPrice' || c.k==='fifo') {
          disp = '<span class="font-semibold text-slate-700">'+fmtNum(Math.round(Number(v)||0))+'</span>';
        } else if (c.k==='qty' || c.k==='qtyReq' || c.k==='qtyApv' || c.k==='before' || c.k==='after') {
          disp = '<span class="font-semibold">'+fmtNum(Number(v)||v)+'</span>';
        } else if (c.k==='days') {
          var d = Number(v);
          var dc = isNaN(d)?'text-slate-400':d<=0?'text-red-600 font-bold':d<=30?'text-amber-600 font-bold':'text-slate-700';
          disp = '<span class="'+dc+'">'+v+'</span>';
        } else {
          disp = '<span class="text-slate-700">'+v+'</span>';
        }
        return '<td class="px-3 py-2.5 text-xs whitespace-nowrap text-'+(c.r?'right':'left')+'">'+disp+'</td>';
      }).join('') +
    '</tr>';
  }).join('');

  el.innerHTML =
    kpiHtml +
    '<div class="card overflow-hidden shadow-sm">' +
    '<div class="overflow-x-auto"><table class="w-full text-xs">' +
    '<thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>' +
    '<div class="px-4 pb-2">'+renderPagBar(pag,'_rptPage','_rptPage')+'</div>' +
    '</div>';
}

function _rptPage(pg,pp){ window._rptF.page=pg; if(pp) window._rptF.perPage=pp; _rptGenerate(); }

// ── KPI summary cards per tab ─────────────────────────────
function _rptKpis(tab, rows) {
  var html = '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">';
  if (tab==='movement') {
    var inQ  = rows.filter(function(r){return r.type==='IN';}).reduce(function(s,r){return s+(Number(r.qty)||0);},0);
    var outQ = rows.filter(function(r){return r.type==='OUT'||r.type==='USAGE';}).reduce(function(s,r){return s+(Number(r.qty)||0);},0);
    var disp = rows.filter(function(r){return r.type==='DISPATCH';}).length;
    html += _kpiMini('🔄','ລາຍການທັງໝົດ',rows.length,'from-slate-600 to-slate-800');
    html += _kpiMini('📥','Total IN',fmtNum(inQ),'from-emerald-500 to-emerald-700');
    html += _kpiMini('📤','Total OUT',fmtNum(outQ),'from-amber-500 to-amber-700');
    html += _kpiMini('🚚','Dispatches',disp,'from-blue-500 to-blue-700');
  } else if (tab==='valuation') {
    var totalVal = rows.reduce(function(s,r){return s+(Number(r.value)||0);},0);
    var lowCnt = rows.filter(function(r){return r.status.indexOf('Low')>-1||r.status.indexOf('Out')>-1;}).length;
    var zeroCnt = rows.filter(function(r){return !Number(r.qty);}).length;
    html += _kpiMini('💰','Total Value','LAK '+fmtNum(Math.round(totalVal)),'from-blue-600 to-blue-800');
    html += _kpiMini('📦','ລາຍການທັງໝົດ',rows.length,'from-slate-500 to-slate-700');
    html += _kpiMini('⚠️','Low Stock',lowCnt,'from-amber-500 to-amber-700');
    html += _kpiMini('🔴','Out of Stock',zeroCnt,'from-red-600 to-red-800');
  } else if (tab==='dispatch') {
    var totQty = rows.reduce(function(s,r){return s+(Number(r.qty)||0);},0);
    var pending = rows.filter(function(r){return r.status==='PENDING';}).length;
    var completed = rows.filter(function(r){return r.status==='COMPLETED';}).length;
    html += _kpiMini('📤','ໃບຈ່າຍທັງໝົດ',rows.length,'from-slate-600 to-slate-800');
    html += _kpiMini('📦','ຈຳນວນສິນຄ້າ',fmtNum(totQty),'from-blue-500 to-blue-700');
    html += _kpiMini('⏳','PENDING',pending,'from-amber-500 to-amber-700');
    html += _kpiMini('✅','COMPLETED',completed,'from-emerald-500 to-emerald-700');
  } else if (tab==='sr') {
    var totReq = rows.reduce(function(s,r){return s+(Number(r.qtyReq)||0);},0);
    var totApv = rows.reduce(function(s,r){return s+(Number(r.qtyApv)||0);},0);
    html += _kpiMini('📋','SR Items',rows.length,'from-slate-600 to-slate-800');
    html += _kpiMini('🔢','ຂໍທັງໝົດ',fmtNum(totReq),'from-blue-500 to-blue-700');
    html += _kpiMini('✅','ອະນຸມັດ',fmtNum(totApv),'from-emerald-500 to-emerald-700');
    html += _kpiMini('📊','% Fulfill',totReq?Math.round(totApv/totReq*100)+'%':'—','from-purple-500 to-purple-700');
  } else if (tab==='usage') {
    var totUsed = rows.reduce(function(s,r){return s+(Number(r.qty)||0);},0);
    var totVal  = rows.reduce(function(s,r){return s+(Number(r.value)||0);},0);
    var sites = [...new Set(rows.map(function(r){return r.site;}))].length;
    html += _kpiMini('🧴','Usage Items',rows.length,'from-slate-600 to-slate-800');
    html += _kpiMini('📦','ຈຳນວນໃຊ້',fmtNum(totUsed),'from-orange-500 to-orange-700');
    html += _kpiMini('💰','ມູນຄ່າ','LAK '+fmtNum(Math.round(totVal)),'from-blue-500 to-blue-700');
    html += _kpiMini('📍','Sites',sites,'from-purple-500 to-purple-700');
  } else if (tab==='project') {
    var totPjVal = rows.reduce(function(s,r){return s+(Number(r.value)||0);},0);
    var completed2 = rows.filter(function(r){return r.status==='COMPLETED';}).length;
    html += _kpiMini('🏗️','Project Items',rows.length,'from-slate-600 to-slate-800');
    html += _kpiMini('💰','ມູນຄ່າ','LAK '+fmtNum(Math.round(totPjVal)),'from-blue-500 to-blue-700');
    html += _kpiMini('✅','Completed',completed2,'from-emerald-500 to-emerald-700');
    html += _kpiMini('📋','Active',rows.filter(function(r){return r.status!=='COMPLETED';}).length,'from-amber-500 to-amber-700');
  } else if (tab==='expiry') {
    var expired2 = rows.filter(function(r){return String(r.status).indexOf('Expired')>-1;}).length;
    var critical = rows.filter(function(r){return String(r.status).indexOf('Critical')>-1;}).length;
    var near = rows.filter(function(r){return String(r.status).indexOf('Near')>-1;}).length;
    html += _kpiMini('📦','Total Lots',rows.length,'from-slate-600 to-slate-800');
    html += _kpiMini('🔴','Expired',expired2,'from-red-600 to-red-800');
    html += _kpiMini('🟠','Critical ≤7d',critical,'from-orange-500 to-orange-700');
    html += _kpiMini('🟡','Near ≤30d',near,'from-amber-500 to-amber-700');
  }
  return html + '</div>';
}

// ── Export helpers ────────────────────────────────────────
function _rptGetTabLabel() {
  var tab = window._rptTab||'movement';
  return (_RPT_TABS.find(function(t){return t.id===tab;})||{label:tab}).label;
}

function _rptExportExcel() {
  var rows = window._rptRows||[];
  if (!rows.length) { showToast('ບໍ່ມີຂໍ້ມູນ — Generate ກ່ອນ', 'warn'); return; }
  var cols = _rptCols(window._rptTab||'movement');
  var f = window._rptF||{};
  var title = 'Inventory Report — '+_rptGetTabLabel();
  var period = 'Period: '+(f.dateFrom||'—')+' to '+(f.dateTo||'—');

  var header = cols.map(function(c){return c.l;});
  var data = rows.map(function(row){
    return cols.map(function(c){
      var v = row[c.k];
      return (v===undefined||v===null)?'':v;
    });
  });

  var wb = XLSX.utils.book_new();
  // Title rows
  var wsData = [[title],[period],['Generated: '+new Date().toLocaleString()],[],[header]].concat(data);
  var ws = XLSX.utils.aoa_to_sheet(wsData);
  // Column widths
  ws['!cols'] = cols.map(function(){return {wch:20};});
  // Merge title
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:cols.length-1}}];
  XLSX.utils.book_append_sheet(wb, ws, _rptGetTabLabel().slice(0,31));

  var fn = 'Report_'+(_rptGetTabLabel().replace(/[^a-zA-Z0-9]/g,'_'))+'_'+(f.dateFrom||'')+'.xlsx';
  XLSX.writeFile(wb, fn);
  showToast('✅ Excel ດາວໂຫລດສຳເລັດ', 'success');
}

function _rptExportPDF() {
  var rows = window._rptRows||[];
  if (!rows.length) { showToast('ບໍ່ມີຂໍ້ມູນ — Generate ກ່ອນ', 'warn'); return; }
  if (typeof jspdf === 'undefined' && typeof window.jspdf === 'undefined') {
    showToast('jsPDF library not loaded', 'error'); return;
  }
  var cols = _rptCols(window._rptTab||'movement');
  var f = window._rptF||{};
  var tabLabel = _rptGetTabLabel();
  var doc = new jspdf.jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  var pw = doc.internal.pageSize.getWidth();

  // Header gradient bar
  doc.setFillColor(30,41,59); doc.rect(0,0,pw,22,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(14); doc.setFont(undefined,'bold');
  doc.text('📊 INVENTORY REPORT — '+tabLabel.toUpperCase(), 10, 10);
  doc.setFontSize(8); doc.setFont(undefined,'normal'); doc.setTextColor(148,163,184);
  doc.text('Company: [Your Company Name]  |  Period: '+(f.dateFrom||'—')+' to '+(f.dateTo||'—')+'  |  Generated: '+new Date().toLocaleString(), 10, 17);

  // KPI summary line
  doc.setFillColor(248,250,252); doc.rect(0,22,pw,12,'F');
  doc.setTextColor(51,65,85); doc.setFontSize(9); doc.setFont(undefined,'bold');
  doc.text('Total Records: '+fmtNum(rows.length), 10, 30);
  if (window._rptTab==='valuation') {
    var tv = rows.reduce(function(s,r){return s+(Number(r.value)||0);},0);
    doc.text('Total Value: LAK '+fmtNum(Math.round(tv)), 70, 30);
  } else if (window._rptTab==='usage' || window._rptTab==='project') {
    var tv2 = rows.reduce(function(s,r){return s+(Number(r.value)||0);},0);
    doc.text('Total Value: LAK '+fmtNum(Math.round(tv2)), 70, 30);
  }

  // Table
  var head = [cols.map(function(c){return c.l;})];
  var body = rows.map(function(row){
    return cols.map(function(c){
      var v = row[c.k];
      return (v===undefined||v===null)?'':String(v);
    });
  });

  // Color rows by status
  doc.autoTable({
    head: head,
    body: body,
    startY: 36,
    styles: {fontSize:7.5, cellPadding:2.5, overflow:'linebreak'},
    headStyles: {fillColor:[30,41,59], textColor:[255,255,255], fontStyle:'bold', fontSize:8},
    alternateRowStyles: {fillColor:[248,250,252]},
    columnStyles: cols.reduce(function(acc,c,i){
      if(c.r) acc[i]={halign:'right'};
      return acc;
    },{}),
    margin: {left:8, right:8},
    rowPageBreak:'auto',
    didParseCell: function(data){
      if(data.section==='body'){
        var v = String(data.cell.raw||'');
        if(v.indexOf('Low')>-1||v.indexOf('Expired')>-1||v.indexOf('PENDING')>-1) { data.cell.styles.textColor=[220,38,38]; data.cell.styles.fontStyle='bold'; }
        if(v==='COMPLETED'||v==='APPROVED'||v==='FULFILLED'||v.indexOf('✅')>-1) { data.cell.styles.textColor=[5,150,105]; }
      }
    },
    didDrawPage: function(){
      doc.setFontSize(7.5); doc.setTextColor(148,163,184);
      doc.text('Page '+doc.internal.getCurrentPageInfo().pageNumber+' | Confidential', pw/2, doc.internal.pageSize.getHeight()-5, {align:'center'});
      doc.text('Print: '+new Date().toLocaleString(), pw-8, doc.internal.pageSize.getHeight()-5, {align:'right'});
    }
  });

  var fn = 'Report_'+(tabLabel.replace(/[^a-zA-Z0-9]/g,'_'))+'_'+(f.dateFrom||'')+'.pdf';
  doc.save(fn);
  showToast('📄 PDF ດາວໂຫລດສຳເລັດ', 'success');
}

function _renderLSAlert() {
  var el = document.getElementById('lsTabContent');
  if (!el) return;

  var items = [];
  (STATE.data.products||[]).forEach(function(p){
    var stockMap = (STATE.data.stock||[])[p.id] || {};
    Object.keys(stockMap).forEach(function(locId){
      var qty = stockMap[locId] || 0;
      var rp = _getRp(p.id, locId);
      if (qty >= 0 && rp > 0 && qty <= rp) {
        var isCW = locId === 'CW001';
        var isB  = !isCW && locId.startsWith('B');
        var locObj = isCW
          ? {name:'Company Warehouse (CW)', type:'COMPANY', branchId:null}
          : isB
          ? ((STATE.data.branches||[]).find(function(b){return b.id===locId;})||{name:locId,type:'BRANCH'})
          : ((STATE.data.sites||[]).find(function(s){return s.id===locId;})||{name:locId,type:'SITE'});
        var cat = (STATE.data.categories||[]).find(function(c){return c.id===p.categoryId;})||{name:'—'};
        items.push({
          productId:p.id, sku:p.sku, name:p.name, nameLao:p.nameLao||'',
          categoryId:p.categoryId, catName:_catLabel(cat),
          unit:p.unit, costPrice:p.costPrice,
          reorderPoint:rp, reorderQty:p.reorderQty||0,
          qty:qty, locId:locId,
          locName:locObj.name||locId,
          locType:isCW?'COMPANY':(isB?'BRANCH':'SITE'),
          branchId:isB?locId:(locObj.branchId||null)
        });
      }
    });
  });

  items.sort(function(a,b){
    if (a.qty === 0 && b.qty > 0) return -1;
    if (b.qty === 0 && a.qty > 0) return 1;
    var pA = a.qty/(a.reorderPoint||1), pB = b.qty/(b.reorderPoint||1);
    if (pA !== pB) return pA - pB;
    return a.name.localeCompare(b.name);
  });

  var totalOut  = items.filter(function(i){return i.qty===0;}).length;
  var totalLow  = items.filter(function(i){return i.qty>0;}).length;
  var cwItems   = items.filter(function(i){return i.locType==='COMPANY';});
  var brItems   = items.filter(function(i){return i.locType==='BRANCH';});
  var siteItems = items.filter(function(i){return i.locType==='SITE';});

  window._lsFilter = window._lsFilter || {tab:'ALL', search:'', cat:'ALL'};

  function _renderLS() {
    var tab    = window._lsFilter.tab;
    var search = (window._lsFilter.search||'').toLowerCase();
    var cat    = window._lsFilter.cat;

    var filtered = items.filter(function(i){
      if (tab === 'CW'   && i.locType !== 'COMPANY') return false;
      if (tab === 'BRANCH' && i.locType !== 'BRANCH') return false;
      if (tab === 'SITE' && i.locType !== 'SITE') return false;
      if (tab === 'OUT'  && i.qty !== 0) return false;
      if (search && i.name.toLowerCase().indexOf(search)<0 && i.sku.toLowerCase().indexOf(search)<0 && i.locName.toLowerCase().indexOf(search)<0) return false;
      if (cat !== 'ALL' && i.categoryId !== cat) return false;
      return true;
    });

    var catOpts = '<option value="ALL">ທຸກໝວດ</option>' +
      (STATE.data.categories||[]).map(function(c){return '<option value="'+c.id+'" '+(cat===c.id?'selected':'')+'>'+_catLabel(c)+'</option>';}).join('');

    var tabs = [
      {id:'ALL',   label:'ທັງໝົດ',        count: items.length,     color:'bg-slate-100 text-slate-700 border-slate-300'},
      {id:'OUT',   label:'🔴 ໝົດສະຕ໋ອກ', count: totalOut,         color:'bg-red-100 text-red-700 border-red-300'},
      {id:'CW',    label:'🏛️ ຄັງຫລັກ',   count: cwItems.length,   color:'bg-purple-100 text-purple-700 border-purple-300'},
      {id:'BRANCH',label:'🏢 ສາຂາ',        count: brItems.length,   color:'bg-blue-100 text-blue-700 border-blue-300'},
      {id:'SITE',  label:'📍 ໄຊງານ',      count: siteItems.length, color:'bg-emerald-100 text-emerald-700 border-emerald-300'},
    ];

    var html =
      '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">' +
        _lsKpi('⚠️','ທັງໝົດ Low Stock', items.length+' ລາຍການ','from-red-500 to-red-700') +
        _lsKpi('🔴','ໝົດສະຕ໋ອກ', totalOut+' ລາຍການ','from-rose-600 to-rose-800') +
        _lsKpi('🏛️','ຄັງຫລັກ (CW)', cwItems.length+' ລາຍການ','from-purple-600 to-purple-800') +
        _lsKpi('🏢/📍','ສາຂາ + ໄຊງານ', (brItems.length+siteItems.length)+' ລາຍການ','from-blue-600 to-blue-800') +
      '</div>' +
      '<div class="flex flex-wrap gap-2 mb-4">' +
      tabs.map(function(t){
        var active = tab===t.id ? 'ring-2 ring-red-400 font-bold shadow-sm' : 'opacity-70 hover:opacity-100';
        return '<button onclick="_lsSetTab(\''+t.id+'\')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs border '+t.color+' '+active+' transition-all">'+
          t.label+'<span class="bg-white/70 px-1.5 py-0.5 rounded-full font-bold text-xs">'+t.count+'</span></button>';
      }).join('') +
      '</div>' +
      '<div class="flex flex-wrap gap-2 mb-4 items-center">' +
      '<input id="lsSearch" value="'+(window._lsFilter.search||'')+'" class="input text-sm py-2" style="max-width:220px" placeholder="🔍 ສິນຄ້າ / SKU / ສະຖານທີ່..." oninput="_lsSetSearch(this.value)">' +
      '<select id="lsCat" class="select text-sm py-2" style="max-width:160px" onchange="_lsSetCat(this.value)">'+catOpts+'</select>' +
      '<button onclick="_lsMainTabSet(\'rp\')" class="btn text-xs px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white flex items-center gap-1.5">⚙️ ຕັ້ງ Reorder Point</button>' +
      '<button onclick="_lsExport()" class="btn btn-secondary text-xs px-3 py-2 flex items-center gap-1 ml-auto">📥 Export Excel</button>' +
      '</div>' +
      '<div class="text-xs text-slate-500 mb-3">ສະແດງ <strong>'+filtered.length+'</strong> / '+items.length+' ລາຍການ</div>';

    if (!filtered.length) {
      html += '<div class="card p-10 text-center text-slate-400"><div style="font-size:48px" class="mb-3">✅</div><div class="font-semibold text-slate-600">ບໍ່ມີສິນຄ້າ Low Stock ໃນ Filter ນີ້</div></div>';
    } else {
      html += '<div class="card overflow-hidden">' +
        '<div class="overflow-x-auto"><table class="w-full text-sm">' +
        '<thead><tr class="border-b border-slate-100 bg-slate-50/80 text-left">' +
        ['#','SKU','ສິນຄ້າ','ໝວດ','ສາງ / ສະຖານທີ່','ຈຳນວນ','Reorder Pt','ຂາດ','ລາຄາ','ມູນຄ່າຂາດ','ສະຖານະ','Action'].map(function(h){
          return '<th class="px-3 py-3 text-xs font-bold text-slate-500 uppercase whitespace-nowrap">'+h+'</th>';
        }).join('') +
        '</tr></thead><tbody>' +
        filtered.map(function(item, idx){
          var pct    = item.reorderPoint > 0 ? Math.round(item.qty/item.reorderPoint*100) : 0;
          var short  = Math.max(0, (item.reorderQty||item.reorderPoint) - item.qty);
          var missingVal = short * (item.costPrice||0);
          var locIcon= item.locType==='COMPANY'?'🏛️':item.locType==='BRANCH'?'🏢':'📍';
          var locCls = item.locType==='COMPANY'?'text-purple-700 bg-purple-50':item.locType==='BRANCH'?'text-blue-700 bg-blue-50':'text-emerald-700 bg-emerald-50';
          var barCls = item.qty===0?'bg-red-600':pct<=30?'bg-red-500':pct<=60?'bg-amber-500':'bg-yellow-400';
          var badge2 = item.qty===0
            ? '<span class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-bold px-2 py-0.5 rounded-full">🔴 ໝົດ</span>'
            : pct<=30
            ? '<span class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-bold px-2 py-0.5 rounded-full">🟠 ຮ້ອນ</span>'
            : '<span class="inline-flex items-center gap-1 bg-amber-100 text-amber-700 text-xs font-bold px-2 py-0.5 rounded-full">⚠️ ໃກ້ໝົດ</span>';
          var actionNav = item.locType==='COMPANY'
            ? "selectLocation('CW001','COMPANY','Company Warehouse')"
            : item.locType==='BRANCH'
            ? "selectLocation('"+item.locId+"','BRANCH','')"
            : "showPage('branches')";
          return '<tr class="border-b border-slate-100 hover:bg-red-50/30 transition-colors '+(item.qty===0?'bg-red-50/20':'')+'">' +
            '<td class="px-3 py-3 text-xs text-slate-400 font-mono">'+(idx+1)+'</td>' +
            '<td class="px-3 py-3 font-mono text-xs text-slate-500 whitespace-nowrap">'+item.sku+'</td>' +
            '<td class="px-3 py-3"><div class="font-semibold text-slate-800 text-sm">'+item.name+'</div><div class="text-xs text-slate-400">'+item.nameLao+'</div></td>' +
            '<td class="px-3 py-3 text-xs text-slate-500 whitespace-nowrap">'+item.catName+'</td>' +
            '<td class="px-3 py-3 whitespace-nowrap"><span class="inline-flex items-center gap-1 text-xs font-semibold px-2 py-1 rounded-lg '+locCls+'">'+locIcon+' '+item.locName+'</span></td>' +
            '<td class="px-3 py-3"><div class="flex items-center gap-2 min-w-24"><div class="flex-1 bg-slate-100 rounded-full h-2"><div class="'+barCls+' h-2 rounded-full transition-all" style="width:'+pct+'%"></div></div><span class="font-bold whitespace-nowrap '+(item.qty===0?'text-red-600':'text-slate-800')+'">'+item.qty+' <span class="font-normal text-xs text-slate-400">'+item.unit+'</span></span></div></td>' +
            '<td class="px-3 py-3 text-center text-xs font-semibold text-slate-600">'+item.reorderPoint+'</td>' +
            '<td class="px-3 py-3 text-center font-bold '+(short>0?'text-red-600':'text-slate-400')+'">'+short+' <span class="text-xs font-normal text-slate-400">'+item.unit+'</span></td>' +
            '<td class="px-3 py-3 text-xs text-slate-500 whitespace-nowrap">'+fmtNum(item.costPrice)+' LAK</td>' +
            '<td class="px-3 py-3 text-xs font-semibold text-red-600 whitespace-nowrap">'+(missingVal>0?fmtNum(missingVal)+' LAK':'—')+'</td>' +
            '<td class="px-3 py-3">'+badge2+'</td>' +
            '<td class="px-3 py-3 whitespace-nowrap">' +
              '<button onclick="'+actionNav+'" class="btn btn-secondary text-xs px-2 py-1 mr-1" title="ໄປຫາສາງ">🔍</button>' +
              '<button onclick="openSetReorderPoint(\''+item.productId+'\',\''+item.locId+'\',\''+item.locName+'\')" class="btn text-xs px-2 py-1 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200" title="Set Reorder Pt">📊</button>' +
            '</td>' +
          '</tr>';
        }).join('') +
        '</tbody></table></div></div>';
    }
    document.getElementById('lsTabContent').innerHTML = html;
  }
  _renderLS();
}

// ════════════════════════════════════════════════════════
// REORDER POINT MANAGER TAB

function _renderRPManager() {
  var el = document.getElementById('lsTabContent');
  if (!el) return;

  window._rpFilter = window._rpFilter || {search:'', cat:'ALL', loc:'ALL'};

  // Build location list
  var allLocs = [
    {id:'CW001', name:'🏛️ ຄັງຫລັກ (CW)', type:'COMPANY', color:'purple'}
  ].concat(
    (STATE.data.branches||[]).map(function(b){ return {id:b.id, name:'🏢 '+b.name, type:'BRANCH', color:'blue'}; })
  ).concat(
    (STATE.data.sites||[]).map(function(s){ return {id:s.id, name:'📍 '+s.name, type:'SITE', color:'emerald'}; })
  );

  var catOpts = '<option value="ALL">ທຸກໝວດ</option>' +
    (STATE.data.categories||[]).map(function(c){
      return '<option value="'+c.id+'" '+(window._rpFilter.cat===c.id?'selected':'')+'>'+_catLabel(c)+'</option>';
    }).join('');

  var locOpts = '<option value="ALL">ທຸກສາງ</option>' +
    '<option value="COMPANY" '+(window._rpFilter.loc==='COMPANY'?'selected':'')+'>🏛️ ຄັງຫລັກ (CW)</option>' +
    '<option value="BRANCH" '+(window._rpFilter.loc==='BRANCH'?'selected':'')+'>🏢 ສາຂາ</option>' +
    '<option value="SITE" '+(window._rpFilter.loc==='SITE'?'selected':'')+'>📍 ໄຊງານ</option>';

  // Filter locations based on loc filter
  var shownLocs = allLocs.filter(function(loc){
    if (window._rpFilter.loc === 'ALL') return true;
    if (window._rpFilter.loc === 'COMPANY') return loc.type === 'COMPANY';
    if (window._rpFilter.loc === 'BRANCH') return loc.type === 'BRANCH';
    if (window._rpFilter.loc === 'SITE') return loc.type === 'SITE';
    return true;
  });

  // Filter products
  var search = (window._rpFilter.search||'').toLowerCase();
  var prods = (STATE.data.products||[]).filter(function(p){
    if (p.status === 'INACTIVE') return false;
    if (window._rpFilter.cat !== 'ALL' && p.categoryId !== window._rpFilter.cat) return false;
    if (search && p.name.toLowerCase().indexOf(search)<0 && p.sku.toLowerCase().indexOf(search)<0) return false;
    return true;
  });

  // Compute totals
  var totalOverrides = Object.keys(MOCK.reorderPoints||{}).length;
  var totalProducts = (STATE.data.products||[]).filter(function(p){return p.status!=='INACTIVE';}).length;

  // Color classes by type
  var typeColors = {COMPANY:'bg-purple-50 text-purple-700', BRANCH:'bg-blue-50 text-blue-700', SITE:'bg-emerald-50 text-emerald-700'};
  var typeBorder = {COMPANY:'border-purple-200', BRANCH:'border-blue-200', SITE:'border-emerald-200'};

  // Build table header
  var thLocs = shownLocs.map(function(loc){
    var splitName = loc.name.replace(/^[🏛️🏢📍]\s*/,'');
    var abbr = splitName.length > 16 ? splitName.slice(0,14)+'…' : splitName;
    return '<th class="px-2 py-2 text-xs font-bold whitespace-nowrap text-center '+typeColors[loc.type]+'" style="min-width:110px;">' +
      '<div>'+(loc.type==='COMPANY'?'🏛️':loc.type==='BRANCH'?'🏢':'📍')+'</div>' +
      '<div class="text-xs" title="'+splitName+'">'+abbr+'</div>' +
      '</th>';
  }).join('');

  // Build rows
  var rows = prods.map(function(p){
    var cells = shownLocs.map(function(loc){
      var rp = _getRp(p.id, loc.id);
      var hasOverride = (MOCK.reorderPoints||{})[p.id+'|'+loc.id] !== undefined;
      var stockQty = ((STATE.data.stock||[])[p.id]||{})[loc.id] || 0;
      var isLow = rp > 0 && stockQty <= rp;
      var isEmpty = stockQty === 0;

        : '<span class="text-slate-400 text-xs">'+rp+'</span>';

        ? '<span class="text-red-600 font-bold text-xs">0</span>'
        : '<span class="'+(isLow?'text-amber-600 font-bold':'text-slate-500')+' text-xs">'+stockQty+'</span>';
      return '<td class="px-2 py-2 text-center border-r border-slate-100 '+cellBg+'">' +
        '<div class="flex flex-col items-center gap-0.5">' +
        '<div class="text-xs text-slate-400">Stock: '+stockDisplay+'</div>' +

        '</div>' +
        '</td>';
    }).join('');

    return '<tr class="border-b border-slate-100 hover:bg-slate-50/40">' +
      '<td class="px-3 py-2.5 whitespace-nowrap sticky left-0 bg-white z-10 border-r border-slate-200">' +
        '<div class="font-semibold text-slate-800 text-sm">'+p.name+'</div>' +
        '<div class="text-xs text-slate-400">'+p.sku+' · '+p.unit+'</div>' +
        '<div class="text-xs text-slate-300">'+_catLabel(cat)+'</div>' +
      '</td>' +
      '<td class="px-3 py-2.5 text-center border-r border-slate-100">' +
        '<div class="text-xs font-semibold text-slate-600">'+p.reorderPoint+'</div>' +
        '<div class="text-xs text-slate-400">default</div>' +
        '<button onclick="openEditProductRP(\''+p.id+'\')" class="mt-0.5 text-xs px-1.5 py-0.5 rounded-md hover:bg-slate-100 text-slate-500 border border-slate-200">✏️</button>' +
      '</td>' +
      cells +
      '</tr>';
  }).join('');

  if (!rows) rows = '<tr><td colspan="'+(shownLocs.length+2)+'" class="px-4 py-8 text-center text-slate-400">ບໍ່ພົບສິນຄ້າ</td></tr>';

  var legendHtml =
    '<div class="flex flex-wrap gap-3 text-xs text-slate-500 mb-3 items-center">' +
    '<span class="font-semibold text-slate-600">Legend:</span>' +
    '<span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-red-100 inline-block"></span> ໝົດສະຕ໋ອກ</span>' +
    '<span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-amber-100 inline-block"></span> ຕ່ຳກວ່າ RP</span>' +
    '<span class="flex items-center gap-1"><span class="text-blue-700 font-bold">25●</span> Override ຕໍ່ Location</span>' +
    '<span class="flex items-center gap-1"><span class="text-slate-400">25</span> ໃຊ້ Default ຈາກ Product</span>' +
    '</div>';

  el.innerHTML =
    // Info banner
    '<div class="grid grid-cols-3 gap-3 mb-4">' +
    '<div class="card p-3 flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-xl">⚙️</div><div><div class="font-bold text-slate-800">'+totalProducts+'</div><div class="text-xs text-slate-500">ສິນຄ້າທັງໝົດ</div></div></div>' +
    '<div class="card p-3 flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-xl">📍</div><div><div class="font-bold text-slate-800">'+allLocs.length+'</div><div class="text-xs text-slate-500">ສາງ/ສະຖານທີ່</div></div></div>' +
    '<div class="card p-3 flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center text-xl">🎯</div><div><div class="font-bold text-blue-700">'+totalOverrides+'</div><div class="text-xs text-slate-500">Per-Location Overrides</div></div></div>' +
    '</div>' +
    // Info tip
    '<div class="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4 text-xs text-blue-700 flex items-start gap-2">' +
    '<span class="text-base">💡</span>' +
    '<div><strong>ວິທີໃຊ້:</strong> ກົດ <strong>✏️ ແກ້</strong> ໃນ cell ທີ່ຕ້ອງການ ເພື່ອຕັ້ງ Reorder Point ສຳລັບ ສາງ+ສິນຄ້ານັ້ນ. ' +
    '<span class="text-blue-500 font-semibold">●</span> = Override (ຄ່າສະເພາະສາງ), ຈຳນວນສີຂີ້ຝຸ່ນ = ໃຊ້ Default Product. ' +
    'ຖ້າຕ້ອງການແກ້ Default ທັງໝົດ ກົດ ✏️ ໃນ column "Default".</div>' +
    '</div>' +
    // Filter bar
    '<div class="flex flex-wrap gap-2 mb-4 items-center">' +
    '<input id="rpSearch" value="'+(window._rpFilter.search||'')+'" class="input text-sm py-2" style="max-width:200px" placeholder="🔍 ຊື່ / SKU..." oninput="_rpSetSearch(this.value)">' +
    '<select class="select text-sm py-2" style="max-width:150px" onchange="_rpSetCat(this.value)">'+catOpts+'</select>' +
    '<select class="select text-sm py-2" style="max-width:160px" onchange="_rpSetLoc(this.value)">'+locOpts+'</select>' +
    '<button onclick="_rpCopyDefault()" class="btn btn-secondary text-xs px-3 py-2 flex items-center gap-1.5 ml-auto">📋 Copy Default → ທຸກສາງ</button>' +
    '</div>' +
    legendHtml +
    // Matrix table
    '<div class="card overflow-hidden">' +
    '<div class="overflow-x-auto">' +
    '<table class="w-full text-sm border-collapse" id="rpMatrix">' +
    '<thead>' +
    '<tr class="border-b-2 border-slate-200 bg-slate-50">' +
    '<th class="px-3 py-3 text-xs font-bold text-slate-500 uppercase text-left sticky left-0 bg-slate-50 z-10 border-r border-slate-200" style="min-width:180px;">ສິນຄ້າ / Product</th>' +

function _lsExport() {
  var items = [];
  (STATE.data.products||[]).forEach(function(p){
    Object.keys((STATE.data.stock||[])[p.id]||{}).forEach(function(locId){
      var qty = (STATE.data.stock||[])[p.id][locId]||0;
      if (qty <= (p.reorderPoint||0)) {
        var isCW=locId==='CW001', isB=!isCW&&locId.startsWith('B');
        var locObj=isCW?{name:'Company Warehouse'}:isB?((STATE.data.branches||[]).find(function(b){return b.id===locId;})||{name:locId}):((STATE.data.sites||[]).find(function(s){return s.id===locId;})||{name:locId});
        var cat=(STATE.data.categories||[]).find(function(c){return c.id===p.categoryId;})||{name:''};
        var short=Math.max(0,(p.reorderQty||p.reorderPoint||0)-qty);
        items.push([p.sku,p.name,p.nameLao||'',cat.name,locObj.name||locId,isCW?'ຄັງຫລັກ':isB?'ສາຂາ':'ໄຊງານ',qty,p.reorderPoint||0,short,p.unit,qty*p.costPrice,short*p.costPrice,qty===0?'ໝົດ':'ໃກ້ໝົດ']);
      }
    });
  });
  var wb=XLSX.utils.book_new();
  var ws=XLSX.utils.aoa_to_sheet([['SKU','ຊື່ສິນຄ້າ','ຊື່ລາວ','ໝວດ','ສາງ','ປະເພດສາງ','ຈຳນວນ','Reorder Pt','ຂາດ','ໜ່ວຍ','ມູນຄ່າຄົງເຫຼືອ (LAK)','ມູນຄ່າຂາດ (LAK)','ສະຖານະ']].concat(items));
  ws['!cols']=[8,20,20,12,20,10,8,10,8,8,16,16,10].map(function(w){return{wch:w};});
  XLSX.utils.book_append_sheet(wb,ws,'Low Stock');
  XLSX.writeFile(wb,'LowStock_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('📥 Export Excel ສຳເລັດ','success');
}

function renderAudit() {
  callServer('getAuditLogPaged', [{
      dateFrom: window._auF && window._auF.dateFrom ? window._auF.dateFrom : new Date(Date.now()-30*86400000).toISOString().slice(0,10),
      dateTo:   window._auF && window._auF.dateTo   ? window._auF.dateTo   : new Date().toISOString().slice(0,10),
      page:1, perPage:500
    }], function(res) {
    var allData = res.data || [];
    window._auF = window._auF || {search:'', action:'ALL', user:'ALL', module:'ALL', dateFrom:'', dateTo:'', page:1, perPage:25};
    var f = window._auF;

    var filtered = allData.filter(function(l){
      var s=(f.search||'').toLowerCase();
      if (s && (l.username||'').toLowerCase().indexOf(s)<0 && (l.refId||'').toLowerCase().indexOf(s)<0 && (l.detail||'').toLowerCase().indexOf(s)<0) return false;
      if (f.action!=='ALL' && l.action!==f.action) return false;
      if (f.user!=='ALL' && l.username!==f.user) return false;
      if (f.module!=='ALL' && l.module!==f.module) return false;
      if (!_inDateRange(l.timestamp, f.dateFrom, f.dateTo)) return false;
      return true;
    });

    var pag = paginateData(filtered, f.page, f.perPage);

    var actions  = ['ALL'].concat([...new Set(allData.map(function(l){return l.action;}))]).map(function(a){return {v:a,l:a==='ALL'?'ທຸກ Action':a};});
    var users    = ['ALL'].concat([...new Set(allData.map(function(l){return l.username;}))]).map(function(u){return {v:u,l:u==='ALL'?'ທຸກ User':u};});
    var modules  = ['ALL'].concat([...new Set(allData.map(function(l){return l.module;}))]).map(function(m){return {v:m,l:m==='ALL'?'ທຸກ Module':m};});

    var actionColors = {LOGIN:'bg-blue-100 text-blue-700',APPROVE:'bg-emerald-100 text-emerald-700',REJECT:'bg-red-100 text-red-700',CREATE:'bg-amber-100 text-amber-700',SUBMIT:'bg-purple-100 text-purple-700',SAVE:'bg-slate-100 text-slate-600',DELETE:'bg-red-200 text-red-800'};

    document.getElementById('pageContent').innerHTML =
      '<div class="note note-blue mb-4 text-xs">🔍 ທຸກ action ຂອງ user ຖືກ log ອັດຕະໂນມັດ ພ້ອມ timestamp. ກົດ <kbd style="background:#dbeafe;border:1px solid #93c5fd;border-radius:3px;padding:1px 5px;font-family:monospace">/</kbd> ເພື່ອ focus ຊ່ອງຄົ້ນຫາ.</div>' +

          '<button onclick="_auReset()" class="btn btn-secondary text-xs px-3 py-1.5">↺ Reset</button>'
      }) +
      '<div class="card overflow-hidden">' +
      '<div class="overflow-x-auto">' +
      '<table class="w-full text-sm">' +
      '<thead class="bg-slate-50 border-b text-left"><tr>' +
      ['Timestamp','User','Action','Module','Ref ID','Detail'].map(function(h){
        return '<th class="px-3 py-3 text-xs font-bold text-slate-500 uppercase whitespace-nowrap">'+h+'</th>';
      }).join('')+'</tr></thead><tbody>' +
      (pag.items.length ? pag.items.map(function(l){
        var ac = actionColors[l.action] || 'bg-slate-100 text-slate-600';

function _showProductDetail(id) {
  var p = (STATE.data.products||[]).find(function(x){return x.id===id;});
  if (!p) return;
  var c   = (STATE.data.categories||[]).find(function(x){return x.id===p.categoryId;})||{};
  var sup = (STATE.data.suppliers||[]).find(function(x){return x.id===p.supplierId;})||{};

  // ── Build stock rows ──────────────────────────────────
  var allLocs = [{id:'CW001',name:'Company WH',icon:'🏛️'}]
    .concat(STATE.data.branches.map(function(b){return {id:b.id,name:b.name,icon:'🏢'};}))
    .concat(STATE.data.sites.filter(function(s){return s.status==='ACTIVE';}).map(function(s){return {id:s.id,name:s.name,icon:'📍'};}));
  var totalQty = 0;
  var stockRows = allLocs.map(function(loc){
    var qty = ((STATE.data.stock||[])[p.id]||{})[loc.id]||0;
    if (!qty) return '';
    totalQty += qty;
    var low = qty <= (p.reorderPoint||0);
    return '<div class="flex items-center justify-between py-1.5 border-b border-slate-100 last:border-0">' +
      '<span class="text-sm text-slate-600">'+loc.icon+' '+loc.name+'</span>' +

  }).join('');

  // ── PRs for this product ──────────────────────────────
  var relPRs = ((STATE.data.prs||[])||[]).filter(function(pr){
    return (pr.items||[]).some(function(it){return it.productId===id;});

  // ── POs for this product ──────────────────────────────

    : relPOs.map(function(po){

  // Lot rows

    ? '<div class="text-xs text-slate-400 py-3 text-center">ຍັງບໍ່ມີ Lot — ຮັບສິນຄ້າຈາກ PO ກ່ອນ</div>'
    : relLots.map(function(l){
        var exp = l.expiryDate || '';
        var expDays = exp ? Math.ceil((new Date(exp)-new Date())/(1000*86400)) : null;
        var expCls = expDays===null?'text-slate-400': expDays<0?'text-red-600 font-bold':expDays<30?'text-amber-600 font-bold':'text-emerald-600';

        return '<div class="flex items-center gap-2 py-1.5 border-b border-slate-100 last:border-0 text-xs">' +
          '<span class="font-mono bg-slate-100 px-2 py-0.5 rounded text-slate-600 flex-shrink-0">'+l.lotNumber+'</span>' +
          '<span class="text-slate-500 flex-shrink-0">'+locName+'</span>' +
          '<span class="font-bold text-blue-700 flex-shrink-0">'+fmtNum(l.qty)+' '+p.unit+'</span>' +
          '<span class="text-slate-400 flex-shrink-0">'+fmtNum(l.unitCost||0)+' LAK/ໜ່ວຍ</span>' +
          '<span class="ml-auto '+expCls+' flex-shrink-0">'+(exp?'Exp: '+exp+(expDays!==null?' ('+expDays+'d)':''):'—')+'</span>' +

  openModal('📦 '+p.name+' — ລາຍລະອຽດ',
    '<div class="space-y-4">' +

    // ── Top banner ──────────────────────────────────────
    '<div class="flex items-start gap-4 p-3 bg-slate-50 rounded-2xl border border-slate-200">' +

      ? '<img src="'+p.photo+'" class="w-16 h-16 rounded-xl object-cover border border-slate-200 flex-shrink-0"/>'

      : '') +
    '</div>' +

    // ── Stock at all locations ──────────────────────────
    (stockRows
      ? '<div class="card p-3"><div class="text-xs font-bold text-slate-500 uppercase mb-2">📊 Stock ຢູ່ທຸກສາງ — ລວມ <span class="text-blue-700">'+fmtNum(totalQty)+' '+p.unit+'</span></div>'+stockRows+'</div>'
      : '<div class="p-3 bg-slate-50 rounded-xl text-xs text-slate-400 text-center">ບໍ່ມີ Stock ໃນລະບົບ — ຮັບສິນຄ້າຈາກ PO ກ່ອນ</div>') +

    // ── Tabs ───────────────────────────────────────────

function _pdTab(activeId) {
  ['_pd_t_pr','_pd_t_po','_pd_t_lot'].forEach(function(tid){
    var btn = document.getElementById(tid);
    var content = document.getElementById(tid+'_c');
    if (btn) btn.className = 'px-4 py-2 text-xs font-semibold border-b-2 transition-all ' +
      (tid===activeId ? 'border-blue-500 text-blue-700' : 'border-transparent text-slate-400 hover:text-slate-700');
    if (content) { if(tid===activeId) content.classList.remove('hidden'); else content.classList.add('hidden'); }
  });
}

function _detailRow(lbl, val) {

// ── Barcode Scan Register (Quick Register from scan) ───
function _openBarcodeScanRegister() {
  openModal('📷 Scan Barcode ລົງທະບຽນ',
    '<div class="space-y-3">' +
    '<div class="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm text-blue-700">' +
    '📷 Scan barcode ຈາກ packaging → ລະບົບຈະກວດ ຖ້າ barcode ຍັງບໍ່ມີ ສາມາດລົງທະບຽນໄດ້ເລີຍ</div>' +
    // Camera viewfinder
    '<div class="relative bg-slate-900 rounded-2xl overflow-hidden" style="height:200px">' +
    '<video id="bsrVideo" class="w-full h-full object-cover hidden" playsinline autoplay muted></video>' +
    '<div id="bsrPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 gap-2">' +
    '<span style="font-size:40px">📷</span><span class="text-sm">ກົດ "ເປີດກ້ອງ" ເພື່ອ Scan</span></div>' +
    '<div id="bsrOverlay" class="hidden absolute inset-0 bg-black/30 flex items-center justify-center">' +
    '<div class="border-2 border-blue-400 rounded-lg" style="width:200px;height:80px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4)"></div></div>' +
    '</div>' +
    // Controls
    '<div class="flex gap-2">' +
    '<button onclick="_bsrStartCamera()" class="btn btn-secondary flex-1">📷 ເປີດກ້ອງ</button>' +
    '<button onclick="_bsrStopCamera()" class="btn btn-danger flex-1">⏹ ປິດ</button>' +
    '</div>' +
    // Manual entry
    '<div><label class="field-label">ຫຼື ພິມ / Paste Barcode ໂດຍກົງ</label>' +
    '<div class="flex gap-2">' +
    '<input id="bsrManual" class="input font-mono text-lg tracking-widest" placeholder="0000000000000" oninput="this.value=this.value.replace(/[^0-9A-Za-z-]/g,\'\')">' +
    '<button onclick="_bsrLookup(document.getElementById(\'bsrManual\').value)" class="btn btn-primary px-4">🔍</button>' +
    '</div></div>' +
    '<div id="bsrResult"></div>' +
    '</div>',
    '', true
  );
  window._bsrStream = null;
}

function _bsrStartCamera() {
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
    window._bsrStream = stream;
    var v = document.getElementById('bsrVideo');
    var ph = document.getElementById('bsrPlaceholder');
    var ov = document.getElementById('bsrOverlay');
    if(v){ v.srcObject=stream; v.classList.remove('hidden'); v.play(); }
    if(ph) ph.classList.add('hidden');
    if(ov) ov.classList.remove('hidden');
    // Poll for QR/barcode using QuaggaJS if available
    _bsrStartQuagga();
  }).catch(function(){ showToast('ບໍ່ສາມາດເຂົ້າໃຊ້ກ້ອງໄດ້', 'error'); });
}

function _bsrStopCamera() {
  if(window._bsrStream){ window._bsrStream.getTracks().forEach(function(t){t.stop();}); window._bsrStream=null; }
  var v = document.getElementById('bsrVideo');
  var ph = document.getElementById('bsrPlaceholder');
  var ov = document.getElementById('bsrOverlay');
  if(v){ v.srcObject=null; v.classList.add('hidden'); }
  if(ph) ph.classList.remove('hidden');
  if(ov) ov.classList.add('hidden');
  if(window.Quagga) try{ Quagga.stop(); }catch(e){}
}

function _bsrStartQuagga() {
  if(!window.Quagga) return; // Quagga not loaded
  Quagga.init({
    inputStream:{name:'Live',type:'LiveStream',target:document.getElementById('bsrVideo'),constraints:{facingMode:'environment'}},
    decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader']}
  }, function(err){
    if(err){ return; }
    Quagga.start();
    Quagga.onDetected(function(result){
      var code = result.codeResult && result.codeResult.code;
      if(code){
        Quagga.stop();
        _bsrStopCamera();
        var inp = document.getElementById('bsrManual');
        if(inp) inp.value = code;
        _bsrLookup(code);
      }
    });
  });
}

function _bsrLookup(barcode) {
  barcode = (barcode||'').trim();
  if(!barcode){ showToast('ກະລຸນາໃສ່ Barcode', 'warn'); return; }
  var resultEl = document.getElementById('bsrResult');
  if(!resultEl) return;

  // Check if barcode already registered
  var existing = STATE.data.products.find(function(p){ return p.barcode === barcode; });
  if(existing){
    resultEl.innerHTML =
      '<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3">' +
      '<div class="flex items-center gap-2 mb-1"><span class="text-emerald-600 font-bold">✅ Barcode ລົງທະບຽນແລ້ວ</span></div>' +
      '<div class="flex items-center gap-3">' +
      (existing.photo ? '<img src="'+existing.photo+'" class="w-12 h-12 rounded-xl object-cover border border-slate-200"/>' : '<div class="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-2xl">📦</div>') +
      '<div><div class="font-bold text-slate-800">'+existing.name+'</div>' +
      '<div class="text-xs text-slate-500 font-mono">'+existing.sku+'</div>' +
      '<div class="text-xs font-mono text-slate-400">'+barcode+'</div></div></div>' +
      '<button onclick="closeModal();openProductForm(\''+existing.id+'\')" class="btn btn-secondary w-full mt-2 text-sm">✏️ ແກ້ໄຂສິນຄ້ານີ້</button>' +
      '</div>';
  } else {
    resultEl.innerHTML =
      '<div class="bg-amber-50 border border-amber-200 rounded-xl p-3">' +
      '<div class="font-bold text-amber-700 mb-2">⚠️ ຍັງບໍ່ມີ Barcode ນີ້ໃນລະບົບ</div>' +
      '<div class="font-mono text-sm text-slate-600 bg-white rounded-lg px-3 py-2 mb-3">'+barcode+'</div>' +
      '<button onclick="closeModal();openProductForm(null,false,\''+barcode+'\')" ' +
      'class="btn btn-primary w-full">+ ລົງທະບຽນສິນຄ້າໃໝ່ດ້ວຍ Barcode ນີ້</button>' +
      '</div>';
  }
}

// ── Auto-generate SKU based on selected category ──────────
// skuPrefix map: categoryCode → prefix
var _SKU_PREFIX_MAP = {
  'CONS':  'CL',   // Consumable / Cleaning
  'EQUIP': 'EQ',   // Equipment
  'CHEM':  'CH',   // Chemical
  'PPE':   'PP',   // PPE / Safety
  'SPARE': 'SP',   // Spare Parts
  'MACH':  'MC',   // Machine
  'VHC':   'VH',   // Vehicle
};

function _pfSkuPrefix(catCode) {
  if (!catCode) return 'XX';
  return _SKU_PREFIX_MAP[catCode.toUpperCase()] ||
    catCode.toUpperCase().replace(/[^A-Z]/g,'').slice(0,3) || 'XX';
}

function _pfAutoSku(forceOverwrite) {
  var catSel = document.getElementById('pf_cat');
  var skuEl  = document.getElementById('pf_sku');
  if (!catSel || !skuEl) return;

  var catId   = catSel.value;
  var cat     = (STATE.data.categories||[]).find(function(c){return c.id===catId;})||{};
  var prefix  = _pfSkuPrefix(cat.code||'');
  var pattern = new RegExp('^'+prefix+'-?(\\d+)$','i');

  // Find highest number used for this prefix among existing products
  var maxNum = 0;
  (STATE.data.products||[]).forEach(function(p){
    var m = (p.sku||'').match(pattern);
    if (m) {
      var n = parseInt(m[1],10);
      if (n > maxNum) maxNum = n;
    }
  });
  var nextNum = maxNum + 1;
  var nextSku = prefix + '-' + String(nextNum).padStart(3,'0');

  // Only fill if empty OR if forceOverwrite (button click) OR if current value was auto-generated
  var cur = skuEl.value.trim();
  var isAuto = !cur || /^[A-Z]{2,4}-\d{3}$/.test(cur);
  if (forceOverwrite || isAuto) {
    skuEl.value = nextSku;
    // Flash animation to show it changed
    skuEl.classList.add('ring-2','ring-blue-400');
    setTimeout(function(){ skuEl.classList.remove('ring-2','ring-blue-400'); }, 800);
  }
}

function _pf_previewPhoto(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  if (file.size > 2 * 1024 * 1024) { showToast('ຮູບໃຫຍ່ເກີນ 2MB', 'error'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var src = e.target.result;
    var container = document.getElementById('pf_photoPreview');
    if (container) {
      container.innerHTML = '<img src="'+src+'" id="pf_photoImg" class="w-20 h-20 rounded-2xl object-cover border-2 border-blue-400 cursor-pointer" onclick="document.getElementById(\'pf_photoFile\').click()"/>';
    }
    var hidden = document.getElementById('pf_photoData');
    if (hidden) hidden.value = src;
  };
  reader.readAsDataURL(file);
}

function _pf_clearPhoto() {
  var container = document.getElementById('pf_photoPreview');
  if (container) {
    container.innerHTML = '<div id="pf_photoImg" class="w-20 h-20 rounded-2xl bg-slate-200 flex flex-col items-center justify-center text-slate-400 gap-1 cursor-pointer" onclick="document.getElementById(\'pf_photoFile\').click()">' +
      '<span class="text-2xl">📷</span><span class="text-xs">ເພີ່ມຮູບ</span></div>';
  }
  var hidden = document.getElementById('pf_photoData');
  if (hidden) hidden.value = '';
  var fileInput = document.getElementById('pf_photoFile');
  if (fileInput) fileInput.value = '';
}

function _pfScanBarcode() {
  var box = document.getElementById('pf_scanBox');
  if (!box) return;
  box.classList.remove('hidden');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
    window._pfBcStream = stream;
    var v = document.getElementById('pf_bcVideo');
    if(v){ v.srcObject=stream; v.play(); }
    // QuaggaJS live decode
    if(window.Quagga){
      Quagga.init({
        inputStream:{name:'Live',type:'LiveStream',target:v,constraints:{facingMode:'environment'}},
        decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader']}
      },function(err){
        if(!err){ Quagga.start();
          Quagga.onDetected(function(result){
            var code=result.codeResult&&result.codeResult.code;
            if(code){ _pfStopBcScan(); var inp=document.getElementById('pf_barcode'); if(inp){inp.value=code;} showToast('🔖 Scan ສຳເລັດ: '+code,'success'); }
          });
        }
      });
    }
  }).catch(function(){ showToast('ເຂົ້າໃຊ້ກ້ອງບໍ່ໄດ້','error'); });
}

function _pfStopBcScan() {
  if(window._pfBcStream){ window._pfBcStream.getTracks().forEach(function(t){t.stop();}); window._pfBcStream=null; }
  if(window.Quagga) try{Quagga.stop();}catch(e){}
  var box = document.getElementById('pf_scanBox');
  if(box) box.classList.add('hidden');
}

function _pfClearBarcode() {
  var inp = document.getElementById('pf_barcode');
  if(inp) inp.value = '';
}

function submitProductForm(id, isNew) {
  var skuEl    = document.getElementById('pf_sku');
  var nameEl   = document.getElementById('pf_name');
  var catEl    = document.getElementById('pf_cat');
  var unitEl   = document.getElementById('pf_unit');
  var unitLEl  = document.getElementById('pf_unitlao');
  var costEl   = document.getElementById('pf_cost');
  var reorderEl= document.getElementById('pf_reorder');
  var reorderQEl=document.getElementById('pf_reorderqty');
  var supEl    = document.getElementById('pf_sup');
  var bcEl     = document.getElementById('pf_barcode');
  var nameLEl  = document.getElementById('pf_namelao');
  var photoEl  = document.getElementById('pf_photoData');

  var data = {
    id:           id||undefined,
    sku:          skuEl    ? skuEl.value.trim()    : '',
    name:         nameEl   ? nameEl.value.trim()   : '',
    nameLao:      nameLEl  ? nameLEl.value.trim()  : '',
    categoryId:   catEl    ? catEl.value           : '',
    unit:         unitEl   ? unitEl.value.trim()   : '',
    unitLao:      unitLEl  ? unitLEl.value.trim()  : '',
    costPrice:    costEl   ? Number(costEl.value)||0 : 0,
    reorderPoint: reorderEl? Number(reorderEl.value)||0 : 0,
    reorderQty:   reorderQEl? Number(reorderQEl.value)||0 : 0,
    supplierId:   supEl    ? supEl.value           : '',
    barcode:      bcEl     ? bcEl.value.trim()     : '',
    photo:        photoEl  ? photoEl.value         : '',
    status:       'ACTIVE'
  };

  if (!data.name || !data.sku) { showToast('SKU ແລະ ຊື່ ຕ້ອງມີ', 'warn'); return; }

  // Barcode uniqueness check
  if (data.barcode) {
    var dup = STATE.data.products.find(function(p){ return p.barcode === data.barcode && p.id !== id; });
    if (dup) { showToast('Barcode '+data.barcode+' ໃຊ້ຢູ່ແລ້ວໃນ '+dup.name, 'error'); return; }
  }
  _pfStopBcScan();

  callServer('saveProduct', [data], function(res) {
    if (res.success) {
      // Reload fresh from server (avoids double-insert / stale state)
      callServer('getProducts', [], function(r) {
        if (r.success) STATE.data.products = r.data;
        // Refresh CW view if open
        if (STATE.currentLocation && STATE.currentLocation.id === 'CW001') {
          renderInventoryForLocation('CW001','COMPANY','Company Warehouse');
        }
        showToast('✅ ບັນທຶກສິນຄ້າສຳເລັດ', 'success');
        closeModal();
        renderProducts();
      });
    } else {
      showToast('Error saving product: ' + (res.message||''), 'error');
    }
  });
}

function importProductCSV(input) {
  var file = input.files[0];
  if (!file) return;
  var isXlsx = /\.(xlsx|xls)$/i.test(file.name);

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var dataRows = [];

      if (isXlsx) {
        // ── Parse XLSX via SheetJS ─────────────────────
        if (typeof XLSX === 'undefined') { showToast('SheetJS not loaded', 'error'); return; }
        var ab = e.target.result;
        var wb = XLSX.read(ab, {type:'array'});
        // Use sheet "Products" if exists, else first sheet
        var sheetName = wb.SheetNames.indexOf('Products') > -1 ? 'Products' : wb.SheetNames[0];
        var ws = wb.Sheets[sheetName];
        var raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

        // Find the machine key header row (row containing 'sku' and 'name')
        var headerRowIdx = -1;
        raw.forEach(function(row, i){
          if (String(row[0]||'').toLowerCase()==='sku' && String(row[1]||'').toLowerCase().indexOf('name')>-1) {
            headerRowIdx = i;
          }
        });
        if (headerRowIdx === -1) { showToast('ບໍ່ພົບ header row (sku, name, ...) ໃນ Sheet', 'warn'); return; }

        var headers = raw[headerRowIdx].map(function(h){ return String(h||'').trim().toLowerCase(); });
        for (var ri = headerRowIdx+1; ri < raw.length; ri++) {
          var row = raw[ri];
          if (!row || !row.length) continue;
          var sku = String(row[headers.indexOf('sku')]||'').trim();
          if (!sku || sku.startsWith('—') || sku.startsWith('#')) continue; // skip separators
          var obj = {};
          headers.forEach(function(h, ci){ obj[h] = String(row[ci]||'').trim(); });
          dataRows.push(obj);
        }

      } else {
        // ── Parse CSV ─────────────────────────────────
        var text = e.target.result;
        if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
        var lines = text.split('\n').filter(function(l){
          return l.trim() && !l.trim().startsWith('#') && !l.trim().startsWith('—');
        });
        if (lines.length < 2) { showToast('No data rows found', 'warn'); return; }

        function parseCSVRow(line) {
          var cols = []; var cur = ''; var inQ = false;
          for (var i = 0; i < line.length; i++) {
            var ch = line[i];
            if (ch==='"') { if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
            else if (ch===','&&!inQ) { cols.push(cur.trim()); cur=''; }
            else cur+=ch;
          }
          cols.push(cur.trim());
          return cols;
        }

        // Find header row containing 'sku'
        var headerLineIdx = 0;
        for (var li = 0; li < lines.length; li++) {
          if (lines[li].toLowerCase().split(',')[0].trim() === 'sku') { headerLineIdx = li; break; }
        }
        var headers = parseCSVRow(lines[headerLineIdx]).map(function(h){return h.toLowerCase();});
        for (var li2 = headerLineIdx+1; li2 < lines.length; li2++) {
          var cols = parseCSVRow(lines[li2]);
          var sku = String(cols[headers.indexOf('sku')]||'').trim();
          if (!sku) continue;
          var obj2 = {};
          headers.forEach(function(h,ci){ obj2[h] = String(cols[ci]||'').trim(); });
          dataRows.push(obj2);
        }
      }

      if (!dataRows.length) { showToast('ບໍ່ພົບ data rows — ກວດ header row', 'warn'); return; }

      // ── Process rows ──────────────────────────────────
      var imported = 0, updated = 0, errors = [];
      var pending = dataRows.length;

      dataRows.forEach(function(obj, idx){
        var sku  = obj['sku']  || obj['SKU']  || '';
        var name = obj['name'] || obj['Name'] || obj['ຊື່ສິນຄ້າ (en) *'] || '';
        var catCode = (obj['categorycode'] || obj['categoryCode'] || '').toUpperCase();
        var supCode = (obj['suppliercode'] || obj['supplierCode'] || '').toUpperCase();

        if (!sku || !name) {
          errors.push('Row '+(idx+1)+': SKU ຫຼື Name ຫວ່າງ');
          pending--; if(pending<=0) finish(); return;
        }

        var cat = STATE.data.categories.find(function(c){ return c.code === catCode; }) || STATE.data.categories[0] || {};
        var sup = (STATE.data.suppliers||[]).find(function(s){ return s.code === supCode; }) || {};
        var isExisting = STATE.data.products.find(function(p){ return p.sku === sku; });
        var status = obj['status']||'';
        if (!['ACTIVE','INACTIVE'].includes(status.toUpperCase())) status = 'ACTIVE';

        var prod = {
          sku:          sku,
          name:         name,
          nameLao:      obj['namelao']||obj['nameLao']||'',
          categoryId:   cat.id || '',
          unit:         obj['unit']||'',
          unitLao:      obj['unitleao']||obj['unitLao']||'',
          costPrice:    Number(String(obj['costprice']||obj['costPrice']||'0').replace(/,/g,''))||0,
          reorderPoint: Number(String(obj['reorderpoint']||obj['reorderPoint']||'0').replace(/,/g,''))||0,
          reorderQty:   Number(String(obj['reorderqty']||obj['reorderQty']||'0').replace(/,/g,''))||0,
          supplierId:   sup.id || '',
          barcode:      obj['barcode']||'',
          status:       status.toUpperCase()||'ACTIVE',
        };
        if (isExisting) prod.id = isExisting.id;

        callServer('saveProduct', [prod], function(res){
          if (res.success) { if(isExisting) updated++; else imported++; }
          else errors.push('SKU '+sku+': '+(res.message||'error'));
          pending--; if(pending<=0) finish();
        });
      });

      function finish() {
        var parts = [];
        if (imported) parts.push('✅ ນຳເຂົ້າໃໝ່: '+imported);
        if (updated)  parts.push('🔄 Updated: '+updated);
        if (errors.length) parts.push('⚠️ ຜິດພາດ: '+errors.length+' rows');
        showToast(parts.join(' | '), errors.length?'warn':'success');
        if (errors.length) console.warn('Import errors:', errors);
        callServer('getProducts', [], function(r){
          if (r.success) { STATE.data.products = r.data; renderProducts(); }
        });
      }

    } catch(ex) { showToast('Parse error: '+ex.message, 'error'); console.error(ex); }
  };

  if (isXlsx) reader.readAsArrayBuffer(file);
  else reader.readAsText(file, 'UTF-8');
  input.value = '';
}

  // ── Tab bar ──────────────────────────────────────────

  var pendingSRs    = (STATE.data.srs||[]).filter(function(r){ return r.branchId===_activeBranch && r.status==='PENDING'; }).length;
  var pendingPJs    = ((STATE.data.projects||[])||[]).filter(function(p){ return p.branchId===_activeBranch && p.status==='PENDING'; }).length;

    '<button onclick="_srTab=\'sites\';window._siteTypeFilter=\'ALL\';renderBranches()" class="px-4 py-2 rounded-xl text-sm font-semibold transition-all '+(_srTab==='sites'?'bg-white shadow text-slate-800':'text-slate-500 hover:text-slate-700')+'">📍 ໄຊງານ</button>' +
    '<button onclick="_srTab=\'projects\';renderBranches()" class="px-4 py-2 rounded-xl text-sm font-semibold transition-all '+(_srTab==='projects'?'bg-white shadow text-purple-700':'text-slate-500 hover:text-slate-700')+'">📋 ໂປຣເຈັກ'+(countProjects>0?' <span class="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded-full font-bold ml-1">'+countProjects+'</span>':'')+'</button>' +
    '<button onclick="_srTab=\'approve\';renderBranches()" class="px-4 py-2 rounded-xl text-sm font-semibold transition-all '+(_srTab==='approve'?'bg-amber-500 shadow text-white':'text-slate-500 hover:text-slate-700')+'">✅ ອະນຸມັດ'+(totalPending>0?' <span class="text-xs '+(totalPending>0?(_srTab==='approve'?'bg-white text-amber-600':'bg-red-500 text-white'):'bg-slate-200 text-slate-500')+' px-1.5 py-0.5 rounded-full font-bold ml-1">'+totalPending+'</span>':'')+'</button>' +

  // Render active tab
  if (_srTab === 'stock')         _renderBranchStockTab(_activeBranch);
  else if (_srTab === 'projects') _renderBranchProjectsTab(_activeBranch);
  else if (_srTab === 'approve')  _renderBranchApproveTab(_activeBranch);
  else                            _renderBranchSitesTab(_activeBranch);
