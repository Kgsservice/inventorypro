              borderRadius: 6, borderSkipped: false
            }]
          },
          options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(c){return ' LAK '+fmtNum(c.raw);}}}},
            scales:{
              y:{ticks:{callback:function(v){return 'LAK '+fmtNum(v);},font:{size:9}},grid:{color:'#f1f5f9'}},
              x:{ticks:{font:{size:9}},grid:{display:false}}
            }
          }
        });
      }

      // 2. Category donut
      var ctxC = document.getElementById('dashChartCat');
      if (ctxC && catVals.length) {
        window._dashChartCat = new Chart(ctxC.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: catVals.map(function(c){return c.name;}),
            datasets:[{data:catVals.map(function(c){return c.val;}), backgroundColor:palCat, borderWidth:2, borderColor:'#fff'}]
          },
          options:{
            responsive:true, maintainAspectRatio:false,
            cutout:'65%',
            plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(c){return ' '+c.label+': LAK '+fmtNum(c.raw);}}}}
          }
        });
        // custom legend
        var legEl = document.getElementById('dashCatLegend');
        if (legEl) {
          legEl.innerHTML = catVals.map(function(c,i){
            var pct = catVals.reduce(function(s,x){return s+x.val;},0);
            pct = pct>0 ? Math.round(c.val/pct*100) : 0;
            return '<div class="flex items-center gap-1.5 leading-tight">' +
              '<span class="w-2.5 h-2.5 rounded-sm flex-shrink-0" style="background:'+palCat[i%palCat.length]+'"></span>' +

              '<span class="ml-auto text-slate-400 font-bold flex-shrink-0">'+pct+'%</span>' +
              '</div>';
          }).join('');

      // 3. Usage trend line
      var ctxU = document.getElementById('dashChartUsage');
      if (ctxU) {
        window._dashChartUsage = new Chart(ctxU.getContext('2d'), {
          type: 'line',
          data: {
            labels: trendLabels.length ? trendLabels : ['ຍັງບໍ່ມີ'],

              label:'ຈຳນວນທີ່ໃຊ້',
              data: trendVals.length ? trendVals : [0],
              borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.08)',
              borderWidth:2, pointRadius:4, pointBackgroundColor:'#3b82f6',
              fill:true, tension:0.4
            }]
          },
          options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
              y:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'},beginAtZero:true},
              x:{ticks:{font:{size:9}},grid:{display:false}}
            }
          }
        });
      }

      // 4. Top 5 horizontal bar
      var ctxT = document.getElementById('dashChartTop');
      if (ctxT) {
        window._dashChartTop = new Chart(ctxT.getContext('2d'), {
          type: 'bar',
          data: {
            labels: topProds.length ? topProds.map(function(p){return p.name;}) : ['ຍັງບໍ່ມີ'],
            datasets:[{
              label:'ຈຳນວນ',
              data: topProds.length ? topProds.map(function(p){return p.qty;}) : [0],
              backgroundColor:'#8b5cf6', borderRadius:4, borderSkipped:false
            }]
          },
          options:{
            indexAxis:'y',
            responsive:true, maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
              x:{ticks:{font:{size:9}},grid:{color:'#f1f5f9'},beginAtZero:true},
              y:{ticks:{font:{size:9}},grid:{display:false}}
            }
          }
        });
      }
    }, 80);
  });
}

      action:"showPage('transfer')" },
    { key:'arrow2',   arrow:true, label:'→' },
    { key:'branch',   icon:'🏢', label:'ສາຂາ',     sub:'Branch Stock',
      action:"selectLocation('ALL','ALL','All Locations')" },
    { key:'arrow3',   arrow:true, label:'SR ເບີກ' },
    { key:'sr',       icon:'📋', label:'ໃບເບີກ',   sub:'Stock Request',
      action:"_srTab='requests';renderBranches()" },
    { key:'arrow4',   arrow:true, label:'→' },
    { key:'site',     icon:'📍', label:'ໄຊງານ',    sub:'Job Site',
      action:"_srTab='sites';renderBranches()" },
    { key:'arrow5',   arrow:true, label:'Usage' },
    { key:'usage',    icon:'🔧', label:'ໃຊ້ງານ',   sub:'Consumed',
      action:"showPage('usage')" },
  ];

  var colorActive = {
    cw:       'bg-purple-50  border-b-2 border-purple-500',
    dispatch: 'bg-indigo-50  border-b-2 border-indigo-400',
    branch:   'bg-slate-100  border-b-2 border-slate-500',
    sr:       'bg-amber-50   border-b-2 border-amber-400',
    site:     'bg-blue-50    border-b-2 border-blue-400',
    usage:    'bg-teal-50    border-b-2 border-teal-400',
  };
  var colorIcon = {
    cw:'text-purple-600', dispatch:'text-indigo-600',
    branch:'text-slate-700', sr:'text-amber-600',
    site:'text-blue-600', usage:'text-teal-600'
  };

  return '<div class="flex items-stretch mb-5 bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm overflow-x-auto">' +
    steps.map(function(s){
      if (s.arrow) {
        return '<div class="flex items-center px-2 text-slate-300 text-sm font-bold flex-shrink-0 whitespace-nowrap">'+s.label+'</div>';
      }
      var isActive = s.key === activeStep;
      var cls = 'flex flex-col items-center justify-center gap-0.5 px-4 py-3 flex-shrink-0 transition-all ' +
                (s.action ? 'cursor-pointer ' : '') +
                (isActive ? (colorActive[s.key]||'bg-slate-100 border-b-2 border-slate-400') : 'hover:bg-slate-50');
      return '<div class="'+cls+'" '+(s.action?'onclick="'+s.action+'"':'')+' title="'+s.sub+'">' +
        '<span class="text-xl leading-none '+(isActive?(colorIcon[s.key]||''):'')+'">'+s.icon+'</span>' +
        '<span class="font-bold text-xs mt-0.5 '+(isActive?(colorIcon[s.key]||'text-slate-800'):'text-slate-600')+'">'+s.label+'</span>' +

function buildBranchTree() {
  var u = STATE.user;
  var isAdmin = u.role === 'ADMIN' || u.role === 'MANAGER';
  var allowedBranches = u.branchIds || [];
  var hasAll = allowedBranches.indexOf('ALL') > -1;

  var branches = STATE.data.branches.filter(function(b) {
    return b.status === 'ACTIVE' && (hasAll || allowedBranches.indexOf(b.id) > -1);
  });

  var html = '';
  if (isAdmin) {
    html += '<button onclick="selectLocation(\'CW001\',\'COMPANY\',\'Company Warehouse\')" id="loc_CW001" ' +
      'class="branch-node w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5">' +
      '<span>🏛️</span>' +
      '<div class="flex-1 min-w-0 text-left"><div class="truncate text-sm font-medium">Company WH / ຄັງຫລັກ</div>' +
      '<div class="text-slate-500 truncate" style="font-size:10px">Master stock</div></div>' +
      '</button>';
    html += '<div style="border-top:1px solid rgba(255,255,255,0.08);margin:4px 12px 4px;"></div>';
  }

  // Single "Branches" entry — no per-branch items
  html += '<button onclick="selectLocation(\'ALL\',\'ALL\',\'All Locations\')" id="loc_ALL" ' +
    'class="branch-node w-full text-left flex items-center gap-2 px-3 py-2 rounded-lg text-slate-300 hover:text-white hover:bg-white/10 transition-all text-sm mb-0.5">' +
    '<span>🏢</span>' +
    '<div class="flex-1 min-w-0 text-left"><div class="truncate text-sm font-medium">Branches / ຄັງສາຂາ</div>' +
    '<div class="text-slate-500 truncate" style="font-size:10px">ທຸກສາຂາ · ໄຊງານ</div></div>' +
    '</button>';

  var el = document.getElementById('branchTree');
  if (el) el.innerHTML = html;

  var firstBranch = branches[0];
  if (firstBranch) {
    selectLocation(isAdmin ? 'ALL' : firstBranch.id, isAdmin ? 'ALL' : 'BRANCH', isAdmin ? 'All Locations' : firstBranch.name, true);
  }
}

function selectLocation(locId, locType, locName, silent) {
  STATE.currentLocation = { id: locId, type: locType, name: locName };
  window._currentLocId   = locId;
  window._currentLocType = locType;

  // Clear all highlights
  document.querySelectorAll('[id^="loc_"]').forEach(function(el) {
    el.classList.remove('active-branch','active-site','text-white');
    el.classList.add('text-slate-300');
    if (el.classList.contains('branch-node')) {
      el.style.background = '';
    }
  });

  // Highlight selected
  var activeEl = document.getElementById('loc_' + locId);
  if (activeEl) {
    activeEl.classList.remove('text-slate-300','text-slate-400');
    activeEl.classList.add(locType === 'SITE' ? 'active-site' : 'active-branch', 'text-white');
  }

  // Navigate to inventory page and load the selected location
  if (!silent) {
    currentPage = 'inventory';
    document.querySelectorAll('.nav-item[data-page]').forEach(function(b) {
      b.classList.remove('active','text-white');
    });
    document.getElementById('pageTitle').textContent = STATE.lang==='lo' ? 'ຈັດການສະຕ໋ອກ' : 'Stock Management';
    document.getElementById('pageSubtitle').textContent = locName;
    closeSidebar();
    if (locType === 'ALL') {
      renderBranches();
    } else {
      renderInventoryForLocation(locId, locType, locName);
    }
  }
}

// ── Asset Status Helpers ──────────────────────────────────
var _ASSET_STATUS_CFG = {
  OPERATIONAL:      {label:'ໃຊ້ງານໄດ້',          en:'Operational',      cls:'bg-emerald-100 text-emerald-700 border border-emerald-300', icon:'✅', dot:'bg-emerald-500'},
  UNDER_MAINTENANCE:{label:'ກຳລັງສ້ອມ',           en:'Under Maintenance', cls:'bg-amber-100 text-amber-700 border border-amber-300',     icon:'🔧', dot:'bg-amber-500'},
  CANNOT_REPAIR:    {label:'ສ້ອມບໍ່ໄດ້',          en:'Cannot Repair',    cls:'bg-orange-100 text-orange-700 border border-orange-300',  icon:'🚫', dot:'bg-orange-500'},
  DISPOSED:         {label:'ທຳລາຍ/ຕັດຈຳໜ່າຍ',   en:'Disposed',         cls:'bg-red-100 text-red-600 border border-red-200',           icon:'🗑️', dot:'bg-red-500'},
};

// ── Category codes that are trackable assets ──────────────
var _ASSET_CAT_TYPES = ['EQUIPMENT','MACHINE','VEHICLE','SPARE_PARTS'];

function _isAssetCategory(categoryId) {
  var cat = ((STATE.data.categories||[])||[]).find(function(c){return c.id===categoryId;});
  return cat && _ASSET_CAT_TYPES.indexOf(cat.type||cat.code)>-1;
}

function _getAssetStatus(productId, locId) {
  // Try specific location first, then branch (if site)
  var key = productId+'|'+locId;
  if (MOCK.assetStatus && MOCK.assetStatus[key]) return MOCK.assetStatus[key];
  return null; // null = OPERATIONAL
}

function _setAssetStatusLocal(productId, locId, status, mrId, mrNumber, note) {
  if (!MOCK.assetStatus) MOCK.assetStatus = {};
  var key = productId+'|'+locId;
  if (status === 'OPERATIONAL') { delete MOCK.assetStatus[key]; return; }
  MOCK.assetStatus[key] = {status:status, mrId:mrId||'', mrNumber:mrNumber||'', reportedAt:new Date().toISOString().slice(0,10), note:note||''};
}

// ── Rewritten _renderStockSection with asset status ───────
function _renderStockSection(locId, canManage, isSite) {
  var search = (document.getElementById('stockSearch')||{}).value||'';
  var catFilter = (document.getElementById('stockCat')||{}).value||'ALL';
  var pageKey = '_stockPage_'+locId;
  var ppKey   = '_stockPP_'+locId;
  var page    = window[pageKey] || 1;
  var perPage = window[ppKey]   || 25;

  var data = (window._stockSections||{})[locId] || [];
  if (search) data = data.filter(function(s){ return (s.productName||'').toLowerCase().indexOf(search.toLowerCase())>-1 || (s.sku||'').toLowerCase().indexOf(search.toLowerCase())>-1; });
  if (catFilter !== 'ALL') data = data.filter(function(s){
    var p2 = STATE.data.products.find(function(p){return p.id===s.productId;})||{};
    return p2.categoryId === catFilter;
  });

  data.sort(function(a,b){ return (a.productName||'').localeCompare(b.productName||''); });
  var pag = paginateData(data, page, perPage);

  var totalVal = data.reduce(function(sum,s){ return sum+(Number(s.qty)||0)*(Number(s.costPrice)||0); }, 0);
  var lowCount = data.filter(function(s){ return (Number(s.qty)||0) <= (Number(s.reorderPoint)||0) && s.reorderPoint > 0; }).length;

  // ── Asset items in this location ─────────────────────────
  var assetItems = data.filter(function(s){
    var p = STATE.data.products.find(function(p){return p.id===s.productId;})||{};
    return _isAssetCategory(p.categoryId);
  });
  var assetsUnderMaint = assetItems.filter(function(s){ var as = _getAssetStatus(s.productId, locId); return as && as.status==='UNDER_MAINTENANCE'; });
  var assetsCannotRepair = assetItems.filter(function(s){ var as = _getAssetStatus(s.productId, locId); return as && as.status==='CANNOT_REPAIR'; });
  var assetsDisposed     = assetItems.filter(function(s){ var as = _getAssetStatus(s.productId, locId); return as && as.status==='DISPOSED'; });
  var assetsOk = assetItems.length - assetsUnderMaint.length - assetsCannotRepair.length - assetsDisposed.length;

  var el = document.getElementById('section_'+locId);
  if (!el) return;

  if (data.length === 0) {
    el.innerHTML = '<div class="card p-6 text-center text-slate-400 text-sm">'+(search||catFilter!=='ALL'?'ບໍ່ພົບສິນຄ້າທີ່ກົງກັບ filter':'No stock data')+'</div>';
    return;
  }

  // ── Equipment Status Panel (only if has asset items) ─────
  var equipPanelHtml = '';
  if (assetItems.length > 0) {
    var hasProblem = assetsUnderMaint.length > 0 || assetsCannotRepair.length > 0 || assetsDisposed.length > 0;
    equipPanelHtml =
      '<div class="card mb-3 overflow-hidden border '+(hasProblem?'border-amber-300':'border-emerald-200')+'">' +
      '<div class="px-4 py-2.5 flex flex-wrap items-center gap-3 '+(hasProblem?'bg-amber-50':'bg-emerald-50')+'">' +
      '<span class="text-sm font-bold '+(hasProblem?'text-amber-800':'text-emerald-700')+'">'+
      (hasProblem?'⚠️':'✅')+' ສະຖານະ Equipment / ເຄື່ອງຈັກ</span>' +
      '<div class="flex flex-wrap gap-2 text-xs">' +
      '<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 font-semibold border border-emerald-300">' +
      '<span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span> ໃຊ້ໄດ້: <strong>'+assetsOk+'</strong></span>' +
      (assetsUnderMaint.length>0?'<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 font-semibold border border-amber-300 animate-pulse">'+
      '<span class="w-2 h-2 rounded-full bg-amber-500 inline-block"></span> ກຳລັງສ້ອມ: <strong>'+assetsUnderMaint.length+'</strong></span>':'')+
      (assetsCannotRepair.length>0?'<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-orange-100 text-orange-700 font-semibold border border-orange-300">'+
      '<span class="w-2 h-2 rounded-full bg-orange-500 inline-block"></span> ສ້ອມບໍ່ໄດ້: <strong>'+assetsCannotRepair.length+'</strong></span>':'')+
      (assetsDisposed.length>0?'<span class="flex items-center gap-1 px-2 py-0.5 rounded-full bg-red-100 text-red-600 font-semibold border border-red-200">'+
      '<span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span> ທຳລາຍ: <strong>'+assetsDisposed.length+'</strong></span>':'')+
      '</div>' +
      (_can('maintenance.view')?'<button onclick="showPage(\'maintenance\')" class="ml-auto text-xs text-blue-600 hover:text-blue-800 font-semibold underline">ເບິ່ງ Maintenance →</button>':'')+
      '</div>' +
      // Under-maintenance detail rows
      (assetsUnderMaint.length>0?
        '<div class="px-4 py-2 bg-amber-50/60 border-t border-amber-200">' +
        '<div class="text-xs font-bold text-amber-700 mb-1.5">🔧 ລາຍການທີ່ກຳລັງສ້ອມ:</div>' +
        assetsUnderMaint.map(function(s){
          var as = _getAssetStatus(s.productId, locId);
          var mr = ((STATE.data.maintenance||[])||[]).find(function(m){return m.id===(as&&as.mrId);});
          return '<div class="flex items-center gap-3 text-xs py-1 border-b border-amber-100 last:border-0">' +
            '<span class="font-mono text-slate-500">'+s.sku+'</span>' +
            '<span class="font-semibold text-slate-700">'+s.productName+'</span>' +
            '<span class="text-amber-600">→ '+((as&&as.mrNumber)||'MR#')+'</span>' +
            (mr?'<span class="text-slate-400">ຊ່າງ: '+(mr.assignedTo||'ລໍຖ້າ')+'</span>':'') +
            '<span class="text-slate-400">ແຈ້ງ: '+(as&&fmtDate(as.reportedAt)||'-')+'</span>' +
            '<button onclick="openMRDetail(\''+(as&&as.mrId)+'\')" class="ml-auto text-xs text-blue-600 hover:text-blue-800 font-semibold">ລາຍລະອຽດ →</button>' +
            '</div>';
        }).join('')+
        '</div>' : '') +
      '</div>';
  }

  el.innerHTML =
    equipPanelHtml +
    '<div class="card overflow-hidden">' +
    '<div class="flex gap-4 px-4 py-2 bg-slate-50 border-b border-slate-100 text-xs flex-wrap items-center">' +
    '<span class="text-slate-500 font-semibold">'+data.length+' products</span>' +
    '<span class="font-semibold text-blue-700">💰 LAK '+fmtNum(totalVal)+'</span>' +
    (lowCount>0?'<span class="text-amber-600 font-semibold">⚠️ '+lowCount+' low stock</span>':'<span class="text-emerald-600 font-semibold">✅ All OK</span>') +
    '</div>' +
    '<div class="overflow-x-auto"><table class="w-full text-sm">' +
    '<thead class="bg-slate-50 border-b border-slate-200"><tr>' +
    ['SKU','Product / ສິນຄ້າ','Category','Qty','Value','Reorder','Status','Action'].map(function(h){
      return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase">'+h+'</th>';
    }).join('')+'</tr></thead><tbody>' +
    pag.items.map(function(s){
      var p = STATE.data.products.find(function(x){return x.id===s.productId;})||{};
      var isAsset = _isAssetCategory(p.categoryId);
      var asStatus = isAsset ? _getAssetStatus(s.productId, locId) : null;
      var stCfg = asStatus ? (_ASSET_STATUS_CFG[asStatus.status]||_ASSET_STATUS_CFG.OPERATIONAL) : (isAsset ? _ASSET_STATUS_CFG.OPERATIONAL : null);
      var isLow = (Number(s.qty)||0) <= (Number(s.reorderPoint)||0) && s.reorderPoint > 0;
      var pct = s.reorderPoint > 0 ? Math.min(100, Math.round(s.qty/s.reorderPoint*100)) : 100;
      var barCls = isLow ? (s.qty===0?'bg-red-600':'bg-amber-500') : 'bg-emerald-400';
      var isBroken = asStatus && (asStatus.status==='UNDER_MAINTENANCE'||asStatus.status==='CANNOT_REPAIR'||asStatus.status==='DISPOSED');

      // Asset status badge cell
      var statusCell = '';
      if (isAsset) {
        if (stCfg) {
          statusCell = '<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full font-bold '+stCfg.cls+'">'+
            '<span class="w-1.5 h-1.5 rounded-full '+stCfg.dot+' flex-shrink-0"></span>'+
            stCfg.label+'</span>';
          if (asStatus && asStatus.mrNumber) {
            statusCell += '<div class="text-[9px] text-slate-400 mt-0.5">'+asStatus.mrNumber+'</div>';
          }
        }
      } else {
        statusCell = '<span class="text-xs text-slate-300">—</span>';

      // Action buttons
      var maintBtn = '';
      if (isAsset && _can('maintenance.create') && !isBroken) {
        maintBtn = '<button onclick="openCreateMRFromStock(\''+s.productId+'\',\''+s.sku+'\',\''+s.productName.replace(/'/g,'')+'\',\''+locId+'\')" '+

      return '<tr class="border-b border-slate-100 hover:bg-slate-50/50 '+(isBroken?'bg-amber-50/30':isLow?'bg-red-50/20':'')+'">' +
        '<td class="px-4 py-2.5 font-mono text-xs text-slate-500">'+s.sku+'</td>' +

          '<div class="font-semibold text-slate-800 '+(isBroken?'text-amber-700':'')+'">'+s.productName+'</div>' +

        '<td class="px-4 py-2.5 text-xs text-slate-500">'+s.categoryName+'</td>' +
        '<td class="px-4 py-2.5">' +

    }).join('') + '</select></div>' +

    '<input id="adj_note" class="input" placeholder="ລາຍລະອຽດເພີ່ມ..."></div>' +

function updateAdjPreview(currentQty) {
  var type = (document.querySelector('input[name="adj_type"]:checked')||{value:'SET'}).value;
  var qty = Number((document.getElementById('adj_qty')||{}).value)||0;
  var result = type==='SET' ? qty : type==='ADD' ? currentQty+qty : Math.max(0, currentQty-qty);
  var el = document.getElementById('adj_preview');
  if (el) el.textContent = fmtNum(result);
}

function submitAdjustStock(productId, locId, currentQty) {
  var confirm2 = ((document.getElementById('adj_confirm')||{}).value||'').trim();
  if (confirm2 !== 'CONFIRM') { showToast('ພິມ CONFIRM ເພື່ອຢືນຢັນ','warn'); return; }
  var type   = (document.querySelector('input[name="adj_type"]:checked')||{value:'SET'}).value;
  var qty    = Number((document.getElementById('adj_qty')||{}).value)||0;
  var reason = (document.getElementById('adj_reason')||{}).value||'';
  var note   = (document.getElementById('adj_note')||{}).value||'';
  var newQty = type==='SET' ? qty : type==='ADD' ? currentQty+qty : Math.max(0, currentQty-qty);

  callServer('adjustStock',[{productId:productId, locId:locId, newQty:newQty, reason:reason, note:note}], function(res){
    if (res.success) {
      // Update local mock stock
      if (!(STATE.data.stock||[])[productId]) (STATE.data.stock||[])[productId]={};
      (STATE.data.stock||[])[productId][locId] = newQty;
      // Update _stockSections cache
      if (window._stockSections && window._stockSections[locId]) {
        var item = window._stockSections[locId].find(function(s){return s.productId===productId;});
        if (item) item.qty = newQty;
      }
      closeModal();
      showToast('✅ ແກ້ໄຂ Stock ສຳເລັດ: '+fmtNum(newQty)+' ໜ່ວຍ','success');
      var canManage = _can('inventory.branch.manage');
      _renderStockSection(locId, canManage, locId.startsWith('SI'));
    } else showToast('Error','error');
  });
}

function filterAllSections() {
  if (!window._stockSections) return;
  var canManage = _can('inventory.branch.manage');
  Object.keys(window._stockSections).forEach(function(locId) {
    var isSite = locId.startsWith('SI');
    _renderStockSection(locId, canManage, isSite);
  });
}

function _switchSiteTab(tab) {
  var ids = ['stock','sr','usage','maint'];
  ids.forEach(function(t){
    var btn = document.getElementById('siteTab_'+t);
    var contentId = {stock:'siteStockContent', sr:'siteSRContent', usage:'siteUsageContent', maint:'siteMaintContent'}[t];
    var div = document.getElementById(contentId);
    if (btn) btn.className = (t===tab)
      ? 'px-4 py-2 rounded-lg text-sm font-semibold bg-white shadow text-slate-800 transition-all flex items-center gap-1.5'
      : 'px-4 py-2 rounded-lg text-sm font-semibold text-slate-500 hover:text-slate-700 transition-all flex items-center gap-1.5';
    if (div) { if(t===tab) div.classList.remove('hidden'); else div.classList.add('hidden'); }
  });
  var siteId = window._currentSiteId;
  if (tab === 'stock' && siteId) _loadSiteStock(siteId);
  if (tab === 'sr'    && siteId) _loadSiteSRs(siteId);
  if (tab === 'usage' && siteId) _loadSiteUsage(siteId);
  if (tab === 'maint' && siteId) _loadSiteMaintenance(siteId);
}

function _loadSiteStock(siteId) {
  window._currentSiteId = siteId;
  callServer('getStock', [siteId], function(res){
    window._siteStockData = res.data || [];
    _filterSiteStock();
  });
}

function _filterSiteStock() {
  var siteId  = window._currentSiteId || '';
  var data    = window._siteStockData || [];
  var q       = ((document.getElementById('siteSearch')||{}).value||'').toLowerCase();
  var cat     = (document.getElementById('siteCat')||{}).value||'';
  if (q)   data = data.filter(function(s){ return (s.productName||'').toLowerCase().indexOf(q)>-1 || (s.sku||'').toLowerCase().indexOf(q)>-1; });
  if (cat && cat !== 'ALL') data = data.filter(function(s){ return s.categoryCode===cat || s.categoryId===cat; });

  var el = document.getElementById('siteStockTable');
  if (!el) return;

  if (!data.length) {
    el.innerHTML = '<div class="card p-8 text-center text-slate-400"><div class="text-3xl mb-2">📦</div>ບໍ່ມີສິນຄ້າໃນໄຊງານນີ້</div>';
    return;
  }

  var canManage = _can('inventory.branch.manage') || _can('inventory.cw.manage');
  var totalVal  = data.reduce(function(a,s){ return a+(Number(s.qty)||0)*(Number(s.costPrice)||0); }, 0);
  var lowCount  = data.filter(function(s){ return (Number(s.qty)||0)<=(Number(s.reorderPoint)||0) && s.reorderPoint>0; }).length;
  var maintCount = data.filter(function(s){
    var p2 = STATE.data.products.find(function(p){return p.id===s.productId;})||{};
    if (!_isAssetCategory(p2.categoryId)) return false;
    var as = _getAssetStatus(s.productId, siteId);
    return as && (as.status==='UNDER_MAINTENANCE'||as.status==='CANNOT_REPAIR');
  }).length;

  el.innerHTML =
    '<div class="flex flex-wrap gap-4 px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl mb-3 text-xs items-center">' +
    '<span class="text-slate-500">'+data.length+' ສິນຄ້າ</span>' +
    '<span class="font-bold text-blue-700">'+fmtNum(totalVal)+' LAK</span>' +
    (lowCount   > 0 ? '<span class="text-amber-600 font-bold">⚠️ '+lowCount+' Low Stock</span>' : '<span class="text-emerald-600 font-bold">✅ All OK</span>') +
    (maintCount > 0 ? '<span class="text-orange-600 font-bold">🔧 '+maintCount+' ກຳລັງສ້ອມ</span>' : '') +
    '</div>' +

    '<div class="card overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm">' +
    '<thead class="bg-slate-50 border-b border-slate-200"><tr>' +
    ['SKU','Product / ສິນຄ້າ','Category','Qty','Value','Reorder','Status','Action'].map(function(h){
      return '<th class="text-left px-4 py-2.5 text-xs font-bold text-slate-500 uppercase">'+h+'</th>';
    }).join('') + '</tr></thead><tbody>' +

    data.map(function(s){
      var p2      = STATE.data.products.find(function(p){return p.id===s.productId;})||{};
      var isAsset = _isAssetCategory(p2.categoryId);
      var asStatus= isAsset ? _getAssetStatus(s.productId, siteId) : null;
      var stCfg   = asStatus ? (_ASSET_STATUS_CFG[asStatus.status]||_ASSET_STATUS_CFG.OPERATIONAL)
                             : (isAsset ? _ASSET_STATUS_CFG.OPERATIONAL : null);
      var isLow   = (Number(s.qty)||0)<=(Number(s.reorderPoint)||0) && s.reorderPoint>0;
      var pct     = s.reorderPoint>0 ? Math.min(100, Math.round(s.qty/s.reorderPoint*100)) : 100;
      var barCls  = isLow ? (s.qty===0?'bg-red-600':'bg-amber-500') : 'bg-emerald-400';
      var isBroken= asStatus && (asStatus.status==='UNDER_MAINTENANCE'||asStatus.status==='CANNOT_REPAIR'||asStatus.status==='DISPOSED');

      var statusCell = '';
      if (isAsset && stCfg) {
        statusCell = '<span class="inline-flex items-center gap-1 text-[10px] px-2 py-0.5 rounded-full font-bold '+stCfg.cls+'">' +
          '<span class="w-1.5 h-1.5 rounded-full '+stCfg.dot+' flex-shrink-0"></span>'+stCfg.label+'</span>';
        if (asStatus && asStatus.mrNumber) statusCell += '<div class="text-[9px] text-slate-400 mt-0.5">'+asStatus.mrNumber+'</div>';
      } else {
        statusCell = isLow
          ? '<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-xs font-bold">⚠️ Low</span>'
          : '<span class="text-xs text-slate-300">—</span>';
      }

      var adjustBtn = canManage
        ? '<button onclick="openAdjustStock(\''+s.productId+'\',\''+siteId+'\',\''+s.productName.replace(/'/g,'')+'\','+s.qty+')" '+
          'class="btn btn-secondary text-[10px] px-2 py-1 flex items-center gap-1" title="ແກ້ໄຂ Stock">⚙️ ແກ້ໄຂ</button>'
        : '';

      var maintBtn = '';
      if (isAsset && _can('maintenance.create') && !isBroken) {
        maintBtn = '<button onclick="openCreateMRFromStock(\''+s.productId+'\',\''+s.sku+'\',\''+s.productName.replace(/'/g,'')+'\',\''+siteId+'\')" '+
          'class="btn text-[10px] px-2 py-1 bg-orange-50 hover:bg-orange-100 text-orange-600 border border-orange-200 font-semibold" '+
          'title="ແຈ້ງສ້ອມແປງ">🔧 ແຈ້ງສ້ອມ</button>';
      }
      if (isAsset && isBroken && _can('maintenance.view')) {
        var mrLinkId = asStatus ? asStatus.mrId : '';
        maintBtn = '<button onclick="openMRDetail(\''+mrLinkId+'\')" '+
          'class="btn text-[10px] px-2 py-1 bg-amber-50 hover:bg-amber-100 text-amber-700 border border-amber-300 font-semibold">' +
          '🔍 MR Detail</button>';
      }

      return '<tr class="border-b border-slate-100 hover:bg-slate-50/50 '+(isBroken?'bg-amber-50/30':isLow?'bg-red-50/20':'')+'">' +
        '<td class="px-4 py-2.5 font-mono text-xs text-slate-500">'+s.sku+'</td>' +
        '<td class="px-4 py-2.5"><div class="font-semibold text-slate-800 '+(isBroken?'text-amber-700':'')+'">'+s.productName+'</div><div class="text-xs text-slate-400">'+s.productNameLao+'</div></td>' +
        '<td class="px-4 py-2.5 text-xs text-slate-500">'+s.categoryName+'</td>' +
        '<td class="px-4 py-2.5"><div class="flex items-center gap-2">' +
          '<div class="w-14 bg-slate-100 rounded-full h-1.5 flex-shrink-0"><div class="'+barCls+' h-1.5 rounded-full" style="width:'+pct+'%"></div></div>' +
          '<span class="font-bold '+(isLow?'text-red-600':'text-slate-800')+'">'+fmtNum(s.qty)+'</span>' +
          '<span class="text-xs font-normal text-slate-400">'+s.unit+'</span>' +
          (isLow?'<span class="text-amber-500 text-xs">⚠️</span>':'') +
        '</div></td>' +
        '<td class="px-4 py-2.5 text-xs text-slate-600">'+fmtNum(Number(s.qty)*Number(s.costPrice||0))+'</td>' +
        '<td class="px-4 py-2.5 text-xs text-slate-400">'+s.reorderPoint+'</td>' +
        '<td class="px-4 py-2.5 min-w-36">'+statusCell+'</td>' +
        '<td class="px-4 py-2.5"><div class="flex gap-1 flex-wrap">'+adjustBtn+maintBtn+'</div></td>' +
        '</tr>';
    }).join('') +
    '</tbody></table></div></div>';
}

function _loadSiteSRs(siteId) {
  window._currentSiteId = siteId;
  var el = document.getElementById('siteSRTable');
  if (!el) return;
  el.innerHTML = '<div class="text-center py-6 text-slate-400 text-sm">⏳ ກຳລັງໂຫລດ...</div>';

  callServer('getSRs', [siteId], function(res){
    var srs = res.data || [];
    var from     = (document.getElementById('srDateFrom')||{}).value || '';
    var to       = (document.getElementById('srDateTo')||{}).value || '';
    var stFilter = (document.getElementById('srStatusFilter')||{}).value || 'ALL';

    if (from) srs = srs.filter(function(r){ return (r.requestedAt||r.createdAt||'') >= from; });
    if (to)   srs = srs.filter(function(r){ return (r.requestedAt||r.createdAt||'') <= to+'Z'; });
    if (stFilter !== 'ALL') srs = srs.filter(function(r){ return r.status === stFilter; });
    window._siteSRsForExport = srs;

    if (!srs.length) {
      el.innerHTML = '<div class="card p-10 text-center text-slate-400"><div class="text-4xl mb-2">📋</div><div>ບໍ່ມີໃບເບີກໃນຊ່ວງທີ່ເລືອກ</div></div>';
      return;
    }

    var stColors = {
      PENDING:  {bg:'bg-amber-100',   text:'text-amber-700',   border:'border-amber-300'},
      APPROVED: {bg:'bg-emerald-100', text:'text-emerald-700', border:'border-emerald-300'},
      REJECTED: {bg:'bg-red-100',     text:'text-red-700',     border:'border-red-300'},
      FULFILLED:{bg:'bg-blue-100',    text:'text-blue-700',    border:'border-blue-300'}

    var html = '<div class="text-xs text-slate-500 mb-3">ພົບ <strong>'+srs.length+'</strong> ໃບເບີກ</div>' +

      var sc = stColors[r.status] || {bg:'bg-slate-100',text:'text-slate-600',border:'border-slate-200'};
      var totalItems = (r.items||[]).length;

      var totalApproved = (r.items||[]).reduce(function(a,it){ return a+(Number(it.qtyApproved)||0); }, 0);
      var totalValue = (r.items||[]).reduce(function(a,it){ return a+(Number(it.totalCost)||0); }, 0);
      var date = r.requestedAt || r.createdAt || '—';
      var site2 = STATE.data.sites.find(function(s){return s.id===r.siteId;})||{};
      var branch2 = STATE.data.branches.find(function(b){return b.id===r.branchId;})||{};
      var hasApproval = r.status === 'APPROVED' || r.status === 'FULFILLED';

      html +=
        '<div class="card overflow-hidden border-l-4 '+sc.border+'">' +
        // Header
        '<div class="flex items-start justify-between px-5 py-3 bg-slate-50 border-b border-slate-100">' +
        '<div class="flex items-center gap-3">' +
        '<div class="'+sc.bg+' rounded-xl px-3 py-1.5">' +
        '<div class="text-xs font-mono font-bold '+sc.text+'">'+r.srNumber+'</div>' +
        '</div>' +
        '<div>' +
        '<div class="text-xs text-slate-500">📅 '+date+(r.requiredDate?' &nbsp;·&nbsp; ⏰ Required: <strong>'+r.requiredDate+'</strong>':'')+'</div>' +
        '<div class="text-xs text-slate-400 mt-0.5">👤 '+(r.requestedBy||'—')+(r.note?' &nbsp;·&nbsp; "'+r.note+'"':'')+'</div>' +
        '</div>' +
        '</div>' +
        '<div class="flex items-center gap-2">' +
        '<span class="'+sc.bg+' '+sc.text+' text-xs font-bold px-3 py-1 rounded-full">'+r.status+'</span>' +
        (canApprove && r.status==='PENDING'
          ? '<button onclick="openApproveModal(\''+r.id+'\')" class="btn btn-success text-xs px-2 py-1">✅ Approve</button>' +
            '<button onclick="openRejectModal(\''+r.id+'\')" class="btn btn-danger text-xs px-2 py-1">✕ Reject</button>'
          : '') +
        '<button onclick="_printSR(\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1" title="Print / PDF">🖨️</button>' +
        '<button onclick="openSRForm(\''+r.siteId+'\',\''+r.id+'\')" class="btn btn-secondary text-xs px-2 py-1">✏️</button>' +
        '</div></div>' +
        // Items table
        '<div class="overflow-x-auto">' +
        '<table class="w-full text-sm">' +

function _exportSiteSRExcel(siteId, siteName) {
  var srs = window._siteSRsForExport || [];
  if (!srs.length) { showToast('ບໍ່ມີຂໍ້ມູນທີ່ຈະ Export', 'warn'); return; }

  var rows = [
    [siteName + ' — ລາຍງານໃບຂໍເບີກສິນຄ້າ / Stock Requisition Report'],
    ['SR#','ວັນທີຂໍ','ວັນທີຕ້ອງການ','ໄຊງານ','SKU','ສິນຄ້າ','ຈຳນວນຂໍ','ຈຳນວນອະນຸມັດ','ໜ່ວຍ','ຜູ້ຂໍ','ໝາຍເຫດ','ສະຖານະ']
  ];
  srs.forEach(function(r){
    (r.items||[{productId:'',qtyRequested:0,note:''}]).forEach(function(it, i){
      var p = STATE.data.products.find(function(x){return x.id===it.productId;})||{name:it.productId||'—',sku:'—',unit:''};
      rows.push([
        i===0 ? r.srNumber : '',
        i===0 ? (r.requestedAt||r.createdAt||'') : '',
        i===0 ? (r.requiredDate||'') : '',
        i===0 ? siteName : '',
        p.sku||'—',
        p.name,
        it.qtyRequested||0,
        it.qtyApproved !== undefined && it.qtyApproved !== null ? it.qtyApproved : '',
        p.unit||'',
        i===0 ? (r.requestedBy||'') : '',
        it.note||'',
        i===0 ? r.status : ''
      ]);
    });
  });

  var csv = '\uFEFF' + rows.map(function(row){
    return row.map(function(cell){
      var v = String(cell===null||cell===undefined?'':cell).replace(/"/g,'""');
      return /[,"\n]/.test(v) ? '"'+v+'"' : v;
    }).join(',');
  }).join('\n');

  var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = siteName.replace(/\s+/g,'_')+'_SR_'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('📥 Excel Export ສຳເລັດ — '+srs.length+' ໃບເບີກ', 'success');
}

function _exportUsageExcel(siteId, siteName) {
  var usages = window._siteUsagesForExport || [];
  if (!usages.length) { showToast('ບໍ່ມີຂໍ້ມູນ', 'warn'); return; }
  var rows = [[siteName+' — ລາຍງານການໃຊ້ສິນຄ້າ'],
    ['UR#','ວັນທີ','ປະເພດວຽກ','ເວລາ','ພະນັກງານ','SKU','ສິນຄ້າ','Stock ກ່ອນ','ຕັດ','Stock ຫຼັງ','ໜ່ວຍ','ລາຄາ/ໜ່ວຍ','ມູນຄ່າ (LAK)','ໝາຍເຫດ','ຜູ້ລາຍງານ']];
  usages.forEach(function(u){
    (u.items||[]).forEach(function(it,i){
      var p = STATE.data.products.find(function(x){return x.id===it.productId;})||{name:it.productId||'—',sku:'—',unit:'',costPrice:0};
      var cost = it.unitCost !== undefined ? it.unitCost : p.costPrice || 0;
      var val  = it.totalCost !== undefined ? it.totalCost : (Number(it.qty)||0)*cost;
      rows.push([
        i===0?u.urNumber||u.id:'', i===0?u.reportDate:'', i===0?u.workType:'',
        i===0?(u.startTime+'-'+u.endTime):'', i===0?u.staffCount:'',
        p.sku, p.name,
        it.stockBefore !== undefined ? it.stockBefore : '',
        it.qty,
        it.stockAfter  !== undefined ? it.stockAfter  : '',
        p.unit, cost, val, it.note||'',
        i===0?u.reportedBy:''
      ]);
    });
  });
  var csv = '\uFEFF'+rows.map(function(r){return r.map(function(c){var v=String(c==null?'':c).replace(/"/g,'""');return /[,"\n]/.test(v)?'"'+v+'"':v;}).join(',');}).join('\n');
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download = siteName.replace(/\s+/g,'_')+'_Usage_'+new Date().toISOString().split('T')[0]+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('📥 Export ສຳເລັດ', 'success');
}

  var u = STATE.user;

    '<div class="text-right"><div class="text-xs text-slate-400">ຄົງເຫຼືອ</div><div class="font-bold '+(type==='OUT'&&curQty===0?'text-red-600':'text-slate-800')+'">'+curQty+' <span class="text-xs font-normal text-slate-400">'+p.unit+'</span></div></div>' +

    '<div id="smQtyWarn" class="text-xs text-red-600 -mt-2 px-1 hidden">⚠️ ຈຳນວນເກີນ Stock ທີ່ມີ</div>' +

function _smUpdateCurQty(productId) {
  var loc = (document.getElementById('sm_loc')||{}).value;
  var p = STATE.data.products.find(function(x){ return x.id === productId; })||{unit:''};
  var q = ((STATE.data.stock||[])[productId]||{})[loc]||0;
  var bar = document.getElementById('smCurQtyBar');
  if (bar) bar.innerHTML = '🏭 ຄົງເຫຼືອ: <strong class="'+(q===0?'text-red-500':'text-slate-700')+'">'+q+' '+p.unit+'</strong>';
  var qtyInput = document.getElementById('sm_qty');
  if (qtyInput) qtyInput.max = q;
}

function _smCheckQty(productId, type) {
  if (type !== 'OUT') return;
  var loc = (document.getElementById('sm_loc')||{}).value;
  var qty = Number((document.getElementById('sm_qty')||{}).value||0);
  var cur = ((STATE.data.stock||[])[productId]||{})[loc]||0;
  var warn = document.getElementById('smQtyWarn');
  if (warn) warn.classList.toggle('hidden', qty <= cur);
}

function submitStockMove(productId, type) {
  var loc  = document.getElementById('sm_loc').value;
  var qty  = Number(document.getElementById('sm_qty').value);
  var note = document.getElementById('sm_note').value;
  if (!qty || qty <= 0) { showToast('ກະລຸນາໃສ່ຈຳນວນທີ່ຖືກຕ້ອງ', 'error'); return; }

  // Detect location type
  var locType = 'SITE';
  if (loc === 'CW001' || loc.startsWith('CW')) locType = 'COMPANY';
  else if (STATE.data.branches.some(function(b){ return b.id === loc; })) locType = 'BRANCH';

  // Check stock won't go negative on OUT
  if (type === 'OUT') {
    var curQty = ((STATE.data.stock||[])[productId]||{})[loc] || 0;
    if (qty > curQty) {
      showToast('Stock ບໍ່ພໍ — ມີ '+curQty+' ໜ່ວຍ', 'error'); return;
    }
  }

  callServer('stockMovement', [{
    productId: productId, locationId: loc, locationType: locType,
    type: type, qty: qty, userId: STATE.user.id, note: note
  }], function(res){
    if (res.success) {
      showToast((type==='IN'?'📥 Stock In':'📤 Stock Out')+' ສຳເລັດ — ຄົງເຫຼືອ: '+res.after+' ໜ່ວຍ', 'success');
      closeModal();
      // Refresh the correct view
      if (locType === 'COMPANY') {
        renderInventoryForLocation('CW001','COMPANY','Company Warehouse');
      } else if (locType === 'BRANCH') {
        renderInventoryForLocation(loc,'BRANCH','');
      } else {
        // Site — refresh branch that owns the site
        var site = STATE.data.sites.find(function(s){ return s.id === loc; }) || {};
        if (site.branchId) renderInventoryForLocation(site.branchId,'BRANCH','');
        else renderInventory();
      }
    } else showToast('Error: '+(res.message||'Failed'), 'error');
  });
}

function _bcpStartCamera() {
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
    window._bcPickerStream = stream;
    var v=document.getElementById('bcp_video');
    var ph=document.getElementById('bcp_ph');
    var aim=document.getElementById('bcp_aim');
    if(v){v.srcObject=stream;v.classList.remove('hidden');v.play();}
    if(ph) ph.classList.add('hidden');
    if(aim) aim.classList.remove('hidden');
    _bcpStartQuagga(v);
  }).catch(function(){ showToast('ເຂົ້າໃຊ້ກ້ອງບໍ່ໄດ້','error'); });
}

function _bcpStartQuagga(videoEl) {
  if(!window.Quagga) return;
  Quagga.init({
    inputStream:{name:'Live',type:'LiveStream',target:videoEl,constraints:{facingMode:'environment'}},
    decoder:{readers:['ean_reader','ean_8_reader','code_128_reader','code_39_reader','upc_reader']}
  }, function(err){
    if(err) return;
    Quagga.start();
    Quagga.onDetected(function(result){
      var code=result.codeResult&&result.codeResult.code;
      if(!code) return;
      Quagga.stop();
      _bcpStop();
      // Search by barcode
      var inp=document.getElementById('bcp_search');
      if(inp){ inp.value=code; }
      _bcpFilter(code);
      showToast('🔖 Scanned: '+code,'success');
    });
  });
}

function _bcpStop() {
  if(window._bcPickerStream){ window._bcPickerStream.getTracks().forEach(function(t){t.stop();}); window._bcPickerStream=null; }
  if(window.Quagga) try{Quagga.stop();}catch(e){}
  var v=document.getElementById('bcp_video');
  var ph=document.getElementById('bcp_ph');
  var aim=document.getElementById('bcp_aim');
  if(v){v.srcObject=null;v.classList.add('hidden');}
  if(ph) ph.classList.remove('hidden');
  if(aim) aim.classList.add('hidden');
}

function _bcpFilter(q) {
  var lq=(q||'').toLowerCase().trim();
  var results=document.getElementById('bcp_results');
  if(!results) return;
  var matches = STATE.data.products.filter(function(p){
    return !lq ||
      (p.sku||'').toLowerCase().includes(lq) ||
      (p.name||'').toLowerCase().includes(lq) ||
      (p.nameLao||'').toLowerCase().includes(lq) ||
      (p.barcode||'').toLowerCase().includes(lq);
  }).slice(0,12);

  if(!matches.length){
    results.innerHTML='<div class="text-center text-slate-400 py-4 text-sm">ບໍ່ພົບສິນຄ້າ</div>';
    return;
  }
  results.innerHTML = matches.map(function(p){
    var c=STATE.data.categories.find(function(x){return x.id===p.categoryId;})||{};
    var hasBarcode=p.barcode?'<span class="text-emerald-500 text-xs">🔖</span>':'';
    var hasPhoto=p.photo?'<img src="'+p.photo+'" class="w-8 h-8 rounded-lg object-cover border border-slate-200 flex-shrink-0"/>':'<div class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-sm flex-shrink-0">📦</div>';
    return '<div onclick="_bcpSelect(&#x27;' + p.id + '&#x27;)" ' +
      'class="flex items-center gap-3 p-2.5 rounded-xl cursor-pointer hover:bg-blue-50 border border-transparent hover:border-blue-200 transition-all">' +
      hasPhoto +
      '<div class="flex-1 min-w-0">' +
      '<div class="font-semibold text-sm text-slate-800 truncate">'+p.name+' '+hasBarcode+'</div>' +
      '<div class="text-xs text-slate-400"><span class="font-mono">'+p.sku+'</span> · '+c.name+' · '+p.unit+'</div>' +
      (p.barcode?'<div class="text-xs font-mono text-slate-400">'+p.barcode+'</div>':'') +
      '</div>' +
      '<div class="text-blue-500 text-lg flex-shrink-0">›</div>' +
      '</div>';
  }).join('');
}

function _bcpSelect(productId) {
  _bcpStop();

var _scanMode = 'check'; // 'check' | 'receive' | 'dispense' | 'transfer'
var _scanStream = null;

// ── PIN lock state ─────────────────────────────────────
var _scanPinUnlocked = false;     // unlocked this session?
var _scanPinExpiry   = 0;         // epoch ms when unlock expires
var _SCAN_PIN_TIMEOUT = 8 * 60 * 60 * 1000; // 8 hours

// Stored PIN — Manager can change via Admin > Settings
// Default: 1234  (stored in localStorage so it persists)
function getScanPin() {
  return localStorage.getItem('inventoryPro_scanPin') || '1234';
}
function setScanPin(newPin) {
  localStorage.setItem('inventoryPro_scanPin', newPin);
}
function isScanUnlocked() {
  return _scanPinUnlocked && Date.now() < _scanPinExpiry;
}

// Called from sidebar nav item
function renderScan() {
  if (!isScanUnlocked()) {
    _renderScanPinGate();
    return;
  }
  _renderScanUI();
}

function _renderScanPinGate() {
  document.getElementById('pageContent').innerHTML =
    '<div class="max-w-xs mx-auto mt-12">' +
    '<div class="card p-8 text-center">' +

    '<div id="pinPad" class="grid grid-cols-3 gap-3">' +
    [1,2,3,4,5,6,7,8,9].map(function(n){
      return '<button onclick="_pinPress(\''+n+'\')" ' +
        'class="h-14 rounded-2xl text-xl font-bold bg-slate-100 text-slate-800 hover:bg-blue-100 hover:text-blue-700 active:scale-95 transition-all">'+n+'</button>';
    }).join('') +
    '<button onclick="_pinPress(\'clear\')" class="h-14 rounded-2xl text-sm font-bold bg-red-50 text-red-500 hover:bg-red-100 active:scale-95 transition-all">✕ ລຶບ</button>' +
    '<button onclick="_pinPress(\'0\')" class="h-14 rounded-2xl text-xl font-bold bg-slate-100 text-slate-800 hover:bg-blue-100 hover:text-blue-700 active:scale-95 transition-all">0</button>' +
    '<button onclick="_pinPress(\'del\')" class="h-14 rounded-2xl text-lg font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 active:scale-95 transition-all">⌫</button>' +
    '</div>' +

    '<div id="pinMsg" class="mt-4 text-sm text-red-500 min-h-5"></div>' +

    // Change PIN link (Admin/Manager only)
    (STATE.user && (STATE.user.role==='ADMIN'||STATE.user.role==='MANAGER') ?

    '</div></div>';

  window._pinBuffer = '';
}

function _renderPinDots(filled) {
  var html = '';
  for (var i = 0; i < 4; i++) {
    html += '<div class="w-4 h-4 rounded-full border-2 transition-all ' +
      (i < filled ? 'bg-blue-600 border-blue-600' : 'border-slate-400 bg-white') + '"></div>';
  }
  return html;
}

function _pinPress(val) {
  if (!window._pinBuffer) window._pinBuffer = '';
  var buf = window._pinBuffer;

  if (val === 'clear') { buf = ''; }
  else if (val === 'del') { buf = buf.slice(0, -1); }
  else if (buf.length < 4) { buf += val; }

  window._pinBuffer = buf;

  // Update dots
  var dotsEl = document.getElementById('pinDots');
  if (dotsEl) dotsEl.innerHTML = _renderPinDots(buf.length);

  // Auto-check when 4 digits entered
  if (buf.length === 4) {
    setTimeout(function() {
      if (buf === getScanPin()) {
        _scanPinUnlocked = true;
        _scanPinExpiry = Date.now() + _SCAN_PIN_TIMEOUT;
        window._pinBuffer = '';
        showToast('🔓 Unlock ສຳເລັດ — Scan mode ພ້ອມ!', 'success');
        _renderScanUI();
      } else {
        window._pinBuffer = '';
        var dotsEl2 = document.getElementById('pinDots');
        if (dotsEl2) dotsEl2.innerHTML = _renderPinDots(0);
        var msgEl = document.getElementById('pinMsg');
        if (msgEl) {
          msgEl.textContent = '❌ PIN ບໍ່ຖືກຕ້ອງ ກະລຸນາລອງໃໝ່';
          setTimeout(function(){ if(msgEl) msgEl.textContent=''; }, 2000);
        }
        // Shake animation
        var card = document.querySelector('#pageContent .card');
        if (card) {
          card.style.animation = 'shake 0.4s';
          setTimeout(function(){ card.style.animation=''; }, 400);
        }
      }
    }, 150);
  }
}

  openModal('⚙️ ປ່ຽນ PIN Barcode Scan',

    '<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 text-sm text-amber-700">🔐 PIN ໃໝ່ຈະໃຊ້ທຸກຄັ້ງທີ່ເຂົ້າ Barcode Scan</div>' +

}

function _submitChangePin() {
  var cur     = document.getElementById('cp_current').value;
  var newPin  = document.getElementById('cp_new').value;
  var confirm = document.getElementById('cp_confirm').value;

  if (cur !== getScanPin())         { showToast('PIN ປັດຈຸບັນບໍ່ຖືກ', 'error'); return; }
  if (!/^\d{4}$/.test(newPin))      { showToast('PIN ຕ້ອງເປັນ 4 ຕົວເລກ', 'error'); return; }
  if (newPin !== confirm)            { showToast('PIN ໃໝ່ບໍ່ກົງກັນ', 'error'); return; }

  setScanPin(newPin);
  showToast('✅ ປ່ຽນ PIN ສຳເລັດ', 'success');
  closeModal();
}

// Show contextual hint based on selected location

  var locEl = document.getElementById('scanCtxLoc');
  if (!locEl) return;
  window._scanContextLoc = locEl.value;
  var parts = (locEl.value||'').split('|');
  var locType = parts[1] || 'COMPANY';
  var hints = {
    COMPANY: [
      '📥 <strong>ຮັບສິນຄ້າ</strong> ຈາກ Supplier (PO)',
      '📤 <strong>ຈ່າຍ</strong> ໃຫ້ສາຂາ (Dispatch)',
      '✅ <strong>ກວດ Stock</strong> ສາງຫຼັກ'
    ],
    BRANCH: [
      '📥 <strong>ຮັບ</strong> ຈາກສາງຫຼັກ',
      '📤 <strong>Fulfill SR</strong> ໃຫ້ໄຊງານ',
      '✅ <strong>ກວດ Stock</strong> ສາຂານີ້'
    ],
    SITE: [
      '📥 <strong>ຮັບ</strong> ຈາກສາຂາ (ຢືນຢັນ SR)',
      '🧴 <strong>ລາຍງານໃຊ້</strong> ສິນຄ້ານີ້',
      '✅ <strong>ກວດ Stock</strong> ໄຊງານ'
    ]
  };
  var hintList = hints[locType] || hints['COMPANY'];
  var hintEl = document.getElementById('scanCtxHint');
  if (hintEl) {
    hintEl.innerHTML = '<span class="font-semibold text-slate-500">Action ທີ່ໃຊ້ໄດ້ທີ່ນີ້:</span> ' +
      hintList.join(' &nbsp;·&nbsp; ');

function toggleCamera() {
  var video = document.getElementById('scanVideo');
  if (_scanStream) { stopCamera(); return; }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('Camera not supported on this device/browser', 'warn');
    return;
  }
  document.getElementById('scanBtn').textContent = '⏳ ກຳລັງເປີດກ້ອງ...';
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(stream){
      _scanStream = stream;
      video.srcObject = stream;
      video.classList.remove('hidden');
      document.getElementById('scanPlaceholder').classList.add('hidden');
      document.getElementById('scanBtn').textContent = '■ ປິດກ້ອງ';
      var laser = document.getElementById('scanLaser');
      if (laser) { laser.classList.remove('hidden'); }
      _startScanLoop();
    })
    .catch(function(err){
      showToast('ເຂົ້າໃຊ້ກ້ອງບໍ່ໄດ້: '+err.message, 'error');
      document.getElementById('scanBtn').textContent = '📷 ເປີດກ້ອງ Scan';
    });
}

function stopCamera() {
  if (_scanStream) { _scanStream.getTracks().forEach(function(t){t.stop();}); _scanStream = null; }
  var video = document.getElementById('scanVideo');
  if (video) { video.classList.add('hidden'); video.srcObject = null; }
  var ph = document.getElementById('scanPlaceholder');
  if (ph) ph.classList.remove('hidden');
  var laser = document.getElementById('scanLaser');
  if (laser) laser.classList.add('hidden');
  var btn = document.getElementById('scanBtn');
  if (btn) btn.textContent = '📷 ເປີດກ້ອງ Scan';
  clearInterval(window._scanInterval);
}

function _startScanLoop() {
  clearInterval(window._scanInterval);
  window._scanInterval = setInterval(function(){
    var video = document.getElementById('scanVideo');
    var canvas = document.getElementById('scanCanvas');
    if (!video || !canvas || !_scanStream) return;
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(video,0,0);
    // In production: use ZXing / BarcodeDetector API
    if (window.BarcodeDetector) {
      var detector = new window.BarcodeDetector({formats:['ean_13','ean_8','code_128','qr_code','code_39']});
      detector.detect(canvas).then(function(codes){
        if (codes.length > 0) {
          var code = codes[0].rawValue;
          clearInterval(window._scanInterval);
          document.getElementById('scanInput').value = code;
          doScanSearch();
          showToast('สแกนได้: '+code+' ✅');
        }
      }).catch(function(){});
    }
  }, 600);
}

function doScanSearch() {
  var sku = (document.getElementById('scanInput')||{}).value||'';
  if (!sku || sku.length < 1) return;
  var p = STATE.data.products.find(function(x){
    return x.sku.toLowerCase()===sku.toLowerCase() || x.name.toLowerCase().includes(sku.toLowerCase());
  });
  if (!p) {
    document.getElementById('scanResult').innerHTML = '<div class="card p-6 text-center text-slate-400"><div style="font-size:40px">❓</div><div class="mt-2">ไม่พบสินค้า: "'+sku+'"</div></div>';
    return;
  }
  _showScanResult(p);
}

function _showScanResult(p) {
  callServer('getStock', ['ALL'], function(res){
    var allStocks = (res.data||[]).filter(function(s){return s.productId===p.id;});
    var totalQty  = allStocks.reduce(function(a,s){return a+Number(s.qty||0);},0);
    var c         = STATE.data.categories.find(function(x){return x.id===p.categoryId;})||{};
    var isLow     = totalQty <= (p.reorderPoint||0);

    // Context: where is the user?
    var ctxParts  = (window._scanContextLoc||'CW001|COMPANY').split('|');
    var ctxLocId  = ctxParts[0];
    var ctxType   = ctxParts[1] || 'COMPANY';
    var ctxStock  = allStocks.find(function(s){return s.locationId===ctxLocId;});
    var ctxQty    = ctxStock ? Number(ctxStock.qty||0) : 0;
    var ctxName   = ctxStock ? ctxStock.locationName : (ctxLocId==='CW001'?'ສາງຫຼັກ':ctxLocId);
    var ctxIcon   = ctxType==='COMPANY'?'🏛️':ctxType==='BRANCH'?'🏢':'📍';

    callServer('getLots', [p.id, null], function(lr){
      var lots = lr.data || [];
      var nearExpiry = lots.filter(function(l){ return l.daysLeft!==undefined && l.daysLeft<=30 && l.qty>0; });
      var firstLot   = lots.length ? lots[0] : null;

      // Stock at this location bar
      var ctxPct   = p.reorderPoint > 0 ? Math.min(100, Math.round(ctxQty/p.reorderPoint*100)) : 100;
      var ctxBarCls = ctxQty===0?'bg-red-500':ctxPct<=50?'bg-amber-400':'bg-emerald-500';

      // Stock across all locations table
      var locRows = allStocks.length ? allStocks.map(function(s){
        var ico = s.locationType==='BRANCH'?'🏢':s.locationType==='COMPANY'?'🏛️':'📍';
        var isCurrent = s.locationId===ctxLocId;
        return '<div class="flex justify-between items-center py-1.5 '+(isCurrent?'bg-blue-50 px-2 rounded-lg':'')+'">' +
          '<span class="text-xs '+(isCurrent?'font-bold text-blue-700':'text-slate-600')+'">'+ico+' '+s.locationName+(isCurrent?' ← ທ່ານຢູ່ທີ່ນີ້':'')+'</span>' +
          '<span class="text-xs font-bold '+(Number(s.qty)<=0?'text-red-500':Number(s.qty)<=(s.reorderPoint||0)?'text-amber-600':'text-slate-800')+'">'+s.qty+' '+s.unit+'</span>' +
          '</div>';
      }).join('') : '<div class="text-xs text-slate-400 py-2">ບໍ່ມີ stock ທີ່ໃດ</div>';

      // FIFO info
      var fifoNote = firstLot
        ? '<div class="flex items-center gap-2 text-xs mt-1"><span class="bg-blue-100 text-blue-700 font-bold px-1.5 rounded">FIFO</span> <span class="font-mono text-slate-600">'+firstLot.lotNumber+'</span>' +
          (firstLot.daysLeft<=0?'<span class="text-red-600 font-bold">🔴 EXPIRED</span>':firstLot.daysLeft<=30?'<span class="text-amber-600">⚠️ '+firstLot.daysLeft+'d</span>':'<span class="text-emerald-600">✅</span>') +
          '</div>' : '';

      // ── Context-aware Action Buttons ────────────────────
      var actionBtns = _buildScanContextActions(p, ctxLocId, ctxType, ctxQty, allStocks);

      document.getElementById('scanResult').innerHTML =
        '<div class="card overflow-hidden border-2 '+(isLow?'border-red-200':'border-emerald-100')+'">' +

        // Product card
        '<div class="flex items-center gap-3 p-4 border-b border-slate-100">' +
        (p.photo ? '<img src="'+p.photo+'" class="w-14 h-14 rounded-xl object-cover border border-slate-200 flex-shrink-0"/>' :
          '<div class="w-14 h-14 rounded-xl bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center text-3xl flex-shrink-0">📦</div>') +
        '<div class="flex-1 min-w-0">' +
        '<div class="font-black text-slate-800 text-base leading-tight">'+p.name+'</div>' +
        '<div class="text-slate-400 text-sm">'+p.nameLao+'</div>' +
        '<div class="font-mono text-xs text-slate-400">'+p.sku+' · '+c.name+'</div>' +
        fifoNote +
        '</div>' +
        '<div class="text-right flex-shrink-0">' +
        '<div class="text-3xl font-black '+(isLow?'text-red-600':'text-slate-800')+'">'+totalQty+'</div>' +
        '<div class="text-xs text-slate-400">'+p.unit+' (ທັງໝົດ)</div>' +
        (isLow?'<span class="text-xs bg-red-100 text-red-600 font-bold px-1.5 py-0.5 rounded-full">ໃກ້ໝົດ</span>':'') +
        '</div></div>' +

        // Current location stock highlight
        '<div class="px-4 py-3 bg-slate-50 border-b border-slate-100">' +
        '<div class="flex items-center justify-between mb-1.5">' +
        '<span class="text-xs font-bold text-slate-600">'+ctxIcon+' Stock ທີ່ '+ctxName+'</span>' +
        '<span class="text-base font-black '+(ctxQty===0?'text-red-600':ctxQty<=(p.reorderPoint||0)?'text-amber-600':'text-slate-800')+'">'+ctxQty+' '+p.unit+'</span>' +
        '</div>' +
        '<div class="bg-slate-200 rounded-full h-2"><div class="'+ctxBarCls+' h-2 rounded-full transition-all" style="width:'+ctxPct+'%"></div></div>' +
        (nearExpiry.length>0?'<div class="mt-2 text-xs bg-amber-50 border border-amber-200 rounded-lg px-2 py-1.5 text-amber-700">⚠️ '+nearExpiry.length+' Lot ໃກ້ໝົດອາຍຸ — <button onclick="showPage(\'lots\')" class="underline font-bold">ເບິ່ງ Lots</button></div>':'') +
        '</div>' +

        // All locations
        '<details class="border-b border-slate-100">' +
        '<summary class="px-4 py-2 text-xs font-semibold text-slate-500 cursor-pointer hover:text-slate-700 list-none flex items-center gap-1">📍 Stock ທຸກສາງ <span class="text-slate-300">▼</span></summary>' +
        '<div class="px-4 py-2">'+locRows+'</div>' +
        '</details>' +

        // ── Context Action Buttons ────────────────────────
        '<div class="p-4">' +
        '<div class="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">⚡ ຈະເຮັດຫຍັງ?</div>' +
        actionBtns +
        '</div></div>';
    });
  });
}

// Build action buttons appropriate to the current location context
function _buildScanContextActions(p, locId, locType, currentQty, allStocks) {
  var pid  = p.id;
  var unit = p.unit;

  // ── Shared actions (all contexts) ──────────────────────
  var btnStockCard =
    '<button onclick="showPage(\'stockcard\')" ' +
    'class="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold transition-colors">' +
    '<span class="text-xl">📊</span>' +
    '<div class="text-left"><div>ເບິ່ງ Stock Card</div><div class="text-xs font-normal text-slate-400">ປະຫວັດການເຄື່ອນໄຫວທັງໝົດ</div></div></button>';

  var btnStockCount =
    '<button onclick="_scanOpenStockCount(\''+pid+'\',\''+locId+'\')" ' +
    'class="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-violet-500 hover:bg-violet-600 text-white text-sm font-bold transition-colors shadow-sm">' +
    '<span class="text-xl">📋</span>' +
    '<div class="text-left"><div>ນັບ Stock</div><div class="text-xs font-normal opacity-80">Stock ປັດຈຸບັນ: '+currentQty+' '+unit+' — ໃສ່ຈຳນວນຈິງ</div></div></button>';

  // ── CW: Receive PO · Dispatch to Branch ────────────────
  if (locType === 'COMPANY') {
    return '<div class="space-y-2">' +
      '<button onclick="showPage(\'po\')" ' +
      'class="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-bold transition-colors shadow-sm">' +
      '<span class="text-xl">📥</span><div class="text-left"><div>ຮັບສິນຄ້າ (PO Receive)</div><div class="text-xs font-normal opacity-80">ກ່ວດ PO ລໍຖ້າ — ສາງຫຼັກ</div></div></button>' +
      '<button onclick="_scanQuickDispatch(\''+pid+'\')" ' +
      'class="flex items-center gap-3 w-full px-4 py-3 rounded-xl bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-bold transition-colors shadow-sm">' +
      '<span class="text-xl">📤</span><div class="text-left"><div>ຈ່າຍໃຫ້ສາຂາ (Dispatch)</div><div class="text-xs font-normal opacity-80">Stock CW: '+currentQty+' '+unit+'</div></div></button>' +
      btnStockCount +
      btnStockCard +
      '</div>';
  }

  // ── Branch: Fulfill SR · Transfer ──────────────────────

function _submitScanStockCount(pid, locId, sysBefore) {
  var actual = parseInt((document.getElementById('sc_qty')||{}).value||sysBefore);
  var note   = (document.getElementById('sc_note')||{}).value||'Stock Count ຈາກ Barcode Scanner';
  if (isNaN(actual) || actual < 0) { showToast('ຈຳນວນບໍ່ຖືກຕ້ອງ','error'); return; }

  callServer('adjustStock', [{
    productId: pid, locId: locId,
    newQty: actual, note: 'Stock Count: '+note,
    type: 'STOCK_COUNT'
  }], function(r){
    if (r.success) {
      var diff = actual - sysBefore;
      var msg  = diff===0 ? '✅ Stock ກົງກັນ' : (diff>0?'▲ Adjust +'+diff:' ▼ Adjust '+diff);
      showToast(msg+' — Stock Count ສຳເລັດ', 'success');
      closeModal();
      doScanSearch(); // refresh scan result
    } else {
      showToast('Error: '+(r.error||'ບໍ່ສຳເລັດ'), 'error');
    }
  });
}

function renderLots() {
  window._lotF = window._lotF || {search:'', prod:'ALL', loc:'ALL', cat:'ALL', expiry:'ALL', dateFrom:'', dateTo:'', page:1, perPage:25};
  callServer('getLots', [null,null], function(res){
    var lots = res.data || [];
    window._allLots = lots;
    // Expiry alert banners (persistent, above page)
    var expired  = lots.filter(function(l){ return l.daysLeft <= 0 && l.qty > 0; });
    var expiring = lots.filter(function(l){ return l.daysLeft > 0 && l.daysLeft <= 30 && l.qty > 0; });
    var alertBanner = '';
    if (expired.length)  alertBanner += '<div class="card p-3 mb-3 bg-red-50 border-red-200 border-2 flex items-center gap-3"><span class="text-xl">🔴</span><div><div class="font-bold text-red-700 text-sm">EXPIRED — '+expired.length+' Lot(s) have expired stock!</div><div class="text-xs text-red-600">'+expired.slice(0,4).map(function(l){return l.productName+' · '+l.lotNumber;}).join(' | ')+(expired.length>4?' …':'')+'</div></div><button onclick="window._lotF.expiry=\'expired\';_redrawLots()" class="ml-auto btn text-xs px-2 py-1 bg-red-600 text-white">ກັ່ນຕອງ →</button></div>';
    if (expiring.length) alertBanner += '<div class="card p-3 mb-3 bg-amber-50 border-amber-200 border flex items-center gap-3"><span class="text-xl">⚠️</span><div><div class="font-bold text-amber-700 text-sm">Near Expiry — '+expiring.length+' Lots expiring within 30 days</div><div class="text-xs text-amber-600">'+expiring.slice(0,4).map(function(l){return l.productName+' ('+l.daysLeft+'d)';}).join(' · ')+(expiring.length>4?' …':'')+'</div></div><button onclick="window._lotF.expiry=\'soon\';_redrawLots()" class="ml-auto btn text-xs px-2 py-1 bg-amber-500 text-white">ກັ່ນຕອງ →</button></div>';
    document.getElementById('pageContent').innerHTML =
      alertBanner +
      // KPI row
      '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4" id="lotKpi"></div>' +
      // Filter + table area
      '<div id="lotFilterArea"></div>' +
      '<div id="lotTableArea"></div>';
    _redrawLots();
  });
}

function _redrawLots() {
  var f = window._lotF || {};
  var all = (window._allLots||[]).slice();
  var s = (f.search||'').toLowerCase();
  var filtered = all.filter(function(l){
    if (f.prod && f.prod !== 'ALL' && l.productId !== f.prod) return false;
    if (f.loc  && f.loc  !== 'ALL' && l.locationId !== f.loc)  return false;
    if (f.cat  && f.cat  !== 'ALL') {
      var p2 = STATE.data.products.find(function(x){return x.id===l.productId;})||{};
      if (p2.categoryId !== f.cat) return false;
    }
    if (f.expiry === 'ok')      { if (l.daysLeft <= 30) return false; }
    else if (f.expiry === 'soon')    { if (!(l.daysLeft > 0 && l.daysLeft <= 30)) return false; }
    else if (f.expiry === 'expired') { if (l.daysLeft > 0) return false; }
    else if (f.expiry === 'active')  { if (l.qty <= 0) return false; }
    if (f.dateFrom && _dateStr(l.receivedAt||l.receivedDate) < f.dateFrom) return false;
    if (f.dateTo   && _dateStr(l.receivedAt||l.receivedDate) > f.dateTo)   return false;
    if (s && (l.lotNumber||'').toLowerCase().indexOf(s)<0 &&
             (l.productName||'').toLowerCase().indexOf(s)<0 &&
             (l.sku||'').toLowerCase().indexOf(s)<0) return false;
    return true;
  });
  var pag = paginateData(filtered, f.page||1, f.perPage||25);

  // KPI
  var kpiEl = document.getElementById('lotKpi');
  if (kpiEl) {
    var total = all.length, active = all.filter(function(l){return l.qty>0;}).length;
    var expCnt = all.filter(function(l){return l.daysLeft<=0&&l.qty>0;}).length;
    var soonCnt = all.filter(function(l){return l.daysLeft>0&&l.daysLeft<=30&&l.qty>0;}).length;
    kpiEl.innerHTML =
      _kpiMini('📦','Total Lots',total,'from-blue-500 to-blue-700') +
      _kpiMini('✅','Active Lots',active,'from-emerald-500 to-emerald-700') +
      _kpiMini('⚠️','Near Expiry',soonCnt,'from-amber-500 to-amber-700') +
      _kpiMini('🔴','Expired',expCnt,'from-red-600 to-red-800');
  }

  // Build dropdown options
  var prodOpts = '<option value="ALL">All Products</option>' + STATE.data.products.map(function(p){
    return '<option value="'+p.id+'" '+(f.prod===p.id?'selected':'')+'>'+p.sku+' – '+p.name+'</option>';
  }).join('');

function renderLotRows(lots) {
  if (!lots.length) return '<tr><td colspan="12" class="px-4 py-8 text-center text-slate-400">No lot records found</td></tr>';
  // Group by product+location for FIFO order (oldest = next to be used)
  var fifoOrder = lots.slice().sort(function(a,b){
    return (a.receivedAt||a.receivedDate||'').localeCompare(b.receivedAt||b.receivedDate||'');
  });
  // FIFO / AVCO per product+location
  var costMap = {};
  lots.forEach(function(l){
    var key = l.productId+'|'+l.locationId;
    if (!costMap[key]) {
      costMap[key] = {
        fifo: _getFifoCost(l.productId, l.locationId),
        avco: _getAvco(l.productId, l.locationId)
      };
    }
  });
  return lots.map(function(l){
    var expStatus, expClass, expBg;
    if (l.daysLeft <= 0) { expStatus='🔴 EXPIRED'; expClass='text-red-600 font-bold'; expBg='bg-red-50/30'; }
    else if (l.daysLeft <= 7) { expStatus='🟠 '+l.daysLeft+'d'; expClass='text-orange-600 font-bold'; expBg='bg-orange-50/20'; }
    else if (l.daysLeft <= 30) { expStatus='🟡 '+l.daysLeft+'d'; expClass='text-amber-600'; expBg='bg-amber-50/20'; }
    else { expStatus='🟢 '+l.daysLeft+'d'; expClass='text-emerald-600'; expBg=''; }
    var fifoIdx = fifoOrder.filter(function(x){ return x.productId===l.productId && x.locationId===l.locationId; })
                           .findIndex(function(x){return x.id===l.id;});
    var isFirstFifo = fifoIdx === 0;
    var key = l.productId+'|'+l.locationId;
    var costs = costMap[key]||{fifo:0,avco:0};
    var locName = (STATE.data.branches.find(function(b){return b.id===l.locationId;})||
                   STATE.data.sites.find(function(s){return s.id===l.locationId;})||
                   (l.locationId==='CW001'?{name:'Company WH'}:{name:l.locationId})||{name:l.locationId}).name;
    return '<tr class="border-b border-slate-100 hover:bg-slate-50/50 '+expBg+'">' +
      '<td class="px-3 py-3 font-mono text-xs font-bold text-slate-700 whitespace-nowrap">'+l.lotNumber+'</td>' +
      '<td class="px-3 py-3"><div class="font-semibold text-slate-800 text-xs">'+l.productName+'</div><div class="text-xs text-slate-400">'+l.sku+'</div></td>' +
      '<td class="px-3 py-3 text-xs text-slate-500 whitespace-nowrap">'+locName+'</td>' +
      '<td class="px-3 py-3 font-bold text-slate-800 text-xs">'+l.qty+' <span class="font-normal text-slate-400">'+l.unit+'</span></td>' +
      '<td class="px-3 py-3 text-xs text-slate-500 whitespace-nowrap">'+fmtDT(l.receivedAt||l.receivedDate)+'</td>' +
      '<td class="px-3 py-3 text-xs text-slate-600 whitespace-nowrap">'+l.expiryDate+'</td>' +
      '<td class="px-3 py-3 text-xs '+expClass+' whitespace-nowrap">'+expStatus+'</td>' +
      // Lot unit cost (this specific lot's purchase price)
      '<td class="px-3 py-3 text-xs whitespace-nowrap"><span class="font-semibold text-slate-700">'+fmtNum(Math.round(l.unitCost||0))+'</span><div class="text-slate-400">LAK/ໜ່ວຍ</div></td>' +
      // FIFO cost = oldest remaining lot's unitCost for this product+location
      '<td class="px-3 py-3 text-xs whitespace-nowrap"><span class="font-bold text-blue-700">'+fmtNum(Math.round(costs.fifo))+'</span><div class="text-slate-400">LAK/ໜ່ວຍ</div></td>' +
      // AVCO = weighted average of all remaining lots at this location
      '<td class="px-3 py-3 text-xs whitespace-nowrap"><span class="font-bold text-purple-700">'+fmtNum(Math.round(costs.avco))+'</span><div class="text-slate-400">LAK/ໜ່ວຍ</div></td>' +
      '<td class="px-3 py-3">'+(isFirstFifo?'<span class="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full">🥇 Next OUT</span>':'<span class="text-slate-300 text-xs">#'+(fifoIdx+1)+'</span>')+'</td>' +
      '<td class="px-3 py-3"><button onclick="openEditLot(\''+l.id+'\')" class="btn btn-secondary text-xs px-2 py-1">✏️</button></td></tr>';
  }).join('');
}

function filterLots() {
  var lots = (window._allLots||[]).slice();
  var prod = (document.getElementById('lotProd')||{}).value||'';
  var loc = (document.getElementById('lotLoc')||{}).value||'';
  var exp = (document.getElementById('lotExpiry')||{}).value||'';
  if (prod) lots = lots.filter(function(l){return l.productId===prod;});
  if (loc) lots = lots.filter(function(l){return l.locationId===loc;});
  if (exp==='ok') lots = lots.filter(function(l){return l.daysLeft>30;});
  else if (exp==='soon') lots = lots.filter(function(l){return l.daysLeft>0&&l.daysLeft<=30;});
  else if (exp==='expired') lots = lots.filter(function(l){return l.daysLeft<=0;});
  var body = document.getElementById('lotBody');
  if (body) body.innerHTML = renderLotRows(lots);
}

function _alUpdateCost(sel) {
  var pid = sel.value;
  var p = STATE.data.products.find(function(x){return x.id===pid;})||{costPrice:0};
  var el = document.getElementById('al_cost'); if(el) el.value = p.costPrice||0;
  _alCalc();
}
function _alCalc() {
  var pid = (document.getElementById('al_prod')||{}).value;
  var locId = (document.getElementById('al_loc')||{}).value||'CW001';
  var qty = Number((document.getElementById('al_qty')||{value:0}).value||0);
  var cost = Number((document.getElementById('al_cost')||{value:0}).value||0);
  var avco = _getAvco(pid, locId);
  var avcoEl = document.getElementById('al_avco');
  if(avcoEl) avcoEl.textContent = 'LAK '+fmtNum(Math.round(avco));
  // Preview new AVCO after this lot
  var existLots = (STATE.data.lots||[]).filter(function(l){return l.productId===pid&&l.locationId===locId&&l.qty>0;});
  var existQty = existLots.reduce(function(s,l){return s+l.qty;},0);
  var existVal = existLots.reduce(function(s,l){return s+(l.qty*(l.unitCost||0));},0);
  var newAvco = (existQty+qty)>0?(existVal+qty*cost)/(existQty+qty):cost;
  var summEl = document.getElementById('al_summary');
  if(summEl && qty>0) summEl.innerHTML =
    '💰 ລວມ Lot: <strong>LAK '+fmtNum(qty*cost)+'</strong> &nbsp;·&nbsp; '+
    'AVCO ປັດຈຸບັນ: <strong>LAK '+fmtNum(Math.round(avco))+'</strong> &nbsp;·&nbsp; '+
    'AVCO ຫຼັງຮັບ: <strong class="text-blue-900">LAK '+fmtNum(Math.round(newAvco))+'</strong>';
}

function submitAddLot() {

    productId:(document.getElementById('al_prod')||{}).value,
    locationId:(document.getElementById('al_loc')||{value:'CW001'}).value||'CW001',
    lotNumber:(document.getElementById('al_lot')||{}).value||'',
    qty:Number((document.getElementById('al_qty')||{}).value||0),
    unitCost:Number((document.getElementById('al_cost')||{}).value||0),
    receivedDate:(document.getElementById('al_rec')||{}).value,
    expiryDate:(document.getElementById('al_exp')||{}).value,
    note:(document.getElementById('al_note')||{}).value
  };
  if (!d.qty||d.qty<=0) {showToast('ກະລຸນາໃສ່ຈຳນວນ','warn');return;}
  if (!d.lotNumber) {showToast('ກະລຸນາໃສ່ Lot Number','warn');return;}

function _dpItemRow(idx, productId, qty, note) {
  var prodOpts = '<option value="">— ເລືອກສິນຄ້າ —</option>' +
    (STATE.data.products||[]).map(function(p){
      return '<option value="'+p.id+'" '+(p.id===productId?'selected':'')+'>'+p.sku+' – '+p.name+' ('+p.unit+')</option>';
    }).join('');
  return '<div id="dpRow_'+idx+'" class="p-3 bg-slate-50 rounded-xl space-y-2">' +
    '<div class="scan-field-wrap">' +
    '<select id="dp_prod_'+idx+'" class="select text-sm" onchange="dpCheckRowStock('+idx+')">'+prodOpts+'</select>' +
    '<button type="button" onclick="openBarcodePicker(\'dp_prod_'+idx+'\',function(){dpCheckRowStock('+idx+');})" class="btn-scan">&#x25AE;&#x25A0; Scan</button>' +
    '<button type="button" onclick="dpRemoveItem('+idx+')" class="text-red-400 hover:text-red-600 px-2 font-bold text-xl flex-shrink-0">×</button>' +
    '</div>' +
    '<div class="grid gap-2" style="grid-template-columns:100px 1fr">' +
    '<input id="dp_qty_'+idx+'" type="number" min="1" class="input text-sm" value="'+(qty||1)+'" placeholder="ຈຳນວນ" oninput="dpCheckRowStock('+idx+')">' +
    '<input id="dp_note_'+idx+'" class="input text-sm" value="'+(note||'')+'" placeholder="ໝາຍເຫດ (optional)">' +
    '</div>' +
    '<div id="dpRowInfo_'+idx+'" class="text-xs px-1 min-h-4"></div>' +
    '</div>';
}

var _dpItemCount = 1;

function dpAddItem() {
  var list = document.getElementById('dpItemsList');
  if (!list) return;
  var div = document.createElement('div');
  div.innerHTML = _dpItemRow(_dpItemCount++, '', 1, '');
  list.appendChild(div.firstElementChild);
}

function dpRemoveItem(idx) {
  var row = document.getElementById('dpRow_'+idx);
  if (row && row.parentNode.children.length > 1) row.remove();
  else showToast('ຕ້ອງມີລາຍການຢ່າງໜ້ອຍ 1', 'warn');
}

function dpCheckRowStock(idx) {
  var pid = (document.getElementById('dp_prod_'+idx)||{}).value;
  var qty = Number((document.getElementById('dp_qty_'+idx)||{}).value||0);
  var info = document.getElementById('dpRowInfo_'+idx);
  if (!info) return;
  if (!pid) { info.innerHTML = ''; return; }
  var cwQty = ((STATE.data.stock||[])[pid]||{})['CW001']||0;
  var p = (STATE.data.products||[]).find(function(x){return x.id===pid;})||{unit:''};
  var enough = !qty || cwQty >= qty;
  info.innerHTML = '🏛️ ມີໃນ CW: <strong class="'+(enough?'text-purple-700':'text-red-600')+'">'+fmtNum(cwQty)+' '+p.unit+'</strong>'+(qty&&!enough?' <span class="text-red-500 font-semibold">⚠️ ບໍ່ພໍ</span>':'');
}

function dpRefreshAllStock() {
  for (var i = 0; i < _dpItemCount; i++) {
    if (document.getElementById('dpRow_'+i)) dpCheckRowStock(i);
  }
}

function submitDispatch(bdId) {
  var to   = (document.getElementById('dp_to')||{}).value;
  var date = (document.getElementById('dp_date')||{}).value;
  var note = (document.getElementById('dp_note')||{}).value||'';
  if (!to)   { showToast('ກະລຸນາເລືອກສາຂາ','warn'); return; }
  if (!date) { showToast('ກະລຸນາໃສ່ວັນທີ','warn'); return; }

  var items = [];
  document.querySelectorAll('[id^="dpRow_"]').forEach(function(row){
    var idx = row.id.replace('dpRow_','');
    var pid  = (document.getElementById('dp_prod_'+idx)||{}).value;
    var qty  = Number((document.getElementById('dp_qty_'+idx)||{}).value||0);
    var rn   = (document.getElementById('dp_note_'+idx)||{}).value||'';
    if (pid && qty > 0) items.push({productId:pid, qty:qty, note:rn});
  });
  if (!items.length) { showToast('ກະລຸນາໃສ່ລາຍການສິນຄ້າ','warn'); return; }

  var payload = {toLocId:to, fromLocId:'CW001', requiredDate:date, note:note, items:items};
  if (bdId) payload.id = bdId;

  callServer('saveDispatch', [payload], function(res){
    if (res.success){
      showToast('✅ ສ່ງຄຳຮ້ອງ Dispatch — '+res.bdNumber, 'success');
      closeModal();
      _dpItemCount = 1;
      renderInventoryForLocation('CW001','COMPANY','Company Warehouse');
    } else showToast('Error','error');
  });
}
