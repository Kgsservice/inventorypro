<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Multiplayer 301</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f4f3ef;min-height:100vh;color:#1a1a1a}
#app{max-width:440px;margin:0 auto;padding:1rem}
.scr{display:none}.scr.on{display:block}
h1{font-size:24px;font-weight:700;margin-bottom:.5rem}
h2{font-size:20px;font-weight:600;margin-bottom:1rem}
.sub{color:#666;font-size:14px;margin-bottom:1.25rem;line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;padding:13px 20px;border:1.5px solid #1a1a1a;border-radius:10px;background:transparent;color:#1a1a1a;cursor:pointer;font-size:15px;font-weight:500;margin-bottom:8px;font-family:inherit;transition:background .15s}
.btn:hover{background:#e8e7e2}.btn.pri{background:#1a1a1a;color:#fff}.btn.pri:hover{background:#333}
.btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.row{display:flex;gap:8px;margin-bottom:8px}.row .btn{margin:0}
.fld{width:100%;padding:12px 14px;border:1.5px solid #d0cfc9;border-radius:10px;background:#fff;color:#1a1a1a;font-size:15px;margin-bottom:8px;font-family:inherit}
.fld:focus{outline:none;border-color:#1a1a1a}
.err{color:#c0392b;font-size:13px;min-height:18px;margin-bottom:6px}
.card{background:#fff;border:1px solid #e0dfd9;border-radius:14px;padding:1rem 1.25rem;margin-bottom:10px}
.muted{color:#888;font-size:13px}
.code-box{background:#fff;border:1.5px solid #d0cfc9;border-radius:12px;padding:1rem;text-align:center;margin:1rem 0}
.code-big{font-family:monospace;font-size:15px;font-weight:700;word-break:break-all;line-height:1.6;padding:0 .5rem;user-select:all;cursor:text}
.copy-btn{margin-top:8px;font-size:13px;color:#888;cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit;padding:4px 0}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:1rem 0}
.pc{background:#fff;border:1.5px solid #e0dfd9;border-radius:12px;padding:.75rem;text-align:center;transition:border-color .2s}
.pc.active{background:#e8f4e8;border-color:#1a6b3c}
.pc.me{border-color:#1a1a1a}
.pnm{font-size:12px;color:#888;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.psc{font-size:32px;font-weight:700}.pc.active .psc{color:#1a6b3c}
.turn-lbl{text-align:center;font-size:13px;color:#888;margin-bottom:.5rem}
canvas{display:block;margin:0 auto;cursor:crosshair;border-radius:50%}
.drow{display:flex;gap:10px;justify-content:center;margin:.6rem 0}
.dp{width:40px;height:40px;border-radius:50%;border:1.5px solid #d0cfc9;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#888}
.dp.hit{background:#f0ede0;border-color:#999;color:#1a1a1a}.dp.cur{border-color:#1a1a1a;border-width:2px;color:#1a1a1a}
.rslt{text-align:center;font-size:18px;font-weight:600;min-height:28px;margin:.4rem 0;color:#1a6b3c}
.rslt.bust{color:#c0392b}
.wait-box{text-align:center;padding:3rem 1rem}.wait-box p{font-size:16px;margin-bottom:.5rem}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#eee;color:#555;margin-left:6px}
.trophy{width:72px;height:72px;border-radius:50%;background:#f5d020;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#5d4200}
.notif{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:13px;background:#1a1a1a;color:#fff;padding:6px 16px;border-radius:20px;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.notif.show{opacity:1}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #aaa;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

<!-- HOME -->
<div id="s-home" class="scr on">
  <h1>🎯 Dart Multiplayer</h1>
  <p class="sub">เล่น 301 กับเพื่อนผ่านอินเทอร์เน็ต<br>ส่งไฟล์นี้ให้เพื่อน แล้วใช้รหัสห้องเพื่อเจอกัน</p>
  <input class="fld" id="f-name" placeholder="ชื่อผู้เล่น" maxlength="14">
  <button class="btn pri" id="create-btn" onclick="createRoom()">+ สร้างห้อง</button>
  <div class="row">
    <input class="fld" id="f-code" placeholder="รหัสห้อง" maxlength="20" style="margin:0;text-transform:uppercase">
    <button class="btn" id="join-btn" style="flex:0 0 100px" onclick="joinRoom()">เข้าร่วม</button>
  </div>
  <p class="err" id="herr"></p>
  <p class="muted" id="hstatus"></p>
</div>

<!-- LOBBY -->
<div id="s-lobby" class="scr">
  <h2>ห้องรอ</h2>
  <p class="muted">กด "คัดลอก" แล้วส่งให้เพื่อนวาง</p>
  <div class="code-box">
    <div class="code-big" id="lcode" onclick="copyCode()" title="กดเพื่อคัดลอก">—</div>
    <button class="copy-btn" onclick="copyCode()">📋 คัดลอกรหัสห้อง</button>
  </div>
  <div id="lplayers"></div>
  <p class="muted" id="lstatus" style="text-align:center;margin:.5rem 0"></p>
  <button class="btn pri" id="sbtn" style="display:none" onclick="hostStartGame()">เริ่มเกม!</button>
</div>

<!-- GAME -->
<div id="s-game" class="scr">
  <div class="pgrid" id="gplayers"></div>
  <p class="turn-lbl" id="tlabel"></p>
  <div id="my-area" style="display:none">
    <canvas id="board" width="288" height="288"></canvas>
    <div class="rslt" id="drslt"></div>
    <div class="drow" id="drow"></div>
    <button class="btn pri" id="tbtn" onclick="throwDart()" style="margin-top:.5rem">ขว้างปา!</button>
  </div>
  <div id="wait-area" class="wait-box" style="display:none">
    <p id="wmsg" style="font-size:16px;margin-bottom:.5rem"></p>
    <p class="muted" id="wsub"></p>
  </div>
</div>

<!-- RESULTS -->
<div id="s-res" class="scr" style="text-align:center;padding:1.5rem 0">
  <div class="trophy">1</div>
  <h1 id="wname" style="margin-bottom:.25rem"></h1>
  <p class="muted" style="margin-bottom:1.5rem">ชนะเลิศ!</p>
  <div class="pgrid" id="fscores"></div>
  <button class="btn pri" style="margin-top:1rem" onclick="location.reload()">เล่นใหม่</button>
</div>

</div><!-- #app -->
<div class="notif" id="notif"></div>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script>
// ─── Constants ───────────────────────────────────────────────────
const SECTORS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const START = 301;

// ─── State ───────────────────────────────────────────────────────
let peer = null, conns = [], hostConn = null;
let isHost = false, myName = '', roomCode = '', myId = '';
let gameState = null;
let turnDarts = [];          // local display copy — always synced FROM gameState on renderGame
let aimRaf = null, aimX = 0, aimY = 0, aimPh = Math.random() * Math.PI * 2;
let canThrow = false;

// ─── UI Helpers ───────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById('s-' + id).classList.add('on');
}
function setErr(m) { document.getElementById('herr').textContent = m; }
function setStatus(m) { document.getElementById('hstatus').textContent = m; }
function notify(msg, dur = 2500) {
  const el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), dur);
}
function setBusy(busy) {
  document.getElementById('create-btn').disabled = busy;
  document.getElementById('join-btn').disabled = busy;
}
function copyCode() {
  navigator.clipboard.writeText(roomCode)
    .then(() => notify('คัดลอกแล้ว! ✓'))
    .catch(() => { prompt('คัดลอกรหัสนี้:', roomCode); });
}

// ─── PeerJS ──────────────────────────────────────────────────────
function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 8; i++) s += c[Math.floor(Math.random() * c.length)];
  return s;
}

function makePeer(customId, onOpen, onErr) {
  if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
  peer = customId ? new Peer(customId, {debug: 0}) : new Peer({debug: 0});
  peer.on('open', id => { myId = id; onOpen(id); });
  peer.on('error', e => onErr(e));
}

// ─── CREATE ROOM ─────────────────────────────────────────────────
function createRoom() {
  myName = document.getElementById('f-name').value.trim();
  if (!myName) { setErr('กรุณาใส่ชื่อ'); return; }
  setErr(''); setBusy(true); setStatus('กำลังสร้างห้อง...');
  tryCreate(0);
}

function tryCreate(attempt) {
  if (attempt > 8) { setErr('สร้างห้องไม่ได้ กรุณาลองใหม่'); setStatus(''); setBusy(false); return; }
  makePeer(null, peerId => {
    roomCode = peerId; isHost = true; myId = peerId;
    gameState = {
      players: [{ id: peerId, name: myName, score: START }],
      cur: 0, phase: 'waiting', turnDarts: [], winner: null, round: 1,
      bust: false, lastLabel: ''
    };
    // listen for incoming connections
    peer.on('connection', conn => {
      conn.on('open', () => {
        conns.push(conn);
        conn.send({ type: 'state', state: gameState }); // send current state immediately
        notify('มีคนเข้าร่วม! 🎯');
      });
      conn.on('data', d => handleHostData(conn, d));
      conn.on('close', () => { handleDisconnect(conn); });
    });
    document.getElementById('lcode').textContent = roomCode;
    show('lobby'); renderLobby(); setStatus(''); setBusy(false);
  }, e => {
    if (e.type === 'unavailable-id') { tryCreate(attempt + 1); }
    else { setErr('ผิดพลาด: ' + e.type); setStatus(''); setBusy(false); }
  });
}

// ─── JOIN ROOM ────────────────────────────────────────────────────
function joinRoom() {
  myName = document.getElementById('f-name').value.trim();
  const code = document.getElementById('f-code').value.trim().toUpperCase();
  if (!myName) { setErr('กรุณาใส่ชื่อ'); return; }
  if (!code) { setErr('กรุณาใส่รหัสห้อง'); return; }
  setErr(''); setBusy(true); setStatus('กำลังเชื่อมต่อ...');
  makePeer(null, id => {
    myId = id; roomCode = code;
    hostConn = peer.connect(code, { reliable: true });
    let opened = false;
    let timeoutId = setTimeout(() => {
      if (!opened) {
        setErr('เชื่อมต่อไม่ได้ — ตรวจสอบรหัสอีกครั้ง');
        setStatus(''); setBusy(false);
      }
    }, 10000);
    hostConn.on('open', () => {
      opened = true;
      clearTimeout(timeoutId);
      setStatus(''); setBusy(false);
      // Show lobby immediately — don't wait for first broadcast
      document.getElementById('lcode').textContent = roomCode;
      document.getElementById('lstatus').textContent = 'รอ Host เริ่มเกม...';
      document.getElementById('lplayers').innerHTML = `<div class="card" style="display:flex;align-items:center;gap:12px"><div style="width:38px;height:38px;border-radius:50%;background:#f0ede0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px">${myName[0].toUpperCase()}</div><span style="font-weight:500">${myName} <span class="badge">คุณ</span></span></div>`;
      show('lobby');
      hostConn.send({ type: 'join', id: myId, name: myName });
    });
    hostConn.on('data', d => handleClientData(d));
    hostConn.on('close', () => {
      notify('การเชื่อมต่อถูกตัด — โหลดใหม่เพื่อเล่นต่อ', 6000);
    });
  }, e => {
    setErr('ผิดพลาด: ' + e.type); setStatus(''); setBusy(false);
  });
}

// ─── HOST: handle incoming messages ──────────────────────────────
function handleHostData(conn, d) {
  if (d.type === 'join') {
    if (gameState.phase !== 'waiting') {
      conn.send({ type: 'error', msg: 'เกมเริ่มแล้ว ไม่สามารถเข้าร่วมได้' });
      return;
    }
    if (gameState.players.length >= 4) {
      conn.send({ type: 'error', msg: 'ห้องเต็ม (สูงสุด 4 คน)' });
      return;
    }
    if (!gameState.players.find(p => p.id === d.id)) {
      gameState.players.push({ id: d.id, name: d.name, score: START });
    }
    broadcastState(); renderLobby();
  }
  if (d.type === 'throw') {
    const curP = gameState.players[gameState.cur];
    // Validate: must be this player's turn
    if (!curP || curP.id !== d.pid) return;
    // Validate: must be in playing phase and have room for more darts
    if (gameState.phase !== 'playing') return;
    if ((gameState.turnDarts || []).length >= 3) return;
    hostApplyThrow(d.nx, d.ny);
  }
}

// ─── CLIENT: handle incoming messages ────────────────────────────
function handleClientData(d) {
  if (d.type === 'state') {
    gameState = d.state;
    if (gameState.phase === 'waiting') {
      document.getElementById('lcode').textContent = roomCode;
      show('lobby'); renderLobby();
    } else if (gameState.phase === 'playing') {
      show('game'); renderGame();
    } else if (gameState.phase === 'finished') {
      renderResults();
    }
  }
  if (d.type === 'error') { notify('⚠️ ' + d.msg, 4000); }
}

// ─── HANDLE DISCONNECT ────────────────────────────────────────────
function handleDisconnect(conn) {
  conns = conns.filter(c => c !== conn);
  if (!gameState) return;
  // Find which player disconnected
  const disconnectedId = [...gameState.players.map(p => p.id)].find(id => {
    return !conns.find(c => c.peer === id) && id !== myId;
  });
  if (disconnectedId) {
    notify('ผู้เล่นออกจากเกม', 3000);
    // Remove from players list if in waiting
    if (gameState.phase === 'waiting') {
      gameState.players = gameState.players.filter(p => p.id !== disconnectedId);
      broadcastState(); renderLobby();
    } else if (gameState.phase === 'playing') {
      // Skip if it was their turn
      const wasCur = gameState.players[gameState.cur] && gameState.players[gameState.cur].id === disconnectedId;
      gameState.players = gameState.players.filter(p => p.id !== disconnectedId);
      if (gameState.players.length === 0) { location.reload(); return; }
      if (gameState.players.length === 1) {
        // only one left — they win
        gameState.phase = 'finished';
        gameState.winner = gameState.players[0].id;
      } else if (wasCur) {
        gameState.cur = gameState.cur % gameState.players.length;
        gameState.turnDarts = []; gameState.bust = false; gameState.lastLabel = '';
      }
      broadcastState();
      if (gameState.phase === 'finished') renderResults();
      else renderGame();
    }
  }
}

// ─── BROADCAST ────────────────────────────────────────────────────
function broadcastState() {
  conns.forEach(c => { try { c.send({ type: 'state', state: gameState }); } catch(e) {} });
}

// ─── LOBBY ────────────────────────────────────────────────────────
function renderLobby() {
  document.getElementById('lplayers').innerHTML = gameState.players.map(p =>
    `<div class="card" style="display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:50%;background:#f0ede0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px">${p.name[0].toUpperCase()}</div>
      <span style="font-weight:500">${p.name}${p.id === myId ? ' <span class="badge">คุณ</span>' : ''}</span>
      ${gameState.players[0].id === p.id ? '<span class="muted" style="margin-left:auto">Host</span>' : ''}
    </div>`
  ).join('');
  const sbtn = document.getElementById('sbtn');
  if (isHost) {
    if (gameState.players.length >= 2) {
      sbtn.style.display = ''; document.getElementById('lstatus').textContent = 'พร้อมเริ่ม!';
    } else {
      sbtn.style.display = 'none'; document.getElementById('lstatus').textContent = 'รอผู้เล่นอื่นเข้าร่วม...';
    }
  } else {
    sbtn.style.display = 'none'; document.getElementById('lstatus').textContent = 'รอ Host เริ่มเกม...';
  }
}

function hostStartGame() {
  gameState.phase = 'playing'; gameState.cur = 0;
  gameState.turnDarts = []; gameState.round = 1;
  gameState.bust = false; gameState.lastLabel = '';
  broadcastState(); show('game'); renderGame();
}

// ─── GAME RENDER ─────────────────────────────────────────────────
function renderGame() {
  const cur = gameState.players[gameState.cur];
  const isMe = cur && cur.id === myId;

  // Scoreboard
  document.getElementById('gplayers').innerHTML = gameState.players.map((p, i) =>
    `<div class="pc ${i === gameState.cur ? 'active' : ''} ${p.id === myId ? 'me' : ''}">
      <div class="pnm">${p.name}${p.id === myId ? ' ★' : ''}</div>
      <div class="psc">${p.score}</div>
      ${i === gameState.cur ? '<div style="font-size:10px;color:#1a6b3c;margin-top:2px">เล่นอยู่</div>' : ''}
    </div>`
  ).join('');
  document.getElementById('tlabel').textContent =
    `รอบ ${gameState.round || 1}  —  ${isMe ? 'ตาของคุณ!' : 'ตาของ ' + (cur ? cur.name : '?')}`;

  if (isMe) {
    document.getElementById('my-area').style.display = '';
    document.getElementById('wait-area').style.display = 'none';
    // Sync dart display from authoritative state
    turnDarts = (gameState.turnDarts || []).slice();
    updateDRow();
    // Show label from state (bust or last score)
    const rsltEl = document.getElementById('drslt');
    rsltEl.className = 'rslt' + (gameState.bust ? ' bust' : '');
    rsltEl.textContent = turnDarts.length > 0 ? (gameState.bust ? `Bust! คะแนนคงเดิม ${cur.score}` : gameState.lastLabel) : '';
    // Enable throwing only if darts remain
    if (turnDarts.length < 3) {
      canThrow = true;
      document.getElementById('tbtn').disabled = false;
      if (!aimRaf) startAim();
    } else {
      canThrow = false;
      document.getElementById('tbtn').disabled = true;
    }
  } else {
    document.getElementById('my-area').style.display = 'none';
    document.getElementById('wait-area').style.display = '';
    document.getElementById('wmsg').textContent = `${cur ? cur.name : '?'} กำลังเล่น...`;
    document.getElementById('wsub').textContent = `โยนแล้ว ${(gameState.turnDarts || []).length} / 3 ลูก`;
    stopAim();
  }
  drawBoard(isMe ? aimX : null, isMe ? aimY : null);
}

// ─── DARTBOARD DRAWING ───────────────────────────────────────────
function drawBoard(hx, hy) {
  const cv = document.getElementById('board'); if (!cv) return;
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height, cx = W/2, cy = H/2, R = 122;
  ctx.clearRect(0, 0, W, H);
  const N = 20, ANG = Math.PI*2/N, OFF = -Math.PI/2 - ANG/2;
  const RINGS = [
    {r: R,      c: ['#1a6b3c','#c0392b']},
    {r: R*.926, c: ['#141414','#f0ede0']},
    {r: R*.695, c: ['#1a6b3c','#c0392b']},
    {r: R*.635, c: ['#141414','#f0ede0']}
  ];
  for (let i = 0; i < N; i++) {
    const a0 = OFF + i*ANG, a1 = a0 + ANG;
    RINGS.forEach(rg => {
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, rg.r, a0, a1); ctx.closePath();
      ctx.fillStyle = rg.c[i%2]; ctx.fill();
    });
  }
  [R, R*.926, R*.695, R*.635].forEach(r => {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(180,180,180,.4)'; ctx.lineWidth = 1; ctx.stroke();
  });
  ctx.strokeStyle = 'rgba(180,180,180,.25)'; ctx.lineWidth = .5;
  for (let i = 0; i < N; i++) {
    const a = OFF + i*ANG;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*R, cy + Math.sin(a)*R); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(cx, cy, R*.175, 0, Math.PI*2); ctx.fillStyle = '#1a6b3c'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, R*.07, 0, Math.PI*2); ctx.fillStyle = '#c0392b'; ctx.fill();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 9.5px system-ui';
  for (let i = 0; i < N; i++) {
    const a = OFF + (i+.5)*ANG;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText(SECTORS[i], cx + Math.cos(a)*R*1.08, cy + Math.sin(a)*R*1.08);
  }
  // Draw dart markers (local display copy)
  turnDarts.forEach((d, i) => {
    const px = cx + d.nx*R, py = cy + d.ny*R;
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2);
    ctx.fillStyle = ['#e74c3c','#3498db','#f39c12'][i]; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 1.5; ctx.stroke();
  });
  // Draw crosshair
  if (hx !== null) {
    const px = cx + hx*R, py = cy + hy*R;
    ctx.strokeStyle = 'rgba(231,76,60,.9)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px-14, py); ctx.lineTo(px+14, py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px, py-14); ctx.lineTo(px, py+14); ctx.stroke();
    ctx.beginPath(); ctx.arc(px, py, 9, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(231,76,60,.35)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

// ─── SCORE CALCULATION ────────────────────────────────────────────
function calcScore(nx, ny) {
  const r = Math.sqrt(nx*nx + ny*ny);
  if (r <= .07) return { score: 50, label: 'Bullseye! (50)' };
  if (r <= .175) return { score: 25, label: 'Bull (25)' };
  let a = Math.atan2(nx, -ny) * 180 / Math.PI; if (a < 0) a += 360;
  const v = SECTORS[Math.floor(((a + 9) % 360) / 18)];
  if (r <= .635) return { score: v, label: `${v}` };
  if (r <= .695) return { score: v*3, label: `Triple ${v}  (${v*3})` };
  if (r <= .926) return { score: v, label: `${v}` };
  if (r <= 1.0)  return { score: v*2, label: `Double ${v}  (${v*2})` };
  return { score: 0, label: 'พลาด!' };
}

// ─── AIM ANIMATION ───────────────────────────────────────────────
function startAim() {
  if (aimRaf) return;
  function tick() {
    aimPh += .038;
    aimX = Math.sin(aimPh*1.3)*.6 + Math.sin(aimPh*.7)*.2;
    aimY = Math.cos(aimPh*1.0)*.6 + Math.cos(aimPh*.5)*.2;
    const r = Math.sqrt(aimX*aimX + aimY*aimY);
    if (r > .95) { aimX *= .95/r; aimY *= .95/r; }
    drawBoard(aimX, aimY);
    aimRaf = requestAnimationFrame(tick);
  }
  aimRaf = requestAnimationFrame(tick);
}
function stopAim() {
  if (aimRaf) { cancelAnimationFrame(aimRaf); aimRaf = null; }
  drawBoard(null, null);
}
function updateDRow() {
  document.getElementById('drow').innerHTML = [0,1,2].map(i => {
    const d = turnDarts[i];
    return `<div class="dp ${d ? 'hit' : i === turnDarts.length ? 'cur' : ''}">${d ? d.score : i+1}</div>`;
  }).join('');
}

// ─── THROW ────────────────────────────────────────────────────────
function throwDart() {
  if (!canThrow || turnDarts.length >= 3) return;
  canThrow = false;
  document.getElementById('tbtn').disabled = true;
  const nx = aimX + (Math.random()-.5)*.045;
  const ny = aimY + (Math.random()-.5)*.045;
  if (isHost) {
    hostApplyThrow(nx, ny);
  } else {
    // Send to host and wait for state broadcast — NO optimistic UI update
    // (canThrow stays false until renderGame() re-enables it from authoritative state)
    if (hostConn) hostConn.send({ type: 'throw', pid: myId, nx, ny });
  }
}

// ─── HOST: APPLY THROW (authoritative) ───────────────────────────
function hostApplyThrow(nx, ny) {
  if (gameState.phase !== 'playing') return;
  const res = calcScore(nx, ny);
  gameState.turnDarts = gameState.turnDarts || [];
  gameState.turnDarts.push({ score: res.score, label: res.label, nx, ny });
  gameState.lastLabel = res.label;
  gameState.bust = false;

  if (gameState.turnDarts.length >= 3) {
    // End of turn
    stopAim();
    const total = gameState.turnDarts.reduce((s, d) => s + d.score, 0);
    const curP = gameState.players[gameState.cur];
    const ns = curP.score - total;

    if (ns < 0) {
      // Bust — score unchanged
      gameState.bust = true;
    } else {
      curP.score = ns;
      if (ns === 0) {
        // Win!
        gameState.phase = 'finished';
        gameState.winner = curP.id;
      }
    }

    if (gameState.phase !== 'finished') {
      // Advance turn
      gameState.cur = (gameState.cur + 1) % gameState.players.length;
      if (gameState.cur === 0) gameState.round = (gameState.round || 1) + 1;
      gameState.turnDarts = [];
      gameState.bust = false;
      gameState.lastLabel = '';
    }

    broadcastState();
    // Delay before transitioning UI — let players see last dart
    setTimeout(() => {
      if (gameState.phase === 'finished') {
        renderResults();
      } else {
        renderGame();
        const nxt = gameState.players[gameState.cur];
        if (nxt && nxt.id === myId) startAim();
      }
    }, 1200);
  } else {
    // Mid-turn — broadcast and re-render
    broadcastState();
    // Update host's own UI
    turnDarts = gameState.turnDarts.slice();
    updateDRow();
    document.getElementById('drslt').className = 'rslt';
    document.getElementById('drslt').textContent = res.label;
    drawBoard(aimX, aimY);
    canThrow = true;
    document.getElementById('tbtn').disabled = false;
  }
}

// ─── RESULTS ─────────────────────────────────────────────────────
function renderResults() {
  stopAim();
  const w = gameState.players.find(p => p.id === gameState.winner);
  document.getElementById('wname').textContent = w ? w.name : '?';
  const sorted = [...gameState.players].sort((a, b) => a.score - b.score);
  document.getElementById('fscores').innerHTML = sorted.map((p, i) =>
    `<div class="pc ${p.id === gameState.winner ? 'active' : ''}">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">${['1st','2nd','3rd','4th'][i]}</div>
      <div style="font-weight:600">${p.name}</div>
      <div class="muted">เหลือ ${p.score} แต้ม</div>
    </div>`
  ).join('');
  show('res');
}

// Init board
drawBoard(null, null);
</script>
